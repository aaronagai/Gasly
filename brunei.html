<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gasly — Brunei Fuel Prices</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  <style>
    .country-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0 4px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 16px;
    }
    .country-flag { font-size: 1.25rem; line-height: 1; }
    .country-name {
      font-size: 0.8rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
    }
    .country-status-pill {
      margin-left: auto;
      font-size: 0.56rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 3px 9px; border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.04);
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .country-status-pill.live {
      color: #00d4ff;
      border-color: rgba(0,212,255,0.3);
      background: rgba(0,212,255,0.08);
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.6rem; color: var(--text-muted, #888);
      letter-spacing: 0.1em; text-transform: uppercase;
      text-decoration: none; margin-bottom: 14px;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--text, #f0f0f0); }

    [data-theme="light"] .country-bar { border-color: rgba(0,0,0,0.08); }
  </style>
  <script>
    (function(){
      var t = localStorage.getItem('theme') ||
        (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>

  <div class="container">
    <header>
      <div class="header-left">
        <a href="./index.html" class="logo-block" style="text-decoration:none;color:inherit;" aria-label="Home">
          <img src="logo.svg" alt="Gasly logo" class="site-logo" />
          <div>
            <h1 class="site-title"><span class="title-regular">Gas</span><span class="title-bold">ly</span></h1>
            <p class="site-subtitle">World Live Fuel Prices</p>
          </div>
        </a>
      </div>
      <div class="header-right">
        <button id="theme-btn" class="theme-btn" onclick="toggleTheme()" aria-label="Toggle light/dark mode"></button>
      </div>
    </header>

    <!-- Meta bar -->
    <div class="meta-bar">
      <div class="meta-item">
        <span class="meta-label">Last Updated</span>
        <span class="meta-value" id="last-updated">—</span>
      </div>
      <div class="meta-item">
        <span class="status-dot" id="status-dot"></span>
        <span class="meta-value" id="status-text">Loading…</span>
      </div>
    </div>

    <a href="./index.html" class="back-link">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
      All countries
    </a>

    <div class="country-bar">
      <span class="country-flag">🇧🇳</span>
      <span class="country-name">Brunei Darussalam</span>
      <span class="country-status-pill" id="country-status">Loading…</span>
    </div>

    <!-- Fuel Cards -->
    <main class="cards-grid" id="cards-grid">
      <div class="skeleton-card" aria-busy="true"></div>
      <div class="skeleton-card" aria-busy="true"></div>
      <div class="skeleton-card" aria-busy="true"></div>
      <div class="skeleton-card" aria-busy="true"></div>
    </main>

    <footer>
      <p class="footer-powered">Powered by Open Government Data</p>
      <p class="footer-meta">
        <a href="https://github.com/aaronagai/Gasly" target="_blank" rel="noopener">Open Source</a> &nbsp;&bull;&nbsp;
        <a href="https://github.com/aaronagai/Gasly/blob/main/LICENSE" target="_blank" rel="noopener">MIT License</a>
        &nbsp;&bull;&nbsp;
        Built by <a href="https://github.com/aaronagai" target="_blank" rel="noopener">@aaronagai</a>
      </p>
    </footer>
  </div>

  <script>
    /* ── Theme ── */
    const ICON_SUN  = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.25a.75.75 0 0 1 .75.75v2.25a.75.75 0 0 1-1.5 0V3a.75.75 0 0 1 .75-.75ZM7.5 12a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0Zm11.394-5.834a.75.75 0 0 0-1.06-1.06l-1.591 1.59a.75.75 0 1 0 1.06 1.061l1.591-1.59ZM21.75 12a.75.75 0 0 1-.75.75h-2.25a.75.75 0 0 1 0-1.5H21a.75.75 0 0 1 .75.75Zm-3.916 5.834a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 1 0-1.061 1.06l1.59 1.591ZM12 18a.75.75 0 0 1 .75.75V21a.75.75 0 0 1-1.5 0v-2.25A.75.75 0 0 1 12 18Zm-4.242-.697a.75.75 0 0 0-1.061-1.06l-1.591 1.59a.75.75 0 0 0 1.06 1.061l1.591-1.59ZM6 12a.75.75 0 0 1-.75.75H3a.75.75 0 0 1 0-1.5h2.25A.75.75 0 0 1 6 12Zm.697-4.243a.75.75 0 0 0 1.06-1.06L6.166 5.106a.75.75 0 0 0-1.06 1.06l1.59 1.591Z"/></svg>`;
    const ICON_MOON = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M9.528 1.718a.75.75 0 0 1 .162.819A8.97 8.97 0 0 0 9 6a9 9 0 0 0 9 9 8.97 8.97 0 0 0 3.463-.69.75.75 0 0 1 .981.98 10.503 10.503 0 0 1-9.694 6.46c-5.799 0-10.5-4.701-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 0 1 .818.162Z" clip-rule="evenodd"/></svg>`;

    let currentTheme = localStorage.getItem('theme') ||
      (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');

    function updateThemeBtn() {
      const btn = document.getElementById('theme-btn');
      if (btn) btn.innerHTML = currentTheme === 'dark' ? ICON_SUN : ICON_MOON;
    }
    window.toggleTheme = function() {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('theme', currentTheme);
      document.documentElement.setAttribute('data-theme', currentTheme);
      updateThemeBtn();
      if (window._bnData) renderCards(window._bnData);
    };
    updateThemeBtn();

    /* ── Fuel config ── */
    const FUEL_KEYS = [
      { key: 'gasoline',        label: 'Gasoline',        accent: '#00ff64', lightAccent: '#16a34a' },
      { key: 'diesel',          label: 'Diesel',          accent: '#ffaa00', lightAccent: '#ea580c' },
      { key: 'vpower_gasoline', label: 'V-Power Gasoline', accent: '#b478ff', lightAccent: '#9333ea' },
      { key: 'vpower_diesel',   label: 'V-Power Diesel',  accent: '#00d4ff', lightAccent: '#0ea5e9' },
    ];

    /* ── CSV parser ── */
    function parseCSV(text) {
      const rows = text.trim().split('\n').map(r =>
        r.split(',').map(c => c.replace(/^"|"$/g, '').trim())
      );
      const headers = rows[0];
      return rows.slice(1).map(r => {
        const obj = {};
        headers.forEach((h, i) => { obj[h] = r[i]; });
        return obj;
      });
    }

    /* ── Render ── */
    function renderCards(data) {
      const grid = document.getElementById('cards-grid');
      grid.innerHTML = '';

      FUEL_KEYS.forEach(({ key, label, accent, lightAccent }) => {
        const activeAccent = (currentTheme === 'light' && lightAccent) ? lightAccent : accent;

        const prices = data
          .map(row => parseFloat(row[key]))
          .filter(v => !isNaN(v) && v > 0);

        const current = prices[prices.length - 1];
        const prev    = prices[prices.length - 2];
        if (current === undefined) return;

        const diff        = prev !== undefined ? +(current - prev).toFixed(3) : 0;
        const changeClass = diff > 0 ? 'up' : diff < 0 ? 'down' : 'same';
        const arrow       = diff > 0 ? '▲' : diff < 0 ? '▼' : '─';
        const changeLabel = diff === 0
          ? 'Unchanged'
          : `${diff > 0 ? '+' : ''}B$${diff.toFixed(2)}`;

        const card = document.createElement('div');
        card.className = 'fuel-card';
        card.style.setProperty('--card-accent', activeAccent);
        card.innerHTML = `
          <div class="card-header">
            <div>
              <div class="card-name">${label}</div>
              <div class="card-name-sub">Brunei-Wide</div>
            </div>
            <span class="card-type-badge" style="color:${activeAccent};border-color:${activeAccent}40;background:${activeAccent}12;">${label.split(' ')[0]}</span>
          </div>
          <div class="card-price-row">
            <span class="card-currency">B$</span>
            <span class="card-price" style="color:${activeAccent}">${current.toFixed(2)}</span>
            <span class="card-currency">/L</span>
          </div>
          <div class="card-change ${changeClass}">
            <span class="change-arrow">${arrow}</span>
            <span class="change-label">${changeLabel}</span>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    /* ── Fetch ── */
    const SHEET_ID   = '1kvbA3aTL_4VvjSjsx7n0kcOLbjrXvDRnru8NEF1pDCE';
    const SHEET_NAME = 'Brunei';
    const SHEET_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`;

    async function loadData() {
      const statusDot   = document.getElementById('status-dot');
      const statusText  = document.getElementById('status-text');
      const countryPill = document.getElementById('country-status');

      try {
        const res  = await fetch(SHEET_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const data = parseCSV(text);
        window._bnData = data;

        renderCards(data);

        const lastRow = data[data.length - 1];
        if (lastRow?.date) {
          document.getElementById('last-updated').textContent =
            new Date(lastRow.date).toLocaleDateString('en-BN', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        statusDot.classList.remove('error');
        statusText.textContent = 'Connected';
        countryPill.textContent = '● Live';
        countryPill.classList.add('live');
      } catch (err) {
        console.error(err);
        statusDot.classList.add('error');
        statusText.textContent = 'Failed to load. Retrying…';
        countryPill.textContent = '○ Error';
        document.getElementById('cards-grid').innerHTML =
          `<p class="error-msg">Could not load Brunei data. Please try again later.</p>`;
      }
    }

    loadData();
  </script>
</body>
</html>
