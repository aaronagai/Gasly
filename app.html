<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="application-name" content="PetrolPrice" />
  <meta name="apple-mobile-web-app-title" content="PetrolPrice" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" id="meta-theme-color" content="#ff6a00" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/appicon.png" />
  <link rel="icon" type="image/png" href="assets/appicon.png" />
  <title>PetrolPrice — App</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@600&family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/shared.css" />
  <link rel="stylesheet" href="assets/app.css" />
  <link href="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="assets/config.js"></script>
  <script src="assets/utils.js"></script>
  <script src="assets/app-map-openfreemap.js"></script>
  <!-- styles: assets/app.css -->
</head>
<body>
  <div class="app">
    <div class="map" id="map"></div>

    <div class="topbar">
      <div class="search" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.3-4.3" />
        </svg>
        <input id="country-search" type="search" placeholder="Search" autocomplete="off" spellcheck="false" />
      </div>
      <a href="./index.html" class="topbar-wordmark site-wordmark">petrolprice.xyz</a>
    </div>
    <div class="search-menu" id="country-search-menu" role="listbox" aria-label="Country and region results"></div>

    <div class="sheet" id="sheet" aria-label="Details sheet">
      <div class="grab" id="grab" role="button" tabindex="0" aria-label="Drag to resize panel"></div>
      <div class="sheet-scroll" id="sheet-scroll">
        <div class="sheet-region-sticky" id="sheet-region-sticky">
          <div class="title" id="hi-title">Semenanjung</div>
        </div>
        <div class="sheet-cards-stack">
        <div class="card" id="card-highlights">
          <div class="pad">
            <div class="card-sub-row">
              <div class="sub" id="hi-sub">—</div>
              <button type="button" class="card-export" aria-label="Export highlights" title="Export">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M15 3h6v6" />
                  <path d="M10 14 21 3" />
                  <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                </svg>
              </button>
            </div>
            <div class="lines hi-lines" id="hi-lines"></div>
          </div>
        </div>

        <div class="card" id="card-history">
          <div class="pad">
            <div class="card-head-inline">
              <div class="kicker" id="chart-kicker">Malaysia petrol prices history</div>
              <button type="button" class="card-export" aria-label="Export price history" title="Export">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M15 3h6v6" />
                  <path d="M10 14 21 3" />
                  <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                </svg>
              </button>
            </div>
          </div>
          <div class="chart-wrap">
            <canvas id="chart"></canvas>
          </div>
        </div>

        <div class="card" id="card-overview">
          <div class="pad">
            <div class="card-head-inline">
              <div class="kicker" id="ov-kicker">Malaysia overview</div>
              <button type="button" class="card-export" aria-label="Export overview" title="Export">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M15 3h6v6" />
                  <path d="M10 14 21 3" />
                  <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                </svg>
              </button>
            </div>
            <div class="oil" id="overview-text">—</div>
            <div class="overview-metrics" id="overview-metrics" aria-label="Key metrics"></div>
          </div>
        </div>
        </div>
      </div>
    </div>

    <div class="export-story-modal" id="export-story-modal" aria-hidden="true">
      <div class="export-story-backdrop" aria-hidden="true"></div>
      <div class="export-story-dialog" role="dialog" aria-modal="true" aria-labelledby="export-story-heading">
        <div class="export-story-header">
          <h2 class="export-story-heading" id="export-story-heading">Story preview</h2>
          <button type="button" class="export-story-close" id="export-story-close" aria-label="Close">×</button>
        </div>
        <div class="export-story-frame">
          <img id="export-story-preview" alt="" width="1080" height="1920" />
        </div>
        <button type="button" class="export-story-save" id="export-story-save">Save to gallery</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    // COUNTRIES, COUNTRY_OVERVIEW, ID_CITY_LONLAT, MY_REGIONS — from config.js
    // ensureMalaysiaRows, ensureSheetRows, cssVar, withAlpha, takeLastN, asNum, buildChartSeries — from utils.js

    /** ISO id → name for map hover/hit (same set as terminal). */
    const MAP_COUNTRY_NAMES = {
      36:'Australia', 50:'Bangladesh', 96:'Brunei', 104:'Myanmar',
      116:'Cambodia', 144:'Sri Lanka', 156:'China', 158:'Taiwan',
      356:'India', 360:'Indonesia', 392:'Japan', 410:'South Korea',
      418:'Laos', 458:'Malaysia', 598:'Papua New Guinea', 608:'Philippines',
      626:'Timor-Leste', 702:'Singapore', 704:'Vietnam', 764:'Thailand',
    };

    let selected = 458;
    let RIGHT_CHART = null;
    let APP_ZOOM_TO = null;

    /** Search suggestions: MY regions from config, live SG providers from sheet, BN, ID cities (matches terminal data model). */
    async function buildSearchRegionsList() {
      const rows = [];
      MY_REGIONS.forEach((r) => {
        rows.push({
          countryId: 458,
          label: `${COUNTRIES[458].name} - ${r.label}`,
          myRegion: r.key,
        });
      });
      rows.push({ countryId: 96, label: `${COUNTRIES[96].name} - National` });

      let sgRows = [];
      try {
        sgRows = await ensureSheetRows(SG_SHEET_URL);
      } catch (_) {
        sgRows = [];
      }
      const sgProvs = sortedSingaporeProviders(sgRows);
      if (sgProvs.length) {
        sgProvs.forEach((p) => {
          rows.push({ countryId: 702, label: `${COUNTRIES[702].name} - ${p}`, sgProvider: p });
        });
      } else {
        rows.push({ countryId: 702, label: `${COUNTRIES[702].name} - National` });
      }

      Object.keys(ID_CITY_LONLAT)
        .sort((a, b) => a.localeCompare(b))
        .forEach((city) => {
          rows.push({ countryId: 360, label: `${COUNTRIES[360].name} - ${city}`, idCity: city });
        });
      return rows;
    }


    function fmtIDR(n) {
      const x = parseFloat(n);
      if (!Number.isFinite(x)) return '—';
      return `IDR ${Math.round(x).toLocaleString('en-US')}/L`;
    }

    function getMalaysiaRegion() {
      try {
        const k = localStorage.getItem('terminal_my_region') || 'Semenanjung';
        return k === 'SabahSarawak' ? 'SabahSarawak' : 'Semenanjung';
      } catch (_) {
        return 'Semenanjung';
      }
    }

    function getIndonesiaCity() {
      try { return localStorage.getItem('terminal_id_city') || 'Jakarta Pusat'; } catch (_) { return 'Jakarta Pusat'; }
    }

    function syncSearchInputFromSelection() {
      const inp = document.getElementById('country-search');
      if (!inp || document.activeElement === inp) return;
      inp.value = '';
    }

    // Data fetch helpers — ensureMalaysiaRows / ensureSheetRows come from utils.js

    const APP_CHART_POINTS = 30;

    function chartOptions(countryId) {
      const legendColor = cssVar('--chart-legend', 'rgba(0,0,0,0.48)');
      const tickColor = cssVar('--chart-tick', 'rgba(0,0,0,0.45)');
      const gridColor = cssVar('--chart-grid', 'rgba(0,0,0,0.06)');
      return {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 420, easing: 'easeOutCubic' },
        // App / touch: no hover tooltips or active-point styling
        events: [],
        interaction: { mode: 'nearest', intersect: false },
        plugins: {
          legend: {
            display: true,
            position: 'bottom',
            align: 'start',
            labels: {
              usePointStyle: false,
              boxWidth: 11,
              boxHeight: 2,
              borderRadius: 1,
              padding: 10,
              boxPadding: 4,
              font: {
                family: 'Inter, system-ui, sans-serif',
                size: 8,
                weight: '400',
              },
              color: legendColor,
              generateLabels(chart) {
                const ds = chart.data.datasets || [];
                /* Chart.js paints legend text with legendItem.fontColor; without it, labels stay default (black). */
                return ds.map((d, i) => ({
                  text: d.label,
                  fillStyle: d.borderColor,
                  strokeStyle: d.borderColor,
                  lineWidth: 0,
                  hidden: !chart.isDatasetVisible(i),
                  index: i,
                  datasetIndex: i,
                  fontColor: legendColor,
                }));
              },
            },
          },
          tooltip: { enabled: false },
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { color: tickColor, font: { size: 10 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 },
          },
          y: {
            grid: { color: gridColor },
            ticks: {
              color: tickColor,
              font: { size: 10 },
              callback(v) {
                if (countryId === 360) return Number(v) >= 1e6 ? `${(v / 1e6).toFixed(1)}M` : `${Math.round(v / 1000)}k`;
                return v;
              },
            },
          },
        },
      };
    }

    function updateChart({ labels, datasets, countryId }) {
      const cv = document.getElementById('chart');
      if (!cv || !window.Chart) return;
      const ctx = cv.getContext('2d');

      function mkFill(stroke) {
        const grad = ctx.createLinearGradient(0, 0, 0, cv.height || 210);
        grad.addColorStop(0, withAlpha(stroke, 0.16));
        grad.addColorStop(1, withAlpha(stroke, 0));
        return grad;
      }

      const nextDs = (datasets || []).map((ds) => ({
        label: ds.label,
        data: ds.data || [],
        borderColor: ds.color,
        backgroundColor: mkFill(ds.color),
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 0,
        tension: 0.35,
        fill: true,
        spanGaps: true,
      }));

      if (RIGHT_CHART) {
        RIGHT_CHART.destroy();
        RIGHT_CHART = null;
      }

      RIGHT_CHART = new Chart(ctx, {
        type: 'line',
        data: { labels: labels || [], datasets: nextDs },
        options: chartOptions(countryId),
      });
    }

    function renderHiRows(pairs) {
      const el = document.getElementById('hi-lines');
      el.innerHTML = pairs.map(([k, v]) =>
        `<div class="hi-row"><span class="hi-k">${k}</span><span class="hi-v">${v}</span></div>`
      ).join('');
    }

    function setHiLoading() {
      renderHiRows([['Prices', 'Loading…']]);
    }

    async function refreshHighlights(cid) {
      const titleEl = document.getElementById('hi-title');
      const subEl = document.getElementById('hi-sub');
      const chartKicker = document.getElementById('chart-kicker');
      const cname = COUNTRIES[cid]?.name || '—';
      setHiLoading();

      function emptyChart() {
        updateChart({
          labels: ['—'],
          datasets: [{ label: 'No data', data: [null], color: cssVar('--chart-empty', '#d4d4d4') }],
          countryId: null,
        });
      }

      try {
        if (cid === 458) {
          const rows = await ensureMalaysiaRows();
          const seriesAsc = sortRowsByDate(rows);
          const rSel = seriesAsc[seriesAsc.length - 1] || {};
          const regionKey = getMalaysiaRegion();
          const isEast = regionKey === 'SabahSarawak';
          const dieselKey = isEast ? 'diesel_eastmsia' : 'diesel';
          const dieselLabel = isEast ? 'Diesel (East MY)' : 'Diesel';
          titleEl.textContent = isEast ? 'East Malaysia' : 'Semenanjung';
          subEl.textContent = `As of ${fmtDate(rSel.date)} · ${cname}`;
          renderHiRows([
            ['BUDI95', fmtPerL('MYR', rSel.ron95_budi95, 2)],
            ['RON95', fmtPerL('MYR', rSel.ron95, 2)],
            ['RON97', fmtPerL('MYR', rSel.ron97, 2)],
            [dieselLabel, fmtPerL('MYR', rSel[dieselKey], 2)],
          ]);
          if (chartKicker) chartKicker.textContent = `${cname} petrol prices history`;

          const sliceRows = takeLastN(seriesAsc, APP_CHART_POINTS).map(r => ({ ...r, __label: fmtDate(r.date) }));
          const labels = sliceRows.map(r => r.__label);
          const chartKeys = [
            { key: 'ron95_budi95', label: 'BUDI95', color: '#9333ea' },
            { key: 'ron95', label: 'RON95', color: '#fbbf24' },
            { key: 'ron97', label: 'RON97', color: '#16a34a' },
            { key: dieselKey, label: dieselLabel, color: cssVar('--chart-line-muted', '#111827') },
          ];
          if (labels.length) {
            updateChart({
              labels,
              datasets: buildChartSeries(sliceRows, chartKeys, labels),
              countryId: 458,
            });
          } else emptyChart();
          return;
        }

        if (cid === 702) {
          const rows = await ensureSheetRows(SG_SHEET_URL);
          const hasProviders = sortedSingaporeProviders(rows).length > 0;
          const prov = hasProviders ? resolveSingaporeProviderSelection(rows) : '';
          if (prov) {
            try { localStorage.setItem('terminal_sg_provider', prov); } catch (_) {}
          }
          const seriesAsc = sortRowsByDate(
            hasProviders
              ? rows.filter((r) => normalizeSheetString(r.provider) === normalizeSheetString(prov))
              : rows,
          );
          const rSel = seriesAsc[seriesAsc.length - 1] || {};
          titleEl.textContent = hasProviders ? prov : 'National';
          subEl.textContent = `As of ${fmtDate(rSel.date)} · ${cname}`;
          renderHiRows([
            ['RON92', fmtPerL('SGD', rSel.ron92, 2)],
            ['RON95', fmtPerL('SGD', rSel.ron95, 2)],
            ['RON98', fmtPerL('SGD', rSel.ron98, 2)],
            ['Premium', fmtPerL('SGD', rSel.premium, 2)],
            ['Diesel', fmtPerL('SGD', rSel.diesel, 2)],
          ]);
          if (chartKicker) chartKicker.textContent = `${cname} petrol prices history`;

          const sliceRows = takeLastN(seriesAsc, APP_CHART_POINTS).map(r => ({ ...r, __label: fmtDate(r.date) }));
          const labels = sliceRows.map(r => r.__label);
          const chartKeys = [
            { key: 'ron92', label: 'RON92' },
            { key: 'ron95', label: 'RON95' },
            { key: 'ron98', label: 'RON98' },
            { key: 'premium', label: 'Premium' },
            { key: 'diesel', label: 'Diesel' },
          ];
          if (labels.length) {
            updateChart({
              labels,
              datasets: buildChartSeries(sliceRows, chartKeys, labels),
              countryId: 702,
            });
          } else emptyChart();
          return;
        }

        if (cid === 96) {
          const rows = await ensureSheetRows(BN_SHEET_URL);
          const seriesAsc = sortRowsByDate(rows);
          const rSel = seriesAsc[seriesAsc.length - 1] || {};
          titleEl.textContent = 'National';
          subEl.textContent = `As of ${fmtDate(rSel.date)} · ${cname}`;
          renderHiRows([
            ['Gasoline', fmtPerL('BND', rSel.gasoline, 2)],
            ['Diesel', fmtPerL('BND', rSel.diesel, 2)],
            ['V-Power Gasoline', fmtPerL('BND', rSel.vpower_gasoline, 2)],
            ['V-Power Diesel', fmtPerL('BND', rSel.vpower_diesel, 2)],
          ]);
          if (chartKicker) chartKicker.textContent = `${cname} petrol prices history`;

          const sliceRows = takeLastN(seriesAsc, APP_CHART_POINTS).map(r => ({ ...r, __label: fmtDate(r.date) }));
          const labels = sliceRows.map(r => r.__label);
          const chartKeys = [
            { key: 'gasoline', label: 'Gasoline' },
            { key: 'diesel', label: 'Diesel' },
            { key: 'vpower_gasoline', label: 'V-Power Gasoline' },
            { key: 'vpower_diesel', label: 'V-Power Diesel' },
          ];
          if (labels.length) {
            updateChart({
              labels,
              datasets: buildChartSeries(sliceRows, chartKeys, labels),
              countryId: 96,
            });
          } else emptyChart();
          return;
        }

        if (cid === 360) {
          const rows = await ensureSheetRows(ID_SHEET_URL);
          const city = getIndonesiaCity();
          const cityNorm = normalizeSheetString(city);
          const cityRows = sortRowsByDate(
            rows.filter((r) => normalizeSheetString(r.city) === cityNorm),
          );
          const rSel = cityRows[cityRows.length - 1] || {};
          titleEl.textContent = city;
          subEl.textContent = `As of ${fmtDate(rSel.date)} · ${cname}`;
          const pairs = ID_FUELS.map(f => [f.label, fmtIDR(rSel[f.key])]);
          renderHiRows(pairs.length ? pairs : [['Data', 'No rows for this city']]);
          if (chartKicker) chartKicker.textContent = `${cname} petrol prices history`;

          const sliceRows = takeLastN(cityRows, APP_CHART_POINTS).map(r => ({ ...r, __label: fmtDate(r.date) }));
          const labels = sliceRows.map(r => r.__label);
          const chartKeys = ID_FUELS.map(f => ({ key: f.key, label: f.label }));
          if (labels.length) {
            updateChart({
              labels,
              datasets: buildChartSeries(sliceRows, chartKeys, labels),
              countryId: 360,
            });
          } else emptyChart();
          return;
        }

        titleEl.textContent = cname;
        subEl.textContent = 'No live price feed for this view';
        renderHiRows([['Source', '—']]);
        emptyChart();
      } catch (_) {
        titleEl.textContent = cname;
        subEl.textContent = 'Could not load live prices';
        renderHiRows([['Status', 'Check connection']]);
        emptyChart();
      } finally {
        syncSearchInputFromSelection();
      }
    }

    function renderCountryOverview(cid) {
      const ov = COUNTRY_OVERVIEW[cid];
      const oilEl = document.getElementById('overview-text');
      const metricsEl = document.getElementById('overview-metrics');
      if (oilEl) oilEl.textContent = ov?.oilContext || '—';
      if (metricsEl) {
        const rowData = ov?.metricRows;
        const cellHtml = (m) => m
          ? `<div class="metric"><div class="k">${m[0]}</div><div class="v">${m[1]}</div></div>`
          : '<div class="overview-metric-empty" aria-hidden="true"></div>';
        metricsEl.innerHTML = Array.isArray(rowData) && rowData.length
          ? rowData.map((pair) => {
              const left = pair[0];
              const right = pair[1];
              return `<div class="overview-row">${cellHtml(left)}${cellHtml(right)}</div>`;
            }).join('')
          : '';
      }
    }

    function setSelected(cid){
      selected = cid;
      document.getElementById('ov-kicker').textContent = `${COUNTRIES[cid]?.name || 'Country'} overview`;
      renderCountryOverview(cid);
      refreshHighlights(cid);
      if (typeof APP_ZOOM_TO === 'function') APP_ZOOM_TO(cid, true);
      if (typeof window.__appMapApplySelection === 'function') {
        try { window.__appMapApplySelection(); } catch (_) {}
      }
    }

    function syncHiStickyShadow() {
      const sticky = document.getElementById('sheet-region-sticky');
      const scroller = document.getElementById('sheet-scroll');
      if (!sticky || !scroller) return;
      sticky.classList.toggle('sheet-region-sticky--raised', scroller.scrollTop > 1);
    }

    function initSheet(){
      const sheet = document.getElementById('sheet');
      const grab = document.getElementById('grab');
      const scroller = document.getElementById('sheet-scroll');
      let dragging = false, startY = 0, startH = 0;
      let snap = 1;
      const clamp = (n, lo, hi) => Math.max(lo, Math.min(hi, n));
      const heights = () => {
        const vh = window.visualViewport ? Math.round(window.visualViewport.height) : window.innerHeight;
        const quarter = Math.round(vh * 0.25);
        const half = Math.round(vh * 0.5);
        const expandedTop = Math.round(Math.min(vh - 72, vh * 0.94));
        const expanded = Math.max(half + 100, expandedTop);
        return { quarter, half, expanded };
      };
      const apply = (h) => {
        const px = Math.round(h);
        document.documentElement.style.setProperty('--sheetH', `${px}px`);
        const { half, expanded } = heights();
        const scrollThreshold = half + (expanded - half) * 0.48;
        const isExpanded = px >= scrollThreshold;
        const allowsScroll = px >= half;
        sheet.classList.toggle('sheet-expanded', isExpanded);
        sheet.classList.toggle('sheet-scrollable', allowsScroll);
        if (!allowsScroll && scroller) scroller.scrollTop = 0;
        syncHiStickyShadow();
      };
      const nearestSnapIndex = (h) => {
        const { quarter, half, expanded } = heights();
        const snaps = [quarter, half, expanded];
        let best = 0;
        let d = Infinity;
        snaps.forEach((x, i) => {
          const dd = Math.abs(h - x);
          if (dd < d) {
            d = dd;
            best = i;
          }
        });
        return best;
      };
      function setSnap(i){
        snap = clamp(i, 0, 2);
        const { quarter, half, expanded } = heights();
        const h = snap === 0 ? quarter : snap === 1 ? half : expanded;
        apply(h);
        if (RIGHT_CHART) setTimeout(() => RIGHT_CHART.resize(), 60);
      }
      function shouldStartSheetResize(e) {
        if (sheet.classList.contains('sheet-expanded')) {
          return grab.contains(e.target);
        }
        if (sheet.classList.contains('sheet-scrollable')) {
          if (grab.contains(e.target)) return true;
          return !scroller.contains(e.target);
        }
        return true;
      }
      function onSheetPointerDown(e) {
        if (e.type === 'mousedown' && e.button !== 0) return;
        if (!shouldStartSheetResize(e)) return;
        onDown(e);
      }
      function onDown(e){
        if (e.cancelable && e.type === 'touchstart') e.preventDefault();
        dragging = true;
        startY = (e.touches ? e.touches[0].clientY : e.clientY);
        startH = sheet.getBoundingClientRect().height;
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
        window.addEventListener('touchmove', onMove, { passive: false });
        window.addEventListener('touchend', onUp, { passive: true });
        window.addEventListener('touchcancel', onUp, { passive: true });
      }
      function onMove(e){
        if (!dragging) return;
        if (e.cancelable) e.preventDefault();
        const y = (e.touches ? e.touches[0].clientY : e.clientY);
        const dy = startY - y;
        const { quarter, expanded } = heights();
        apply(clamp(startH + dy, quarter, expanded));
      }
      function onUp(){
        if (!dragging) return;
        dragging = false;
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
        window.removeEventListener('touchmove', onMove);
        window.removeEventListener('touchend', onUp);
        window.removeEventListener('touchcancel', onUp);
        const h = sheet.getBoundingClientRect().height;
        setSnap(nearestSnapIndex(h));
      }
      sheet.addEventListener('mousedown', onSheetPointerDown);
      sheet.addEventListener('touchstart', onSheetPointerDown, { passive: false });
      grab.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          setSnap((snap + 1) % 3);
        }
      });
      setSnap(1);
      scroller.addEventListener('scroll', syncHiStickyShadow, { passive: true });
      syncHiStickyShadow();
      const onViewportResize = () => setSnap(snap);
      window.addEventListener('resize', onViewportResize);
      window.visualViewport?.addEventListener('resize', onViewportResize);
    }

    async function initSearch(){
      const input = document.getElementById('country-search');
      const menu = document.getElementById('country-search-menu');
      const list = await buildSearchRegionsList();
      let open = false;
      const openMenu = () => { open=true; menu.classList.add('open'); };
      const closeMenu = () => { open=false; menu.classList.remove('open'); };
      const escAttr = (s) => String(s)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;');
      const render = (items) => {
        menu.innerHTML = items
          .map(
            (x) =>
              `<div class="search-item" role="option" data-country-id="${x.countryId}" data-my-region="${escAttr(x.myRegion ?? '')}" data-id-city="${escAttr(x.idCity ?? '')}" data-sg-provider="${x.sgProvider != null ? escAttr(x.sgProvider) : ''}">${x.label}</div>`
          )
          .join('');
      };
      const filter = () => {
        const q = (input.value||'').trim().toLowerCase();
        const items = !q ? list : list.filter((x) => x.label.toLowerCase().includes(q));
        render(items);
      };
      input.addEventListener('focus', () => { openMenu(); filter(); });
      input.addEventListener('input', () => { openMenu(); filter(); });
      document.addEventListener('pointerdown', (e) => {
        if (!open) return;
        if (menu.contains(e.target) || input.contains(e.target)) return;
        closeMenu();
      }, true);
      menu.addEventListener('mousedown', (e) => {
        const it = e.target.closest('.search-item');
        if (!it) return;
        const countryId = +it.getAttribute('data-country-id');
        const mr = it.getAttribute('data-my-region');
        const ic = it.getAttribute('data-id-city');
        const sgProv = it.getAttribute('data-sg-provider');
        if (mr) {
          try { localStorage.setItem('terminal_my_region', mr); } catch (_) {}
        }
        if (ic) {
          try { localStorage.setItem('terminal_id_city', ic); } catch (_) {}
        }
        if (countryId === 702) {
          try {
            if (sgProv) localStorage.setItem('terminal_sg_provider', sgProv);
            else localStorage.removeItem('terminal_sg_provider');
          } catch (_) {}
        }
        setSelected(countryId);
        input.value = '';
        closeMenu();
        e.preventDefault();
      });
      document.addEventListener('keydown', (e) => {
        const isMacFind = (e.metaKey && !e.ctrlKey && (e.key === 'f' || e.key === 'F'));
        const isWinFind = (e.ctrlKey && !e.metaKey && (e.key === 'f' || e.key === 'F'));
        if (!isMacFind && !isWinFind) return;
        e.preventDefault();
        openMenu();
        filter();
        input.focus();
        try { input.select(); } catch (_) {}
      }, true);
    }

    function initChart(){
      const cv = document.getElementById('chart');
      if (!cv || !window.Chart) return;
      updateChart({
        labels: [''],
        datasets: [{ label: 'Loading…', data: [null], color: cssVar('--chart-empty', '#d4d4d4') }],
        countryId: 458,
      });
    }

    function initMap() {
      const root = document.getElementById('map');
      if (!root) return;
      window.__appMapApplySelection = null;
      if (window.__appOfmMap) {
        try {
          window.__appOfmMap.remove();
        } catch (_) {}
        window.__appOfmMap = null;
      }
      APP_ZOOM_TO = null;
      if (typeof window.__renderAppMapOpenFreeMap !== 'function') {
        console.error('App OpenFreeMap bridge missing');
        return;
      }
      window.__renderAppMapOpenFreeMap({
        root,
        COUNTRIES,
        NAMES: MAP_COUNTRY_NAMES,
        SEA_IDS: Array.from(SEA),
        getSelected: () => selected,
        setSelected,
        refreshHighlights,
        ID_CITY_LONLAT,
        malaysiaRegionFromLngLat,
        indonesiaCityFromLngLat,
      });
    }

    const APP_STORY_W = 1080;
    const APP_STORY_H = 1920;
    const APP_STORY_PAD = 72;

    let _exportStoryBlob = null;
    let _exportStoryObjectUrl = null;
    let _exportStoryFilename = '';

    function closeExportStoryModal() {
      const modal = document.getElementById('export-story-modal');
      const img = document.getElementById('export-story-preview');
      if (modal) {
        modal.classList.remove('export-story-modal--open');
        modal.setAttribute('aria-hidden', 'true');
      }
      if (img) {
        img.removeAttribute('src');
        img.alt = '';
      }
      if (_exportStoryObjectUrl) {
        URL.revokeObjectURL(_exportStoryObjectUrl);
        _exportStoryObjectUrl = null;
      }
      _exportStoryBlob = null;
      _exportStoryFilename = '';
    }

    function openExportStoryModal(blob, filename) {
      closeExportStoryModal();
      _exportStoryBlob = blob;
      _exportStoryFilename = filename;
      _exportStoryObjectUrl = URL.createObjectURL(blob);
      const modal = document.getElementById('export-story-modal');
      const img = document.getElementById('export-story-preview');
      if (!modal || !img) return;
      img.src = _exportStoryObjectUrl;
      img.alt = 'Instagram story preview';
      modal.classList.add('export-story-modal--open');
      modal.setAttribute('aria-hidden', 'false');
      document.getElementById('export-story-save')?.focus();
    }

    async function saveExportStoryToGallery() {
      const blob = _exportStoryBlob;
      const filename = _exportStoryFilename || 'petrolprice-story.png';
      if (!blob) return;
      const file = new File([blob], filename, { type: 'image/png' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file] });
          return;
        } catch (e) {
          if (e && e.name === 'AbortError') return;
        }
      }
      if (!_exportStoryObjectUrl) return;
      const a = document.createElement('a');
      a.href = _exportStoryObjectUrl;
      a.download = filename;
      a.rel = 'noopener';
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    function initExportStoryModal() {
      const modal = document.getElementById('export-story-modal');
      if (!modal) return;
      modal.querySelector('.export-story-backdrop')?.addEventListener('click', closeExportStoryModal);
      document.getElementById('export-story-close')?.addEventListener('click', closeExportStoryModal);
      document.getElementById('export-story-save')?.addEventListener('click', async () => {
        const btn = document.getElementById('export-story-save');
        if (!btn || btn.disabled) return;
        btn.disabled = true;
        try {
          await saveExportStoryToGallery();
        } catch (err) {
          console.error(err);
        } finally {
          btn.disabled = false;
        }
      });
      document.addEventListener('keydown', (e) => {
        if (e.key !== 'Escape') return;
        if (!modal.classList.contains('export-story-modal--open')) return;
        closeExportStoryModal();
      });
    }

    function appExportSlug(cardId) {
      if (cardId === 'card-highlights') return 'highlights';
      if (cardId === 'card-history') return 'history';
      if (cardId === 'card-overview') return 'overview';
      return 'export';
    }

    function appComposeStoryPng(snapCanvas) {
      const out = document.createElement('canvas');
      out.width = APP_STORY_W;
      out.height = APP_STORY_H;
      const ctx = out.getContext('2d');
      ctx.fillStyle = cssVar('--surface', '#ffffff');
      ctx.fillRect(0, 0, APP_STORY_W, APP_STORY_H);
      const maxW = APP_STORY_W - APP_STORY_PAD * 2;
      const maxH = APP_STORY_H - APP_STORY_PAD * 2;
      const sw = snapCanvas.width;
      const sh = snapCanvas.height;
      const sc = Math.min(maxW / sw, maxH / sh);
      const dw = Math.round(sw * sc);
      const dh = Math.round(sh * sc);
      const dx = Math.round((APP_STORY_W - dw) / 2);
      const dy = Math.round((APP_STORY_H - dh) / 2);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(snapCanvas, 0, 0, sw, sh, dx, dy, dw, dh);
      return out;
    }

    async function exportCardAsInstagramStory(cardId) {
      const html2canvas = window.html2canvas;
      if (typeof html2canvas !== 'function') throw new Error('html2canvas missing');

      const exportBg = cssVar('--surface', '#ffffff');
      const h2cOpts = {
        scale: 2,
        backgroundColor: exportBg,
        logging: false,
        useCORS: true,
        allowTaint: true,
      };
      const stripExports = (root) => {
        root?.querySelectorAll('.card-export').forEach((n) => n.remove());
      };

      let snap;
      if (cardId === 'card-highlights') {
        const wrap = document.createElement('div');
        wrap.style.cssText =
          `position:fixed;left:-16000px;top:0;width:960px;background:${exportBg};padding:48px 44px;box-sizing:border-box;`;
        const st = document.getElementById('sheet-region-sticky')?.cloneNode(true);
        const cd = document.getElementById('card-highlights')?.cloneNode(true);
        stripExports(st);
        stripExports(cd);
        if (st) wrap.appendChild(st);
        if (cd) wrap.appendChild(cd);
        document.body.appendChild(wrap);
        try {
          snap = await html2canvas(wrap, h2cOpts);
        } finally {
          wrap.remove();
        }
      } else if (cardId === 'card-history') {
        const live = document.getElementById('card-history');
        if (!live) return;
        live.scrollIntoView({ block: 'nearest', behavior: 'auto' });
        await new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));
        snap = await html2canvas(live, {
          ...h2cOpts,
          ignoreElements: (el) => el.classList && el.classList.contains('card-export'),
        });
      } else if (cardId === 'card-overview') {
        const wrap = document.createElement('div');
        wrap.style.cssText =
          `position:fixed;left:-16000px;top:0;width:960px;background:${exportBg};padding:48px 44px;box-sizing:border-box;`;
        const cd = document.getElementById('card-overview')?.cloneNode(true);
        stripExports(cd);
        if (cd) wrap.appendChild(cd);
        document.body.appendChild(wrap);
        try {
          snap = await html2canvas(wrap, h2cOpts);
        } finally {
          wrap.remove();
        }
      } else return;

      if (!snap) return;
      const story = appComposeStoryPng(snap);
      const blob = await new Promise((resolve, reject) => {
        story.toBlob((b) => (b ? resolve(b) : reject(new Error('Story export failed'))), 'image/png', 0.95);
      });
      const slug = appExportSlug(cardId);
      openExportStoryModal(blob, `petrolprice-${slug}-story.png`);
    }

    function initCardExport() {
      const sheet = document.getElementById('sheet');
      if (!sheet) return;
      sheet.addEventListener('click', async (e) => {
        const btn = e.target.closest('.card-export');
        if (!btn || !sheet.contains(btn)) return;
        e.preventDefault();
        e.stopPropagation();
        const card = btn.closest('.card');
        const cardId = card?.id;
        if (!cardId) return;
        if (typeof window.html2canvas !== 'function') return;
        btn.disabled = true;
        try {
          await exportCardAsInstagramStory(cardId);
        } catch (err) {
          console.error(err);
        } finally {
          btn.disabled = false;
        }
      });
    }

    // Init
    initSheet();
    void initSearch();
    initExportStoryModal();
    initCardExport();

    (function initAppColorScheme() {
      const mq = window.matchMedia('(prefers-color-scheme: dark)');
      function syncThemeMeta() {
        const meta = document.getElementById('meta-theme-color');
        if (meta) meta.setAttribute('content', mq.matches ? '#1a1a1a' : '#ff6a00');
      }
      function onSchemeChange() {
        syncThemeMeta();
        refreshHighlights(selected).catch(() => {});
      }
      syncThemeMeta();
      mq.addEventListener('change', onSchemeChange);
    })();

    window.addEventListener('load', () => {
      initChart();
      initMap();
      setSelected(458);
    });
  </script>
