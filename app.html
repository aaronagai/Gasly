<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="application-name" content="PetrolPrice" />
  <meta name="apple-mobile-web-app-title" content="PetrolPrice" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" id="meta-theme-color" content="#ff6a00" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/icons/applogo.png" />
  <link rel="icon" type="image/png" href="assets/icons/applogo.png" />
  <title>PetrolPrice — App</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/shared.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="assets/config.js"></script>
  <script src="assets/utils.js"></script>
  <style>
    :root{
      color-scheme: light dark;
      --bg: #f1f1f0;
      --panel: rgba(247,247,246,0.92);
      --text: #0f0f0f;
      --muted: rgba(0,0,0,0.55);
      --line: rgba(0,0,0,0.10);
      --shadow: 0 18px 54px rgba(0,0,0,0.12);
      --orange: #ff6a00;
      --surface: #ffffff;
      --sticky-bg: #ffffff;
      --glass-stroke: rgba(255, 255, 255, 0.55);
      --glass-fill: rgba(255, 255, 255, 0.28);
      --glass-fill-menu: rgba(255, 255, 255, 0.36);
      --glass-blur: 40px;
      --glass-blur-card: 32px;
      --glass-inset: rgba(255, 255, 255, 0.72);
      --glass-shadow-outer: rgba(0, 0, 0, 0.07);
      --glass-keyline: rgba(0, 0, 0, 0.04);
      --input-fg: rgba(0, 0, 0, 0.72);
      --input-ph: rgba(0, 0, 0, 0.36);
      --icon-fg: rgba(0, 0, 0, 0.45);
      --menu-hover: rgba(0, 0, 0, 0.04);
      --menu-shadow: rgba(0, 0, 0, 0.1);
      --hairline: rgba(0, 0, 0, 0.08);
      --hi-label: rgba(0, 0, 0, 0.72);
      --hi-value: rgba(0, 0, 0, 0.88);
      --oil: rgba(0, 0, 0, 0.78);
      --metric-k: rgba(0, 0, 0, 0.52);
      --metric-v: rgba(0, 0, 0, 0.88);
      --grab: rgba(0, 0, 0, 0.2);
      --scroll-thumb: rgba(0, 0, 0, 0.22);
      --sticky-raised: rgba(0, 0, 0, 0.12);
      --export-icon: rgba(0, 0, 0, 0.42);
      --chart-legend: rgba(0, 0, 0, 0.48);
      --chart-tick: rgba(0, 0, 0, 0.45);
      --chart-grid: rgba(0, 0, 0, 0.06);
      --chart-line-muted: #111827;
      --chart-empty: #d4d4d4;
      --map-vignette: rgba(0, 0, 0, 0.06);
      --map-overlay: linear-gradient(0deg, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.6));
      --map-base: #d7d7d7;
      --map-scan: rgba(0, 0, 0, 0.03);
      --sphere: #e7eef7;
      --land: #d9d6d2;
      --land-live: rgba(17, 24, 39, 0.28);
      --land-live-selected: rgba(255, 106, 0, 0.26);
      --graticule: rgba(48, 48, 48, 0.05);
      --border-mesh: rgba(48, 48, 48, 0.14);
      --map-country-outline: rgba(48, 48, 48, 0.22);
      --border-live: rgba(17, 24, 39, 0.45);
      --border-live-selected: rgba(255, 106, 0, 0.78);
      --sg-stroke: rgba(32, 32, 32, 0.58);
      --sg-stroke-selected: rgba(255, 106, 0, 0.9);
      --export-story-img-bg: #ffffff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d0d0f;
        --panel: rgba(28, 28, 32, 0.94);
        --text: #f2f2f7;
        --muted: rgba(255, 255, 255, 0.55);
        --line: rgba(255, 255, 255, 0.12);
        --shadow: 0 24px 56px rgba(0, 0, 0, 0.55);
        --surface: #1c1c1e;
        --sticky-bg: #1c1c1e;
        --glass-stroke: rgba(255, 255, 255, 0.18);
        --glass-fill: rgba(32, 32, 36, 0.45);
        --glass-fill-menu: rgba(28, 28, 32, 0.52);
        --glass-blur: 44px;
        --glass-blur-card: 36px;
        --glass-inset: rgba(255, 255, 255, 0.08);
        --glass-shadow-outer: rgba(0, 0, 0, 0.4);
        --glass-keyline: rgba(255, 255, 255, 0.06);
        --input-fg: rgba(255, 255, 255, 0.88);
        --input-ph: rgba(255, 255, 255, 0.38);
        --icon-fg: rgba(255, 255, 255, 0.5);
        --menu-hover: rgba(255, 255, 255, 0.06);
        --menu-shadow: rgba(0, 0, 0, 0.45);
        --hairline: rgba(255, 255, 255, 0.1);
        --hi-label: rgba(255, 255, 255, 0.72);
        --hi-value: rgba(255, 255, 255, 0.95);
        --oil: rgba(255, 255, 255, 0.82);
        --metric-k: rgba(255, 255, 255, 0.52);
        --metric-v: rgba(255, 255, 255, 0.92);
        --grab: rgba(255, 255, 255, 0.28);
        --scroll-thumb: rgba(255, 255, 255, 0.22);
        --sticky-raised: rgba(0, 0, 0, 0.5);
        --export-icon: rgba(255, 255, 255, 0.45);
        --chart-legend: rgba(255, 255, 255, 0.5);
        --chart-tick: rgba(255, 255, 255, 0.45);
        --chart-grid: rgba(255, 255, 255, 0.08);
        --chart-line-muted: #9ca3af;
        --chart-empty: #6b7280;
        --map-vignette: rgba(0, 0, 0, 0.45);
        --map-overlay: linear-gradient(0deg, rgba(18, 18, 20, 0.75), rgba(18, 18, 20, 0.75));
        --map-base: #2a2a2e;
        --map-scan: rgba(255, 255, 255, 0.04);
        --sphere: #1e293b;
        --land: #3d3d42;
        --land-live: rgba(148, 163, 184, 0.35);
        --land-live-selected: rgba(255, 106, 0, 0.32);
        --graticule: rgba(255, 255, 255, 0.06);
        --border-mesh: rgba(255, 255, 255, 0.12);
        --map-country-outline: rgba(255, 255, 255, 0.2);
        --border-live: rgba(226, 232, 240, 0.35);
        --border-live-selected: rgba(255, 106, 0, 0.85);
        --sg-stroke: rgba(226, 232, 240, 0.45);
        --sg-stroke-selected: rgba(255, 200, 140, 0.95);
        --export-story-img-bg: #1c1c1e;
      }
    }

    *{ box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body{
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
    }

    .app{
      position: relative;
      height: 100dvh;
      width: 100%;
    }

    /* Map layer — full viewport behind UI */
    .map{
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(900px 520px at 55% 48%, rgba(255,106,0,0.14) 0%, rgba(255,106,0,0.06) 30%, rgba(255,106,0,0.00) 62%),
        radial-gradient(1200px 680px at 44% 56%, var(--map-vignette) 0%, transparent 62%),
        var(--map-overlay),
        var(--map-base);
      overflow: hidden;
    }

    .map::before{
      content:'';
      position:absolute;
      inset:0;
      background: repeating-linear-gradient(0deg, var(--map-scan) 0px, var(--map-scan) 1px, transparent 1px, transparent 8px);
      opacity: 0.26;
      pointer-events:none;
    }
    /* Pinch / wheel zoom on the globe — browser must not handle gestures here */
    .map svg{ width: 100%; height: 100%; display:block; touch-action: none; }
    .sphere { fill: var(--sphere); }
    .graticule { fill: none; stroke: var(--graticule); stroke-width: 0.3; }
    .country {
      fill: none;
      stroke: var(--map-country-outline);
      stroke-width: 0.5;
      vector-effect: non-scaling-stroke;
      paint-order: stroke fill;
    }
    .country.live { fill: var(--land-live); stroke: none; }
    .country.live.selected { fill: var(--land-live-selected); }
    /* Singapore is not a separate polygon in countries-110m (merged into Malaysia); overlay + stroke vs MY */
    .country.live.country-sg{
      stroke: var(--sg-stroke);
      stroke-width: 1.15px;
      vector-effect: non-scaling-stroke;
      paint-order: stroke fill;
    }
    .country.live.country-sg.selected{
      stroke: var(--sg-stroke-selected);
      stroke-width: 1.85px;
    }
    .border-mesh { fill:none; stroke: var(--border-mesh); stroke-width: 0.5; pointer-events:none; }
    .border-live { fill:none; stroke: var(--border-live); stroke-width: 1; pointer-events:none; }
    .border-live.selected { stroke: var(--border-live-selected); }

    /* Top search */
    .topbar{
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 10;
      display:flex;
      gap: 10px;
      align-items:center;
    }
    .search{
      flex: 1;
      height: 40px;
      display:flex;
      align-items:center;
      gap: 8px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--glass-stroke);
      background: var(--glass-fill);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      box-shadow:
        0 1px 0 var(--glass-inset) inset,
        0 0 0 0.5px var(--glass-keyline),
        0 8px 28px var(--glass-shadow-outer),
        0 2px 8px var(--glass-shadow-outer);
    }
    .search svg{
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      opacity: 0.42;
      color: var(--icon-fg);
    }
    .search input{
      flex: 1;
      min-width: 0;
      border: none;
      outline: none;
      background: transparent;
      font-family: var(--font);
      /* ≥16px prevents iOS Safari focus-zoom (stuck zoom after blur) */
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--input-fg);
    }
    .search input::placeholder{
      color: var(--input-ph);
      font-weight: 300;
    }
    .topbar-circle{
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--glass-stroke);
      background: var(--glass-fill);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      box-shadow:
        0 1px 0 var(--glass-inset) inset,
        0 0 0 0.5px var(--glass-keyline),
        0 8px 28px var(--glass-shadow-outer),
        0 2px 8px var(--glass-shadow-outer);
      pointer-events: none;
    }
    .topbar-circle svg{
      width: 17px;
      height: 17px;
      flex-shrink: 0;
      opacity: 0.42;
      color: var(--icon-fg);
    }
    .search-menu{
      position: absolute;
      top: calc(12px + 40px + 8px);
      left: 12px;
      right: 12px;
      z-index: 11;
      border: 1px solid var(--glass-stroke);
      background: var(--glass-fill-menu);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border-radius: 18px;
      box-shadow:
        0 1px 0 var(--glass-inset) inset,
        0 12px 40px var(--menu-shadow),
        0 2px 10px var(--glass-shadow-outer);
      padding: 6px;
      display:none;
      max-height: min(320px, calc(100dvh - 180px));
      overflow:auto;
    }
    .search-menu.open{ display:block; }
    .search-item{
      padding: 11px 12px;
      border-radius: 12px;
      cursor: pointer;
      user-select: none;
      display:flex;
      justify-content: space-between;
      gap: 12px;
      font-weight: 400;
      letter-spacing: 0.02em;
    }
    .search-item:hover{ background: var(--menu-hover); }

    /* Bottom sheet — three stops: ~¼, ~½, expanded; scroll from half height up */
    .sheet{
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 10px;
      z-index: 20;
      height: var(--sheetH, 50vh);
      max-height: calc(100dvh - 72px);
      display: flex;
      flex-direction: column;
      border-radius: 22px;
      border: 1px solid var(--glass-stroke);
      background: var(--glass-fill-menu);
      backdrop-filter: blur(var(--glass-blur)) saturate(200%);
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(200%);
      box-shadow:
        0 1px 0 var(--glass-inset) inset,
        0 0 0 0.5px var(--glass-keyline),
        0 18px 48px var(--glass-shadow-outer),
        0 8px 24px var(--menu-shadow);
      overflow: hidden;
    }
    /* Quarter height: drag anywhere resizes. Half+ : scroll inside sheet-scroll; drag handle still resizes. */
    .sheet:not(.sheet-scrollable){
      touch-action: none;
    }
    .sheet.sheet-scrollable:not(.sheet-expanded){
      touch-action: manipulation;
    }
    .grab{
      flex-shrink: 0;
      min-height: 36px;
      padding: 5px 0 6px;
      margin: 0;
      background: transparent;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      cursor: grab;
    }
    .grab:active{ cursor: grabbing; }
    .grab::before{
      content:'';
      display:block;
      width: 46px;
      height: 5px;
      border-radius: 999px;
      background: var(--grab);
      margin: 0 auto;
    }
    .sheet-scroll{
      flex: 1;
      min-height: 0;
      overflow-y: hidden;
      overscroll-behavior-y: none;
      /* Inset from sheet edges so the scrollbar stops above the rounded bottom corners */
      margin: 0 8px 16px 8px;
      padding: 0 4px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 0;
      box-sizing: border-box;
      border-radius: 0 0 16px 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--scroll-thumb) transparent;
    }
    .sheet-scroll::-webkit-scrollbar{
      width: 5px;
    }
    .sheet-scroll::-webkit-scrollbar-thumb{
      background: var(--scroll-thumb);
      border-radius: 999px;
    }
    .sheet-scroll::-webkit-scrollbar-track{
      background: transparent;
    }
    .sheet-cards-stack{
      display: flex;
      flex-direction: column;
      gap: 22px;
      min-height: 0;
    }
    /* Masks on scrollers break iOS touch scrolling — keep fade on fine pointers only */
    @media (hover: hover) and (pointer: fine){
      .sheet-scroll{
        -webkit-mask-image:
          linear-gradient(to bottom, #000 0%, #000 90%, transparent 100%),
          linear-gradient(to right, transparent 0%, #000 5%, #000 95%, transparent 100%);
        mask-image:
          linear-gradient(to bottom, #000 0%, #000 90%, transparent 100%),
          linear-gradient(to right, transparent 0%, #000 5%, #000 95%, transparent 100%);
        -webkit-mask-composite: source-in;
        mask-composite: intersect;
        mask-repeat: no-repeat;
        mask-size: 100% 100%;
        -webkit-mask-size: 100% 100%;
      }
    }
    .sheet.sheet-scrollable .sheet-scroll{
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      touch-action: pan-y;
    }
    .card{
      border-radius: 20px;
      border: 1px solid var(--glass-stroke);
      overflow: hidden;
      background: var(--glass-fill);
      backdrop-filter: blur(var(--glass-blur-card)) saturate(190%);
      -webkit-backdrop-filter: blur(var(--glass-blur-card)) saturate(190%);
      box-shadow:
        0 1px 0 var(--glass-inset) inset,
        0 0 0 0.5px var(--glass-keyline),
        0 10px 28px var(--glass-shadow-outer);
    }
    .card .pad{ padding: 14px; }
    #card-highlights .pad{ padding-top: 2px; }
    /* Highlights block: bright red-orange tint + real glass (translucent stack + sheen) */
    #sheet-region-sticky,
    #card-highlights{
      background-color: transparent;
      background-image:
        linear-gradient(180deg, rgba(255, 240, 230, 0.06) 0%, transparent 32%),
        linear-gradient(
          165deg,
          color-mix(in srgb, #e53512 70%, var(--glass-fill)) 0%,
          color-mix(in srgb, #c42a0e 76%, var(--glass-fill)) 100%
        );
      border-color: color-mix(in srgb, #e53512 62%, rgba(0, 0, 0, 0.14));
      backdrop-filter: blur(var(--glass-blur-card)) saturate(200%);
      -webkit-backdrop-filter: blur(var(--glass-blur-card)) saturate(200%);
    }
    /* Sticky headline: direct child of sheet-scroll so it stays for the whole sheet scroll */
    .sheet-region-sticky{
      position: sticky;
      top: 0;
      z-index: 6;
      flex-shrink: 0;
      margin: 0 -4px 10px -12px;
      padding: 0 14px 10px 26px;
      border-radius: 18px;
      border: 1px solid var(--glass-stroke);
      background: var(--glass-fill);
      backdrop-filter: blur(var(--glass-blur-card)) saturate(190%);
      -webkit-backdrop-filter: blur(var(--glass-blur-card)) saturate(190%);
      box-shadow:
        0 1px 0 var(--glass-inset) inset,
        0 0 0 0.5px var(--glass-keyline),
        0 8px 24px var(--glass-shadow-outer);
      transition: box-shadow 0.2s ease;
    }
    .sheet-region-sticky .hi-kicker{
      margin: 0 0 4px;
      font-family: var(--font);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .sheet-region-sticky .title{
      margin: 0;
    }
    .sheet-region-sticky.sheet-region-sticky--raised{
      box-shadow: 0 6px 12px -8px var(--sticky-raised);
    }
    /* Region headline: drop white glass rim + bright inset (read as a white outline) */
    #sheet-region-sticky{
      border-color: color-mix(in srgb, #e53512 72%, rgba(0, 0, 0, 0.2));
      box-shadow:
        inset 0 1px 0 rgba(0, 0, 0, 0.06),
        0 0 0 0.5px color-mix(in srgb, #c42a0e 38%, transparent),
        0 8px 24px var(--glass-shadow-outer);
    }
    #sheet-region-sticky.sheet-region-sticky--raised{
      box-shadow:
        inset 0 1px 0 rgba(0, 0, 0, 0.06),
        0 0 0 0.5px color-mix(in srgb, #c42a0e 38%, transparent),
        0 10px 22px -8px var(--sticky-raised),
        0 8px 24px var(--glass-shadow-outer);
    }
    /* Highlights: date line + export beside the text */
    .card-sub-row{
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
      min-width: 0;
      margin-top: 6px;
    }
    #card-highlights .card-sub-row .sub{
      margin-top: 0;
      flex: 0 1 auto;
      min-width: 0;
      max-width: 100%;
    }
    /* Kicker + export beside the text */
    .card-head-inline{
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
      min-width: 0;
    }
    .card-head-inline .kicker{
      flex: 0 1 auto;
      min-width: 0;
      max-width: 100%;
    }
    .card-export{
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      margin: 0;
      padding: 0;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--export-icon);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .card-export:disabled{
      opacity: 0.45;
      cursor: wait;
      pointer-events: none;
    }
    .card-export svg{
      width: 14px;
      height: 14px;
    }
    .card-export:focus-visible{
      outline: 2px solid rgba(255, 106, 0, 0.45);
      outline-offset: 2px;
    }
    .kicker{
      font-family: var(--font);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.85;
    }
    .title{
      margin: 8px 0 0;
      font-size: 1.9rem;
      font-weight: 850;
      letter-spacing: -0.02em;
      line-height: 1.05;
    }
    #hi-title {
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
    }
    .sub{
      margin-top: 6px;
      font-family: var(--font);
      font-size: 0.8rem;
      opacity: 0.85;
    }
    .lines{
      margin-top: 12px;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 12px;
      font-family: var(--font);
      font-size: 0.78rem;
    }
    .lines.hi-lines{
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-top: 14px;
    }
    .hi-row{
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 14px;
      padding: 11px 0;
      border-bottom: 1px solid var(--hairline);
      font-family: var(--font);
      font-size: 0.84rem;
    }
    .hi-row:last-child{ border-bottom: none; padding-bottom: 2px; }
    .hi-k{
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--hi-label);
    }
    .hi-v{
      font-weight: 750;
      font-variant-numeric: tabular-nums;
      color: var(--hi-value);
      text-align: right;
    }
    .kv .k{ opacity: 0.82; letter-spacing: 0.06em; text-transform: uppercase; font-size: 0.62rem; }
    .kv .v{ margin-top: 6px; font-weight: 850; font-family: var(--font); }
    .chart-wrap{
      height: 210px;
      padding: 12px;
      margin: 0 2px;
      border-radius: 14px;
      border: 1px solid var(--hairline);
      background: color-mix(in srgb, var(--surface) 38%, transparent);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);

  <script>
    const COUNTRIES = {
      458: { name: 'Malaysia' },
      702: { name: 'Singapore' },
      96:  { name: 'Brunei' },
      360: { name: 'Indonesia' },
    };
    const LIVE = { 458: true, 702: true, 96: true, 360: true };
    /** Same oil context as terminal.html; metricRows = 2-col layout per row */
    const APP_COUNTRY_OVERVIEW = {
      458: {
        oilContext:
          'Mid-sized upstream producer with an economy shaped by oil & gas; exports some crude and petroleum products, while still importing certain grades/volumes to meet refinery and fuel demand.',

        metricRows: [
          [['BOPD', '608,100'], ['1P Reserves', '2.41B Barrels']],

        ],
      },
      702: {
        oilContext:
          'Global refining and trading hub with no domestic oil production; imports massive volumes of crude for refining into high-value petroleum products, most of which are re-exported.',
        metricRows: [
          [['BOPD', '0'], ['1P Reserves', '0 Barrels']],
          [['Refinery Intake', '~1,100,000'], null],
          [['Export Value', 'Not specified in available data'], ['Import Value', 'Not specified in available data']],
          [['Status', 'Net Importer (refining hub)'], null],
        ],

    };

    let selected = 458;
    let RIGHT_CHART = null;
    let APP_ZOOM_TO = null;


    /** [lon, lat] centroids — keys must match `city` in the Indonesia Google Sheet (see indonesia.html). */
    const APP_ID_CITY_LONLAT = {
      'Jakarta Pusat': [106.8456, -6.2088],
      'Jakarta Selatan': [106.81, -6.26],
      'Jakarta Barat': [106.74, -6.15],
      'Jakarta Timur': [106.9, -6.22],
      'Jakarta Utara': [106.88, -6.13],
      Bekasi: [106.99, -6.24],
      Bogor: [106.8, -6.6],
      Depok: [106.82, -6.4],
      Tangerang: [106.63, -6.18],
      'Tangerang Selatan': [106.71, -6.29],
      Bandung: [107.62, -6.92],
      Semarang: [110.42, -6.99],
      Surabaya: [112.75, -7.26],
      Surakarta: [110.82, -7.57],
      Yogyakarta: [110.36, -7.8],
      Medan: [98.67, 3.59],
      Palembang: [104.75, -2.98],
      Pekanbaru: [101.45, 0.51],
      Denpasar: [115.22, -8.65],
      Makassar: [119.43, -5.15],
    };

    function getAppSearchRegions() {
      const c = COUNTRIES;
      const rows = [];
      rows.push({ countryId: 458, label: `${c[458].name} - Semenanjung`, myRegion: 'Semenanjung' });
      rows.push({ countryId: 458, label: `${c[458].name} - East Malaysia`, myRegion: 'SabahSarawak' });
      rows.push({ countryId: 702, label: `${c[702].name} - National` });
      rows.push({ countryId: 96, label: `${c[96].name} - National` });
      Object.keys(APP_ID_CITY_LONLAT)
        .sort((a, b) => a.localeCompare(b))
        .forEach((city) => {
          rows.push({ countryId: 360, label: `${c[360].name} - ${city}`, idCity: city });
        });
      return rows;
    }

    let _appMyRows = null;
    let _appSgRows = null;
    let _appBnRows = null;
    let _appIdRows = null;


    function fmtAppIdrPerL(n) {
      const x = parseFloat(n);
      if (!Number.isFinite(x)) return '—';
      return `IDR ${Math.round(x).toLocaleString('en-US')}/L`;
    }

    function appMalaysiaRegionKey() {
      try {
        const k = localStorage.getItem('terminal_my_region') || 'Semenanjung';
        return k === 'SabahSarawak' ? 'SabahSarawak' : 'Semenanjung';
      } catch (_) {
        return 'Semenanjung';
      }
    }

    /** Rough boxes: peninsular vs Borneo (Sabah/Sarawak/Labuan). Matches map clicks, not maritime claims. */
    function appMalaysiaRegionFromLngLat(lon, lat) {
      const PEN = { minLon: 99.5, maxLon: 104.95, minLat: 0.75, maxLat: 6.95 };
      const EAST = { minLon: 108.8, maxLon: 119.6, minLat: 0.45, maxLat: 7.55 };
      const inPen = lon >= PEN.minLon && lon <= PEN.maxLon && lat >= PEN.minLat && lat <= PEN.maxLat;
      const inEast = lon >= EAST.minLon && lon <= EAST.maxLon && lat >= EAST.minLat && lat <= EAST.maxLat;
      if (inEast && !inPen) return 'SabahSarawak';
      if (inPen && !inEast) return 'Semenanjung';
      if (inEast && inPen) return lon >= 106.5 ? 'SabahSarawak' : 'Semenanjung';
      if (inEast) return 'SabahSarawak';
      if (inPen) return 'Semenanjung';
      return lon >= 106.5 ? 'SabahSarawak' : 'Semenanjung';
    }

    function appApplyMalaysiaClickRegion(event, svgNode, projection) {
      const inv = projection.invert(d3.pointer(event, svgNode));
      if (!inv || !Number.isFinite(inv[0]) || !Number.isFinite(inv[1])) return;
      const next = appMalaysiaRegionFromLngLat(inv[0], inv[1]);
      try {
        localStorage.setItem('terminal_my_region', next);
      } catch (_) {}
    }

    function appIndonesiaCity() {
      try {
        return localStorage.getItem('terminal_id_city') || 'Jakarta Pusat';
      } catch (_) {
        return 'Jakarta Pusat';
      }
    }

    function syncSearchInputFromSelection() {
      const inp = document.getElementById('country-search');
      if (!inp || document.activeElement === inp) return;
      inp.value = '';
    }

    /** Pick the sheet `city` whose centroid is closest to the click (degrees² is fine at this scale). */
    function appIndonesiaCityFromLngLat(lon, lat) {
      if (!Number.isFinite(lon) || !Number.isFinite(lat)) return 'Jakarta Pusat';
      let best = 'Jakarta Pusat';
      let bestD = Infinity;
      for (const [city, ll] of Object.entries(APP_ID_CITY_LONLAT)) {
        const dx = lon - ll[0];
        const dy = lat - ll[1];
        const d = dx * dx + dy * dy;
        if (d < bestD) {
          bestD = d;
          best = city;
        }
      }
      return best;
    }

    function appApplyIndonesiaClickCity(event, svgNode, projection) {
      const inv = projection.invert(d3.pointer(event, svgNode));
      if (!inv || !Number.isFinite(inv[0]) || !Number.isFinite(inv[1])) return;
      const city = appIndonesiaCityFromLngLat(inv[0], inv[1]);
      try {
        localStorage.setItem('terminal_id_city', city);
      } catch (_) {}
    }

    async function ensureAppMalaysiaRows() {
      if (_appMyRows) return _appMyRows;
      const res = await fetch(MY_API_URL);
      if (!res.ok) throw new Error('MY');
      const json = await res.json();
      _appMyRows = (json || []).filter(r => r.series_type === 'level');
      return _appMyRows;
    }

    async function ensureAppSheetRows(url, cacheRef) {
      if (cacheRef.val) return cacheRef.val;
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error('sheet');
      const text = await res.text();
      cacheRef.val = parseCSV(text);
      return cacheRef.val;
    }

    const _sgCache = { val: null };
    const _bnCache = { val: null };
    const _idCache = { val: null };

    const APP_CHART_POINTS = 30;

    function appCssVar(name, fallback) {
      const v = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
      return v || fallback;
    }

    function appChartColors() {
      const muted = appCssVar('--chart-line-muted', '#111827');
      return ['#ff6a00', '#2563eb', '#16a34a', '#a855f7', muted, '#0ea5e9', '#ef4444'];
    }

    function takeLastApp(arr, n) {
      return arr.slice(Math.max(0, arr.length - n));
    }

    function appAsNum(v) {
      const n = parseFloat(v);
      return Number.isFinite(n) ? n : null;
    }

    function buildAppChartSeries(rows, keys, labels) {
      const palette = appChartColors();
      return keys.map((k, i) => ({
        label: k.label,
        color: k.color || palette[i % palette.length],
        data: labels.map((lab) => {
          const r = rows.find((x) => x.__label === lab);
          return r ? appAsNum(r[k.key]) : null;
        }),
      }));
    }

    function appChartOptions(countryId) {
      const legendColor = appCssVar('--chart-legend', 'rgba(0,0,0,0.48)');
      const tickColor = appCssVar('--chart-tick', 'rgba(0,0,0,0.45)');
      const gridColor = appCssVar('--chart-grid', 'rgba(0,0,0,0.06)');
      return {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 420, easing: 'easeOutCubic' },
        // App / touch: no hover tooltips or active-point styling
        events: [],
        interaction: { mode: 'nearest', intersect: false },
        plugins: {
          legend: {
            display: true,
            position: 'bottom',
            align: 'start',
            labels: {
              usePointStyle: false,
              boxWidth: 11,
              boxHeight: 2,
              borderRadius: 1,
              padding: 10,
              boxPadding: 4,
              font: {
                family: 'Inter, system-ui, sans-serif',
                size: 8,
                weight: '400',
              },
              color: legendColor,
              generateLabels(chart) {
                const ds = chart.data.datasets || [];
                return ds.map((d, i) => ({
                  text: d.label,
                  fillStyle: d.borderColor,
                  strokeStyle: d.borderColor,
                  lineWidth: 0,
                  hidden: !chart.isDatasetVisible(i),
                  index: i,
                  datasetIndex: i,
                }));
              },
            },
          },
          tooltip: { enabled: false },
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { color: tickColor, font: { size: 10 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 },
          },
          y: {
            grid: { color: gridColor },
            ticks: {
              color: tickColor,
              font: { size: 10 },
              callback(v) {
                if (countryId === 360) return Number(v) >= 1e6 ? `${(v / 1e6).toFixed(1)}M` : `${Math.round(v / 1000)}k`;
                return v;
              },
            },
          },
        },
      };
    }

    function updateAppChart({ labels, datasets, countryId }) {
      const cv = document.getElementById('chart');
      if (!cv || !window.Chart) return;
      const ctx = cv.getContext('2d');

      function withAlpha(c, a) {
        if (!c) return c;
        const s = String(c).trim();
        if (/^rgba\(/i.test(s)) {
          return s.replace(/rgba\(([^)]+)\)/i, (m, inner) => {
            const parts = inner.split(',').map((p) => p.trim());
            if (parts.length < 3) return s;
            return `rgba(${parts[0]}, ${parts[1]}, ${parts[2]}, ${a})`;
          });
        }
        if (/^rgb\(/i.test(s)) {
          return s.replace(/rgb\(([^)]+)\)/i, (m, inner) => {
            const parts = inner.split(',').map((p) => p.trim());
            if (parts.length < 3) return s;
            return `rgba(${parts[0]}, ${parts[1]}, ${parts[2]}, ${a})`;
          });
        }
        if (/^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(s)) {
          const hex = s.slice(1);
          const full = hex.length === 3 ? hex.split('').map((ch) => ch + ch).join('') : hex;
          const r = parseInt(full.slice(0, 2), 16);
          const g = parseInt(full.slice(2, 4), 16);
          const b = parseInt(full.slice(4, 6), 16);
          return `rgba(${r}, ${g}, ${b}, ${a})`;
        }
        return s;
      }

      function mkFill(stroke) {
        const grad = ctx.createLinearGradient(0, 0, 0, cv.height || 210);
        grad.addColorStop(0, withAlpha(stroke, 0.16));
        grad.addColorStop(1, withAlpha(stroke, 0));
        return grad;
      }

      const nextDs = (datasets || []).map((ds) => ({
        label: ds.label,
        data: ds.data || [],
        borderColor: ds.color,
        backgroundColor: mkFill(ds.color),
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 0,
        tension: 0.55,
        cubicInterpolationMode: 'default',
        fill: true,
        spanGaps: true,
      }));

      if (RIGHT_CHART) {
        RIGHT_CHART.destroy();
        RIGHT_CHART = null;
      }

    function syncHiStickyShadow() {
      const sticky = document.getElementById('sheet-region-sticky');
      const scroller = document.getElementById('sheet-scroll');
      if (!sticky || !scroller) return;
      sticky.classList.toggle('sheet-region-sticky--raised', scroller.scrollTop > 1);

    function initSheet(){
      const sheet = document.getElementById('sheet');
      const grab = document.getElementById('grab');
      const scroller = document.getElementById('sheet-scroll');
      let dragging = false, startY = 0, startH = 0;
      let snap = 1;
      const clamp = (n, lo, hi) => Math.max(lo, Math.min(hi, n));
      const heights = () => {
        const vh = window.visualViewport ? Math.round(window.visualViewport.height) : window.innerHeight;
        const quarter = Math.round(vh * 0.25);
        const half = Math.round(vh * 0.5);
        const expandedTop = Math.round(Math.min(vh - 72, vh * 0.94));
        const expanded = Math.max(half + 100, expandedTop);
        return { quarter, half, expanded };
      };
      const apply = (h) => {
        const px = Math.round(h);
        document.documentElement.style.setProperty('--sheetH', `${px}px`);
        const { half, expanded } = heights();
        const scrollThreshold = half + (expanded - half) * 0.48;
        const isExpanded = px >= scrollThreshold;
        const allowsScroll = px >= half;
        sheet.classList.toggle('sheet-expanded', isExpanded);
        sheet.classList.toggle('sheet-scrollable', allowsScroll);
        if (!allowsScroll && scroller) scroller.scrollTop = 0;
        syncHiStickyShadow();
      };
      const nearestSnapIndex = (h) => {
        const { quarter, half, expanded } = heights();
        const snaps = [quarter, half, expanded];
        let best = 0;
        let d = Infinity;
        snaps.forEach((x, i) => {
          const dd = Math.abs(h - x);
          if (dd < d) {
            d = dd;
            best = i;
          }
        });
        return best;
      };
      function setSnap(i){
        snap = clamp(i, 0, 2);
        const { quarter, half, expanded } = heights();
        const h = snap === 0 ? quarter : snap === 1 ? half : expanded;
        apply(h);
        if (RIGHT_CHART) setTimeout(() => RIGHT_CHART.resize(), 60);
      }
      function shouldStartSheetResize(e) {
        if (sheet.classList.contains('sheet-expanded')) {
          return grab.contains(e.target);
        }
        if (sheet.classList.contains('sheet-scrollable')) {
          if (grab.contains(e.target)) return true;
          return !scroller.contains(e.target);
        }
        return true;
      }
      function onSheetPointerDown(e) {
        if (e.type === 'mousedown' && e.button !== 0) return;
        if (!shouldStartSheetResize(e)) return;
        onDown(e);
      }
      function onDown(e){
        if (e.cancelable && e.type === 'touchstart') e.preventDefault();
        dragging = true;
        startY = (e.touches ? e.touches[0].clientY : e.clientY);
        startH = sheet.getBoundingClientRect().height;
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
        window.addEventListener('touchmove', onMove, { passive: false });
        window.addEventListener('touchend', onUp, { passive: true });
        window.addEventListener('touchcancel', onUp, { passive: true });
      }
      function onMove(e){
        if (!dragging) return;
        if (e.cancelable) e.preventDefault();
        const y = (e.touches ? e.touches[0].clientY : e.clientY);
        const dy = startY - y;
        const { quarter, expanded } = heights();
        apply(clamp(startH + dy, quarter, expanded));
      }
      function onUp(){
        if (!dragging) return;
        dragging = false;
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
        window.removeEventListener('touchmove', onMove);
        window.removeEventListener('touchend', onUp);
        window.removeEventListener('touchcancel', onUp);
        const h = sheet.getBoundingClientRect().height;
        setSnap(nearestSnapIndex(h));
      }
      sheet.addEventListener('mousedown', onSheetPointerDown);
      sheet.addEventListener('touchstart', onSheetPointerDown, { passive: false });
      grab.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          setSnap((snap + 1) % 3);
        }
      });
      setSnap(1);
      scroller.addEventListener('scroll', syncHiStickyShadow, { passive: true });
      syncHiStickyShadow();
      const onViewportResize = () => setSnap(snap);
      window.addEventListener('resize', onViewportResize);
      window.visualViewport?.addEventListener('resize', onViewportResize);
    }

    function initSearch(){
      const input = document.getElementById('country-search');
      const menu = document.getElementById('country-search-menu');
      const list = getAppSearchRegions();
      let open = false;
      const openMenu = () => { open=true; menu.classList.add('open'); };
      const closeMenu = () => { open=false; menu.classList.remove('open'); };
      const render = (items) => {
        menu.innerHTML = items
          .map(
            (x) =>
              `<div class="search-item" role="option" data-country-id="${x.countryId}" data-my-region="${x.myRegion ?? ''}" data-id-city="${x.idCity ?? ''}">${x.label}</div>`
          )
          .join('');
      };
      const filter = () => {
        const q = (input.value||'').trim().toLowerCase();
        const items = !q ? list : list.filter((x) => x.label.toLowerCase().includes(q));
        render(items);
      };
      input.addEventListener('focus', () => { openMenu(); filter(); });
      input.addEventListener('input', () => { openMenu(); filter(); });
      document.addEventListener('pointerdown', (e) => {
        if (!open) return;
        if (menu.contains(e.target) || input.contains(e.target)) return;
        closeMenu();
      }, true);
      menu.addEventListener('mousedown', (e) => {
        const it = e.target.closest('.search-item');
        if (!it) return;
        const countryId = +it.getAttribute('data-country-id');
        const mr = it.getAttribute('data-my-region');
        const ic = it.getAttribute('data-id-city');
        if (mr) {
          try { localStorage.setItem('terminal_my_region', mr); } catch (_) {}
        }
        if (ic) {
          try { localStorage.setItem('terminal_id_city', ic); } catch (_) {}
        }
        setSelected(countryId);
        input.value = '';
        closeMenu();
        e.preventDefault();
      });
      document.addEventListener('keydown', (e) => {
        const isMacFind = (e.metaKey && !e.ctrlKey && (e.key === 'f' || e.key === 'F'));
        const isWinFind = (e.ctrlKey && !e.metaKey && (e.key === 'f' || e.key === 'F'));
        if (!isMacFind && !isWinFind) return;
        e.preventDefault();
        openMenu();
        filter();
        input.focus();
        try { input.select(); } catch (_) {}
      }, true);
    }

    function initMap(){
      const root = document.getElementById('map');
      const rect = root.getBoundingClientRect();
      const W = Math.max(320, Math.floor(rect.width));
      const H = Math.max(320, Math.floor(rect.height));
      const svg = d3.select(root).append('svg')
        .attr('viewBox', `0 0 ${W} ${H}`)
        .attr('preserveAspectRatio', 'xMidYMid meet');

      const baseScale = (Math.min(W, H) * 1.55) / 2;
      // Center the globe slightly above geometric middle so the focused
      // country clears the pull-up panel (default ~half screen).
      const mapCenterY = H * 0.34;
      const projection = d3.geoOrthographic()
        .translate([W / 2, mapCenterY])
        .scale(baseScale)
        .clipAngle(90)
        .precision(0.3);
      const path = d3.geoPath(projection);
      const mapG = svg.append('g');

      Promise.all([
        d3.json('./assets/countries-110m.json'),
        d3.json('./assets/singapore-geo.json').catch(() => null),
      ]).then(([world, sgGeo]) => {
        const countries = topojson.feature(world, world.objects.countries);
        const sgFeature = sgGeo && sgGeo.type === 'Feature'
          ? Object.assign({}, sgGeo, { id: 702 })
          : null;
        const DEFAULT_CENTER = [115, 6];
        projection.rotate([-DEFAULT_CENTER[0], -DEFAULT_CENTER[1], 0]);

        mapG.append('path').datum({ type: 'Sphere' }).attr('class', 'sphere').attr('d', path);
        mapG.append('path').datum(d3.geoGraticule().step([10, 10])()).attr('class', 'graticule').attr('d', path);

        mapG.selectAll('.bg')
          .data(countries.features.filter(d => !SEA.has(+d.id)))
          .enter().append('path').attr('class', 'country').attr('d', path);

        mapG.selectAll('.live-c')
          .data(countries.features.filter(d => LIVE[+d.id]))
          .enter().append('path').attr('class', 'country live').attr('d', path)
          .on('click', (e, d) => {
            const id = +d.id;
            if (id === 458) {
              appApplyMalaysiaClickRegion(e, svg.node(), projection);
              if (+selected === 458) {
                refreshHighlights(458);
                applySel();
                if (typeof APP_ZOOM_TO === 'function') APP_ZOOM_TO(458, true);
                return;
              }
            }
            if (id === 360) {
              appApplyIndonesiaClickCity(e, svg.node(), projection);
              if (+selected === 360) {
                refreshHighlights(360);
                applySel();
                if (typeof APP_ZOOM_TO === 'function') APP_ZOOM_TO(360, true);
                return;
              }
            }
            setSelected(id);
            applySel();
          });

        const mesh = mapG.append('path')
          .datum(topojson.mesh(world, world.objects.countries))
          .attr('class', 'border-mesh')
          .attr('d', path);

        const liveBorders = mapG.selectAll('.border-live-p')
          .data(countries.features.filter(d => LIVE[+d.id]))
          .enter().append('path')
          .attr('class', 'border-live')
          .attr('d', path);

        if (sgFeature) {
          mapG.append('path')
            .datum(sgFeature)
            .attr('class', 'country live country-sg')
            .attr('d', path)
            .on('click', (e) => {
              e.stopPropagation();
              if (+selected === 702) {
                refreshHighlights(702);
                applySel();
                return;
              }
              setSelected(702);
              applySel();
            });
        }

        function applySel(){
          mapG.selectAll('.country.live').classed('selected', (d) => d && +d.id === +selected);
          liveBorders.classed('selected', d => +d.id === +selected);
        }
        applySel();

        function updateAll(){
          mapG.selectAll('path').attr('d', path);
        }

        const minZoomK = 0.90;
        const maxZoomK = 4.8;
        let zoom;
        function syncZoomFromProjection() {
          svg.call(zoom.transform, d3.zoomIdentity.scale(projection.scale() / baseScale));
        }
        zoom = d3.zoom()
          .scaleExtent([minZoomK, maxZoomK])
          .filter((event) => {
            if (event.type === 'wheel') return true;
            if (event.type === 'mousedown') return false;
            if (event.type === 'dblclick') return false;
            if (event.type === 'touchstart' || event.type === 'touchmove') {
              return event.touches && event.touches.length >= 2;
            }
            return false;
          })
          .on('zoom', (event) => {
            projection.scale(baseScale * event.transform.k);
            updateAll();
          });

        function computeFitScale(feature, rotateArr, padPx) {
          const s0 = projection.scale();
          const r0 = projection.rotate();
          try {
            projection.scale(1).rotate(rotateArr);
            const b = path.bounds(feature);
            const dx = b[1][0] - b[0][0];
            const dy = b[1][1] - b[0][1];
            if (!(dx > 0) || !(dy > 0)) return null;
            const s = Math.min((W - padPx) / dx, (H - padPx) / dy);
            if (!isFinite(s) || s <= 0) return null;
            return s;
          } finally {
            projection.scale(s0).rotate(r0);
          }
        }

        // Expose: zoom/rotate to a selected country
        APP_ZOOM_TO = function zoomToCountry(countryId, animate = true) {
          const f = +countryId === 702 && sgFeature
            ? sgFeature
            : countries.features.find(x => +x.id === +countryId);
          if (!f) return;

          let lon, lat, subFocus = false;
          if (+countryId === 360) {
            const city = appIndonesiaCity();
            const ll = APP_ID_CITY_LONLAT[city];
            if (ll && Number.isFinite(ll[0]) && Number.isFinite(ll[1])) {
              [lon, lat] = ll;
              subFocus = true;
            } else {
              [lon, lat] = d3.geoCentroid(f);
            }
          } else if (+countryId === 458) {
            const region = appMalaysiaRegionKey();
            if (region === 'SabahSarawak') {
              lon = 115; lat = 4;
            } else {
              lon = 102; lat = 4;
            }
            subFocus = true;
          } else {
            [lon, lat] = d3.geoCentroid(f);
          }

          const target = [-lon, -lat, 0];
          const padZ = 58;
          const fitS = subFocus ? null : computeFitScale(f, target, padZ);
          let nextScale = fitS ? Math.max(baseScale * 0.90, Math.min(baseScale * 4.8, fitS)) : projection.scale();
          if (subFocus) {
            const floor = +countryId === 458 ? baseScale * 2.12 : baseScale * 2.15;
            nextScale = Math.max(nextScale, Math.min(baseScale * 4.8, floor));
          }

          if (!animate) {
            projection.rotate(target);
            projection.scale(nextScale);
            updateAll();
            syncZoomFromProjection();
            return;
          }

          const r0 = projection.rotate();
          const s0 = projection.scale();
          // Shortest-arc longitude interpolation prevents globe spinning the long way round
          let dLon = target[0] - r0[0];
          while (dLon > 180) dLon -= 360;
          while (dLon < -180) dLon += 360;
          const interpR = t => [r0[0] + t * dLon, r0[1] + t * (target[1] - r0[1]), 0];
          const interpS = d3.interpolateNumber(s0, nextScale);
          svg.interrupt();
          svg.transition().duration(420).tween('appFocus', () => (t) => {
            projection.rotate(interpR(t)).scale(interpS(t));
            updateAll();
          }).on('end', syncZoomFromProjection);
        };

        svg.call(zoom);

        // Initial focus: selected country (syncs pinch/wheel zoom state via APP_ZOOM_TO)
        APP_ZOOM_TO(selected, false);

        // Drag rotate (lower sensitivity)
        function rotateBy(dx, dy){
          const r = projection.rotate();
          const sens = 0.06;
          const ddx = Math.abs(dx) < 1.5 ? 0 : dx;
          const ddy = Math.abs(dy) < 1.5 ? 0 : dy;
          projection.rotate([ r[0] + ddx * sens, Math.max(-85, Math.min(85, r[1] - ddy * sens)), 0 ]);
          updateAll();
        }
        svg.style('cursor','grab');
        svg.call(d3.drag()
          .on('start', () => svg.style('cursor','grabbing'))
          .on('drag', (ev) => rotateBy(ev.dx, ev.dy))
          .on('end', () => svg.style('cursor','grab'))
        );
      });
    }

      _exportStoryObjectUrl = URL.createObjectURL(blob);
      const modal = document.getElementById('export-story-modal');
      const img = document.getElementById('export-story-preview');
      if (!modal || !img) return;
      img.src = _exportStoryObjectUrl;
      img.alt = 'Instagram story preview';
      modal.classList.add('export-story-modal--open');
      modal.setAttribute('aria-hidden', 'false');
      document.getElementById('export-story-save')?.focus();
    }

    async function saveExportStoryToGallery() {
      const blob = _exportStoryBlob;
      const filename = _exportStoryFilename || 'petrolprice-story.png';
      if (!blob) return;
      const file = new File([blob], filename, { type: 'image/png' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file] });
          return;
        } catch (e) {
          if (e && e.name === 'AbortError') return;
        }
      }
      if (!_exportStoryObjectUrl) return;
      const a = document.createElement('a');
      a.href = _exportStoryObjectUrl;
      a.download = filename;
      a.rel = 'noopener';
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    function initExportStoryModal() {
      const modal = document.getElementById('export-story-modal');
      if (!modal) return;
      modal.querySelector('.export-story-backdrop')?.addEventListener('click', closeExportStoryModal);
      document.getElementById('export-story-close')?.addEventListener('click', closeExportStoryModal);
      document.getElementById('export-story-save')?.addEventListener('click', async () => {
        const btn = document.getElementById('export-story-save');
        if (!btn || btn.disabled) return;
        btn.disabled = true;
        try {
          await saveExportStoryToGallery();
        } catch (err) {
          console.error(err);
        } finally {
          btn.disabled = false;
        }
      });
      document.addEventListener('keydown', (e) => {
        if (e.key !== 'Escape') return;
        if (!modal.classList.contains('export-story-modal--open')) return;
        closeExportStoryModal();
      });
    }

    function appExportSlug(cardId) {
      if (cardId === 'card-highlights') return 'highlights';
      if (cardId === 'card-history') return 'history';
      if (cardId === 'card-overview') return 'overview';
      return 'export';
    }

    function appComposeStoryPng(snapCanvas) {
      const out = document.createElement('canvas');
      out.width = APP_STORY_W;
      out.height = APP_STORY_H;
      const ctx = out.getContext('2d');
      ctx.fillStyle = appCssVar('--surface', '#ffffff');
      ctx.fillRect(0, 0, APP_STORY_W, APP_STORY_H);
      const maxW = APP_STORY_W - APP_STORY_PAD * 2;
      const maxH = APP_STORY_H - APP_STORY_PAD * 2;
      const sw = snapCanvas.width;
      const sh = snapCanvas.height;
      const sc = Math.min(maxW / sw, maxH / sh);
      const dw = Math.round(sw * sc);
      const dh = Math.round(sh * sc);
      const dx = Math.round((APP_STORY_W - dw) / 2);
      const dy = Math.round((APP_STORY_H - dh) / 2);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(snapCanvas, 0, 0, sw, sh, dx, dy, dw, dh);
      return out;
    }

    async function exportCardAsInstagramStory(cardId) {
      const html2canvas = window.html2canvas;
      if (typeof html2canvas !== 'function') throw new Error('html2canvas missing');

      const exportBg = appCssVar('--surface', '#ffffff');
      const h2cOpts = {
        scale: 2,
        backgroundColor: exportBg,
        logging: false,
        useCORS: true,
        allowTaint: true,
      };
      const stripExports = (root) => {
        root?.querySelectorAll('.card-export').forEach((n) => n.remove());
      };

      let snap;
      if (cardId === 'card-highlights') {
        const wrap = document.createElement('div');
        wrap.style.cssText =
          `position:fixed;left:-16000px;top:0;width:960px;background:${exportBg};padding:48px 44px;box-sizing:border-box;`;
        const st = document.getElementById('sheet-region-sticky')?.cloneNode(true);
        const cd = document.getElementById('card-highlights')?.cloneNode(true);
        stripExports(st);
        stripExports(cd);
        if (st) wrap.appendChild(st);
        if (cd) wrap.appendChild(cd);
        document.body.appendChild(wrap);
        try {
          snap = await html2canvas(wrap, h2cOpts);
        } finally {
          wrap.remove();
        }
      } else if (cardId === 'card-history') {
        const live = document.getElementById('card-history');
        if (!live) return;
        live.scrollIntoView({ block: 'nearest', behavior: 'auto' });
        await new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));
        snap = await html2canvas(live, {
          ...h2cOpts,
          ignoreElements: (el) => el.classList && el.classList.contains('card-export'),
        });
      } else if (cardId === 'card-overview') {
        const wrap = document.createElement('div');
        wrap.style.cssText =
          `position:fixed;left:-16000px;top:0;width:960px;background:${exportBg};padding:48px 44px;box-sizing:border-box;`;
        const cd = document.getElementById('card-overview')?.cloneNode(true);
        stripExports(cd);
        if (cd) wrap.appendChild(cd);
        document.body.appendChild(wrap);
        try {
          snap = await html2canvas(wrap, h2cOpts);
        } finally {
          wrap.remove();
        }
      } else return;

      if (!snap) return;
      const story = appComposeStoryPng(snap);
      const blob = await new Promise((resolve, reject) => {
        story.toBlob((b) => (b ? resolve(b) : reject(new Error('Story export failed'))), 'image/png', 0.95);
      });
      const slug = appExportSlug(cardId);
      openExportStoryModal(blob, `petrolprice-${slug}-story.png`);
    }

    function initCardExport() {
      const sheet = document.getElementById('sheet');
      if (!sheet) return;
      sheet.addEventListener('click', async (e) => {
        const btn = e.target.closest('.card-export');
        if (!btn || !sheet.contains(btn)) return;
        e.preventDefault();
        e.stopPropagation();
        const card = btn.closest('.card');
        const cardId = card?.id;
        if (!cardId) return;
        if (typeof window.html2canvas !== 'function') return;
        btn.disabled = true;
        try {
          await exportCardAsInstagramStory(cardId);
        } catch (err) {
          console.error(err);
        } finally {
          btn.disabled = false;
        }
      });
    }

    // Init
    initSheet();
    initSearch();
    initExportStoryModal();
    initCardExport();

    (function initAppColorScheme() {
      const mq = window.matchMedia('(prefers-color-scheme: dark)');
      function syncThemeMeta() {
        const meta = document.getElementById('meta-theme-color');
        if (meta) meta.setAttribute('content', mq.matches ? '#1c1c1e' : '#ff6a00');
      }
      function onSchemeChange() {
        syncThemeMeta();
        refreshHighlights(selected).catch(() => {});
      }
      syncThemeMeta();
      mq.addEventListener('change', onSchemeChange);
    })();

    window.addEventListener('load', () => {
      initChart();
      initMap();
      setSelected(458);
    });
  </script>
</body>
