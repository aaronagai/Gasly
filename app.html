  <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="assets/config.js"></script>
  <script src="assets/utils.js"></script>
  <script src="assets/app-map-openfreemap.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    // COUNTRIES, COUNTRY_OVERVIEW_FALLBACK, OVERVIEW_SHEET_URL, ID_CITY_LONLAT, LA_PROVINCE_LONLAT, MY_REGIONS, TH/PH/KH/MM/VN/LA fuels — from config.js
    // ensureMalaysiaRows, ensureSheetRows, cssVar, withAlpha, rowsForPriceChart, selectLatestHighlightRow, fmtDateFromRow, asNum, buildChartSeries — from utils.js

    /** ISO id → name for map hover/hit (same set as terminal). */
    const MAP_COUNTRY_NAMES = {
      36:'Australia', 50:'Bangladesh', 96:'Brunei', 104:'Myanmar',
      116:'Cambodia', 144:'Sri Lanka', 156:'China', 158:'Taiwan',
      356:'India', 360:'Indonesia', 392:'Japan', 410:'South Korea',
      418:'Laos', 458:'Malaysia', 598:'Papua New Guinea', 608:'Philippines',
      626:'Timor-Leste', 702:'Singapore', 704:'Vietnam', 764:'Thailand',
    };

    let selected = 458;
    let RIGHT_CHART = null;
    /** Latest Singapore sheet rows (for provider picker). */
    let _appSgSheetRows = null;

    /** Search suggestions: MY regions from config, live SG providers from sheet, BN, TH, PH, KH, MM, LA provinces, ID cities (matches terminal data model). */
    async function buildSearchRegionsList() {
      const rows = [];
      MY_REGIONS.forEach((r) => {
        rows.push({
          countryId: 458,
          label: `${COUNTRIES[458].name} - ${r.label}`,
          myRegion: r.key,
        });
      });
      rows.push({ countryId: 96, label: `${COUNTRIES[96].name} - National` });
      rows.push({ countryId: 764, label: `${COUNTRIES[764].name} - National` });
      rows.push({ countryId: 608, label: `${COUNTRIES[608].name} - National` });
      let vnRows = [];
      try {
        vnRows = await ensureSheetRows(VN_SHEET_URL);
      } catch (_) {
        vnRows = [];
      }
      const vnAreas = [...new Set(vnRows.map((r) => normalizeSheetString(r.area)).filter(Boolean))].sort((a, b) =>
        a.localeCompare(b),
      );
      if (vnAreas.length) {
        vnAreas.forEach((ar) => {
          rows.push({
            countryId: 704,
            label: `${COUNTRIES[704].name} - ${labelVietnamArea(ar)}`,
            vnArea: ar,
          });
        });
      } else {
        rows.push({ countryId: 704, label: `${COUNTRIES[704].name} - National`, vnArea: '' });
      }
      rows.push({ countryId: 116, label: `${COUNTRIES[116].name} - National` });
      let mmRows = [];
      try {
        mmRows = await ensureSheetRows(MM_SHEET_URL);
      } catch (_) {
        mmRows = [];
      }
      const mmRegs = [...new Set(mmRows.map((r) => normalizeSheetString(r.region)).filter(Boolean))].sort((a, b) =>
        a.localeCompare(b),
      );
      if (mmRegs.length) {
        mmRegs.forEach((reg) => {
          rows.push({ countryId: 104, label: `${COUNTRIES[104].name} - ${reg}`, mmRegion: reg });
        });
      } else {
        rows.push({ countryId: 104, label: `${COUNTRIES[104].name} - National`, mmRegion: '' });
      }

      let sgRows = [];
      try {
        sgRows = await ensureSheetRows(SG_SHEET_URL);
      } catch (_) {
        sgRows = [];
      }
      const sgProvs = sortedSingaporeProviders(sgRows);
      if (sgProvs.length) {
        sgProvs.forEach((p) => {
          rows.push({ countryId: 702, label: `${COUNTRIES[702].name} - ${p}`, sgProvider: p });
        });
      } else {
        rows.push({ countryId: 702, label: `${COUNTRIES[702].name} - National` });
      }

      Object.keys(LA_PROVINCE_LONLAT)
        .sort((a, b) => a.localeCompare(b))
        .forEach((prov) => {
          rows.push({ countryId: 418, label: `${COUNTRIES[418].name} - ${prov}`, laProvince: prov });
        });
      Object.keys(ID_CITY_LONLAT)
        .sort((a, b) => a.localeCompare(b))
        .forEach((city) => {
          rows.push({ countryId: 360, label: `${COUNTRIES[360].name} - ${city}`, idCity: city });
        });
      return rows;
    }


    function fmtIDR(n) {
      const x = parseFloat(n);
      if (!Number.isFinite(x)) return '—';
      return `IDR ${Math.round(x).toLocaleString('en-US')}/L`;
    }

    /** Highlight card: show copy instead of em-dash when price is missing. */
    function fmtHiPerL(sym, n, decimals) {
      const s = fmtPerL(sym, n, decimals);
      return s === '—' ? 'Unavailable' : s;
    }

    function fmtHiIDR(n) {
      const s = fmtIDR(n);
      return s === '—' ? 'Unavailable' : s;
    }

    /** vs previous dated row; '-' if unchanged or no comparison (same ASCII hyphen everywhere). */
    function fmtDeltaPerL(sym, currentVal, prevVal, decimals = 2) {
      const cur = parseFloat(String(currentVal).replace(/,/g, ''));
      const prev = parseFloat(String(prevVal).replace(/,/g, ''));
      if (!Number.isFinite(cur) || !Number.isFinite(prev)) return '-';
      if (cur.toFixed(decimals) === prev.toFixed(decimals)) return '-';
      const diff = cur - prev;
      const mag = Math.abs(diff).toFixed(decimals);
      if (diff > 0) return `+${sym} ${mag}`;
      return `-${sym} ${mag}`;
    }

    function fmtDeltaIDR(currentVal, prevVal) {
      const cur = parseFloat(currentVal);
      const prev = parseFloat(prevVal);
      if (!Number.isFinite(cur) || !Number.isFinite(prev)) return '-';
      const a = Math.round(cur);
      const b = Math.round(prev);
      if (a === b) return '-';
      const diff = a - b;
      const abs = Math.abs(diff).toLocaleString('en-US');
      if (diff > 0) return `+IDR ${abs}/L`;
      return `-IDR ${abs}/L`;
    }

    function getMalaysiaRegion() {
      try {
        const k = localStorage.getItem('terminal_my_region') || 'Semenanjung';
        return k === 'SabahSarawak' ? 'SabahSarawak' : 'Semenanjung';
      } catch (_) {
        return 'Semenanjung';
      }
    }

    function getIndonesiaCity() {
      try { return localStorage.getItem('terminal_id_city') || 'Jakarta Pusat'; } catch (_) { return 'Jakarta Pusat'; }
    }

    function getLaosProvince() {
      try { return localStorage.getItem('terminal_la_province') || 'Vientiane Capital'; } catch (_) { return 'Vientiane Capital'; }
    }

    function getMyanmarRegion() {
      try {
        const s = localStorage.getItem('terminal_mm_region');
        if (s && String(s).trim()) return String(s).trim();
      } catch (_) {}
      return 'Thuwanna';
    }

    function getVietnamArea() {
      try {
        const s = localStorage.getItem('terminal_vn_area');
        if (s && String(s).trim()) return String(s).trim();
      } catch (_) {}
      return 'area_1';
    }

    function labelVietnamArea(areaKey) {
      const a = normalizeSheetString(areaKey).toLowerCase();
      const m = /^area[_-]?(\d+)$/.exec(a);
      if (m) return `Area ${m[1]}`;
      return normalizeSheetString(areaKey) || 'Area 1';
    }

    function syncSearchInputFromSelection() {
      const inp = document.getElementById('country-search');
      if (!inp || document.activeElement === inp) return;
      inp.value = '';
    }

    // Data fetch helpers — ensureMalaysiaRows / ensureSheetRows come from utils.js

    function chartOptions(countryId) {
      const legendColor = cssVar('--chart-legend', 'rgba(0,0,0,0.48)');
      const tickColor = cssVar('--chart-tick', 'rgba(0,0,0,0.45)');
      const gridColor = cssVar('--chart-grid', 'rgba(0,0,0,0.06)');
      return {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 420, easing: 'easeOutCubic' },
        // App / touch: no hover tooltips or active-point styling
        events: [],
        interaction: { mode: 'nearest', intersect: false },
        plugins: {
          legend: {
            display: true,
            position: 'bottom',
            align: 'start',
            labels: {
              usePointStyle: false,
              boxWidth: 11,
              boxHeight: 2,
              borderRadius: 1,
              padding: 10,
              boxPadding: 4,
              font: {
                family: 'Inter, system-ui, sans-serif',
                size: 8,
                weight: '400',
              },
              color: legendColor,
              generateLabels(chart) {
                const ds = chart.data.datasets || [];
                /* Chart.js paints legend text with legendItem.fontColor; without it, labels stay default (black). */
                return ds.map((d, i) => ({
                  text: d.label,
                  fillStyle: d.borderColor,
                  strokeStyle: d.borderColor,
                  lineWidth: 0,
                  hidden: !chart.isDatasetVisible(i),
                  index: i,
                  datasetIndex: i,
                  fontColor: legendColor,
                }));
              },
            },
          },
          tooltip: { enabled: false },
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { color: tickColor, font: { size: 10 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 },
          },
          y: {
            grid: { color: gridColor },
            ticks: {
              color: tickColor,
              font: { size: 10 },
              callback(v) {
                if (countryId === 360) return Number(v) >= 1e6 ? `${(v / 1e6).toFixed(1)}M` : `${Math.round(v / 1000)}k`;
                if (countryId === 116 || countryId === 418 || countryId === 104 || countryId === 704) {
                  const n = Number(v);
                  if (!Number.isFinite(n)) return v;
                  if (Math.abs(n) >= 1e6) return `${(n / 1e6).toFixed(1)}M`;
                  if (Math.abs(n) >= 1000) return `${Math.round(n / 1000)}k`;
                  return String(Math.round(n));
                }
                const n = Number(v);
                return Number.isFinite(n) ? String(parseFloat(n.toFixed(6))) : v;
              },
            },
          },
        },
      };
    }

    function updateChart({ labels, datasets, countryId }) {
      const cv = document.getElementById('chart');
      if (!cv || !window.Chart) return;
      const ctx = cv.getContext('2d');

      function mkFill(stroke) {
        const grad = ctx.createLinearGradient(0, 0, 0, cv.height || 210);
        grad.addColorStop(0, withAlpha(stroke, 0.16));
        grad.addColorStop(1, withAlpha(stroke, 0));
        return grad;
      }

      const nextDs = (datasets || []).map((ds) => ({
        label: ds.label,
        data: ds.data || [],
        borderColor: ds.color,
        backgroundColor: mkFill(ds.color),
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 0,
        tension: 0.35,
        fill: true,
        spanGaps: true,
      }));

      if (RIGHT_CHART) {
        RIGHT_CHART.destroy();
        RIGHT_CHART = null;
      }

      RIGHT_CHART = new Chart(ctx, {
        type: 'line',
        data: { labels: labels || [], datasets: nextDs },
        options: chartOptions(countryId),
      });
    }

    function renderHiRows(pairs) {
      const el = document.getElementById('hi-lines');
      el.innerHTML = pairs.map((row) => {
        const k = row[0];
        const v = row[1];
        const d = row[2];
        if (d != null && d !== '') {
          return `<div class="hi-row"><span class="hi-k">${k}</span><div class="hi-price-block"><span class="hi-v">${v}</span><span class="hi-delta" aria-label="Change vs previous update">${d}</span></div></div>`;
        }
        return `<div class="hi-row"><span class="hi-k">${k}</span><span class="hi-v hi-v--alone">${v}</span></div>`;
      }).join('');
    }

    function setHiLoading() {
      renderHiRows([['Prices', 'Loading…']]);
    }

    function resetHiTitleInteractivity() {
      const titleEl = document.getElementById('hi-title');
      if (!titleEl) return;
      titleEl.classList.remove('switchable');
      titleEl.removeAttribute('role');
      titleEl.removeAttribute('tabindex');
      titleEl.removeAttribute('aria-haspopup');
      titleEl.removeAttribute('aria-expanded');
      titleEl.removeAttribute('aria-controls');
    }

    async function refreshHighlights(cid) {
      const titleEl = document.getElementById('hi-title');
      const subEl = document.getElementById('hi-sub');
      const chartKicker = document.getElementById('chart-kicker');
      const cname = COUNTRIES[cid]?.name || '—';
      resetHiTitleInteractivity();
      try {
        window.__appCloseSgProviderMenu?.();
      } catch (_) {}
      setHiLoading();

      function emptyChart() {
        updateChart({
          labels: ['—'],
          datasets: [{ label: 'No data', data: [null], color: cssVar('--chart-empty', '#d4d4d4') }],
          countryId: null,
        });
      }

      try {
        if (cid === 458) {
          const rows = await ensureMalaysiaRows();
          const seriesAsc = sortRowsByDate(rows);
          const { row: rSel, prev: rPrev } = selectLatestHighlightRow(seriesAsc);
          const regionKey = getMalaysiaRegion();
          const isEast = regionKey === 'SabahSarawak';
          const dieselKey = isEast ? 'diesel_eastmsia' : 'diesel';
          const dieselLabel = isEast ? 'Diesel (East MY)' : 'Diesel';
          titleEl.textContent = isEast ? 'East Malaysia' : 'Semenanjung';
          subEl.textContent = `As of ${fmtDateFromRow(rSel)} · ${cname}`;
          renderHiRows([
            ['BUDI95', fmtHiPerL('MYR', rSel.ron95_budi95, 2), fmtDeltaPerL('MYR', rSel.ron95_budi95, rPrev?.ron95_budi95, 2)],
            ['RON95', fmtHiPerL('MYR', rSel.ron95, 2), fmtDeltaPerL('MYR', rSel.ron95, rPrev?.ron95, 2)],
            ['RON97', fmtHiPerL('MYR', rSel.ron97, 2), fmtDeltaPerL('MYR', rSel.ron97, rPrev?.ron97, 2)],
            [dieselLabel, fmtHiPerL('MYR', rSel[dieselKey], 2), fmtDeltaPerL('MYR', rSel[dieselKey], rPrev?.[dieselKey], 2)],
          ]);
          if (chartKicker) chartKicker.textContent = `${cname} petrol prices history`;

          const sliceRows = rowsForPriceChart(seriesAsc).map(r => ({ ...r, __label: fmtDate(r.date) }));
          const labels = sliceRows.map(r => r.__label);
          const chartKeys = [
            { key: 'ron95_budi95', label: 'BUDI95', color: '#9333ea' },
            { key: 'ron95', label: 'RON95', color: '#fbbf24' },
            { key: 'ron97', label: 'RON97', color: '#16a34a' },
            { key: dieselKey, label: dieselLabel, color: cssVar('--chart-line-muted', '#111827') },
          ];
          if (labels.length) {
            updateChart({
              labels,
              datasets: buildChartSeries(sliceRows, chartKeys, labels),
              countryId: 458,
            });
          } else emptyChart();
          return;
        }

        if (cid === 702) {
          const rows = await ensureSheetRows(SG_SHEET_URL);
          _appSgSheetRows = rows;
          const hasProviders = sortedSingaporeProviders(rows).length > 0;
          const prov = hasProviders ? resolveSingaporeProviderSelection(rows) : '';
          if (prov) {
            try { localStorage.setItem('terminal_sg_provider', prov); } catch (_) {}
          }
          const seriesAsc = sortRowsByDate(
            hasProviders
              ? rows.filter((r) => normalizeSheetString(r.provider) === normalizeSheetString(prov))
              : rows,
          );
          const { row: rSel, prev: rPrev } = selectLatestHighlightRow(seriesAsc);
          titleEl.textContent = hasProviders ? prov : 'National';
          if (hasProviders) {
            titleEl.classList.add('switchable');
            titleEl.setAttribute('role', 'button');
            titleEl.setAttribute('tabindex', '0');
            titleEl.setAttribute('aria-haspopup', 'listbox');
            titleEl.setAttribute('aria-expanded', 'false');
            titleEl.setAttribute('aria-controls', 'sg-provider-menu');
          }
          subEl.textContent = `As of ${fmtDateFromRow(rSel)} · ${cname}`;
          renderHiRows([
            ['RON92', fmtHiPerL('SGD', rSel.ron92, 2), fmtDeltaPerL('SGD', rSel.ron92, rPrev?.ron92, 2)],
            ['RON95', fmtHiPerL('SGD', rSel.ron95, 2), fmtDeltaPerL('SGD', rSel.ron95, rPrev?.ron95, 2)],
            ['RON98', fmtHiPerL('SGD', rSel.ron98, 2), fmtDeltaPerL('SGD', rSel.ron98, rPrev?.ron98, 2)],
            ['Diesel', fmtHiPerL('SGD', rSel.diesel, 2), fmtDeltaPerL('SGD', rSel.diesel, rPrev?.diesel, 2)],
          ]);
          if (chartKicker) chartKicker.textContent = `${cname} petrol prices history`;

          const sliceRows = rowsForPriceChart(seriesAsc).map(r => ({ ...r, __label: fmtDate(r.date) }));
          const labels = sliceRows.map(r => r.__label);
          const chartKeys = [
            { key: 'ron92', label: 'RON92' },
            { key: 'ron95', label: 'RON95' },
            { key: 'ron98', label: 'RON98' },
            { key: 'diesel', label: 'Diesel' },
          ];
          if (labels.length) {
            updateChart({
              labels,
              datasets: buildChartSeries(sliceRows, chartKeys, labels),
              countryId: 702,
            });
          } else emptyChart();
          return;

    function syncHiStickyShadow() {
      const sticky = document.getElementById('sheet-region-sticky');
      const scroller = document.getElementById('sheet-scroll');
      if (!sticky || !scroller) return;
      sticky.classList.toggle('sheet-region-sticky--raised', scroller.scrollTop > 1);
    }

    function initSheet(){
      const sheet = document.getElementById('sheet');
      const grab = document.getElementById('grab');
      const scroller = document.getElementById('sheet-scroll');
      let dragging = false, startY = 0, startH = 0;
      let snap = 1;
      const clamp = (n, lo, hi) => Math.max(lo, Math.min(hi, n));
      const heights = () => {
        const vh = window.visualViewport ? Math.round(window.visualViewport.height) : window.innerHeight;
        const quarter = Math.round(vh * 0.25);
        const half = Math.round(vh * 0.5);
        const expandedTop = Math.round(Math.min(vh - 72, vh * 0.94));
        const expanded = Math.max(half + 100, expandedTop);
        return { quarter, half, expanded };
      };
      const apply = (h) => {
        const px = Math.round(h);
        document.documentElement.style.setProperty('--sheetH', `${px}px`);
        const { half, expanded } = heights();
        const scrollThreshold = half + (expanded - half) * 0.48;
        const isExpanded = px >= scrollThreshold;
        const allowsScroll = px >= half;
        sheet.classList.toggle('sheet-expanded', isExpanded);
        sheet.classList.toggle('sheet-scrollable', allowsScroll);
        if (!allowsScroll && scroller) scroller.scrollTop = 0;
        syncHiStickyShadow();
      };
      const nearestSnapIndex = (h) => {
        const { quarter, half, expanded } = heights();
        const snaps = [quarter, half, expanded];
        let best = 0;
        let d = Infinity;
        snaps.forEach((x, i) => {
          const dd = Math.abs(h - x);
          if (dd < d) {
            d = dd;
            best = i;
          }
        });
        return best;
      };
      function setSnap(i){
        snap = clamp(i, 0, 2);
        const { quarter, half, expanded } = heights();
        const h = snap === 0 ? quarter : snap === 1 ? half : expanded;
        apply(h);
        if (RIGHT_CHART) setTimeout(() => RIGHT_CHART.resize(), 60);
      }
      function shouldStartSheetResize(e) {
        if (sheet.classList.contains('sheet-expanded')) {
          return grab.contains(e.target);
        }
        if (sheet.classList.contains('sheet-scrollable')) {
          if (grab.contains(e.target)) return true;
          return !scroller.contains(e.target);
        }
        return true;
      }
      function onSheetPointerDown(e) {
        if (e.type === 'mousedown' && e.button !== 0) return;
        if (!shouldStartSheetResize(e)) return;
        onDown(e);
      }
      function onDown(e){
        if (e.cancelable && e.type === 'touchstart') e.preventDefault();
        dragging = true;
        startY = (e.touches ? e.touches[0].clientY : e.clientY);
        startH = sheet.getBoundingClientRect().height;
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
        window.addEventListener('touchmove', onMove, { passive: false });
        window.addEventListener('touchend', onUp, { passive: true });
        window.addEventListener('touchcancel', onUp, { passive: true });
      }
      function onMove(e){
        if (!dragging) return;
        if (e.cancelable) e.preventDefault();
        const y = (e.touches ? e.touches[0].clientY : e.clientY);
        const dy = startY - y;
        const { quarter, expanded } = heights();
        apply(clamp(startH + dy, quarter, expanded));
      }
      function onUp(){
        if (!dragging) return;
        dragging = false;
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
        window.removeEventListener('touchmove', onMove);
        window.removeEventListener('touchend', onUp);
        window.removeEventListener('touchcancel', onUp);
        const h = sheet.getBoundingClientRect().height;
        setSnap(nearestSnapIndex(h));
      }
      sheet.addEventListener('mousedown', onSheetPointerDown);
      sheet.addEventListener('touchstart', onSheetPointerDown, { passive: false });
      grab.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          setSnap((snap + 1) % 3);
        }
      });
      /* Default: smallest sheet stop (~¼ viewport) so the map stays visible on first open. */
      setSnap(0);
      scroller.addEventListener('scroll', syncHiStickyShadow, { passive: true });
      syncHiStickyShadow();
      const onViewportResize = () => setSnap(snap);
      window.addEventListener('resize', onViewportResize);
      window.visualViewport?.addEventListener('resize', onViewportResize);
    }

    function initSingaporeProviderMenu() {
      const menu = document.getElementById('sg-provider-menu');
      const sticky = document.getElementById('sheet-region-sticky');
      const scroller = document.getElementById('sheet-scroll');
      if (!menu) return;

      let open = false;

      function titleEl() {
        return document.getElementById('hi-title');
      }

      function closeMenu() {
        if (!open) return;
        open = false;
        menu.classList.remove('open');
        menu.setAttribute('aria-hidden', 'true');
        const t = titleEl();
        if (t) t.setAttribute('aria-expanded', 'false');
      }

      function positionMenu() {
        const t = titleEl();
        if (!t) return;
        const r = t.getBoundingClientRect();
        const pad = 12;
        const maxW = window.innerWidth - pad * 2;
        const w = Math.min(maxW, Math.max(220, r.width + 80));
        let left = Math.max(pad, Math.min(r.left, window.innerWidth - pad - w));
        let top = r.bottom + 8;
        menu.style.width = `${w}px`;
        menu.style.left = `${left}px`;
        menu.style.top = `${top}px`;
        requestAnimationFrame(() => {
          const mh = menu.getBoundingClientRect().height;
          if (top + mh > window.innerHeight - pad) {
            const above = r.top - 8 - mh;
            if (above >= pad) menu.style.top = `${above}px`;
          }
        });
      }

      function renderMenu() {
        const rows = _appSgSheetRows;
        const providers = sortedSingaporeProviders(rows || []);
        const cur =
          rows && rows.length ? resolveSingaporeProviderSelection(rows) : '';
        const curN = normalizeSheetString(cur);
        menu.innerHTML = '';
        providers.forEach((p) => {
          const div = document.createElement('div');
          div.className = 'sg-provider-item';
          if (normalizeSheetString(p) === curN) div.classList.add('active');
          div.setAttribute('role', 'option');
          div.setAttribute('aria-selected', normalizeSheetString(p) === curN ? 'true' : 'false');
          div.dataset.provider = p;
          div.textContent = p;
          div.addEventListener('click', () => {
            try {
              localStorage.setItem('terminal_sg_provider', p);
            } catch (_) {}
            closeMenu();
            if (selected === 702) refreshHighlights(702).catch(() => {});
          });
          menu.appendChild(div);
        });
      }

      function openMenu() {
        if (selected !== 702) return;
        if (!sortedSingaporeProviders(_appSgSheetRows || []).length) return;
        open = true;
        renderMenu();
        menu.setAttribute('aria-hidden', 'false');
        menu.classList.add('open');
        positionMenu();
        const t = titleEl();
        if (t) t.setAttribute('aria-expanded', 'true');
      }

      function toggleMenu() {
        if (open) closeMenu();
        else openMenu();
      }

      sticky?.addEventListener('click', (e) => {
        const t = titleEl();
        if (!t?.classList.contains('switchable') || selected !== 702) return;
        if (!t.contains(e.target)) return;
        e.stopPropagation();
        toggleMenu();
      });

      sticky?.addEventListener(
        'keydown',
        (e) => {
          const t = titleEl();
          if (!t?.classList.contains('switchable') || selected !== 702) return;
          if (!t.contains(e.target)) return;
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            toggleMenu();
          }
        },
        true,
      );

      document.addEventListener(
        'pointerdown',
        (e) => {
          if (!open) return;
          const t = titleEl();
          if (t?.contains(e.target)) return;
          if (menu.contains(e.target)) return;
          closeMenu();
        },
        true,
      );

      document.addEventListener('keydown', (e) => {
        if (open && e.key === 'Escape') closeMenu();
      });

      window.addEventListener('resize', () => {
        if (open) positionMenu();
      });

      scroller?.addEventListener(
        'scroll',
        () => {
          if (open) closeMenu();
        },
        { passive: true },
      );

      window.__appCloseSgProviderMenu = closeMenu;
    }

    async function initSearch(){
      const input = document.getElementById('country-search');
      const menu = document.getElementById('country-search-menu');
      const list = await buildSearchRegionsList();
      let open = false;
      const openMenu = () => { open=true; menu.classList.add('open'); };
      const closeMenu = () => { open=false; menu.classList.remove('open'); };
      const escAttr = (s) => String(s)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;');
      const render = (items) => {
        menu.innerHTML = items
          .map(
            (x) =>
              `<div class="search-item" role="option" data-country-id="${x.countryId}" data-my-region="${escAttr(x.myRegion ?? '')}" data-id-city="${escAttr(x.idCity ?? '')}" data-la-province="${escAttr(x.laProvince ?? '')}" data-sg-provider="${x.sgProvider != null ? escAttr(x.sgProvider) : ''}" data-mm-region="${escAttr(x.mmRegion ?? '')}" data-vn-area="${escAttr(x.vnArea ?? '')}">${x.label}</div>`
          )
          .join('');
      };
      const filter = () => {
        const q = (input.value||'').trim().toLowerCase();
        const items = !q ? list : list.filter((x) => x.label.toLowerCase().includes(q));
        render(items);
      };
      input.addEventListener('focus', () => { openMenu(); filter(); });
      input.addEventListener('input', () => { openMenu(); filter(); });
      document.addEventListener('pointerdown', (e) => {
        if (!open) return;
        if (menu.contains(e.target) || input.contains(e.target)) return;
        closeMenu();
      }, true);
      menu.addEventListener('mousedown', (e) => {
        const it = e.target.closest('.search-item');
        if (!it) return;
        const countryId = +it.getAttribute('data-country-id');
        const mr = it.getAttribute('data-my-region');
        const ic = it.getAttribute('data-id-city');
        const laProv = it.getAttribute('data-la-province');
        const sgProv = it.getAttribute('data-sg-provider');
        const mmReg = it.getAttribute('data-mm-region');
        const vnArea = it.getAttribute('data-vn-area');
        if (mr) {
          try { localStorage.setItem('terminal_my_region', mr); } catch (_) {}
        }
        if (ic) {
          try { localStorage.setItem('terminal_id_city', ic); } catch (_) {}
        }
        if (laProv) {
          try { localStorage.setItem('terminal_la_province', laProv); } catch (_) {}
        }
        if (countryId === 702) {
          try {
            if (sgProv) localStorage.setItem('terminal_sg_provider', sgProv);
            else localStorage.removeItem('terminal_sg_provider');
          } catch (_) {}
        }
        if (mmReg && countryId === 104) {
          try { localStorage.setItem('terminal_mm_region', mmReg); } catch (_) {}
        }
        if (vnArea && countryId === 704) {
          try { localStorage.setItem('terminal_vn_area', vnArea); } catch (_) {}
        }
        setSelected(countryId);
        input.value = '';
        closeMenu();
        e.preventDefault();
        // Defer so mobile browsers reliably drop focus (and the keyboard) after a suggestion tap.
        setTimeout(() => {
          try {
            input.blur();
          } catch (_) {}
        }, 0);
      });
      document.addEventListener('keydown', (e) => {
        const isMacFind = (e.metaKey && !e.ctrlKey && (e.key === 'f' || e.key === 'F'));
        const isWinFind = (e.ctrlKey && !e.metaKey && (e.key === 'f' || e.key === 'F'));
        if (!isMacFind && !isWinFind) return;
        e.preventDefault();
        openMenu();
        filter();
        input.focus();
        try { input.select(); } catch (_) {}
      }, true);
    }

    function initChart(){
      const cv = document.getElementById('chart');
      if (!cv || !window.Chart) return;
      updateChart({
        labels: [''],
        datasets: [{ label: 'Loading…', data: [null], color: cssVar('--chart-empty', '#d4d4d4') }],
        countryId: 458,
      });
    }

    function initMap() {
      const root = document.getElementById('map');
      if (!root) return;
      window.__appMapApplySelection = null;
      if (window.__appOfmMap) {
        try {
          window.__appOfmMap.remove();
        } catch (_) {}
        window.__appOfmMap = null;
      }
      window.APP_ZOOM_TO = null;
      if (typeof window.__renderAppMapOpenFreeMap !== 'function') {
        console.error('App OpenFreeMap bridge missing');
        return;
      }
      window.__renderAppMapOpenFreeMap({
        root,
        COUNTRIES,
        NAMES: MAP_COUNTRY_NAMES,
        SEA_IDS: Array.from(SEA),
        getSelected: () => selected,
        setSelected,
        refreshHighlights,
        ID_CITY_LONLAT,
        LA_PROVINCE_LONLAT,
        malaysiaRegionFromLngLat,
        indonesiaCityFromLngLat,
        laosProvinceFromLngLat,
      });
    }

    const APP_STORY_W = 1080;
    const APP_STORY_H = 1920;
    /** Side margins on the 9:16 canvas (tighter = slightly larger content). */
    const APP_STORY_PAD = 52;
    /** Bottom band for logo + domain (must be ≥ APP_STORY_PAD so content never overlaps). */
    const APP_STORY_FOOTER_H = Math.max(APP_STORY_PAD, 136);
    /** Empty band at the top of story exports (Instagram-safe headroom). */
    const APP_STORY_TOP_DEAD = 250;
    /** Surface gap between orange header and snapshot (px). */
    const APP_STORY_SNAPSHOT_TOP_GAP = 22;
    /** Gap between snapshot bottom and footer strip so chart/legend never touches the logo (px). */
    const APP_STORY_SNAPSHOT_FOOT_GAP = 40;
    /** Capture width for off-screen clones (wider = less pillar + less side letterbox when composing). */
    const APP_EXPORT_CAPTURE_W = 540;
    /** Taller chart block in highlight export vs in-app 210px — reads better on 9:16 stories. */
    const APP_EXPORT_CHART_WRAP_HEIGHT = 260;

    let _exportStoryBlob = null;
    let _exportStoryObjectUrl = null;
    let _exportStoryFilename = '';

    function closeExportStoryModal() {
      const modal = document.getElementById('export-story-modal');
      const img = document.getElementById('export-story-preview');
      if (modal) {
        modal.classList.remove('export-story-modal--open');
        modal.setAttribute('aria-hidden', 'true');
      }
      if (img) {
        img.removeAttribute('src');
        img.alt = '';
      }
      if (_exportStoryObjectUrl) {
        URL.revokeObjectURL(_exportStoryObjectUrl);
        _exportStoryObjectUrl = null;
      }
      _exportStoryBlob = null;
      _exportStoryFilename = '';
    }

    function openExportStoryModal(blob, filename) {
      closeExportStoryModal();
      _exportStoryBlob = blob;
      _exportStoryFilename = filename;
      _exportStoryObjectUrl = URL.createObjectURL(blob);
      const modal = document.getElementById('export-story-modal');
      const img = document.getElementById('export-story-preview');
      if (!modal || !img) return;
      img.src = _exportStoryObjectUrl;
      img.alt = 'Instagram story preview';
      modal.classList.add('export-story-modal--open');
      modal.setAttribute('aria-hidden', 'false');
      document.getElementById('export-story-save')?.focus();
    }

    async function saveExportStoryToGallery() {
      const blob = _exportStoryBlob;
      const filename = _exportStoryFilename || 'petrolprice-story.png';
      if (!blob) return;
      const file = new File([blob], filename, { type: 'image/png' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file] });
          return;
        } catch (e) {
          if (e && e.name === 'AbortError') return;
        }
      }
      if (!_exportStoryObjectUrl) return;
      const a = document.createElement('a');
      a.href = _exportStoryObjectUrl;
      a.download = filename;
      a.rel = 'noopener';
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    function initExportStoryModal() {
      const modal = document.getElementById('export-story-modal');
      if (!modal) return;
      modal.querySelector('.export-story-backdrop')?.addEventListener('click', closeExportStoryModal);
      document.getElementById('export-story-close')?.addEventListener('click', closeExportStoryModal);
      document.getElementById('export-story-save')?.addEventListener('click', async () => {
        const btn = document.getElementById('export-story-save');
        if (!btn || btn.disabled) return;
        btn.disabled = true;
        try {
          await saveExportStoryToGallery();
        } catch (err) {
          console.error(err);
        } finally {
          btn.disabled = false;
        }
      });
      document.addEventListener('keydown', (e) => {
        if (e.key !== 'Escape') return;
        if (!modal.classList.contains('export-story-modal--open')) return;
        closeExportStoryModal();
      });
    }

    function appExportSlug(cardId) {
      if (cardId === 'card-highlights') return 'highlights';
      if (cardId === 'card-history') return 'history';
      if (cardId === 'card-overview') return 'overview';
      return 'export';
    }

    function loadImageForStoryExport(url) {
      return new Promise((resolve) => {
        const im = new Image();
        im.onload = () => resolve(im);
        im.onerror = () => resolve(null);
        im.src = url;
      });
    }

    async function appComposeStoryPng(snapCanvas) {
      const out = document.createElement('canvas');
      out.width = APP_STORY_W;
      out.height = APP_STORY_H;
      const ctx = out.getContext('2d');
      const surface = cssVar('--surface', '#ffffff');
      ctx.fillStyle = surface;
      ctx.fillRect(0, 0, APP_STORY_W, APP_STORY_H);
      const px = APP_STORY_PAD;
      const headerH = APP_STORY_TOP_DEAD;
      const contentPad = headerH + APP_STORY_SNAPSHOT_TOP_GAP;
      if (headerH > 0) {
        const orange = cssVar('--orange', '#ff6a00');
        const cx = APP_STORY_W * 0.5;
        const cy = 0;
        const r1 = Math.hypot(APP_STORY_W * 0.5, headerH) * 1.12;
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r1);
        g.addColorStop(0, '#ffe0c2');
        g.addColorStop(0.18, '#ffb366');
        g.addColorStop(0.45, orange);
        g.addColorStop(0.72, 'rgba(255, 106, 0, 0.35)');
        g.addColorStop(1, surface);
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, APP_STORY_W, headerH);
      }
      const maxW = APP_STORY_W - APP_STORY_PAD * 2;
      const maxH =
        APP_STORY_H - contentPad - APP_STORY_FOOTER_H - APP_STORY_SNAPSHOT_FOOT_GAP;
      const sw = snapCanvas.width;
      const sh = snapCanvas.height;

      async function stampFooter() {
        const footTop = APP_STORY_H - APP_STORY_FOOTER_H;
        const logoSrc = new URL('assets/appicon.png', window.location.href).href;
        const logo = await loadImageForStoryExport(logoSrc);
        const logoSize = 44;
        const gap = 14;
        const label = 'petrolprice.xyz';
        ctx.save();
        ctx.textBaseline = 'middle';
        ctx.fillStyle = cssVar('--text', '#141414');
        ctx.font = '600 30px Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
        const textW = ctx.measureText(label).width;
        const blockW = (logo && logo.naturalWidth ? logoSize + gap : 0) + textW;
        let x = Math.round((APP_STORY_W - blockW) / 2);
        /* Centre in footer strip (snapshot ends above footTop thanks to SNAPSHOT_FOOT_GAP). */
        const yMid = Math.round(footTop + APP_STORY_FOOTER_H / 2);
        if (logo && logo.naturalWidth) {
          ctx.drawImage(logo, x, Math.round(yMid - logoSize / 2), logoSize, logoSize);
          x += logoSize + gap;
        }
        ctx.fillText(label, x, yMid);
        ctx.restore();
      }

      if (sw <= 0 || sh <= 0) {
        await stampFooter();
        return out;
      }
      const slotAspect = maxW / maxH;
      const snapAspect = sw / sh;
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      /**
       * Narrow/tall snapshot: scale to full usable width; if too tall, crop from the bottom only so the
       * region title at the top of the capture is never clipped (center-crop used to cut "Semenanjung").
       * Wider snapshot: uniform "contain" scale — never side-crop (that was clipping titles and prices).
       */
      if (snapAspect < slotAspect) {
        const sc = maxW / sw;
        const dh = sh * sc;
        if (dh > maxH) {
          const srcH = maxH / sc;
          const sy = 0;
          ctx.drawImage(snapCanvas, 0, sy, sw, srcH, px, contentPad, maxW, maxH);
        } else {
          const dhR = Math.round(dh);
          const dy = Math.round(contentPad + (maxH - dhR) / 2);
          ctx.drawImage(snapCanvas, 0, 0, sw, sh, px, dy, maxW, dhR);
        }
        await stampFooter();
        return out;
      }
      const sc = Math.min(maxW / sw, maxH / sh);
      const dw = Math.round(sw * sc);
      const dh = Math.round(sh * sc);
      const dx = Math.round((APP_STORY_W - dw) / 2);
      const dy = Math.round(contentPad + (maxH - dh) / 2);
      ctx.drawImage(snapCanvas, 0, 0, sw, sh, dx, dy, dw, dh);
      await stampFooter();
      return out;
    }

    async function exportCardAsInstagramStory(cardId) {
      const html2canvas = window.html2canvas;
      if (typeof html2canvas !== 'function') throw new Error('html2canvas missing');

      const exportBg = cssVar('--surface', '#ffffff');
      const h2cOpts = {
        scale: 2,
        backgroundColor: exportBg,
        logging: false,
        useCORS: true,
        allowTaint: true,
      };
      const stripExports = (root) => {
        root?.querySelectorAll('.card-export').forEach((n) => n.remove());
      };

      /** Chart.js only draws on the live canvas — copy pixels onto a cloned card for html2canvas. */
      function copyCanvasesFromLiveToClone(liveRoot, cloneRoot) {
        if (!liveRoot || !cloneRoot) return;
        const liveCanvases = liveRoot.querySelectorAll('canvas');
        const cloneCanvases = cloneRoot.querySelectorAll('canvas');
        const n = Math.min(liveCanvases.length, cloneCanvases.length);
        for (let i = 0; i < n; i++) {
          const src = liveCanvases[i];
          const dst = cloneCanvases[i];
          try {
            dst.width = src.width;
            dst.height = src.height;
            dst.getContext('2d').drawImage(src, 0, 0);
          } catch (_) {}
        }
      }

      function stripIdsForExport(root) {
        root?.querySelectorAll('[id]').forEach((el) => el.removeAttribute('id'));
      }

      let snap;
      if (cardId === 'card-highlights') {
        const histLive = document.getElementById('card-history');
        const liveCw = histLive?.querySelector('.chart-wrap');
        const prevH = liveCw ? liveCw.style.height : '';
        const prevMin = liveCw ? liveCw.style.minHeight : '';
        try {
          if (liveCw) {
            liveCw.style.height = `${APP_EXPORT_CHART_WRAP_HEIGHT}px`;
            liveCw.style.minHeight = `${APP_EXPORT_CHART_WRAP_HEIGHT}px`;
            try {
              RIGHT_CHART?.resize();
            } catch (_) {}
            await new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));
          }
          const wrap = document.createElement('div');
          wrap.style.cssText =
            `position:fixed;left:-16000px;top:0;width:${APP_EXPORT_CAPTURE_W}px;max-width:100%;background:${exportBg};padding:36px 16px 48px;box-sizing:border-box;display:flex;flex-direction:column;gap:22px;align-items:stretch;`;
          /* Off-sheet clones are not under .sheet — vars fall back to 34px vs 14px pad and misalign the title. */
          wrap.style.setProperty('--sheet-gutter-x', '0px');
          wrap.style.setProperty('--sheet-scroll-pad-left', '0px');
          wrap.style.setProperty('--sheet-card-pad-x', '14px');
          wrap.style.setProperty('--sheet-text-inset-left', '14px');
          const st = document.getElementById('sheet-region-sticky')?.cloneNode(true);
          const hi = document.getElementById('card-highlights')?.cloneNode(true);
          const hist = histLive?.cloneNode(true);
          stripExports(st);
          stripExports(hi);
          stripExports(hist);
          stripIdsForExport(st);
          stripIdsForExport(hi);
          stripIdsForExport(hist);
          copyCanvasesFromLiveToClone(histLive, hist);
          if (st) wrap.appendChild(st);
          if (hi) wrap.appendChild(hi);
          if (hist) wrap.appendChild(hist);
          document.body.appendChild(wrap);
          try {
            snap = await html2canvas(wrap, h2cOpts);
          } finally {
            wrap.remove();
          }
        } finally {
          if (liveCw) {
            liveCw.style.height = prevH;
            liveCw.style.minHeight = prevMin;
            try {
              RIGHT_CHART?.resize();
            } catch (_) {}
          }
        }
      } else if (cardId === 'card-history') {
        const live = document.getElementById('card-history');
        if (!live) return;
        live.scrollIntoView({ block: 'nearest', behavior: 'auto' });
        await new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));
        snap = await html2canvas(live, {
          ...h2cOpts,
          ignoreElements: (el) => el.classList && el.classList.contains('card-export'),
        });
      } else if (cardId === 'card-overview') {
        const wrap = document.createElement('div');
        wrap.style.cssText =
          `position:fixed;left:-16000px;top:0;width:${APP_EXPORT_CAPTURE_W}px;max-width:100%;background:${exportBg};padding:36px 16px 48px;box-sizing:border-box;`;
        const cd = document.getElementById('card-overview')?.cloneNode(true);
        stripExports(cd);
        stripIdsForExport(cd);
        if (cd) wrap.appendChild(cd);
        document.body.appendChild(wrap);
        try {
          snap = await html2canvas(wrap, h2cOpts);
        } finally {
          wrap.remove();
        }
      } else return;

      if (!snap) return;
      const story = await appComposeStoryPng(snap);
      const blob = await new Promise((resolve, reject) => {
        story.toBlob((b) => (b ? resolve(b) : reject(new Error('Story export failed'))), 'image/png', 0.95);
      });
      const slug = appExportSlug(cardId);
      openExportStoryModal(blob, `petrolprice-${slug}-story.png`);
    }

    function initCardExport() {
      const sheet = document.getElementById('sheet');
      if (!sheet) return;
      sheet.addEventListener('click', async (e) => {
        const btn = e.target.closest('.card-export');
        if (!btn || !sheet.contains(btn)) return;
        e.preventDefault();
        e.stopPropagation();
        const card = btn.closest('.card');
        const cardId = card?.id;
        if (!cardId) return;
        if (typeof window.html2canvas !== 'function') return;
        btn.disabled = true;
        try {
          await exportCardAsInstagramStory(cardId);
        } catch (err) {
          console.error(err);
        } finally {
          btn.disabled = false;
        }
      });
    }

    // Init
    initSheet();
    initSingaporeProviderMenu();
    void initSearch();
    initExportStoryModal();
    initCardExport();

    (function initAppColorScheme() {
      const mq = window.matchMedia('(prefers-color-scheme: dark)');
      function syncThemeMeta() {
        const meta = document.getElementById('meta-theme-color');
        if (meta) meta.setAttribute('content', mq.matches ? '#1a1a1a' : '#ff6a00');
      }
      function onSchemeChange() {
        syncThemeMeta();
        refreshHighlights(selected).catch(() => {});
      }
      syncThemeMeta();
      mq.addEventListener('change', onSchemeChange);
    })();

    window.addEventListener('load', () => {
      initChart();
      initMap();
      setSelected(458);
    });
  </script>
