<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PetrolPrice — App</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <style>
    :root{
      --bg: #f1f1f0;
      --panel: rgba(247,247,246,0.92);
      --text: #0f0f0f;
      --muted: rgba(0,0,0,0.55);
      --line: rgba(0,0,0,0.10);
      --shadow: 0 18px 54px rgba(0,0,0,0.12);
      --orange: #ff6a00;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    *{ box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body{
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
    }

    .app{
      position: relative;
      height: 100dvh;
      width: 100%;
    }

    /* Map layer — full viewport behind UI */
    .map{
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(900px 520px at 55% 48%, rgba(255,106,0,0.14) 0%, rgba(255,106,0,0.06) 30%, rgba(255,106,0,0.00) 62%),
        radial-gradient(1200px 680px at 44% 56%, rgba(0,0,0,0.06) 0%, rgba(0,0,0,0.00) 62%),
        linear-gradient(0deg, rgba(255,255,255,0.6), rgba(255,255,255,0.6)),
        #d7d7d7;
      overflow: hidden;
    }

    .map::before{
      content:'';
      position:absolute;
      inset:0;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 8px);
      opacity: 0.26;
      pointer-events:none;
    }
    .map svg{ width: 100%; height: 100%; display:block; }
    .sphere { fill: #e7eef7; }
    .graticule { fill: none; stroke: rgba(48,48,48,0.05); stroke-width: 0.3; }
    .country { fill: #d9d6d2; stroke:none; }
    .country.live { fill: rgba(17, 24, 39, 0.28); }
    .country.live.selected { fill: rgba(255,106,0,0.26); }
    .border-mesh { fill:none; stroke: rgba(48,48,48,0.14); stroke-width: 0.5; pointer-events:none; }
    .border-live { fill:none; stroke: rgba(17, 24, 39, 0.45); stroke-width: 1; pointer-events:none; }
    .border-live.selected { stroke: rgba(255,106,0,0.78); }

    /* Top search */
    .topbar{
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 10;
      display:flex;
      gap: 10px;
      align-items:center;
    }
    .search{
      flex: 1;
      height: 36px;
      display:flex;
      align-items:center;
      gap: 8px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.55);
      background: rgba(255, 255, 255, 0.38);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.72) inset,
        0 0 0 0.5px rgba(0, 0, 0, 0.04),
        0 8px 28px rgba(0, 0, 0, 0.07),
        0 2px 8px rgba(0, 0, 0, 0.04);
    }
    .search svg{
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      opacity: 0.42;
      color: rgba(0, 0, 0, 0.45);
    }
    .search input{
      flex: 1;
      min-width: 0;
      border: none;
      outline: none;
      background: transparent;
      font-family: var(--font);
      font-size: 0.9375rem;
      font-weight: 400;
      letter-spacing: 0.025em;
      color: rgba(0, 0, 0, 0.72);
    }
    .search input::placeholder{
      color: rgba(0, 0, 0, 0.36);
      font-weight: 300;
    }
    .search-menu{
      position: absolute;
      top: calc(12px + 36px + 8px);
      left: 12px;
      right: 12px;
      z-index: 11;
      border: 1px solid rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.52);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border-radius: 18px;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.65) inset,
        0 12px 40px rgba(0, 0, 0, 0.1),
        0 2px 10px rgba(0, 0, 0, 0.05);
      padding: 6px;
      display:none;
      max-height: min(320px, calc(100dvh - 180px));
      overflow:auto;
    }
    .search-menu.open{ display:block; }
    .search-item{
      padding: 11px 12px;
      border-radius: 12px;
      cursor: pointer;
      user-select: none;
      display:flex;
      justify-content: space-between;
      gap: 12px;
      font-weight: 400;
      letter-spacing: 0.02em;
    }
    .search-item:hover{ background: rgba(0,0,0,0.04); }

    /* Bottom sheet — three stops: ~¼, ~½, expanded; scroll only when mostly expanded */
    .sheet{
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 10px;
      z-index: 20;
      height: var(--sheetH, 50vh);
      max-height: calc(100dvh - 72px);
      display: flex;
      flex-direction: column;
      border-radius: 22px;
      border: none;
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .grab{
      flex-shrink: 0;
      padding: 10px 0 8px;
      background: transparent;
      touch-action: none;
      cursor: grab;
    }
    .grab:active{ cursor: grabbing; }
    .grab::before{
      content:'';
      display:block;
      width: 46px;
      height: 5px;
      border-radius: 999px;
      background: rgba(0,0,0,0.20);
      margin: 0 auto;
    }
    .sheet-scroll{
      flex: 1;
      min-height: 0;
      overflow-y: hidden;
      overscroll-behavior-y: none;
      padding: 8px 14px 20px;
      display: grid;
      gap: 22px;
      /* Soft fade at all clip edges (premium scroll / peek) */
      -webkit-mask-image:
        linear-gradient(to bottom, transparent 0%, #000 7%, #000 93%, transparent 100%),
        linear-gradient(to right, transparent 0%, #000 5%, #000 95%, transparent 100%);
      mask-image:
        linear-gradient(to bottom, transparent 0%, #000 7%, #000 93%, transparent 100%),
        linear-gradient(to right, transparent 0%, #000 5%, #000 95%, transparent 100%);
      -webkit-mask-composite: source-in;
      mask-composite: intersect;
      mask-repeat: no-repeat;
      mask-size: 100% 100%;
      -webkit-mask-size: 100% 100%;
    }
    .sheet.sheet-expanded .sheet-scroll{
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
    }
    .card{
      border-radius: 0;
      border: none;
      overflow: visible;
      background: transparent;
    }
    .card .pad{ padding: 14px; }
    .kicker{
      font-family: var(--font);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.85;
    }
    .title{
      margin: 8px 0 0;
      font-size: 1.9rem;
      font-weight: 850;
      letter-spacing: -0.02em;
      line-height: 1.05;
    }
    .sub{
      margin-top: 6px;
      font-family: var(--font);
      font-size: 0.8rem;
      opacity: 0.85;
    }
    .lines{
      margin-top: 12px;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 12px;
      font-family: var(--font);
      font-size: 0.78rem;
    }
    .lines.hi-lines{
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-top: 14px;
    }
    .hi-row{
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 14px;
      padding: 11px 0;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      font-family: var(--font);
      font-size: 0.84rem;
    }
    .hi-row:last-child{ border-bottom: none; padding-bottom: 2px; }
    .hi-k{
      font-weight: 600;
      letter-spacing: 0.04em;
      color: rgba(0,0,0,0.72);
    }
    .hi-v{
      font-weight: 750;
      font-variant-numeric: tabular-nums;
      color: rgba(0,0,0,0.88);
      text-align: right;
    }
    .kv .k{ opacity: 0.82; letter-spacing: 0.06em; text-transform: uppercase; font-size: 0.62rem; }
    .kv .v{ margin-top: 6px; font-weight: 850; font-family: var(--font); }
    .chart-wrap{ height: 210px; padding: 12px; }
    .chart-wrap canvas{ width:100% !important; height:100% !important; display:block; }
    .oil{ font-size: 0.95rem; line-height: 1.45; font-weight: 600; color: rgba(0,0,0,0.78); }
    .overview-metrics{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .overview-metrics .metric{
      border-top: 1px solid rgba(0,0,0,0.08);
      padding-top: 10px;
    }
    .overview-metrics .metric .k{
      font-family: var(--font);
      font-size: 0.66rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.52);
    }
    .overview-metrics .metric .v{
      margin-top: 6px;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
      color: rgba(0,0,0,0.88);
    }

    @media (min-width: 900px){
      /* "App" can still run on desktop, but keep it phone-ish */
      .sheet{ left: 16px; right: 16px; max-width: 520px; margin: 0 auto; }
      .topbar{ left: 16px; right: 16px; max-width: 520px; margin: 0 auto; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="map" id="map"></div>

    <div class="topbar">
      <div class="search" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.3-4.3" />
        </svg>
        <input id="country-search" type="search" placeholder="Search" autocomplete="off" spellcheck="false" />
      </div>
    </div>
    <div class="search-menu" id="country-search-menu" role="listbox" aria-label="Country results"></div>

    <div class="sheet" id="sheet" aria-label="Details sheet">
      <div class="grab" id="grab" role="button" tabindex="0" aria-label="Drag to resize panel"></div>
      <div class="sheet-scroll" id="sheet-scroll">
        <div class="card" id="card-highlights">
          <div class="pad">
            <div class="kicker">Highlights</div>
            <div class="title" id="hi-title">Semenanjung</div>
            <div class="sub" id="hi-sub">—</div>
            <div class="lines hi-lines" id="hi-lines"></div>
          </div>
        </div>

        <div class="card" id="card-history">
          <div class="pad">
            <div class="kicker" id="chart-kicker">Malaysia petrol prices history</div>
          </div>
          <div class="chart-wrap">
            <canvas id="chart"></canvas>
          </div>
        </div>

        <div class="card" id="card-overview">
          <div class="pad">
            <div class="kicker" id="ov-kicker">Malaysia overview</div>
            <div class="oil" id="overview-text">—</div>
            <div class="overview-metrics" id="overview-metrics" aria-label="Key metrics"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const COUNTRIES = {
      458: { name: 'Malaysia' },
      702: { name: 'Singapore' },
      96:  { name: 'Brunei' },
      360: { name: 'Indonesia' },
    };
    const SEA  = new Set([96, 104, 116, 360, 418, 458, 608, 626, 702, 704, 764]);
    const LIVE = { 458: true, 702: true, 96: true, 360: true };
    /** Same oil context + metrics as terminal.html left overview */
    const APP_COUNTRY_OVERVIEW = {
      458: {
        oilContext:
          'Mid-sized upstream producer with an economy shaped by oil & gas; exports some crude and petroleum products, while still importing certain grades/volumes to meet refinery and fuel demand.',
        metrics: [
          ['BOPD', '570,000'],
          ['1P Reserves', '2.7B Barrels'],
          ['Refinery Intake', '747,000'],
          ['Export Value', 'RM6.2bil'],
          ['Import Value', 'RM13.6bil'],
          ['Status', 'Net Importer'],
        ],
      },
      96: {
        oilContext:
          'Small, wealthy upstream producer with an economy almost entirely dependent on oil & gas; exports the vast majority of its crude and refined products, with domestic consumption representing only a tiny fraction of production.',
        metrics: [
          ['BOPD', '102,677'],
          ['1P Reserves', '1.1B Barrels'],
          ['Refinery Intake', '16,338'],
          ['Export Value', 'BND 13.45bil'],
          ['Import Value', 'BND 8.62bil'],
          ['Status', 'Net Exporter'],
        ],
      },
      360: {
        oilContext:
          "Southeast Asia's largest economy and a former OPEC member; production has declined significantly from its peak, forcing the country to rely heavily on imported refined products despite still being a notable crude oil producer.",
        metrics: [
          ['BOPD', '608,100'],
          ['1P Reserves', '2.41B Barrels'],
          ['Refinery Intake', '1,626,878'],
          ['Export Value', 'US$13.07bil'],
          ['Import Value', 'US$32.77bil'],
          ['Status', 'Net Importer'],
        ],
      },
      702: {
        oilContext:
          'Global refining and trading hub with no domestic oil production; imports massive volumes of crude for refining into high-value petroleum products, most of which are re-exported.',
        metrics: [
          ['BOPD', '0'],
          ['1P Reserves', '0 Barrels'],
          ['Refinery Intake', '~1,100,000'],
          ['Export Value', 'Not specified in available data'],
          ['Import Value', 'Not specified in available data'],
          ['Status', 'Net Importer (refining hub)'],
        ],
      },
    };

    let selected = 458;
    let RIGHT_CHART = null;
    let APP_ZOOM_TO = null;

    const APP_SHEET_ID = '1kvbA3aTL_4VvjSjsx7n0kcOLbjrXvDRnru8NEF1pDCE';
    const APP_MY_API = 'https://api.data.gov.my/data-catalogue/?id=fuelprice&sort=-date&limit=30';
    const APP_SG_URL = `https://docs.google.com/spreadsheets/d/${APP_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Singapore`;
    const APP_BN_URL = `https://docs.google.com/spreadsheets/d/${APP_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Brunei`;
    const APP_ID_URL = `https://docs.google.com/spreadsheets/d/${APP_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Indonesia`;

    const APP_ID_FUELS = [
      { key: 'pertalite', label: 'Pertalite' },
      { key: 'pertamax', label: 'Pertamax' },
      { key: 'pertamax_turbo', label: 'Pertamax Turbo' },
      { key: 'dexlite', label: 'Dexlite' },
      { key: 'pertamina_dex', label: 'Pertamina Dex' },
    ];

    let _appMyRows = null;
    let _appSgRows = null;
    let _appBnRows = null;
    let _appIdRows = null;

    function parseAppCSV(text) {
      const rows = text.trim().split('\n').map(r =>
        r.split(',').map(c => c.replace(/^"|"$/g, '').trim())
      );
      const headers = rows[0];
      return rows.slice(1).map(r => {
        const obj = {};
        headers.forEach((h, i) => { obj[h] = r[i]; });
        return obj;
      });
    }

    function fmtAppDate(d) {
      if (!d) return '—';
      const dt = new Date(d);
      if (isNaN(dt.getTime())) return String(d);
      return dt.toLocaleDateString('en-GB', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function fmtAppPerL(sym, n, decimals = 2) {
      const x = parseFloat(n);
      if (!Number.isFinite(x)) return '—';
      return `${sym} ${x.toFixed(decimals)}/L`;
    }

    function fmtAppIdrPerL(n) {
      const x = parseFloat(n);
      if (!Number.isFinite(x)) return '—';
      return `IDR ${Math.round(x).toLocaleString('en-US')}/L`;
    }

    function appMalaysiaRegionKey() {
      try {
        const k = localStorage.getItem('terminal_my_region') || 'Semenanjung';
        return k === 'SabahSarawak' ? 'SabahSarawak' : 'Semenanjung';
      } catch (_) {
        return 'Semenanjung';
      }
    }

    /** Rough boxes: peninsular vs Borneo (Sabah/Sarawak/Labuan). Matches map clicks, not maritime claims. */
    function appMalaysiaRegionFromLngLat(lon, lat) {
      const PEN = { minLon: 99.5, maxLon: 104.95, minLat: 0.75, maxLat: 6.95 };
      const EAST = { minLon: 108.8, maxLon: 119.6, minLat: 0.45, maxLat: 7.55 };
      const inPen = lon >= PEN.minLon && lon <= PEN.maxLon && lat >= PEN.minLat && lat <= PEN.maxLat;
      const inEast = lon >= EAST.minLon && lon <= EAST.maxLon && lat >= EAST.minLat && lat <= EAST.maxLat;
      if (inEast && !inPen) return 'SabahSarawak';
      if (inPen && !inEast) return 'Semenanjung';
      if (inEast && inPen) return lon >= 106.5 ? 'SabahSarawak' : 'Semenanjung';
      if (inEast) return 'SabahSarawak';
      if (inPen) return 'Semenanjung';
      return lon >= 106.5 ? 'SabahSarawak' : 'Semenanjung';
    }

    function appApplyMalaysiaClickRegion(event, svgNode, projection) {
      const inv = projection.invert(d3.pointer(event, svgNode));
      if (!inv || !Number.isFinite(inv[0]) || !Number.isFinite(inv[1])) return;
      const next = appMalaysiaRegionFromLngLat(inv[0], inv[1]);
      try {
        localStorage.setItem('terminal_my_region', next);
      } catch (_) {}
    }

    function appIndonesiaCity() {
      try {
        return localStorage.getItem('terminal_id_city') || 'Jakarta Pusat';
      } catch (_) {
        return 'Jakarta Pusat';
      }
    }

    async function ensureAppMalaysiaRows() {
      if (_appMyRows) return _appMyRows;
      const res = await fetch(APP_MY_API);
      if (!res.ok) throw new Error('MY');
      const json = await res.json();
      _appMyRows = (json || []).filter(r => r.series_type === 'level');
      return _appMyRows;
    }

    async function ensureAppSheetRows(url, cacheRef) {
      if (cacheRef.val) return cacheRef.val;
      const res = await fetch(url);
      if (!res.ok) throw new Error('sheet');
      const text = await res.text();
      cacheRef.val = parseAppCSV(text);
      return cacheRef.val;
    }

    const _sgCache = { val: null };
    const _bnCache = { val: null };
    const _idCache = { val: null };

    const APP_CHART_POINTS = 30;
    const APP_CHART_COLORS = ['#ff6a00', '#2563eb', '#16a34a', '#a855f7', '#111827', '#0ea5e9', '#ef4444'];

    function takeLastApp(arr, n) {
      return arr.slice(Math.max(0, arr.length - n));
    }

    function appAsNum(v) {
      const n = parseFloat(v);
      return Number.isFinite(n) ? n : null;
    }

    function buildAppChartSeries(rows, keys, labels) {
      return keys.map((k, i) => ({
        label: k.label,
        color: k.color || APP_CHART_COLORS[i % APP_CHART_COLORS.length],
        data: labels.map((lab) => {
          const r = rows.find((x) => x.__label === lab);
          return r ? appAsNum(r[k.key]) : null;
        }),
      }));
    }

    function appChartOptions(countryId) {
      return {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 420, easing: 'easeOutCubic' },
        // App / touch: no hover tooltips or active-point styling
        events: [],
        interaction: { mode: 'nearest', intersect: false },
        plugins: {
          legend: {
            display: true,
            position: 'bottom',
            align: 'start',
            labels: {
              usePointStyle: false,
              boxWidth: 11,
              boxHeight: 2,
              borderRadius: 1,
              padding: 10,
              boxPadding: 4,
              font: {
                family: 'Inter, system-ui, sans-serif',
                size: 8,
                weight: '400',
              },
              color: 'rgba(0,0,0,0.48)',
              generateLabels(chart) {
                const ds = chart.data.datasets || [];
                return ds.map((d, i) => ({
                  text: d.label,
                  fillStyle: d.borderColor,
                  strokeStyle: d.borderColor,
                  lineWidth: 0,
                  hidden: !chart.isDatasetVisible(i),
                  index: i,
                  datasetIndex: i,
                }));
              },
            },
          },
          tooltip: { enabled: false },
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { color: 'rgba(0,0,0,0.45)', font: { size: 10 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 },
          },
          y: {
            grid: { color: 'rgba(0,0,0,0.06)' },
            ticks: {
              color: 'rgba(0,0,0,0.45)',
              font: { size: 10 },
              callback(v) {
                if (countryId === 360) return Number(v) >= 1e6 ? `${(v / 1e6).toFixed(1)}M` : `${Math.round(v / 1000)}k`;
                return v;
              },
            },
          },
        },
      };
    }

    function updateAppChart({ labels, datasets, countryId }) {
      const cv = document.getElementById('chart');
      if (!cv || !window.Chart) return;
      const ctx = cv.getContext('2d');

      function withAlpha(c, a) {
        if (!c) return c;
        const s = String(c).trim();
        if (/^rgba\(/i.test(s)) {
          return s.replace(/rgba\(([^)]+)\)/i, (m, inner) => {
            const parts = inner.split(',').map((p) => p.trim());
            if (parts.length < 3) return s;
            return `rgba(${parts[0]}, ${parts[1]}, ${parts[2]}, ${a})`;
          });
        }
        if (/^rgb\(/i.test(s)) {
          return s.replace(/rgb\(([^)]+)\)/i, (m, inner) => {
            const parts = inner.split(',').map((p) => p.trim());
            if (parts.length < 3) return s;
            return `rgba(${parts[0]}, ${parts[1]}, ${parts[2]}, ${a})`;
          });
        }
        if (/^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(s)) {
          const hex = s.slice(1);
          const full = hex.length === 3 ? hex.split('').map((ch) => ch + ch).join('') : hex;
          const r = parseInt(full.slice(0, 2), 16);
          const g = parseInt(full.slice(2, 4), 16);
          const b = parseInt(full.slice(4, 6), 16);
          return `rgba(${r}, ${g}, ${b}, ${a})`;
        }
        return s;
      }

      function mkFill(stroke) {
        const grad = ctx.createLinearGradient(0, 0, 0, cv.height || 210);
        grad.addColorStop(0, withAlpha(stroke, 0.16));
        grad.addColorStop(1, withAlpha(stroke, 0));
        return grad;
      }

      const nextDs = (datasets || []).map((ds) => ({
        label: ds.label,
        data: ds.data || [],
        borderColor: ds.color,
        backgroundColor: mkFill(ds.color),
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 0,
        tension: 0.35,
        fill: true,
        spanGaps: true,
      }));

      if (RIGHT_CHART) {
        RIGHT_CHART.destroy();
        RIGHT_CHART = null;
      }

      RIGHT_CHART = new Chart(ctx, {
        type: 'line',
        data: { labels: labels || [], datasets: nextDs },
        options: appChartOptions(countryId),
      });
    }

    function renderHiRows(pairs) {

    async function refreshHighlights(cid) {

      const subEl = document.getElementById('hi-sub');
      const chartKicker = document.getElementById('chart-kicker');
      const cname = COUNTRIES[cid]?.name || '—';
      setHiLoading();

      function emptyChart() {
        updateAppChart({
          labels: ['—'],
          datasets: [{ label: 'No data', data: [null], color: '#d4d4d4' }],
          countryId: null,
        });

      try {
        if (cid === 458) {
          const rows = await ensureAppMalaysiaRows();

            .filter(r => r?.date)

          const rSel = seriesAsc[seriesAsc.length - 1] || {};
          const regionKey = appMalaysiaRegionKey();

          const dieselLabel = isEast ? 'Diesel (East MY)' : 'Diesel';
          titleEl.textContent = isEast ? 'East Malaysia' : 'Semenanjung';
          subEl.textContent = `As of ${fmtAppDate(rSel.date)} · ${isEast ? 'East Malaysia' : 'Peninsular'}`;

            ['RON95', fmtAppPerL('MYR', rSel.ron95, 2)],
            ['RON97', fmtAppPerL('MYR', rSel.ron97, 2)],

          const sliceRows = takeLastApp(seriesAsc, APP_CHART_POINTS).map(r => ({ ...r, __label: fmtAppDate(r.date) }));

            { key: 'ron95_budi95', label: 'BUDI95', color: '#9333ea' },

            { key: 'ron97', label: 'RON97', color: '#16a34a' },

          subEl.textContent = `As of ${fmtAppDate(rSel.date)} · National`;
          renderHiRows([

            ['RON98', fmtAppPerL('SGD', rSel.ron98, 2)],

            ['Diesel', fmtAppPerL('SGD', rSel.diesel, 2)],

          if (chartKicker) chartKicker.textContent = `${cname} petrol prices history`;

          const sliceRows = takeLastApp(seriesAsc, APP_CHART_POINTS).map(r => ({ ...r, __label: fmtAppDate(r.date) }));
          const labels = sliceRows.map(r => r.__label);
          const chartKeys = [
            { key: 'ron92', label: 'RON92' },
            { key: 'ron95', label: 'RON95' },
            { key: 'ron98', label: 'RON98' },
            { key: 'premium', label: 'Premium' },
            { key: 'diesel', label: 'Diesel' },

          if (labels.length) {
            updateAppChart({
              labels,
              datasets: buildAppChartSeries(sliceRows, chartKeys, labels),
              countryId: 702,
            });
          } else emptyChart();
          return;
        }

        if (cid === 96) {
          const rows = await ensureAppSheetRows(APP_BN_URL, _bnCache);
          const seriesAsc = rows
            .slice()
            .filter(r => r?.date)

          const rSel = seriesAsc[seriesAsc.length - 1] || {};
          titleEl.textContent = 'Brunei';
          subEl.textContent = `As of ${fmtAppDate(rSel.date)} · National`;
          renderHiRows([
            ['Gasoline', fmtAppPerL('BND', rSel.gasoline, 2)],
            ['Diesel', fmtAppPerL('BND', rSel.diesel, 2)],

          if (chartKicker) chartKicker.textContent = `${cname} petrol prices history`;

          const sliceRows = takeLastApp(seriesAsc, APP_CHART_POINTS).map(r => ({ ...r, __label: fmtAppDate(r.date) }));
          const labels = sliceRows.map(r => r.__label);
          const chartKeys = [
            { key: 'gasoline', label: 'Gasoline' },
            { key: 'diesel', label: 'Diesel' },
            { key: 'vpower_gasoline', label: 'V-Power Gasoline' },
            { key: 'vpower_diesel', label: 'V-Power Diesel' },

          if (labels.length) {
            updateAppChart({
              labels,
              datasets: buildAppChartSeries(sliceRows, chartKeys, labels),

          return;

        if (cid === 360) {
          const rows = await ensureAppSheetRows(APP_ID_URL, _idCache);
          const city = appIndonesiaCity();

          const sliceRows = takeLastApp(cityRows, APP_CHART_POINTS).map(r => ({ ...r, __label: fmtAppDate(r.date) }));
          const labels = sliceRows.map(r => r.__label);

          if (labels.length) {

    function renderCountryOverview(cid) {
      const ov = APP_COUNTRY_OVERVIEW[cid];
      const oilEl = document.getElementById('overview-text');
      const metricsEl = document.getElementById('overview-metrics');
      if (oilEl) oilEl.textContent = ov?.oilContext || '—';
      if (metricsEl) {
        const rows = ov?.metrics;
        metricsEl.innerHTML = Array.isArray(rows) && rows.length
          ? rows.map(([k, v]) => {
              const fullWidth = k === 'Status';
              return `<div class="metric"${fullWidth ? ' style="grid-column:1 / -1;"' : ''}><div class="k">${k}</div><div class="v">${v}</div></div>`;
            }).join('')
          : '';
      }
    }

    function setSelected(cid){
      selected = cid;
      document.getElementById('ov-kicker').textContent = `${COUNTRIES[cid]?.name || 'Country'} overview`;
      renderCountryOverview(cid);
      refreshHighlights(cid);
      if (typeof APP_ZOOM_TO === 'function') APP_ZOOM_TO(cid, true);
    }

    function initSheet(){
      const sheet = document.getElementById('sheet');
      const grab = document.getElementById('grab');
      const scroller = document.getElementById('sheet-scroll');
      let dragging = false, startY = 0, startH = 0;
      let snap = 1;
      const clamp = (n, lo, hi) => Math.max(lo, Math.min(hi, n));
      const heights = () => {
        const vh = window.innerHeight;
        const quarter = Math.round(vh * 0.25);
        const half = Math.round(vh * 0.5);
        const expandedTop = Math.round(Math.min(vh - 72, vh * 0.94));
        const expanded = Math.max(half + 100, expandedTop);
        return { quarter, half, expanded };
      };
      const apply = (h) => {
        const px = Math.round(h);
        document.documentElement.style.setProperty('--sheetH', `${px}px`);
        const { half, expanded } = heights();
        const scrollThreshold = half + (expanded - half) * 0.55;
        const isExpanded = px >= scrollThreshold;
        sheet.classList.toggle('sheet-expanded', isExpanded);
        if (!isExpanded && scroller) scroller.scrollTop = 0;
      };
      const nearestSnapIndex = (h) => {
        const { quarter, half, expanded } = heights();
        const snaps = [quarter, half, expanded];
        let best = 0;
        let d = Infinity;
        snaps.forEach((x, i) => {
          const dd = Math.abs(h - x);
          if (dd < d) {
            d = dd;
            best = i;
          }
        });
        return best;
      };
      function setSnap(i){
        snap = clamp(i, 0, 2);
        const { quarter, half, expanded } = heights();
        const h = snap === 0 ? quarter : snap === 1 ? half : expanded;
        apply(h);
        if (RIGHT_CHART) setTimeout(() => RIGHT_CHART.resize(), 60);
      }
      function onDown(e){
        dragging = true;
        startY = (e.touches ? e.touches[0].clientY : e.clientY);
        startH = sheet.getBoundingClientRect().height;
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
        window.addEventListener('touchmove', onMove, { passive: false });
        window.addEventListener('touchend', onUp);
      }
      function onMove(e){
        if (!dragging) return;
        if (e.cancelable) e.preventDefault();
        const y = (e.touches ? e.touches[0].clientY : e.clientY);
        const dy = startY - y;
        const { quarter, expanded } = heights();
        apply(clamp(startH + dy, quarter, expanded));
      }
      function onUp(){
        if (!dragging) return;
        dragging = false;
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
        window.removeEventListener('touchmove', onMove);
        window.removeEventListener('touchend', onUp);
        const h = sheet.getBoundingClientRect().height;
        setSnap(nearestSnapIndex(h));
      }
      grab.addEventListener('mousedown', onDown);
      grab.addEventListener('touchstart', onDown, { passive: true });
      grab.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          setSnap((snap + 1) % 3);
        }
      });
      setSnap(1);
      window.addEventListener('resize', () => setSnap(snap));
    }

    function initSearch(){
      const input = document.getElementById('country-search');
      const menu = document.getElementById('country-search-menu');
      const list = Object.keys(COUNTRIES).map(k => ({ id:+k, name: COUNTRIES[k].name }));
      let open = false;
      const openMenu = () => { open=true; menu.classList.add('open'); };
      const closeMenu = () => { open=false; menu.classList.remove('open'); };
      const render = (items) => {
        menu.innerHTML = items.map(c => `<div class="search-item" role="option" data-id="${c.id}">${c.name}</div>`).join('');
      };
      const filter = () => {
        const q = (input.value||'').trim().toLowerCase();
        const items = !q ? list : list.filter(x => x.name.toLowerCase().includes(q));
        render(items);
      };
      input.addEventListener('focus', () => { openMenu(); filter(); });
      input.addEventListener('input', () => { openMenu(); filter(); });
      document.addEventListener('pointerdown', (e) => {
        if (!open) return;
        if (menu.contains(e.target) || input.contains(e.target)) return;
        closeMenu();
      }, true);
      menu.addEventListener('mousedown', (e) => {
        const it = e.target.closest('.search-item');
        if (!it) return;
        const id = +it.getAttribute('data-id');
        setSelected(id);
        input.value = COUNTRIES[id].name;
        closeMenu();
        e.preventDefault();
      });
      document.addEventListener('keydown', (e) => {
        const isMacFind = (e.metaKey && !e.ctrlKey && (e.key === 'f' || e.key === 'F'));
        const isWinFind = (e.ctrlKey && !e.metaKey && (e.key === 'f' || e.key === 'F'));
        if (!isMacFind && !isWinFind) return;
        e.preventDefault();
        openMenu();
        filter();
        input.focus();
        try { input.select(); } catch (_) {}
      }, true);
    }

    function initChart(){
      const cv = document.getElementById('chart');
      if (!cv || !window.Chart) return;
      updateAppChart({
        labels: [''],
        datasets: [{ label: 'Loading…', data: [null], color: '#d4d4d4' }],
        countryId: 458,
      });
    }

    function initMap(){
      const root = document.getElementById('map');
      const rect = root.getBoundingClientRect();
      const W = Math.max(320, Math.floor(rect.width));
      const H = Math.max(320, Math.floor(rect.height));
      const svg = d3.select(root).append('svg')
        .attr('viewBox', `0 0 ${W} ${H}`)
        .attr('preserveAspectRatio', 'xMidYMid meet');

      const baseScale = (Math.min(W, H) * 1.55) / 2;
      // Center the globe slightly above geometric middle so the focused
      // country clears the pull-up panel (default ~half screen).
      const mapCenterY = H * 0.34;
      const projection = d3.geoOrthographic()
        .translate([W / 2, mapCenterY])
        .scale(baseScale)
        .clipAngle(90)
        .precision(0.3);
      const path = d3.geoPath(projection);
      const mapG = svg.append('g');

      d3.json('./assets/countries-110m.json').then(world => {
        const countries = topojson.feature(world, world.objects.countries);
        const DEFAULT_CENTER = [115, 6];
        projection.rotate([-DEFAULT_CENTER[0], -DEFAULT_CENTER[1], 0]);

        mapG.append('path').datum({ type: 'Sphere' }).attr('class', 'sphere').attr('d', path);
        mapG.append('path').datum(d3.geoGraticule().step([10, 10])()).attr('class', 'graticule').attr('d', path);

        mapG.selectAll('.bg')
          .data(countries.features.filter(d => !SEA.has(+d.id)))
          .enter().append('path').attr('class', 'country').attr('d', path);

        mapG.selectAll('.live-c')
          .data(countries.features.filter(d => LIVE[+d.id]))
          .enter().append('path').attr('class', 'country live').attr('d', path)
          .on('click', (e, d) => {
            const id = +d.id;
            if (id === 458) {
              appApplyMalaysiaClickRegion(e, svg.node(), projection);
              if (+selected === 458) {
                refreshHighlights(458);
                applySel();
                return;
              }
            }
            setSelected(id);
            applySel();
          });

        const mesh = mapG.append('path')
          .datum(topojson.mesh(world, world.objects.countries))
          .attr('class', 'border-mesh')
          .attr('d', path);

        const liveBorders = mapG.selectAll('.border-live-p')
          .data(countries.features.filter(d => LIVE[+d.id]))
          .enter().append('path')
          .attr('class', 'border-live')
          .attr('d', path);

        function applySel(){
          mapG.selectAll('.country.live').classed('selected', d => +d.id === +selected);
          liveBorders.classed('selected', d => +d.id === +selected);
        }
        applySel();

        function updateAll(){
          mapG.selectAll('path').attr('d', path);
        }

        function computeFitScale(feature, rotateArr, padPx) {
          const s0 = projection.scale();
          const r0 = projection.rotate();
          try {
            projection.scale(1).rotate(rotateArr);
            const b = path.bounds(feature);
            const dx = b[1][0] - b[0][0];
            const dy = b[1][1] - b[0][1];
            if (!(dx > 0) || !(dy > 0)) return null;
            const s = Math.min((W - padPx) / dx, (H - padPx) / dy);
            if (!isFinite(s) || s <= 0) return null;
            return s;
          } finally {
            projection.scale(s0).rotate(r0);
          }
        }

        // Expose: zoom/rotate to a selected country
        APP_ZOOM_TO = function zoomToCountry(countryId, animate = true) {
          const f = countries.features.find(x => +x.id === +countryId);
          if (!f) return;
          const [lon, lat] = d3.geoCentroid(f);
          const target = [-lon, -lat, 0];
          const padZ = 58;
          const fitS = computeFitScale(f, target, padZ);
          const nextScale = fitS ? Math.max(baseScale * 0.90, Math.min(baseScale * 4.8, fitS)) : projection.scale();

          if (!animate) {
            projection.rotate(target);
            if (fitS) projection.scale(nextScale);
            updateAll();
            return;
          }

          const r0 = projection.rotate();
          const s0 = projection.scale();
          const interpR = d3.interpolate(r0, target);
          const interpS = d3.interpolateNumber(s0, nextScale);
          svg.interrupt();
          svg.transition().duration(420).tween('appFocus', () => (t) => {
            projection.rotate(interpR(t)).scale(interpS(t));
            updateAll();
          });
        };

        // Initial focus: selected country
        APP_ZOOM_TO(selected, false);

        // Drag rotate (lower sensitivity)
        function rotateBy(dx, dy){
          const r = projection.rotate();
          const sens = 0.06;
          const ddx = Math.abs(dx) < 1.5 ? 0 : dx;
          const ddy = Math.abs(dy) < 1.5 ? 0 : dy;
          projection.rotate([ r[0] + ddx * sens, Math.max(-85, Math.min(85, r[1] - ddy * sens)), 0 ]);
          updateAll();
        }
        svg.style('cursor','grab');
        svg.call(d3.drag()
          .on('start', () => svg.style('cursor','grabbing'))
          .on('drag', (ev) => rotateBy(ev.dx, ev.dy))
          .on('end', () => svg.style('cursor','grab'))
        );
      });
    }

    // Init
    initSheet();
    initSearch();
    window.addEventListener('load', () => {
      initChart();
      initMap();
      setSelected(458);
    });
  </script>
