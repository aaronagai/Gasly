  <script>
    // COUNTRIES, COUNTRY_OVERVIEW_FALLBACK, OVERVIEW_SHEET_URL, ID_CITY_LONLAT, LA_PROVINCE_LONLAT, MY_REGIONS, TH/PH/KH/MM/VN/LA/VIC fuels — from config.js
    // ensureMalaysiaRows, ensureSheetRows, ensureVicServoSnapshot, ensureNswFuelSnapshot, mergeCurrencySheetRowsIntoUsdRates, cssVar, withAlpha, rowsForPriceChart, selectLatestHighlightRow, fmtDateFromRow, asNum, buildChartSeries, formatPriceChartYTick — from utils.js
    // buildSearchRegionsList, labelVietnamArea, appHighlightUsdOn, getAppUsdMultiplier, loadAppCurrencyRates, loadAndRenderAppDashboard — assets/app-dashboard-core.js

    /** ISO id → name for map hover/hit (same set as terminal). */
    const MAP_COUNTRY_NAMES = {
      36:'Australia', 50:'Bangladesh', 96:'Brunei', 104:'Myanmar',
      116:'Cambodia', 144:'Sri Lanka', 156:'China', 158:'Taiwan',
      356:'India', 360:'Indonesia', 392:'Japan', 410:'South Korea',
      418:'Laos', 458:'Malaysia', 598:'Papua New Guinea', 608:'Philippines',
      344:'Hong Kong', 626:'Timor-Leste', 702:'Singapore', 704:'Vietnam', 764:'Thailand',
    };

    let selected = 458;
    let RIGHT_CHART = null;
    /** Latest Singapore sheet rows (for provider picker). */
    let _appSgSheetRows = null;
    let _appHkSheetRows = null;
    /** Monotonic: stale `refreshHighlights` runs bail so async sheet fetches cannot overwrite a newer selection. */
    let __appHiRefreshEpoch = 0;
    let __appChartResizeT = 0;

    function scheduleChartResize() {
      clearTimeout(__appChartResizeT);
      __appChartResizeT = setTimeout(() => {
        __appChartResizeT = 0;
        try {
          if (RIGHT_CHART) RIGHT_CHART.resize();
        } catch (_) {}
      }, 72);
    }

    /** Pick the list row that matches the current app selection + localStorage sub-keys (sync; `rows` from buildSearchRegionsList). */
    function findAppSearchRowForSelection(rows, cid) {
      if (!rows || !rows.length) return null;
      const id = +cid;
      const m = rows.filter((r) => +r.countryId === id);
      if (!m.length) return null;
      if (id === 458) {
        const want = getMalaysiaRegion();
        return m.find((r) => (r.myRegion || '') === want) || m[0];
      }
      if (id === 360) {
        const city = getIndonesiaCity();
        return m.find((r) => (r.idCity || '') === city) || m[0];
      }
      if (id === 702) {
        let stored = '';
        try {
          stored = normalizeSheetString(localStorage.getItem('terminal_sg_provider') || '');
        } catch (_) {}
        if (stored) {
          const hit = m.find((r) => normalizeSheetString(r.sgProvider || '') === stored);
          if (hit) return hit;
        }
        return m.find((r) => !r.sgProvider) || m[0];
      }
      if (id === 344) {
        let stored = '';
        try {
          stored = normalizeSheetString(localStorage.getItem('terminal_hk_provider') || '');
        } catch (_) {}
        if (stored) {
          const hit = m.find((r) => normalizeSheetString(r.hkProvider || '') === stored);
          if (hit) return hit;
        }
        return m.find((r) => !r.hkProvider) || m[0];
      }
      if (id === 418) {
        const prov = getLaosProvince();
        return m.find((r) => (r.laProvince || '') === prov) || m[0];
      }
      if (id === 104) {
        const reg = getMyanmarRegion();
        return m.find((r) => (r.mmRegion || '') === reg) || m[0];
      }
      if (id === 704) {
        const want = canonVietnamAreaKey(getVietnamArea()) || getVietnamArea();
        const hit = m.find((r) => canonVietnamAreaKey(r.vnArea || '') === want || (r.vnArea || '') === want);
        return hit || m[0];
      }
      return m[0];
    }

    function fmtIDR(n) {
      const x = parseFloat(String(n).replace(/,/g, ''));
      if (!Number.isFinite(x)) return '—';
      return `IDR ${formatNumberCommas(Math.round(x), 0, 0)}/L`;
    }

    function usdDecimalsForValue(_usd) {
      return 2;
    }

    /** Highlight card: show copy instead of em-dash when price is missing. */
    function fmtHiPerL(sym, n, decimals) {
      if (appHighlightUsdOn()) {
        const mult = getAppUsdMultiplier(sym);
        const x = parseFloat(String(n == null ? '' : n).replace(/,/g, '').trim());
        if (!Number.isFinite(x) || mult == null) return 'Unavailable';
        const usd = x * mult;
        const dec = usdDecimalsForValue(usd);
        return `$${formatNumberCommas(usd, dec, dec)}/L`;
      }
      const s = fmtPerL(sym, n, decimals);
      return s === '—' ? 'Unavailable' : s;
    }

    function fmtHiIDR(n) {
      if (appHighlightUsdOn()) {
        const mult = getAppUsdMultiplier('IDR');
        const x = parseFloat(String(n == null ? '' : n).replace(/,/g, '').trim());
        if (!Number.isFinite(x) || mult == null) return 'Unavailable';
        const usd = x * mult;
        const dec = usdDecimalsForValue(usd);
        return `$${formatNumberCommas(usd, dec, dec)}/L`;
      }
      const s = fmtIDR(n);
      return s === '—' ? 'Unavailable' : s;
    }

    /** vs previous dated row; '-' if unchanged or no comparison (same ASCII hyphen everywhere). */
    function fmtDeltaPerL(sym, currentVal, prevVal, decimals = 2) {
      const cur = parseFloat(String(currentVal).replace(/,/g, ''));
      const prev = parseFloat(String(prevVal).replace(/,/g, ''));
      if (!Number.isFinite(cur) || !Number.isFinite(prev)) return '-';
      if (appHighlightUsdOn()) {
        const mult = getAppUsdMultiplier(sym);
        if (mult == null) return '-';
        const cUsd = cur * mult;
        const pUsd = prev * mult;
        const diff = cUsd - pUsd;
        if (Math.abs(diff) < 1e-9) return '-';
        const dec = Math.max(usdDecimalsForValue(diff), usdDecimalsForValue(cUsd));
        const mag = formatNumberCommas(Math.abs(diff), dec, dec);
        if (diff > 0) return `+$${mag}`;
        return `-$${mag}`;
      }
      const dec =
        Number.isFinite(decimals) && decimals >= 0 ? Math.min(20, Math.floor(decimals)) : 2;
      if (cur.toFixed(dec) === prev.toFixed(dec)) return '-';
      const diff = cur - prev;
      const mag = formatNumberCommas(Math.abs(diff), dec, dec);
      if (diff > 0) return `+${sym} ${mag}`;
      return `-${sym} ${mag}`;
    }

    function fmtDeltaIDR(currentVal, prevVal) {
      const cur = parseFloat(String(currentVal).replace(/,/g, ''));
      const prev = parseFloat(String(prevVal).replace(/,/g, ''));
      if (!Number.isFinite(cur) || !Number.isFinite(prev)) return '-';
      if (appHighlightUsdOn()) {
        const mult = getAppUsdMultiplier('IDR');
        if (mult == null) return '-';
        const cUsd = cur * mult;
        const pUsd = prev * mult;
        const diff = cUsd - pUsd;
        if (Math.abs(diff) < 1e-9) return '-';
        const dec = Math.max(usdDecimalsForValue(diff), usdDecimalsForValue(cUsd));
        const mag = formatNumberCommas(Math.abs(diff), dec, dec);
        if (diff > 0) return `+$${mag}`;
        return `-$${mag}`;
      }
      const a = Math.round(cur);
      const b = Math.round(prev);
      if (a === b) return '-';
      const diff = a - b;
      const abs = formatNumberCommas(Math.abs(diff), 0, 0);
      if (diff > 0) return `+IDR ${abs}/L`;
      return `-IDR ${abs}/L`;
    }

    function getMalaysiaRegion() {
      try {
        const k = localStorage.getItem('terminal_my_region') || 'Semenanjung';
        return k === 'SabahSarawak' ? 'SabahSarawak' : 'Semenanjung';
      } catch (_) {
        return 'Semenanjung';
      }
    }

    function getIndonesiaCity() {
      try { return localStorage.getItem('terminal_id_city') || 'Jakarta Pusat'; } catch (_) { return 'Jakarta Pusat'; }
    }

    function getLaosProvince() {
      try { return localStorage.getItem('terminal_la_province') || 'Vientiane Capital'; } catch (_) { return 'Vientiane Capital'; }
    }

    function getMyanmarRegion() {
      try {
        const s = localStorage.getItem('terminal_mm_region');
        if (s && String(s).trim()) return String(s).trim();
      } catch (_) {}
      return 'Thuwanna';
    }

    function getVietnamArea() {
      try {
        const s = localStorage.getItem('terminal_vn_area');
        if (s && String(s).trim()) {
          const t = String(s).trim();
          return canonVietnamAreaKey(t) || t;
        }
      } catch (_) {}
      return 'area_1';
    }

    function syncSearchInputFromSelection() {
      const inp = document.getElementById('country-search');
      if (!inp || document.activeElement === inp) return;
      if (typeof window.__appSyncSearchCommittedLabel === 'function') {
        try {
          window.__appSyncSearchCommittedLabel();
        } catch (_) {}
      }
    }

    // Data fetch helpers — ensureMalaysiaRows / ensureSheetRows come from utils.js

    /** ISO currency per country for charts (must match `fmtHiPerL` / `fmtHiIDR` and Currency sheet). */
    const APP_CHART_CCY = {
      458: 'MYR',
      702: 'SGD',
      96: 'BND',
      360: 'IDR',
      764: 'THB',
      608: 'PHP',
      116: 'KHR',
      104: 'MMK',
      704: 'VND',
      418: 'LAK',
      344: 'HKD',
      801: 'AUD',
      802: 'AUD',
    };

    function chartOptions(countryId, chartUsdMode = false) {
      const legendColor = cssVar('--chart-legend', 'rgba(0,0,0,0.48)');
      const tickColor = cssVar('--chart-tick', 'rgba(0,0,0,0.45)');
      const gridColor = cssVar('--chart-grid', 'rgba(0,0,0,0.06)');
      return {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 420, easing: 'easeOutCubic' },
        // App / touch: no hover tooltips or active-point styling
        events: [],
        interaction: { mode: 'nearest', intersect: false },
        plugins: {
          legend: {
            display: true,
            position: 'bottom',
            align: 'start',
            labels: {
              usePointStyle: false,
              boxWidth: 11,
              boxHeight: 2,
              borderRadius: 1,
              padding: 10,
              boxPadding: 4,
              font: {
                family: 'Inter, system-ui, sans-serif',
                size: 8,
                weight: '400',
              },
              color: legendColor,
              generateLabels(chart) {
                const ds = chart.data.datasets || [];
                /* Chart.js paints legend text with legendItem.fontColor; without it, labels stay default (black). */
                return ds.map((d, i) => ({
                  text: d.label,
                  fillStyle: d.borderColor,
                  strokeStyle: d.borderColor,
                  lineWidth: 0,
                  hidden: !chart.isDatasetVisible(i),
                  index: i,
                  datasetIndex: i,
                  fontColor: legendColor,
                }));
              },
            },
          },
          tooltip: { enabled: false },
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { color: tickColor, font: { size: 10 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 },
          },
          y: {
            grid: { color: gridColor },
            ticks: {
              color: tickColor,
              font: { size: 10 },
              callback(v) {
                const iso =
                  chartUsdMode || countryId == null ? null : APP_CHART_CCY[countryId] || null;
                return formatPriceChartYTick(v, {
                  usdMode: chartUsdMode,
                  countryId,
                  isoCurrency: iso,
                });
              },
            },
          },
        },
      };
    }

    function updateChart({ labels, datasets, countryId }) {
      const cv = document.getElementById('chart');
      if (!cv || !window.Chart) return;
      const ctx = cv.getContext('2d');

      function mkFill(stroke) {
        const grad = ctx.createLinearGradient(0, 0, 0, cv.height || 210);
        grad.addColorStop(0, withAlpha(stroke, 0.16));
        grad.addColorStop(1, withAlpha(stroke, 0));
        return grad;
      }

      const ccy = countryId != null ? APP_CHART_CCY[countryId] : null;
      let usdMult = 1;
      let chartUsdMode = false;
      if (ccy && appHighlightUsdOn()) {
        const m = getAppUsdMultiplier(ccy);
        if (m != null && Number.isFinite(m) && m > 0) {
          usdMult = m;
          chartUsdMode = true;
        }
      }

      const nextDs = (datasets || []).map((ds) => ({
        label: ds.label,
        data: (ds.data || []).map((v) => {
          if (v == null || v === '') return v;
          const x = typeof v === 'number' ? v : parseFloat(String(v).replace(/,/g, ''));
          if (!Number.isFinite(x)) return v;
          return x * usdMult;
        }),
        borderColor: ds.color,
        backgroundColor: mkFill(ds.color),
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 0,
        tension: 0.35,
        fill: true,
        spanGaps: true,
      }));

      if (RIGHT_CHART) {
        try {
          RIGHT_CHART.destroy();
        } catch (_) {}
        RIGHT_CHART = null;
      }

      try {
        RIGHT_CHART = new Chart(ctx, {
          type: 'line',
          data: { labels: labels || [], datasets: nextDs },
          options: chartOptions(countryId, chartUsdMode),
        });
        scheduleChartResize();
      } catch (err) {
        console.error('App chart failed', err);
        RIGHT_CHART = null;
      }
    }

    function renderHiRows(pairs) {
      const el = document.getElementById('hi-lines');
      if (!el) return;
      el.innerHTML = pairs.map((row) => {
        const k = row[0];
        const v = row[1];
        const d = row[2];
        if (d != null && d !== '') {
          return `<div class="hi-row"><span class="hi-k">${k}</span><div class="hi-price-block"><span class="hi-v">${v}</span><span class="hi-delta" aria-label="Change vs previous update">${d}</span></div></div>`;
        }
        return `<div class="hi-row"><span class="hi-k">${k}</span><span class="hi-v hi-v--alone">${v}</span></div>`;
      }).join('');
    }

            subEl.textContent = subBits.length ? subBits.join(' · ') : `AUD/L · ${cname}`;

          const pairs = [];

          } else {
            renderHiRows([['Data', snap.hint || 'No prices parsed from API (check SERVO_SAVER_PATH)']]);
            if (chartKicker) chartKicker.textContent = `${cname}`;
            emptyChart();
          }
          return;
        }

        if (!alive()) return;
        titleEl.textContent = cname;
        subEl.textContent = 'No live price feed for this view';
        renderHiRows([['Source', 'Unavailable']]);
        emptyChart();
      } catch (_) {
        if (!alive()) return;
        if (titleEl) titleEl.textContent = cname;
        if (subEl) subEl.textContent = 'Could not load live prices';
        try {

        } catch (__) {}
        try {

    function initSheet(){
      const sheet = document.getElementById('sheet');
      const grab = document.getElementById('grab');
      const scroller = document.getElementById('sheet-scroll');
      if (!sheet || !grab || !scroller) return;

      let cardsOnlyEmbed = false;
      try {
        cardsOnlyEmbed = new URLSearchParams(window.location.search).get('cards') === '1';
      } catch (_) {}

      /* Dashboard iframe: parent sets height — inner snap math does not apply; scroll only when parent says full. */
      if (cardsOnlyEmbed) {
        window.__appSetCardsOnlySheetScroll = function (allow) {
          sheet.classList.toggle('sheet-scrollable', !!allow);
          sheet.classList.toggle('sheet-expanded', !!allow);
          if (!allow) scroller.scrollTop = 0;
          syncHiStickyShadow();
        };
        window.__appSetCardsOnlySheetScroll(false);
        scroller.addEventListener('scroll', syncHiStickyShadow, { passive: true });
        syncHiStickyShadow();
        return;
      }

      let dragging = false, startY = 0, startH = 0;
      let dragRaf = null;
      let pendingDy = 0;
      let snap = 1;
      const clamp = (n, lo, hi) => Math.max(lo, Math.min(hi, n));
      const heights = () => {
        const vh = window.visualViewport ? Math.round(window.visualViewport.height) : window.innerHeight;
        const quarter = Math.round(vh * 0.25);
        const half = Math.round(vh * 0.5);
        const expandedTop = Math.round(Math.min(vh - 72, vh * 0.94));
        const expanded = Math.max(half + 100, expandedTop);
        return { quarter, half, expanded };
      };
      const apply = (h) => {
        const px = Math.round(h);
        document.documentElement.style.setProperty('--sheetH', `${px}px`);
        const { expanded } = heights();
        /* Scroll only at the top (expanded) snap — quarter and half are fixed previews. */
        const tol = 2;
        const allowsScroll = px >= expanded - tol;
        const isExpanded = allowsScroll;
        sheet.classList.toggle('sheet-expanded', isExpanded);
        sheet.classList.toggle('sheet-scrollable', allowsScroll);
        if (!allowsScroll && scroller) scroller.scrollTop = 0;
        syncHiStickyShadow();
      };
      const nearestSnapIndex = (h) => {
        const { quarter, half, expanded } = heights();
        const snaps = [quarter, half, expanded];
        let best = 0;
        let d = Infinity;
        snaps.forEach((x, i) => {
          const dd = Math.abs(h - x);
          if (dd < d) {
            d = dd;
            best = i;
          }
        });
        return best;
      };
      function setSnap(i){
        snap = clamp(i, 0, 2);
        const { quarter, half, expanded } = heights();
        const h = snap === 0 ? quarter : snap === 1 ? half : expanded;
        apply(h);
        scheduleChartResize();
      }

      const HAS_PTR = typeof window.PointerEvent !== 'undefined';
      const EDGE_EPS = 4;
      const SLOP_PX = 14;
      const ANGLE_RATIO = 1.22;
      const VEL_RESIZE = 0.22;
      const AMBIG_DIST = 40;

      function maxScrollTop() {
        return Math.max(0, Math.round(scroller.scrollHeight - scroller.clientHeight));
      }

      let activePointerId = null;
      let probeOn = false;
      let probePid = null;
      let probeY0 = 0;
      let probeX0 = 0;
      let probeT0 = 0;
      let probeScroll0 = 0;
      let probeLastY = 0;
      let probeLastT = 0;

      function clearProbe() {
        if (!probeOn) return;
        probeOn = false;
        probePid = null;
        window.removeEventListener('pointermove', onProbePtrMove);
        window.removeEventListener('pointerup', onProbePtrEnd);
        window.removeEventListener('pointercancel', onProbePtrEnd);
        window.removeEventListener('mousemove', onProbeMouseMove);
        window.removeEventListener('mouseup', onProbeMouseEnd);
        window.removeEventListener('touchmove', onProbeTouchMove, { passive: false });
        window.removeEventListener('touchend', onProbeTouchEnd);
        window.removeEventListener('touchcancel', onProbeTouchEnd);
      }

      function detachDrag() {
        window.removeEventListener('pointermove', onPtrDragMove);
        window.removeEventListener('pointerup', onPtrDragEnd);
        window.removeEventListener('pointercancel', onPtrDragEnd);
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
        window.removeEventListener('touchmove', onMove, { passive: false });
        window.removeEventListener('touchend', onUp);
        window.removeEventListener('touchcancel', onUp);
      }

      function beginSheetDrag(clientY) {
        dragging = true;
        startY = clientY;
        startH = sheet.getBoundingClientRect().height;
        pendingDy = 0;
        const usePtr = HAS_PTR && typeof activePointerId === 'number';
        if (usePtr) {
          try {
            sheet.setPointerCapture(activePointerId);
          } catch (_) {}
          window.addEventListener('pointermove', onPtrDragMove, { passive: false });
          window.addEventListener('pointerup', onPtrDragEnd);
          window.addEventListener('pointercancel', onPtrDragEnd);
        } else {
          window.addEventListener('mousemove', onMove);
          window.addEventListener('mouseup', onUp);
          window.addEventListener('touchmove', onMove, { passive: false });
          window.addEventListener('touchend', onUp, { passive: true });
          window.addEventListener('touchcancel', onUp, { passive: true });
        }
      }

      function finishSheetDrag() {
        if (!dragging) return;
        dragging = false;
        if (dragRaf != null) {
          cancelAnimationFrame(dragRaf);
          dragRaf = null;
        }
        if (HAS_PTR && typeof activePointerId === 'number' && sheet.releasePointerCapture) {
          try {
            sheet.releasePointerCapture(activePointerId);
          } catch (_) {}
        }
        activePointerId = null;
        detachDrag();
        const { quarter, expanded } = heights();
        apply(clamp(startH + pendingDy, quarter, expanded));
        const h = sheet.getBoundingClientRect().height;
        setSnap(nearestSnapIndex(h));
      }

      function classifyScrollVsResize(dy, dx, st, maxSt, tNow) {
        const ady = Math.abs(dy);
        const adx = Math.abs(dx);
        const hyp = Math.hypot(dx, dy);
        const verticalDominant = ady >= adx * ANGLE_RATIO;
        const dt = Math.max(5, tNow - probeT0);
        const v = dy / dt;

        if (hyp < 5) return null;
        if (!verticalDominant && hyp > 16) return 'scroll';

        if (verticalDominant && ady >= SLOP_PX) {
          if (dy > 0 && st <= EDGE_EPS) return 'resize';
          if (dy < 0 && st >= maxSt - EDGE_EPS) return 'resize';
          return 'scroll';
        }

        if (verticalDominant && hyp > 10) {
          if (st <= EDGE_EPS && dy > 6 && v > VEL_RESIZE) return 'resize';
          if (st >= maxSt - EDGE_EPS && dy < -6 && v < -VEL_RESIZE) return 'resize';
        }

        if (verticalDominant && hyp > AMBIG_DIST) return 'scroll';
        return null;
      }

      function startProbe(clientY, clientX, tNow, pid) {
        probeOn = true;
        probePid = pid;
        probeY0 = clientY;
        probeX0 = clientX;
        probeT0 = tNow;
        probeScroll0 = scroller.scrollTop;
        probeLastY = clientY;
        probeLastT = tNow;
        if (HAS_PTR && pid != null) {
          window.addEventListener('pointermove', onProbePtrMove, { passive: false });
          window.addEventListener('pointerup', onProbePtrEnd);
          window.addEventListener('pointercancel', onProbePtrEnd);
        } else if (pid === 'mouse') {
          window.addEventListener('mousemove', onProbeMouseMove);
          window.addEventListener('mouseup', onProbeMouseEnd);
        } else {
          window.addEventListener('touchmove', onProbeTouchMove, { passive: false });
          window.addEventListener('touchend', onProbeTouchEnd);
          window.addEventListener('touchcancel', onProbeTouchEnd);
        }
      }

      function runProbeDecision(clientY, clientX, tNow, ev) {
        const dy = clientY - probeY0;
        const dx = clientX - probeX0;
        const st = scroller.scrollTop;
        const maxSt = maxScrollTop();
        const d = classifyScrollVsResize(dy, dx, st, maxSt, tNow);
        if (d === 'resize') {
          if (ev && ev.cancelable) ev.preventDefault();
          clearProbe();
          beginSheetDrag(clientY);
          return true;
        }
        if (d === 'scroll') {
          clearProbe();
          return true;
        }
        probeLastY = clientY;
        probeLastT = tNow;
        return false;
      }

      function onProbePtrMove(e) {
        if (!probeOn || e.pointerId !== probePid) return;
        runProbeDecision(e.clientY, e.clientX, performance.now(), e);
      }
      function onProbePtrEnd(e) {
        if (!probeOn || (e.pointerId != null && e.pointerId !== probePid)) return;
        clearProbe();
      }

      function onProbeMouseMove(e) {
        if (!probeOn) return;
        runProbeDecision(e.clientY, e.clientX, performance.now(), e);
      }
      function onProbeMouseEnd() {
        clearProbe();
      }

      function onProbeTouchMove(e) {
        if (!probeOn || !e.touches || !e.touches[0]) return;
        const t = e.touches[0];
        runProbeDecision(t.clientY, t.clientX, performance.now(), e);
      }
      function onProbeTouchEnd() {
        clearProbe();
      }

      function onPtrDragMove(e) {
        if (!dragging || e.pointerId !== activePointerId) return;
        if (e.cancelable) e.preventDefault();
        pendingDy = startY - e.clientY;
        if (dragRaf == null) dragRaf = requestAnimationFrame(flushDragFrame);
      }
      function onPtrDragEnd(e) {
        if (!dragging || (e.pointerId != null && e.pointerId !== activePointerId)) return;
        finishSheetDrag();
      }

      function onSheetPointerDownCapture(e) {
        if (e.pointerType === 'mouse' && e.button !== 0) return;
        if (e.pointerType === 'touch' && e.isPrimary === false) return;

        const scrollable = sheet.classList.contains('sheet-scrollable');
        const y = e.clientY;
        const x = e.clientX;

        if (!scrollable) {
          activePointerId = e.pointerId;
          beginSheetDrag(y);
          return;
        }

        if (!scroller.contains(e.target)) {
          activePointerId = e.pointerId;
          beginSheetDrag(y);
          return;
        }

        activePointerId = e.pointerId;
        startProbe(y, x, performance.now(), e.pointerId);
      }

      function onDown(e){
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        activePointerId = null;
        beginSheetDrag(y);
      }

      function flushDragFrame() {
        dragRaf = null;
        if (!dragging) return;
        const { quarter, expanded } = heights();
        apply(clamp(startH + pendingDy, quarter, expanded));
      }
      function onMove(e){
        if (!dragging) return;
        if (e.cancelable) e.preventDefault();
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        pendingDy = startY - y;
        if (dragRaf == null) dragRaf = requestAnimationFrame(flushDragFrame);
      }
      function onUp(){
        finishSheetDrag();
      }

      if (HAS_PTR) {
        sheet.addEventListener('pointerdown', onSheetPointerDownCapture, { capture: true, passive: false });
      } else {
        sheet.addEventListener(
          'touchstart',
          function (e) {
            if (!e.touches || !e.touches[0]) return;
            const scrollable = sheet.classList.contains('sheet-scrollable');
            const t = e.touches[0];
            if (!scrollable) {
              activePointerId = null;
              onDown(e);
              return;
            }
            if (!scroller.contains(e.target)) {
              activePointerId = null;
              onDown(e);
              return;
            }
            activePointerId = null;
            startProbe(t.clientY, t.clientX, performance.now(), null);
          },
          { capture: true, passive: false },
        );
        sheet.addEventListener(
          'mousedown',
          function (e) {
            if (e.button !== 0) return;
            const scrollable = sheet.classList.contains('sheet-scrollable');
            if (!scrollable) {
              activePointerId = null;
              onDown(e);
              return;
            }
            if (!scroller.contains(e.target)) {
              activePointerId = null;
              onDown(e);
              return;
            }
            activePointerId = 'mouse';
            startProbe(e.clientY, e.clientX, performance.now(), 'mouse');
          },
          { capture: true },
        );
      }
      grab.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          setSnap((snap + 1) % 3);
        }
      });
      /* Default: smallest sheet stop (~¼ viewport) so the map stays visible on first open. */
      setSnap(0);
      scroller.addEventListener('scroll', syncHiStickyShadow, { passive: true });
      syncHiStickyShadow();
      const onViewportResize = () => setSnap(snap);
      window.addEventListener('resize', onViewportResize);
      window.visualViewport?.addEventListener('resize', onViewportResize);

      window.__appCollapseSheetToMin = function () {
        setSnap(0);
      };
    }

      function positionMenu() {
        const t = titleEl();
        if (!t) return;
        const r = t.getBoundingClientRect();
        const pad = 12;
        const maxW = window.innerWidth - pad * 2;
        const w = Math.min(maxW, Math.max(220, r.width + 80));
        let left = Math.max(pad, Math.min(r.left, window.innerWidth - pad - w));

        menu.style.left = `${left}px`;
        menu.style.top = `${top}px`;
        requestAnimationFrame(() => {
          const mh = menu.getBoundingClientRect().height;

            const above = r.top - 8 - mh;
            if (above >= pad) menu.style.top = `${above}px`;

        positionMenu();

        if (t) t.setAttribute('aria-expanded', 'true');
      }

        if (open) closeMenu();

        const t = titleEl();

        if (!t.contains(e.target)) return;
        e.stopPropagation();
        toggleMenu();

        'keydown',

            toggleMenu();

        'pointerdown',
        (e) => {
          if (!open) return;
          const t = titleEl();
          if (t?.contains(e.target)) return;
          if (menu.contains(e.target)) return;
          closeMenu();

        true,

        if (open && e.key === 'Escape') closeMenu();

      window.addEventListener('resize', () => {
        if (open) positionMenu();

      scroller?.addEventListener(
        'scroll',
        () => {
          if (open) closeMenu();
        },
        { passive: true },
      );

      window.__appCloseSgProviderMenu = closeMenu;
    }

    async function initSearch(){
      const input = document.getElementById('country-search');
      const menu = document.getElementById('country-search-menu');
      let list = [];
      /** When the field still shows the last picked label, reopening the menu lists all countries until the user types. */
      let lastCommittedLabel = '';
      /** In country-picker mode: which country’s region rows are expanded inline (`null` = none). */
      let expandedCountryId = null;

      window.__appResetSearchInput = function appResetSearchInput() {
        lastCommittedLabel = '';
        try {
          if (input) input.value = '';
        } catch (_) {}
      };

      function buildCountryGroups(rows) {
        const m = new Map();
        for (const r of rows) {
          const dataId = +r.countryId;
          if (!COUNTRIES[dataId]) continue;
          const gk = r.searchGroupId != null ? +r.searchGroupId : dataId;
          if (r.searchGroupId != null && !COUNTRIES[gk]) continue;
          if (!m.has(gk)) m.set(gk, []);
          m.get(gk).push(r);
        }
        return [...m.entries()]
          .map(([groupId, gRows]) => ({
            countryId: groupId,
            name: COUNTRIES[groupId]?.name || String(groupId),
            rows: gRows.slice().sort((a, b) => String(a.label).localeCompare(String(b.label))),
          }))
          .sort((a, b) => a.name.localeCompare(b.name));
      }

      async function rebuildList() {
        try {
          list = await buildSearchRegionsList();
        } catch (_) {
          list = [];
        }
      }
      let open = false;
      let filterDebounceT = 0;
      const openMenu = () => { open=true; menu.classList.add('open'); };
      const closeMenu = () => {
        open=false;
        menu.classList.remove('open');
        expandedCountryId = null;
        clearTimeout(filterDebounceT);
        filterDebounceT = 0;
      };
      const searchShell = input.closest('.search');
      const searchField = input.closest('.search-field');
      const escAttr = (s) => String(s)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;');

      function regionShortLabel(countryName, fullLabel) {
        const p = `${countryName} - `;
        const s = String(fullLabel || '');
        return s.startsWith(p) ? s.slice(p.length) : s;
      }

      function pickRowHtmlApp(x, displayOverride, nested) {
        const cid = x.countryId;
        const shown = displayOverride != null ? escAttr(displayOverride) : escAttr(x.label);
        const nest = nested ? ' search-item-nested' : '';
        return `<div class="search-item search-item-pick${nest}" role="option" data-country-id="${cid}" data-label="${escAttr(x.label)}" data-my-region="${escAttr(x.myRegion ?? '')}" data-id-city="${escAttr(x.idCity ?? '')}" data-la-province="${escAttr(x.laProvince ?? '')}" data-sg-provider="${x.sgProvider != null ? escAttr(x.sgProvider) : ''}" data-hk-provider="${x.hkProvider != null ? escAttr(x.hkProvider) : ''}" data-mm-region="${escAttr(x.mmRegion ?? '')}" data-vn-area="${escAttr(x.vnArea ?? '')}">${shown}</div>`;
      }

      function renderFlat(items) {
        menu.innerHTML = items.length
          ? items.map((x) => pickRowHtmlApp(x)).join('')
          : '<div class="search-empty">No matches</div>';
      }

      function renderCountries(groups) {
        if (!groups.length) {
          menu.innerHTML = '<div class="search-empty">No matches</div>';
          return;
        }
        const chevronSvg =
          '<svg class="search-item-dropdown-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>';
        const parts = [];
        for (const g of groups) {
          if (g.rows.length > 1) {
            const isOpen = expandedCountryId === g.countryId;
            parts.push(
              `<div class="search-item search-item-expand${isOpen ? ' search-item-expand-open' : ''}" role="button" tabindex="-1" aria-expanded="${isOpen ? 'true' : 'false'}" data-expand="${g.countryId}"><span class="search-item-label">${escAttr(g.name)}</span><span class="search-item-chevron${isOpen ? ' search-item-chevron-open' : ''}" aria-hidden="true">${chevronSvg}</span></div>`,
            );
            if (isOpen) {
              for (const x of g.rows) {
                parts.push(pickRowHtmlApp(x, regionShortLabel(g.name, x.label), true));
              }
            }
          } else {
            parts.push(pickRowHtmlApp(g.rows[0], g.name));
          }
        }
        menu.innerHTML = parts.join('');
      }

      function showsCountryPicker() {
        const raw = (input.value || '').trim();
        const q = raw.toLowerCase();
        const committed = (lastCommittedLabel || '').trim().toLowerCase();
        return !q || q === committed;
      }

      function filter() {
        const raw = (input.value || '').trim();
        const q = raw.toLowerCase();
        const committed = (lastCommittedLabel || '').trim().toLowerCase();
        const groups = buildCountryGroups(list);

        if (!showsCountryPicker()) {
          expandedCountryId = null;
          const items = list.filter((x) => x.label.toLowerCase().includes(q));
          renderFlat(items);
          return;
        }

        if (!q || q === committed) {
          renderCountries(groups);
          return;
        }

        const byCountry = groups.filter((g) => g.name.toLowerCase().includes(q));
        if (byCountry.length) {
          if (expandedCountryId != null && !byCountry.some((g) => g.countryId === expandedCountryId)) {
            expandedCountryId = null;
          }
          renderCountries(byCountry);
          return;
        }
        expandedCountryId = null;
        const hits = list.filter((x) => x.label.toLowerCase().includes(q));
        renderFlat(hits);
      }

      function applyPickFromRowEl(it) {
        const countryId = +it.getAttribute('data-country-id');
        const mr = it.getAttribute('data-my-region');
        const ic = it.getAttribute('data-id-city');
        const laProv = it.getAttribute('data-la-province');
        const sgProv = it.getAttribute('data-sg-provider');
        const mmReg = it.getAttribute('data-mm-region');
        const vnArea = it.getAttribute('data-vn-area');
        if (mr) {
          try { localStorage.setItem('terminal_my_region', mr); } catch (_) {}
        }
        if (ic) {
          try { localStorage.setItem('terminal_id_city', ic); } catch (_) {}
        }
        if (laProv) {
          try { localStorage.setItem('terminal_la_province', laProv); } catch (_) {}
        }
        if (countryId === 702) {
          try {
            if (sgProv) localStorage.setItem('terminal_sg_provider', sgProv);
            else localStorage.removeItem('terminal_sg_provider');
          } catch (_) {}
        }
        const hkProv = it.getAttribute('data-hk-provider');
        if (countryId === 344) {
          try {
            if (hkProv) localStorage.setItem('terminal_hk_provider', hkProv);
            else localStorage.removeItem('terminal_hk_provider');
          } catch (_) {}
        }
        if (mmReg && countryId === 104) {
          try { localStorage.setItem('terminal_mm_region', mmReg); } catch (_) {}
        }
        if (vnArea && countryId === 704) {
          try { localStorage.setItem('terminal_vn_area', vnArea); } catch (_) {}
        }
        setSelected(countryId, { syncSearchBar: false });
        closeMenu();
        setTimeout(() => {
          try {
            input.blur();
          } catch (_) {}
        }, 0);
      }

      window.__appSyncSearchCommittedLabel = () => {
        void rebuildList().then(() => {
          const hit = findAppSearchRowForSelection(list, selected);
          if (hit && hit.label) {
            lastCommittedLabel = hit.label;
            if (document.activeElement !== input) input.value = hit.label;
          } else {
            lastCommittedLabel = '';
            if (document.activeElement !== input) input.value = '';
          }
        });
      };
      function collapseSheetForSearch() {
        if (typeof window.__appCollapseSheetToMin === 'function') {
          try {
            window.__appCollapseSheetToMin();
          } catch (_) {}
        }
      }
      if (searchShell) {
        searchShell.addEventListener('pointerdown', (e) => {
          if (!e.isPrimary) return;
          collapseSheetForSearch();
          queueMicrotask(() => {
            if (document.activeElement === input) return;
            try {
              input.focus({ preventScroll: true });
            } catch (_) {
              try {
                input.focus();
              } catch (_) {}
            }
          });
        });
      }
      input.addEventListener('focus', () => {
        collapseSheetForSearch();
        void rebuildList().then(() => {
          expandedCountryId = null;
          openMenu();
          filter();
        });
      });
      input.addEventListener('click', () => {
        collapseSheetForSearch();
      });
      input.addEventListener('input', () => {
        openMenu();
        clearTimeout(filterDebounceT);
        filterDebounceT = setTimeout(() => {
          filterDebounceT = 0;
          filter();
        }, 56);
      });
      input.addEventListener('keydown', (e) => {
        if (!open) return;
        if (e.key === 'Escape' && expandedCountryId != null) {
          expandedCountryId = null;
          filter();
          e.preventDefault();
        }
      });
      document.addEventListener('pointerdown', (e) => {
        if (!open) return;
        if (menu.contains(e.target) || (searchField && searchField.contains(e.target))) return;
        closeMenu();
      }, true);
      menu.addEventListener('pointerdown', (e) => {
        if (!e.isPrimary) return;
        const expand = e.target.closest('.search-item-expand');
        if (expand) {
          const id = +expand.getAttribute('data-expand');
          expandedCountryId = expandedCountryId === id ? null : id;
          filter();
          e.preventDefault();
          return;
        }
        const it = e.target.closest('.search-item-pick');
        if (!it) return;
        applyPickFromRowEl(it);
        e.preventDefault();
      });
      document.addEventListener('keydown', (e) => {
        const isMacFind = (e.metaKey && !e.ctrlKey && (e.key === 'f' || e.key === 'F'));
        const isWinFind = (e.ctrlKey && !e.metaKey && (e.key === 'f' || e.key === 'F'));
        if (!isMacFind && !isWinFind) return;
        e.preventDefault();
        if (typeof window.__appCollapseSheetToMin === 'function') {
          try {
            window.__appCollapseSheetToMin();
          } catch (_) {}
        }
        void rebuildList().then(() => {
          expandedCountryId = null;
          openMenu();
          filter();
          input.focus();
          try { input.select(); } catch (_) {}
        });
      }, true);

      await rebuildList();
    }

    const APP_STORY_W = 1080;
    const APP_STORY_H = 1920;
    /** Side margins on the 9:16 canvas (tighter = slightly larger content). */
    const APP_STORY_PAD = 52;
    /** Bottom band for logo + domain (must be ≥ APP_STORY_PAD so content never overlaps). */
    const APP_STORY_FOOTER_H = Math.max(APP_STORY_PAD, 136);
    /** Empty band at the top of story exports (Instagram-safe headroom). */
    const APP_STORY_TOP_DEAD = 250;
    /** Surface gap between orange header and snapshot (px). */
    const APP_STORY_SNAPSHOT_TOP_GAP = 22;
    /** Gap between snapshot bottom and footer strip so chart/legend never touches the logo (px). */
    const APP_STORY_SNAPSHOT_FOOT_GAP = 40;
    /** Capture width for off-screen clones (wider = less pillar + less side letterbox when composing). */
    const APP_EXPORT_CAPTURE_W = 540;
    /** Taller chart block in highlight export vs in-app 210px — reads better on 9:16 stories. */
    const APP_EXPORT_CHART_WRAP_HEIGHT = 260;

    let _exportStoryBlob = null;
    let _exportStoryObjectUrl = null;
    let _exportStoryFilename = '';

    function closeExportStoryModal() {
      const modal = document.getElementById('export-story-modal');
      const img = document.getElementById('export-story-preview');
      if (modal) {
        modal.classList.remove('export-story-modal--open');
        modal.setAttribute('aria-hidden', 'true');
      }
      if (img) {
        img.removeAttribute('src');
        img.alt = '';
      }
      if (_exportStoryObjectUrl) {
        URL.revokeObjectURL(_exportStoryObjectUrl);
        _exportStoryObjectUrl = null;
      }
      _exportStoryBlob = null;
      _exportStoryFilename = '';
    }

    function openExportStoryModal(blob, filename) {
      closeExportStoryModal();
      _exportStoryBlob = blob;
      _exportStoryFilename = filename;
      _exportStoryObjectUrl = URL.createObjectURL(blob);
      const modal = document.getElementById('export-story-modal');
      const img = document.getElementById('export-story-preview');
      if (!modal || !img) return;
      img.src = _exportStoryObjectUrl;
      img.alt = 'Instagram story preview';
      modal.classList.add('export-story-modal--open');
      modal.setAttribute('aria-hidden', 'false');
      document.getElementById('export-story-save')?.focus();
    }

    async function saveExportStoryToGallery() {
      const blob = _exportStoryBlob;
      const filename = _exportStoryFilename || 'petrolprice-story.png';
      if (!blob) return;
      const file = new File([blob], filename, { type: 'image/png' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file] });
          return;
        } catch (e) {
          if (e && e.name === 'AbortError') return;
        }
      }
      if (!_exportStoryObjectUrl) return;
      const a = document.createElement('a');
      a.href = _exportStoryObjectUrl;
      a.download = filename;
      a.rel = 'noopener';
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    function initExportStoryModal() {
      const modal = document.getElementById('export-story-modal');
      if (!modal) return;
      modal.querySelector('.export-story-backdrop')?.addEventListener('click', closeExportStoryModal);
      document.getElementById('export-story-close')?.addEventListener('click', closeExportStoryModal);
      document.getElementById('export-story-save')?.addEventListener('click', async () => {
        const btn = document.getElementById('export-story-save');
        if (!btn || btn.disabled) return;
        btn.disabled = true;
        try {
          await saveExportStoryToGallery();
        } catch (err) {
          console.error(err);
        } finally {
          btn.disabled = false;
        }
      });
      document.addEventListener('keydown', (e) => {
        if (e.key !== 'Escape') return;
        if (!modal.classList.contains('export-story-modal--open')) return;
        closeExportStoryModal();
      });
    }

    function appExportSlug(cardId) {
      if (cardId === 'card-highlights') return 'highlights';
      if (cardId === 'card-history') return 'history';
      return 'export';
    }

    function loadImageForStoryExport(url) {
      return new Promise((resolve) => {
        const im = new Image();
        im.onload = () => resolve(im);
        im.onerror = () => resolve(null);
        im.src = url;
      });
    }

    async function appComposeStoryPng(snapCanvas) {
      const out = document.createElement('canvas');
      out.width = APP_STORY_W;
      out.height = APP_STORY_H;
      const ctx = out.getContext('2d');
      const surface = cssVar('--surface', '#ffffff');
      ctx.fillStyle = surface;
      ctx.fillRect(0, 0, APP_STORY_W, APP_STORY_H);
      const px = APP_STORY_PAD;
      const headerH = APP_STORY_TOP_DEAD;
      const contentPad = headerH + APP_STORY_SNAPSHOT_TOP_GAP;
      if (headerH > 0) {
        const orange = cssVar('--orange', '#ff6a00');
        const cx = APP_STORY_W * 0.5;
        const cy = 0;
        const r1 = Math.hypot(APP_STORY_W * 0.5, headerH) * 1.12;
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r1);
        g.addColorStop(0, '#ffe0c2');
        g.addColorStop(0.18, '#ffb366');
        g.addColorStop(0.45, orange);
        g.addColorStop(0.72, 'rgba(255, 106, 0, 0.35)');
        g.addColorStop(1, surface);
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, APP_STORY_W, headerH);
      }
      const maxW = APP_STORY_W - APP_STORY_PAD * 2;
      const maxH =
        APP_STORY_H - contentPad - APP_STORY_FOOTER_H - APP_STORY_SNAPSHOT_FOOT_GAP;
      const sw = snapCanvas.width;
      const sh = snapCanvas.height;

      async function stampFooter() {
        const footTop = APP_STORY_H - APP_STORY_FOOTER_H;
        const logoSrc = new URL('assets/appicon.png', window.location.href).href;
        const logo = await loadImageForStoryExport(logoSrc);
        const logoSize = 44;
        const gap = 14;
        const label = 'petrolprice.xyz';
        ctx.save();
        ctx.textBaseline = 'middle';
        ctx.fillStyle = cssVar('--text', '#141414');
        ctx.font = '600 30px Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
        const textW = ctx.measureText(label).width;
        const blockW = (logo && logo.naturalWidth ? logoSize + gap : 0) + textW;
        let x = Math.round((APP_STORY_W - blockW) / 2);
        /* Centre in footer strip (snapshot ends above footTop thanks to SNAPSHOT_FOOT_GAP). */
        const yMid = Math.round(footTop + APP_STORY_FOOTER_H / 2);
        if (logo && logo.naturalWidth) {
          ctx.drawImage(logo, x, Math.round(yMid - logoSize / 2), logoSize, logoSize);
          x += logoSize + gap;
        }
        ctx.fillText(label, x, yMid);
        ctx.restore();
      }

      if (sw <= 0 || sh <= 0) {
        await stampFooter();
        return out;
      }
      const slotAspect = maxW / maxH;
      const snapAspect = sw / sh;
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      /**
       * Narrow/tall snapshot: scale to full usable width; if too tall, crop from the bottom only so the
       * region title at the top of the capture is never clipped (center-crop used to cut "Semenanjung").
       * Wider snapshot: uniform "contain" scale — never side-crop (that was clipping titles and prices).
       */
      if (snapAspect < slotAspect) {
        const sc = maxW / sw;
        const dh = sh * sc;
        if (dh > maxH) {
          const srcH = maxH / sc;
          const sy = 0;
          ctx.drawImage(snapCanvas, 0, sy, sw, srcH, px, contentPad, maxW, maxH);
        } else {
          const dhR = Math.round(dh);
          const dy = Math.round(contentPad + (maxH - dhR) / 2);
          ctx.drawImage(snapCanvas, 0, 0, sw, sh, px, dy, maxW, dhR);
        }
        await stampFooter();
        return out;
      }
      const sc = Math.min(maxW / sw, maxH / sh);
      const dw = Math.round(sw * sc);
      const dh = Math.round(sh * sc);
      const dx = Math.round((APP_STORY_W - dw) / 2);
      const dy = Math.round(contentPad + (maxH - dh) / 2);
      ctx.drawImage(snapCanvas, 0, 0, sw, sh, dx, dy, dw, dh);
      await stampFooter();
      return out;
    }

    async function exportCardAsInstagramStory(cardId) {
      const html2canvas = window.html2canvas;
      if (typeof html2canvas !== 'function') throw new Error('html2canvas missing');

      const exportBg = cssVar('--surface', '#ffffff');
      const h2cOpts = {
        scale: 2,
        backgroundColor: exportBg,
        logging: false,
        useCORS: true,
        allowTaint: true,
      };
      const stripExports = (root) => {
        root?.querySelectorAll('.card-export').forEach((n) => n.remove());
      };

      /** Chart.js only draws on the live canvas — copy pixels onto a cloned card for html2canvas. */
      function copyCanvasesFromLiveToClone(liveRoot, cloneRoot) {
        if (!liveRoot || !cloneRoot) return;
        const liveCanvases = liveRoot.querySelectorAll('canvas');
        const cloneCanvases = cloneRoot.querySelectorAll('canvas');
        const n = Math.min(liveCanvases.length, cloneCanvases.length);
        for (let i = 0; i < n; i++) {
          const src = liveCanvases[i];
          const dst = cloneCanvases[i];
          try {
            dst.width = src.width;
            dst.height = src.height;
            dst.getContext('2d').drawImage(src, 0, 0);
          } catch (_) {}
        }
      }

      function stripIdsForExport(root) {
        root?.querySelectorAll('[id]').forEach((el) => el.removeAttribute('id'));
      }

      let snap;
      if (cardId === 'card-highlights') {
        const histLive = document.getElementById('card-history');
        const liveCw = histLive?.querySelector('.chart-wrap');
        const prevH = liveCw ? liveCw.style.height : '';
        const prevMin = liveCw ? liveCw.style.minHeight : '';
        try {
          if (liveCw) {
            liveCw.style.height = `${APP_EXPORT_CHART_WRAP_HEIGHT}px`;
            liveCw.style.minHeight = `${APP_EXPORT_CHART_WRAP_HEIGHT}px`;
            try {
              RIGHT_CHART?.resize();
            } catch (_) {}
            await new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));
          }
          const wrap = document.createElement('div');
          wrap.style.cssText =
            `position:fixed;left:-16000px;top:0;width:${APP_EXPORT_CAPTURE_W}px;max-width:100%;background:${exportBg};padding:36px 16px 48px;box-sizing:border-box;display:flex;flex-direction:column;gap:22px;align-items:stretch;`;
          /* Off-sheet clones are not under .sheet — vars fall back to 34px vs 14px pad and misalign the title. */
          wrap.style.setProperty('--sheet-gutter-x', '0px');
          wrap.style.setProperty('--sheet-scroll-pad-left', '0px');
          wrap.style.setProperty('--sheet-card-pad-x', '14px');
          wrap.style.setProperty('--sheet-text-inset-left', '14px');
          const st = document.getElementById('sheet-region-sticky')?.cloneNode(true);
          const hi = document.getElementById('card-highlights')?.cloneNode(true);
          const hist = histLive?.cloneNode(true);
          stripExports(st);
          stripExports(hi);
          stripExports(hist);
          stripIdsForExport(st);
          stripIdsForExport(hi);
          stripIdsForExport(hist);
          copyCanvasesFromLiveToClone(histLive, hist);
          if (st) wrap.appendChild(st);
          if (hi) wrap.appendChild(hi);
          if (hist) wrap.appendChild(hist);
          document.body.appendChild(wrap);
          try {
            snap = await html2canvas(wrap, h2cOpts);
          } finally {
            wrap.remove();
          }
        } finally {
          if (liveCw) {
            liveCw.style.height = prevH;
            liveCw.style.minHeight = prevMin;
            try {
              RIGHT_CHART?.resize();
            } catch (_) {}
          }
        }
      } else if (cardId === 'card-history') {
        const live = document.getElementById('card-history');
        if (!live) return;
        live.scrollIntoView({ block: 'nearest', behavior: 'auto' });
        await new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));
        snap = await html2canvas(live, {
          ...h2cOpts,
          ignoreElements: (el) => el.classList && el.classList.contains('card-export'),
        });
      } else return;

      if (!snap) return;
      const story = await appComposeStoryPng(snap);
      const blob = await new Promise((resolve, reject) => {
        story.toBlob((b) => (b ? resolve(b) : reject(new Error('Story export failed'))), 'image/png', 0.95);
      });
      const slug = appExportSlug(cardId);
      openExportStoryModal(blob, `petrolprice-${slug}-story.png`);
    }

    function initCardExport() {
      const sheet = document.getElementById('sheet');
      if (!sheet) return;
      sheet.addEventListener('click', async (e) => {
        const btn = e.target.closest('.card-export');
        if (!btn || !sheet.contains(btn)) return;
        e.preventDefault();
        e.stopPropagation();
        const card = btn.closest('.card');
        const cardId = card?.id;
        if (!cardId) return;
        if (typeof window.html2canvas !== 'function') return;
        btn.disabled = true;
        try {
          await exportCardAsInstagramStory(cardId);
        } catch (err) {
          console.error(err);
        } finally {
          btn.disabled = false;
        }
      });
    }

    /* Settings sheet init is wired below via initAppSettingsSheet() from assets/app-settings.js. */

    // Init
    initSheet();
    initSingaporeProviderMenu();
    initHongKongProviderMenu();
    void initSearch();
    initAppSettingsSheet({
      onUsdToggle: function () {
        refreshHighlights(selected).catch(function () {});
      },
    });
    initExportStoryModal();
    initCardExport();

    (function initAppColorScheme() {
      const mq = window.matchMedia('(prefers-color-scheme: dark)');
      function syncThemeMeta() {
        const meta = document.getElementById('meta-theme-color');
        if (meta) meta.setAttribute('content', mq.matches ? '#1a1a1a' : '#ff6a00');
      }
      function onSchemeChange() {
        syncThemeMeta();
        refreshHighlights(selected).catch(() => {});
      }
      syncThemeMeta();
      mq.addEventListener('change', onSchemeChange);
    })();

    /**
     * Cards-only embed mode: when `?cards=1` is set in the URL, hide everything
     * except the details sheet so this page can be iframed into the dashboard's
     * row pull-up. The body class is toggled before `load` so CSS hides the map
     * without a flash. `?country=<id>` selects the initial region.
     */
    const __APP_CARDS_ONLY = (function () {
      try {
        const sp = new URLSearchParams(window.location.search);
        return sp.get('cards') === '1';
      } catch (_) {
        return false;
      }
    })();
    if (__APP_CARDS_ONLY) {
      try { document.documentElement.classList.add('app-cards-only-root'); } catch (_) {}
      const applyBodyClass = function () {
        if (document.body) document.body.classList.add('app-cards-only');
      };
      if (document.body) applyBodyClass();
      else document.addEventListener('DOMContentLoaded', applyBodyClass, { once: true });
    }

    function __appReadInitialCidFromQuery() {
      try {
        const sp = new URLSearchParams(window.location.search);
        const raw = sp.get('country');
        if (raw == null || raw === '') return null;
        const id = +raw;
        if (
          Number.isFinite(id) &&
          typeof COUNTRIES !== 'undefined' &&
          COUNTRIES[id] &&
          !COUNTRIES[id].searchGroupOnly
        ) {
          return id;
        }
      } catch (_) {}
      return null;
    }

    /** Cards-only iframe: set headline from `?country=` before `load` / currency fetch
       so we never show empty or Malaysia placeholder while waiting for `setSelected`. */
    function syncCardsOnlyPlaceholderHeadingsFromQuery() {
      if (!__APP_CARDS_ONLY) return;
      const id = __appReadInitialCidFromQuery();
      const titleEl = document.getElementById('hi-title');
      const chartKicker = document.getElementById('chart-kicker');
      if (id == null || typeof COUNTRIES === 'undefined' || !COUNTRIES[id]) {
        if (titleEl) titleEl.textContent = '';
        if (chartKicker) chartKicker.textContent = '';
        return;
      }
      const nm = COUNTRIES[id].name || '';
      if (titleEl) titleEl.textContent = nm;
      if (chartKicker) chartKicker.textContent = nm ? `${nm} petrol prices history` : '';
    }
    syncCardsOnlyPlaceholderHeadingsFromQuery();

    window.addEventListener('load', () => {
      initChart();
      if (!__APP_CARDS_ONLY) initMap();
      void loadAppCurrencyRates()
        .catch(() => {})
        .then(() => {
          let initialCid = 458;
          const fromQuery = __appReadInitialCidFromQuery();
          if (fromQuery != null) {
            initialCid = fromQuery;
          } else {
            try {
              const stored = localStorage.getItem('app_selected_country');
              if (stored != null && stored !== '') {
                const id = +stored;
                if (
                  Number.isFinite(id) &&
                  typeof COUNTRIES !== 'undefined' &&
                  COUNTRIES[id] &&
                  !COUNTRIES[id].searchGroupOnly
                ) {
                  initialCid = id;
                }
              }
              localStorage.removeItem('app_selected_country');
            } catch (_) {}
          }
          setSelected(initialCid, { syncSearchBar: false });
        });
    });
  </script>
  <script src="assets/app-liquid-nav-drag.js?v=85"></script>
</body>
