        else if (cid === 360) rows = ID_ROWS ? terminalIndonesiaSortedCityRows() : null;

        const idx = (typeof getPagerIndex === 'function') ? getPagerIndex(cid) : null;
        const hasRows = Array.isArray(rows) && rows.length > 0;
        if (!hasRows || idx == null) {
          prevBtn.disabled = false;
          nextBtn.disabled = false;
          return;
        }

        const seriesLen = rows.filter(r => r?.date).length || rows.length;
        prevBtn.disabled = idx <= 0;
        // next = newer (towards latest)
        nextBtn.disabled = idx >= (seriesLen - 1);
      }

      // Expose so data render can re-sync after async fetch
      window.__terminalSyncPager = syncPager;

      prevBtn.addEventListener('click', async () => {
        const cid = +window.__terminalSelectedCountryId;
        if (!PAGER_COUNTRIES.has(cid)) return;
        const seriesAsc = await terminalPagerSeries(cid);
        const seriesLen = seriesAsc.filter(r => r?.date).length || seriesAsc.length;
        if (!seriesLen) return;
        let idx = getPagerIndex(cid);
        if (idx == null) idx = seriesLen - 1;
        idx = Math.max(0, idx - 1); // older
        setPagerIndex(cid, idx);
        await updateRightPanelForCountry(cid);
        syncPager();
      });

      nextBtn.addEventListener('click', async () => {
        const cid = +window.__terminalSelectedCountryId;
        if (!PAGER_COUNTRIES.has(cid)) return;
        const seriesAsc = await terminalPagerSeries(cid);
        const seriesLen = seriesAsc.filter(r => r?.date).length || seriesAsc.length;
        if (!seriesLen) return;
        let idx = getPagerIndex(cid);
        if (idx == null) idx = seriesLen - 1;
        idx = Math.min(seriesLen - 1, idx + 1); // newer
        setPagerIndex(cid, idx);
        await updateRightPanelForCountry(cid);
        syncPager();
      });

      // Hook into existing selection updates
      const origSetLeftOverview = setLeftOverview;
      setLeftOverview = function patchedSetLeftOverview(countryId) {
        origSetLeftOverview(countryId);
        // update button state after panel update kicks off
        setTimeout(syncPager, 0);
      };

      // Initial state
      syncPager();
    })();

    const TERMINAL_MY_REGION_CYCLE = ['Semenanjung', 'SabahSarawak'];
    function terminalCycleMalaysiaRegion(step) {
      const i = TERMINAL_MY_REGION_CYCLE.indexOf(MY_REGION);
      const base = i >= 0 ? i : 0;
      const n = (base + step + TERMINAL_MY_REGION_CYCLE.length) % TERMINAL_MY_REGION_CYCLE.length;
      setMalaysiaRegion(TERMINAL_MY_REGION_CYCLE[n]);
      if (typeof window.__terminalZoomToCountry === 'function') window.__terminalZoomToCountry(458, true);
    }
    function terminalCycleIndonesiaCity(step) {
      const cities = Object.keys(TERMINAL_ID_CITY_LONLAT).sort((a, b) => a.localeCompare(b));
      if (!cities.length) return;
      let cur = '';
      try { cur = localStorage.getItem('terminal_id_city') || ''; } catch (_) {}
      let i = cities.indexOf(cur);
      if (i < 0) i = cities.indexOf('Jakarta Pusat');
      if (i < 0) i = 0;
      const n = (i + step + cities.length) % cities.length;
      try { localStorage.setItem('terminal_id_city', cities[n]); } catch (_) {}
      delete TERMINAL_PAGER_INDEX[360];
      updateRightPanelForCountry(360).catch(() => {});
      if (typeof window.__terminalSyncPager === 'function') window.__terminalSyncPager();
      if (typeof window.__terminalZoomToCountry === 'function') window.__terminalZoomToCountry(360, true);
    }

    // Keyboard: ↑/↓ = Malaysia region / Indonesia city (+ map); ←/→ = date pager; SG/BN ↑/↓ = zoom; [ ] = date pager
    (function initTerminalKeyboardShortcuts() {
      function isTypingTarget(el) {
        if (!el || el.nodeType !== 1) return false;
        if (el.isContentEditable) return true;
        const tag = (el.tagName || '').toLowerCase();
        if (tag === 'input' || tag === 'textarea' || tag === 'select') return true;
        return !!el.closest?.('[contenteditable="true"]');
      }

      function clickPagerPrev() {
        const prev = document.getElementById('pager-prev');
        if (!prev || prev.style.display === 'none' || prev.disabled) return;
        prev.click();
      }
      function clickPagerNext() {
        const next = document.getElementById('pager-next');
        if (!next || next.style.display === 'none' || next.disabled) return;
        next.click();
      }

      document.addEventListener('keydown', (e) => {
        if (e.defaultPrevented) return;
        if (e.metaKey || e.ctrlKey || e.altKey) return;
        if (isTypingTarget(e.target)) return;

        const cid = +window.__terminalSelectedCountryId;

        if (e.key === 'ArrowUp') {
          if (cid === 458) {
            e.preventDefault();
            terminalCycleMalaysiaRegion(-1);
            return;
          }
          if (cid === 360) {
            e.preventDefault();
            terminalCycleIndonesiaCity(-1);
            return;
          }
          const z = document.getElementById('zoom-in');
          if (!z || typeof z.onclick !== 'function') return;
          e.preventDefault();
          z.click();
          return;
        }
        if (e.key === 'ArrowDown') {
          if (cid === 458) {
            e.preventDefault();
            terminalCycleMalaysiaRegion(1);
            return;
          }
          if (cid === 360) {
            e.preventDefault();
            terminalCycleIndonesiaCity(1);
            return;
          }
          const z = document.getElementById('zoom-out');
          if (!z || typeof z.onclick !== 'function') return;
          e.preventDefault();
          z.click();
          return;
        }
        if (e.key === '[' || e.key === 'BracketLeft') {
          e.preventDefault();
          clickPagerPrev();
          return;
        }
        if (e.key === ']' || e.key === 'BracketRight') {
          e.preventDefault();
          clickPagerNext();
          return;
        }
        if (e.key === 'ArrowLeft') {
          const prev = document.getElementById('pager-prev');
          if (!prev || prev.style.display === 'none' || prev.disabled) return;
          e.preventDefault();
          prev.click();
          return;
        }
        if (e.key === 'ArrowRight') {
          const next = document.getElementById('pager-next');
          if (!next || next.style.display === 'none' || next.disabled) return;
          e.preventDefault();
          next.click();
          return;
        }
      });
    })();

    window.addEventListener('resize', () => {
      // cheap debounce
      clearTimeout(window.__termMapT);
      window.__termMapT = setTimeout(renderTerminalMap, 120);
    });

    // Resizable panels (left/right)
    (function initResizers() {
      const root = document.documentElement;
      const leftKey = 'terminal_leftW';
      const rightKey = 'terminal_rightW';

      function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, n)); }
      function px(n) { return `${Math.round(n)}px`; }

      function applyScales(leftW, rightW) {
        // scale headings smoothly with width
        const leftScale = clamp(leftW / 280, 0.82, 1.22);
        const rightScale = clamp(rightW / 420, 0.82, 1.22);
        root.style.setProperty('--leftScale', leftScale.toFixed(3));
        root.style.setProperty('--rightScale', rightScale.toFixed(3));
      }

      function getNumVar(name, fallback) {
        const v = getComputedStyle(root).getPropertyValue(name).trim();
        const n = parseFloat(v.replace('px', ''));
        return Number.isFinite(n) ? n : fallback;
      }

      // Restore persisted widths (desktop only)
      try {
        const savedLeft = parseFloat(localStorage.getItem(leftKey) || '');
        const savedRight = parseFloat(localStorage.getItem(rightKey) || '');
        if (Number.isFinite(savedLeft)) root.style.setProperty('--leftW', px(savedLeft));
        if (Number.isFinite(savedRight)) root.style.setProperty('--rightW', px(savedRight));
      } catch (_) {}

      function currentSizes() {
        const railW = getNumVar('--railW', 88);
        const leftW = getNumVar('--leftW', 280);
        const rightW = getNumVar('--rightW', 420);
        return { railW, leftW, rightW };
      }

      function bounds() {
        const W = window.innerWidth;
        const { railW } = currentSizes();
        return {
          leftMin: 220,
          leftMax: Math.max(260, Math.min(520, W - railW - 360)),
          rightMin: 320,
          rightMax: Math.max(360, Math.min(560, W - railW - 260)),
        };
      }

      function setLeftW(w) {
        const b = bounds();
        const x = clamp(w, b.leftMin, b.leftMax);
        root.style.setProperty('--leftW', px(x));
        applyScales(x, currentSizes().rightW);
        try { localStorage.setItem(leftKey, String(x)); } catch (_) {}
      }

      function setRightW(w) {
        const b = bounds();
        const x = clamp(w, b.rightMin, b.rightMax);
        root.style.setProperty('--rightW', px(x));
        applyScales(currentSizes().leftW, x);
        try { localStorage.setItem(rightKey, String(x)); } catch (_) {}
      }

      // Initial scale compute
      applyScales(currentSizes().leftW, currentSizes().rightW);

      function drag(gutterEl, which) {
        let startX = 0;
        let startLeft = 0;
        let startRight = 0;

        const onMove = (e) => {
          const x = (e.touches ? e.touches[0].clientX : e.clientX);
          const dx = x - startX;
          if (which === 'left') setLeftW(startLeft + dx);
          if (which === 'right') setRightW(startRight - dx);
        };
        const onUp = () => {
          document.body.classList.remove('resizing');
          gutterEl.classList.remove('dragging');
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
          window.removeEventListener('touchmove', onMove);
          window.removeEventListener('touchend', onUp);
        };
        const onDown = (e) => {
          const x = (e.touches ? e.touches[0].clientX : e.clientX);
          startX = x;
          const s = currentSizes();
          startLeft = s.leftW;
          startRight = s.rightW;
          document.body.classList.add('resizing');
          gutterEl.classList.add('dragging');
          window.addEventListener('mousemove', onMove);
          window.addEventListener('mouseup', onUp);
          window.addEventListener('touchmove', onMove, { passive: true });
          window.addEventListener('touchend', onUp);
        };

        gutterEl.addEventListener('mousedown', onDown);
        gutterEl.addEventListener('touchstart', onDown, { passive: true });

        // Keyboard resizing (accessibility)
        gutterEl.addEventListener('keydown', (e) => {
          const step = e.shiftKey ? 40 : 16;
          if (which === 'left') {
            if (e.key === 'ArrowLeft') setLeftW(currentSizes().leftW - step);
            if (e.key === 'ArrowRight') setLeftW(currentSizes().leftW + step);
          }
          if (which === 'right') {
            if (e.key === 'ArrowLeft') setRightW(currentSizes().rightW + step);
            if (e.key === 'ArrowRight') setRightW(currentSizes().rightW - step);
          }
        });
      }

      const gl = document.getElementById('gutter-left');
      const gr = document.getElementById('gutter-right');
      if (gl) drag(gl, 'left');
      if (gr) drag(gr, 'right');
    })();

    // Collapse/expand left panel
    (function initLeftPanelToggle() {
      const btnBorder = document.getElementById('left-panel-toggle');
      if (!btnBorder) return;

      const storageKey = 'terminal_leftCollapsed';
      const body = document.body;
      const mqMobile = window.matchMedia('(max-width: 720px)');

      function positionBtn() {
        // Keep it on the left panel border, slightly lower than center (less distracting).
        const isCollapsed = body.classList.contains('left-collapsed');
        const leftEl = document.querySelector('aside.left');
        const mapTopbar = document.querySelector('.map-topbar');

        const yTarget = () => {
          if (leftEl) {
            const r = leftEl.getBoundingClientRect();
            // 0.65 down the panel looks calmer than dead-center.
            return Math.round(r.top + r.height * 0.65);
          }
          return Math.round(window.innerHeight * 0.65);
        };

        const clampY = (y) => {
          const padTop = 76;
          const padBottom = 24;
          const lo = padTop;
          const hi = Math.max(lo, window.innerHeight - padBottom);
          return Math.max(lo, Math.min(hi, y));
        };

        if (isCollapsed) {
          // Dock to the map edge; avoid the search topbar area.
          const fallback = yTarget();
          const top = mapTopbar
            ? Math.round(mapTopbar.getBoundingClientRect().top + 140) /* below search */
            : fallback;
          const railW = getComputedStyle(document.documentElement).getPropertyValue('--railW').trim() || '0px';
          btnBorder.style.left = `calc(${railW} + 12px)`;
          btnBorder.style.top = `${clampY(top)}px`;
          btnBorder.style.transform = 'translate(0, -50%)';
          return;
        }

        if (leftEl) {
          const r = leftEl.getBoundingClientRect();
          btnBorder.style.left = `${Math.round(r.right)}px`;
          btnBorder.style.top = `${clampY(yTarget())}px`;
          btnBorder.style.transform = 'translate(-50%, -50%)';
          return;
        }

        btnBorder.style.left = '12px';
        btnBorder.style.top = `${clampY(yTarget())}px`;
        btnBorder.style.transform = 'translate(0, -50%)';
      }

      function setCollapsed(next) {
        body.classList.toggle('left-collapsed', !!next);
        const expanded = !next;
        if (btnBorder) btnBorder.setAttribute('aria-expanded', String(expanded));

        // Flip chevron direction (border button points left when open, right when closed)
        const pathBorder = btnBorder ? btnBorder.querySelector('path') : null;
        if (pathBorder) pathBorder.setAttribute('d', next ? 'M9 18l6-6-6-6' : 'M15 18l-6-6 6-6');

        try { localStorage.setItem(storageKey, next ? '1' : '0'); } catch (_) {}

        // If the map is using fixed viewBox based on container size, re-render once.
        clearTimeout(window.__termMapT2);
        window.__termMapT2 = setTimeout(() => {
          try { renderTerminalMap(); } catch (_) {}
        }, 80);

        // Reposition toggle after layout settles
        clearTimeout(window.__termPosT);
        window.__termPosT = setTimeout(positionBtn, 60);
      }

      // Restore
      try { setCollapsed(localStorage.getItem(storageKey) === '1'); } catch (_) {}

      // On mobile we don't show the left panel; keep the toggle out of the way.
      function syncMobileVisibility() {
        if (mqMobile.matches) {
          btnBorder.style.display = 'none';
        } else {
          btnBorder.style.display = '';
          positionBtn();
        }
      }
      syncMobileVisibility();
      mqMobile.addEventListener?.('change', syncMobileVisibility);

      function bind(el) {
        if (!el) return;
        el.addEventListener('click', () => {
          setCollapsed(!body.classList.contains('left-collapsed'));
        });
        el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            setCollapsed(!body.classList.contains('left-collapsed'));
          }
        });
      }
      bind(btnBorder);

      // Initial + responsive repositioning
      positionBtn();
      window.addEventListener('resize', () => {
        clearTimeout(window.__termPosT);
        window.__termPosT = setTimeout(positionBtn, 60);
      });
    })();

    // Mobile bottom-sheet UI removed (desktop-only terminal).
  </script>
</body>
</html>
