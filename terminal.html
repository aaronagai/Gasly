          <div class="mini-bars" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
          </div>

    <div class="gutter gutter-left" id="gutter-left" role="separator" aria-label="Resize left panel" aria-orientation="vertical" tabindex="0"></div>

    <main class="main" aria-label="Country map">
      <div class="map-topbar" aria-label="Search and panel controls">
        <a href="./index.html" class="map-topbar-wordmark site-wordmark">petrolprice.xyz</a>
        <div class="search" aria-label="Search">

        </div>

    <div class="gutter gutter-right" id="gutter-right" role="separator" aria-label="Resize right panel" aria-orientation="vertical" tabindex="0"></div>

    <aside class="right" aria-label="Details">
      <div class="chart">
        <div class="small" id="right-kicker">Fuel prices</div>

        <div class="toolbar">
          <span class="tag" id="right-subtag" style="background:transparent;border-color:transparent;padding:0;color:var(--term-chart-small);font-family:var(--font);font-weight:700;letter-spacing:0.02em;">Live</span>
        </div>

        <div class="hint" id="info-sub">Click a country to compare</div>

          <div class="kv"><span class="k">Status</span><span class="v">Live</span></div>
          <div class="kv"><span class="k">Tip</span><span class="v">↑/↓ region or city · ←/→ date · [ ] date · +/− map zoom</span></div>
        </div>
        <div class="pager" aria-label="Highlights date history">
          <button type="button" id="pager-prev" aria-label="Previous">&lt;</button>
          <button type="button" id="pager-next" aria-label="Next">&gt;</button>

      </div>

  <!-- Tooltip -->
  <div id="tooltip" aria-hidden="true">
    <span class="tt-country" id="tt-country"></span>
    <span class="tt-status"  id="tt-status"></span>
  </div>

  <!-- Malaysia city dropdown -->
  <div id="my-city-menu" class="city-menu" role="listbox" aria-label="Select Malaysia city"></div>

  <script>
    // COUNTRIES, COUNTRY_OVERVIEW, ID_CITY_LONLAT, MY_REGIONS — from config.js
    // ensureMalaysiaRows, ensureSheetRows, cssVar, withAlpha, takeLastN, asNum, buildChartSeries — from utils.js

    let MY_INDEX = null; // selected week index in ascending series
    // Per-country selected index for the highlights pager (all non-Malaysia).
    const PAGER_INDEX = Object.create(null);
    const LOADED_ROWS = new Map();
    let _idAllRows = null;
    function getPagerIndex(countryId) {
      if (+countryId === 458) return MY_INDEX;
      return PAGER_INDEX[+countryId] ?? null;
    }
    function setPagerIndex(countryId, idx) {
      if (+countryId === 458) { MY_INDEX = idx; return; }
      PAGER_INDEX[+countryId] = idx;
    }

    let MY_REGION = localStorage.getItem('terminal_my_region') || 'Semenanjung';

    function myIsEastMalaysia(regionKey) {
      return regionKey === 'SabahSarawak';
    }
    function setMalaysiaRegion(regionKey) {
      regionKey = String(regionKey || '').trim();
      if (!regionKey) return;
      MY_REGION = regionKey;
      try { localStorage.setItem('terminal_my_region', regionKey); } catch (_) {}
      if (window.__terminalSelectedCountryId === 458) {
        const hiTitle = document.getElementById('info-title');
        const label = (MY_REGIONS.find(r => r.key === MY_REGION)?.label) || MY_REGION;
        if (hiTitle) hiTitle.textContent = `${label}`;
        updateRightPanelForCountry(458).catch(() => {});
      }
    }

    async function ensureSingaporeRows() { return ensureSheetRows(SG_SHEET_URL); }
    async function ensureBruneiRows()    { return ensureSheetRows(BN_SHEET_URL); }
    async function ensureIndonesiaRows() { return ensureSheetRows(ID_SHEET_URL); }

    /** Sorted rows for the currently selected Indonesia city (for highlights pager). */
    function indonesiaSortedCityRows() {
      if (!_idAllRows) return [];
      const city = localStorage.getItem('terminal_id_city') || 'Jakarta Pusat';
      return sortRowsByDate(_idAllRows.filter(r => r.city === city));
    }

    async function pagerSeries(cid) {
      if (cid === 458) return sortRowsByDate((await ensureMalaysiaRows()) || []);
      if (cid === 702) return sortRowsByDate((await ensureSingaporeRows()) || []);
      if (cid === 96) return sortRowsByDate((await ensureBruneiRows()) || []);
      if (cid === 360) {
        await ensureIndonesiaRows();
        return indonesiaSortedCityRows();
      }
      return [];
    }

    /* Matches app.js / country pages — synced via localStorage key "currency" */
    function isTerminalUsd() {
      return (localStorage.getItem('currency') || 'local') === 'usd';
    }
    function fmtTerminalPerL(localSym, n, decimals = 2) {
      if (!isFinite(n)) return '—';
      const rate = USD_RATES[localSym];
      if (isTerminalUsd() && rate != null) {
        return `USD ${(n * rate).toFixed(3)}/L`;
      }
      return fmtPerL(localSym, n, decimals);
    }
    function fmtIDR(v) {
      if (!isFinite(v)) return '—';
      if (isTerminalUsd()) {
        return `USD ${(v * USD_RATES.IDR).toFixed(4)}/L`;
      }
      return `IDR ${Math.round(v).toLocaleString('en-US')}/L`;
    }

    function setRightPanel({ kicker, titleA, titleB, subtag, infoTitle, infoSub, infoLines }) {
      window.__terminalRightPanelState = { kicker, titleA, titleB, subtag, infoTitle, infoSub, infoLines };
      const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
      set('right-kicker', kicker);
      const rt = document.getElementById('right-title');
      if (rt) rt.innerHTML = `${titleA}<br/>${titleB}`;
      const st = document.getElementById('right-subtag');
      if (st) st.innerHTML = subtag || '';

      set('info-title', infoTitle);
      set('info-sub', infoSub);
      const lines = document.getElementById('info-lines');
      if (lines && Array.isArray(infoLines)) {
        // Animate numeric values in highlights when they change.
        const numToken = /(-?\d[\d,]*\.?\d*)/;
        const parseNumText = (text) => {
          const s = String(text ?? '').trim();
          const m = s.match(numToken);
          if (!m) return null;
          const raw = m[1];
          const n = parseFloat(raw.replace(/,/g, ''));
          if (!Number.isFinite(n)) return null;
          const idx = m.index ?? s.indexOf(raw);
          const prefix = s.slice(0, idx);
          const suffix = s.slice(idx + raw.length);
          const dec = (raw.split('.')[1] || '').length;
          return { n, prefix, suffix, dec };
        };
        const fmt = (n, dec) => {
          try {
            return new Intl.NumberFormat(undefined, {
              minimumFractionDigits: dec,
              maximumFractionDigits: dec,
            }).format(n);
          } catch (_) {
            return n.toFixed(dec);
          }
        };
        const animateNumber = (el, from, to, dec, prefix, suffix) => {
          const duration = 520;
          const t0 = performance.now();
          const ease = (t) => 1 - Math.pow(1 - t, 3); // easeOutCubic

          const step = (now) => {
            const p = Math.min(1, (now - t0) / duration);
            const v = from + (to - from) * ease(p);
            el.textContent = `${prefix}${fmt(v, dec)}${suffix}`;
            if (p < 1) requestAnimationFrame(step);
          };
          requestAnimationFrame(step);
        };

        // Build (or reuse) rows keyed by label.
        const existing = new Map();
        lines.querySelectorAll('.kv').forEach(row => {
          const kEl = row.querySelector('.k');
          const vEl = row.querySelector('.v');
          const key = kEl ? kEl.textContent : null;
          if (key && vEl) existing.set(key, { row, vEl });
        });

        // Remove rows that no longer exist.
        const nextKeys = new Set(infoLines.map(([k]) => String(k)));
        existing.forEach(({ row }, key) => {
          if (!nextKeys.has(key)) row.remove();
        });

        // Upsert rows in order.
        for (const [kRaw, vRaw] of infoLines) {
          const k = String(kRaw);
          const v = String(vRaw);
          let row = existing.get(k)?.row || null;
          let vEl = existing.get(k)?.vEl || null;

          if (!row || !vEl) {
            row = document.createElement('div');
            row.className = 'kv';
            const kEl = document.createElement('span');
            kEl.className = 'k';
            kEl.textContent = k;
            vEl = document.createElement('span');
            vEl.className = 'v';
            const next = parseNumText(v);
            if (next) {
              // Animate in on first render too (e.g. switching countries/cities).
              vEl.textContent = `${next.prefix}${fmt(0, next.dec)}${next.suffix}`;
              vEl.dataset.num = String(next.n);
              // Start animation next frame so layout is stable.
              requestAnimationFrame(() => animateNumber(vEl, 0, next.n, next.dec, next.prefix, next.suffix));
            } else {
              vEl.textContent = v;
            }
            row.appendChild(kEl);
            row.appendChild(vEl);
            lines.appendChild(row);
            existing.set(k, { row, vEl });
            continue;
          }

          // Update value with optional counting animation.
          const prev = parseNumText(vEl.textContent);
          const next = parseNumText(v);
          if (prev && next && prev.n !== next.n && prev.prefix === next.prefix && prev.suffix === next.suffix) {
            vEl.dataset.num = String(next.n);
            animateNumber(vEl, prev.n, next.n, next.dec, next.prefix, next.suffix);
          } else {
            vEl.textContent = v;
            const n = next?.n;
            if (Number.isFinite(n)) vEl.dataset.num = String(n);
            else delete vEl.dataset.num;
          }
        }
      }
    }

    // Right-panel chart
    function chartThemeOptions() {
      const tick = cssVar('--term-chart-tick', 'rgba(0,0,0,0.45)');
      return {
        tooltip: {
          backgroundColor: cssVar('--term-chart-tooltip-bg', 'rgba(255,255,255,0.96)'),
          borderColor: cssVar('--term-chart-tooltip-border', 'rgba(0,0,0,0.12)'),
          borderWidth: 1,
          titleColor: cssVar('--term-chart-tooltip-title', 'rgba(0,0,0,0.9)'),
          bodyColor: cssVar('--term-chart-tooltip-body', 'rgba(0,0,0,0.75)'),
          titleFont: { family: 'Inter', size: 12, weight: '700' },
          bodyFont: { family: 'Inter', size: 12, weight: '600' },
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { color: tick, font: { family: 'Inter', size: 11 }, maxRotation: 0 },
          },
          y: {
            grid: { color: cssVar('--term-chart-grid', 'rgba(0,0,0,0.06)') },
            ticks: { color: tick, font: { family: 'Inter', size: 11 } },
          },
        },
      };
    }

    function applyChartTheme(chart) {
      if (!chart?.options?.plugins?.tooltip || !chart?.options?.scales) return;
      const t = chartThemeOptions();
      Object.assign(chart.options.plugins.tooltip, t.tooltip);
      chart.options.scales.x.grid = { ...chart.options.scales.x.grid, ...t.scales.x.grid };
      chart.options.scales.x.ticks = { ...chart.options.scales.x.ticks, ...t.scales.x.ticks };
      chart.options.scales.y.grid = { ...chart.options.scales.y.grid, ...t.scales.y.grid };
      chart.options.scales.y.ticks = { ...chart.options.scales.y.ticks, ...t.scales.y.ticks };
    }

    let RIGHT_CHART = null;
    let RIGHT_CHART_COUNTRY = null;
    let RIGHT_CHART_MY_DIESEL_KEY = null;
    function destroyRightChart() {
      if (RIGHT_CHART) {
        RIGHT_CHART.destroy();
        RIGHT_CHART = null;
      }
      RIGHT_CHART_COUNTRY = null;
      RIGHT_CHART_MY_DIESEL_KEY = null;
      window.__terminalIndonesiaChartKey = null;
    }

    function renderRightChart({ labels, datasets, countryId, animate = true }) {
      window.__terminalRightChartState = { labels, datasets, countryId };
      const cv = document.getElementById('right-chart');
      if (!cv || !window.Chart) return;

      const ctx = cv.getContext('2d');
      const mkFill = (stroke) => {
        const grad = ctx.createLinearGradient(0, 0, 0, cv.height || 220);
        grad.addColorStop(0, withAlpha(stroke, 0.18));
        grad.addColorStop(1, withAlpha(stroke, 0));
        return grad;
      };

      const CHART_CCY = { 360: 'IDR', 458: 'MYR', 702: 'SGD', 96: 'BND' };
      const ccyKey = CHART_CCY[countryId];
      const usdMult =
        isTerminalUsd() && ccyKey && USD_RATES[ccyKey] != null
          ? USD_RATES[ccyKey]
          : 1;

      const nextDs = (datasets || []).map(ds => ({
        label: ds.label,
        data: (ds.data || []).map(v =>
          v == null || !Number.isFinite(v) ? v : v * usdMult
        ),
        borderColor: ds.color,
        backgroundColor: mkFill(ds.color),
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 4,
        pointHoverBackgroundColor: ds.color,
        tension: 0.55,
        cubicInterpolationMode: 'default',
        fill: true,
        spanGaps: true,
      }));

      const canUpdateInPlace =
        !!RIGHT_CHART &&
        (RIGHT_CHART_COUNTRY === (countryId ?? null)) &&
        Array.isArray(RIGHT_CHART.data?.datasets) &&
        RIGHT_CHART.data.datasets.length === nextDs.length;

      if (canUpdateInPlace) {
        RIGHT_CHART.data.labels = labels;
        nextDs.forEach((ds, i) => {
          RIGHT_CHART.data.datasets[i] = { ...RIGHT_CHART.data.datasets[i], ...ds };
        });
        applyChartTheme(RIGHT_CHART);

        if (animate) {
          const prevAnim = RIGHT_CHART.options.animation;
          RIGHT_CHART.options.animation = { duration: 650, easing: 'easeOutCubic' };
          RIGHT_CHART.update();
          RIGHT_CHART.options.animation = prevAnim;
        } else {
          RIGHT_CHART.update('none');
        }
        return;
      }

      destroyRightChart();
      const themeChart = chartThemeOptions();
      RIGHT_CHART = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets: nextDs },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: animate ? { duration: 0 } : { duration: 0 },
          plugins: {
            legend: { display: false },
            tooltip: themeChart.tooltip,
          },
          scales: themeChart.scales,
        },
      });
      RIGHT_CHART_COUNTRY = countryId ?? null;
    }

    function waitForChartJs() {
      if (window.Chart) return Promise.resolve();
      return new Promise(resolve => {
        const t = setInterval(() => {
          if (window.Chart) { clearInterval(t); resolve(); }
        }, 30);
        setTimeout(() => { clearInterval(t); resolve(); }, 2500);
      });
    }

    async function updateRightPanelForCountry(countryId) {
      // Default skeleton
      const meta = COUNTRIES[countryId];
      if (!meta) return;
      await waitForChartJs();

      const legendHtml = (datasets) => {
        if (!datasets?.length) return '';
        return datasets.map(ds => {
          const c = ds.color || '#999';
          const label = ds.label || '';
          return `<span class="legend-item"><span class="legend-dot" style="background:${c}"></span>${label}</span>`;
        }).join('');
      };
      // Indonesia: reflect selected city/fuel from city card (pager = history rows for this city)
      if (countryId === 360) {
        const rows = await ensureIndonesiaRows();
        _idAllRows = rows;
        const city = localStorage.getItem('terminal_id_city') || 'Jakarta Pusat';
        const seriesAsc = sortRowsByDate(rows.filter(r => r.city === city));
        LOADED_ROWS.set(360, seriesAsc);

        let idx = getPagerIndex(360);
        if (idx == null) idx = Math.max(0, seriesAsc.length - 1);
        if (seriesAsc.length) idx = Math.max(0, Math.min(seriesAsc.length - 1, idx));
        else idx = 0;
        setPagerIndex(360, idx);

        const rSel = seriesAsc[idx] || {};
        const sliceRows = takeLastN(seriesAsc, 13).map(r => ({ ...r, __label: fmtDate(r.date) }));
        const labels = sliceRows.map(r => r.__label);
        const datasets = buildChartSeries(sliceRows, ID_FUELS, labels);
        setRightPanel({
          kicker: 'Indonesia Petrol Prices History',
          titleA: 'Indonesia',
          titleB: 'Overview',
          subtag: legendHtml(datasets),
          infoTitle: city,
          infoSub: `As of ${fmtDate(rSel.date)} · Indonesia`,
          infoLines: ID_FUELS.map((f) => [f.label, fmtIDR(parseFloat(rSel[f.key]))]),
        });
        const idChartMode = isTerminalUsd() ? 'usd' : 'local';
        const idChartKey = `${city}|${idChartMode}`;
        if (RIGHT_CHART_COUNTRY !== 360 || window.__terminalIndonesiaChartKey !== idChartKey) {
          renderRightChart({
            labels,
            datasets,
            countryId: 360,
            animate: true,
          });
          window.__terminalIndonesiaChartKey = idChartKey;
        }
        if (typeof window.__terminalSyncPager === 'function') window.__terminalSyncPager();
        return;
      }

      // Malaysia
      if (countryId === 458) {
        const rows = await ensureMalaysiaRows();
        const seriesAsc = sortRowsByDate(rows || []);
        LOADED_ROWS.set(458, seriesAsc);

        if (MY_INDEX == null) MY_INDEX = Math.max(0, seriesAsc.length - 1); // default: latest
        MY_INDEX = Math.max(0, Math.min(seriesAsc.length - 1, MY_INDEX));

        const rSel = seriesAsc[MY_INDEX] || {};
        // Keep the chart stable (always show the latest window),
        // while the pager changes only the selected-week details.
        const slice = takeLastN(seriesAsc, 13);
        const sliceRows = slice.map(r => ({ ...r, __label: fmtDate(r.date) }));
        const labels = sliceRows.map(r => r.__label);
        const isEast = myIsEastMalaysia(MY_REGION);
        const dieselKey = isEast ? 'diesel_eastmsia' : 'diesel';
        const dieselLabel = 'Diesel';
        const keys = [
          { key: 'ron95', label: 'RON95' },
          { key: 'ron97', label: 'RON97' },
          { key: dieselKey, label: dieselLabel },
        ];
        const datasets = buildChartSeries(sliceRows, keys, labels).map(ds => {
          if (ds.label === 'RON95') return { ...ds, color: '#fbbf24' }; // yellow/amber
          if (ds.label === 'RON97') return { ...ds, color: '#16a34a' }; // green
          if (ds.label === dieselLabel) return { ...ds, color: cssVar('--term-chart-line-muted', '#111827') };
          return ds;
        });
        setRightPanel({
          kicker: 'Malaysia Petrol Prices History',
          titleA: 'Malaysia',
          titleB: 'Overview',
          subtag: legendHtml(datasets),
          infoTitle: `${(MY_REGIONS.find(r => r.key === MY_REGION)?.label) || MY_REGION}`,
          infoSub: `As of ${fmtDate(rSel.date)} · Malaysia`,
          infoLines: [
            ['BUDI95', fmtTerminalPerL('MYR', parseFloat(rSel.ron95_budi95), 2)],
            ['RON95', fmtTerminalPerL('MYR', parseFloat(rSel.ron95), 2)],
            ['RON97', fmtTerminalPerL('MYR', parseFloat(rSel.ron97), 2)],
            [dieselLabel, fmtTerminalPerL('MYR', parseFloat(rSel[dieselKey]), 2)],
          ],
        });
        // Don't re-render the chart on pager clicks; keep it visually still (still refresh on currency / diesel key).
        const chartMode = isTerminalUsd() ? 'usd' : 'local';
        if (RIGHT_CHART_COUNTRY !== 458 || RIGHT_CHART_MY_DIESEL_KEY !== dieselKey || window.__terminalMalaysiaChartMode !== chartMode) {
          renderRightChart({
            labels,
            datasets,
            countryId: 458,
            animate: true,
          });
          RIGHT_CHART_MY_DIESEL_KEY = dieselKey;
          window.__terminalMalaysiaChartMode = chartMode;
        }
        // Ensure pager buttons become clickable once data is ready
        if (typeof window.__terminalSyncPager === 'function') window.__terminalSyncPager();
        return;
      }

      // Singapore
      if (countryId === 702) {
        const rows = await ensureSingaporeRows();
        const seriesAsc = sortRowsByDate(rows || []);
        LOADED_ROWS.set(702, seriesAsc);

        let idx = getPagerIndex(702);
        if (idx == null) idx = Math.max(0, seriesAsc.length - 1);
        idx = Math.max(0, Math.min(seriesAsc.length - 1, idx));
        setPagerIndex(702, idx);

        const rSel = seriesAsc[idx] || {};
        const slice = takeLastN(seriesAsc, 13);
        const sliceRows = slice.map(r => ({ ...r, __label: fmtDate(r.date) }));

    // Country search dropdown
    (function initCountrySearch(){
      const input = document.getElementById('country-search');
      const menu  = document.getElementById('country-search-menu');
      if (!input || !menu) return;

      const all = Object.entries(COUNTRIES).map(([id, meta]) => ({
        id: +id,
        name: meta.name,
        subtitle: meta.subtitle || ''
      })).sort((a, b) => a.name.localeCompare(b.name));

      let isOpen = false;
      let activeIndex = -1;

      function openMenu(){
        if (isOpen) return;
        isOpen = true;
        menu.classList.add('open');
        input.setAttribute('aria-expanded', 'true');
      }
      function closeMenu(){
        if (!isOpen) return;
        isOpen = false;
        activeIndex = -1;
        menu.classList.remove('open');
        input.setAttribute('aria-expanded', 'false');
      }
      function setActive(idx){
        activeIndex = idx;
        const items = Array.from(menu.querySelectorAll('.search-item'));
        items.forEach((el, i) => el.classList.toggle('active', i === activeIndex));
        if (activeIndex >= 0 && items[activeIndex]) {
          items[activeIndex].scrollIntoView({ block: 'nearest' });
        }
      }
      function selectCountry(id){
        const meta = COUNTRIES[id];
        if (!meta) return;
        input.value = meta.name;
        setLeftOverview(id);
        // Keep map selection highlight in sync when chosen from dropdown
        document.querySelectorAll('.country.live').forEach(el => {
          const did = el && el.__data__ ? +el.__data__.id : NaN;
          el.classList.toggle('selected', did === +id);
        });
        document.querySelectorAll('.border-live').forEach(el => {
          const did = el && el.__data__ ? +el.__data__.id : NaN;
          el.classList.toggle('selected', did === +id);
        });
        if (typeof window.__terminalZoomToCountry === 'function') window.__terminalZoomToCountry(id, true);
        closeMenu();
        input.blur();
      }

      function render(list){
        if (!list.length) {
          menu.innerHTML = `<div class="search-empty">No matches</div>`;
          return;
        }
        menu.innerHTML = list.map((c, idx) => `
          <div class="search-item" role="option" data-id="${c.id}" data-idx="${idx}">
            <div class="label">${c.name}</div>
            <div class="sub">${c.subtitle}</div>
          </div>
        `).join('');
      }

      function getFiltered(){
        const q = (input.value || '').trim().toLowerCase();
        if (!q) return all;
        return all.filter(c =>
          c.name.toLowerCase().includes(q) ||
          c.subtitle.toLowerCase().includes(q)
        );
      }

      function refresh(){
        const filtered = getFiltered();
        render(filtered);
        setActive(filtered.length ? 0 : -1);
      }

      input.setAttribute('aria-controls', 'country-search-menu');
      input.setAttribute('aria-expanded', 'false');

      input.addEventListener('focus', () => { openMenu(); refresh(); });
      input.addEventListener('click',  () => { openMenu(); refresh(); });
      input.addEventListener('input',  () => { openMenu(); refresh(); });
      input.addEventListener('keydown', (e) => {
        if (!isOpen && (e.key === 'ArrowDown' || e.key === 'ArrowUp')) {
          openMenu();
          refresh();
          e.preventDefault();
          return;
        }
        if (!isOpen) return;

        const items = Array.from(menu.querySelectorAll('.search-item'));
        if (e.key === 'Escape') { closeMenu(); e.preventDefault(); return; }
        if (e.key === 'ArrowDown') { setActive(Math.min(items.length - 1, activeIndex + 1)); e.preventDefault(); return; }
        if (e.key === 'ArrowUp') { setActive(Math.max(0, activeIndex - 1)); e.preventDefault(); return; }
        if (e.key === 'Enter') {
          const el = items[activeIndex];
          const id = el ? +el.getAttribute('data-id') : null;
          if (id) selectCountry(id);
          e.preventDefault();
        }
      });

      menu.addEventListener('mousemove', (e) => {
        const item = e.target.closest('.search-item');
        if (!item) return;
        const idx = +item.getAttribute('data-idx');
        if (Number.isFinite(idx)) setActive(idx);
      });
      menu.addEventListener('mousedown', (e) => {
        // Use mousedown so selection happens before input blur.
        const item = e.target.closest('.search-item');
        if (!item) return;
        const id = +item.getAttribute('data-id');
        if (id) selectCountry(id);
        e.preventDefault();
      });

      function onDocPointerDown(e){
        if (!isOpen) return;
        const inside = menu.contains(e.target) || input.contains(e.target);
        if (!inside) closeMenu();
      }
      // Use capture so D3 zoom/map handlers can't swallow the event.
      document.addEventListener('pointerdown', onDocPointerDown, true);

      // Cmd+F (or Ctrl+F) opens this search + suggestions
      document.addEventListener('keydown', (e) => {
        const isMacFind = (e.metaKey && !e.ctrlKey && (e.key === 'f' || e.key === 'F'));
        const isWinFind = (e.ctrlKey && !e.metaKey && (e.key === 'f' || e.key === 'F'));
        if (!isMacFind && !isWinFind) return;

        e.preventDefault();
        e.stopPropagation();
        openMenu();
        refresh();
        input.focus();
        // Select existing text to make it easy to overwrite
        try { input.select(); } catch (_) {}
      }, true);
    })();

    // Map
    const LIVE = {

    function renderTerminalMap() {
      const root = document.getElementById('terminal-map');
      if (!root) return;
      root.innerHTML = '';

      const rect = root.getBoundingClientRect();
      const W = Math.max(320, Math.floor(rect.width));
      const H = Math.max(320, Math.floor(rect.height));

      const svg = d3.select(root)
        .append('svg')
        .attr('viewBox', `0 0 ${W} ${H}`)
        .attr('preserveAspectRatio', 'xMidYMid meet');

      const baseScale = (Math.min(W, H) * 1.55) / 2;
      const mapCenterY = H * 0.34;
      const projection = d3.geoOrthographic()
        .translate([W / 2, mapCenterY])
        .scale(baseScale)
        .clipAngle(90)
        .precision(0.3);
      const path = d3.geoPath(projection);
      const mapG = svg.append('g');

      Promise.all([
        d3.json('./assets/countries-110m.json'),
        d3.json('./assets/singapore-geo.json').catch(() => null),
      ]).then(([world, sgGeo]) => {
        const countries = topojson.feature(world, world.objects.countries);
        const sgFeature = sgGeo && sgGeo.type === 'Feature'
          ? Object.assign({}, sgGeo, { id: 702 })
          : null;
        const DEFAULT_CENTER = [115, 6];
        projection.rotate([-DEFAULT_CENTER[0], -DEFAULT_CENTER[1], 0]);

        mapG.append('path').datum({ type: 'Sphere' }).attr('class', 'sphere').attr('d', path);
        mapG.append('path').datum(d3.geoGraticule().step([10, 10])()).attr('class', 'graticule').attr('d', path);

        mapG.selectAll('.bg')
          .data(countries.features.filter(d => !SEA.has(+d.id)))
          .enter().append('path').attr('class', 'country').attr('d', path)
          .on('mousemove', (e, d) => showTip(e, +d.id))
          .on('mouseleave', hideTip)
          .on('touchstart', (e, d) => {
            e.stopPropagation();
            const t = e.touches[0];
            showTip({ clientX: t.clientX, clientY: t.clientY }, +d.id);
          }, { passive: true });

        const livePaths = mapG.selectAll('.live-c')
          .data(countries.features.filter(d => LIVE[+d.id]))
          .enter().append('path')
          .attr('class', 'country live')
          .attr('d', path)
          .on('mousemove', (e, d) => showTip(e, +d.id))
          .on('mouseleave', hideTip)
          .on('click', (e, d) => {
            const id = +d.id;
            if (id === 458) {
              const inv = projection.invert(d3.pointer(e, svg.node()));
              if (inv && Number.isFinite(inv[0]) && Number.isFinite(inv[1])) {
                setMalaysiaRegion(malaysiaRegionFromLngLat(inv[0], inv[1]));
              }
              if (+window.__terminalSelectedCountryId === 458) {
                updateRightPanelForCountry(458).catch(() => {});
                applySel();
                if (typeof window.__terminalZoomToCountry === 'function') window.__terminalZoomToCountry(458, true);
                return;
              }
            }
            if (id === 360) {
              const inv = projection.invert(d3.pointer(e, svg.node()));
              if (inv && Number.isFinite(inv[0]) && Number.isFinite(inv[1])) {
                const city = indonesiaCityFromLngLat(inv[0], inv[1]);
                try { localStorage.setItem('terminal_id_city', city); } catch (_) {}
              }
              if (+window.__terminalSelectedCountryId === 360) {
                updateRightPanelForCountry(360).catch(() => {});
                applySel();
                if (typeof window.__terminalZoomToCountry === 'function') window.__terminalZoomToCountry(360, true);
                return;
              }
            }
            setLeftOverview(id);
            applySel();
          });

        mapG.append('path')
          .datum(topojson.mesh(world, world.objects.countries))
          .attr('class', 'border-mesh')
          .attr('d', path);

        const liveBorders = mapG.selectAll('.border-live-p')
          .data(countries.features.filter(d => LIVE[+d.id]))
          .enter().append('path')
          .attr('class', 'border-live')
          .attr('d', path);

        if (sgFeature) {
          mapG.append('path')
            .datum(sgFeature)
            .attr('class', 'country live country-sg')
            .attr('d', path)
            .on('mousemove', (e) => showTip(e, 702))
            .on('mouseleave', hideTip)
            .on('click', (e) => {
              e.stopPropagation();
              if (+window.__terminalSelectedCountryId === 702) {
                updateRightPanelForCountry(702).catch(() => {});
                applySel();
                return;
              }
              setLeftOverview(702);
              applySel();
            });
        }

        function applySel() {
          const sel = window.__terminalSelectedCountryId;
          mapG.selectAll('.country.live').classed('selected', (d) => d && +d.id === +sel);
          liveBorders.classed('selected', d => +d.id === +sel);
        }
        applySel();

        function updateAll() {
          mapG.selectAll('path').attr('d', path);
        }

        const minZoomK = 0.90;
        const maxZoomK = 9.5;
        let zoom;
        function syncZoomFromProjection() {
          svg.call(zoom.transform, d3.zoomIdentity.scale(projection.scale() / baseScale));
        }
        zoom = d3.zoom()
          .scaleExtent([minZoomK, maxZoomK])
          .filter((event) => {
            if (event.type === 'wheel') return true;
            if (event.type === 'mousedown') return false;
            if (event.type === 'dblclick') return false;
            if (event.type === 'touchstart' || event.type === 'touchmove') {
              return event.touches && event.touches.length >= 2;
            }
            return false;
          })
          .on('zoom', (event) => {
            projection.scale(baseScale * event.transform.k);
            updateAll();
          });

        function computeFitScale(feature, rotateArr, padPx) {
          const s0 = projection.scale();
          const r0 = projection.rotate();
          try {
            projection.scale(1).rotate(rotateArr);
            const b = path.bounds(feature);
            const dx = b[1][0] - b[0][0];
            const dy = b[1][1] - b[0][1];
            if (!(dx > 0) || !(dy > 0)) return null;
            const s = Math.min((W - padPx) / dx, (H - padPx) / dy);
            if (!isFinite(s) || s <= 0) return null;
            return s;
          } finally {
            projection.scale(s0).rotate(r0);
          }
        }

        window.__terminalZoomToCountry = function zoomToCountry(countryId, animate = true) {
          const f = +countryId === 702 && sgFeature
            ? sgFeature
            : countries.features.find(x => +x.id === +countryId);
          if (!f) return;

          let lon; let lat; let subFocus = false;
          if (+countryId === 360) {
            let city = 'Jakarta Pusat';
            try { city = localStorage.getItem('terminal_id_city') || 'Jakarta Pusat'; } catch (_) {}
            const ll = ID_CITY_LONLAT[city];
            if (ll && Number.isFinite(ll[0]) && Number.isFinite(ll[1])) {
              [lon, lat] = ll;
              subFocus = true;
            } else {
              [lon, lat] = d3.geoCentroid(f);
            }
          } else if (+countryId === 458) {
            let region = 'Semenanjung';
            try {
              const k = localStorage.getItem('terminal_my_region') || 'Semenanjung';
              region = k === 'SabahSarawak' ? 'SabahSarawak' : 'Semenanjung';
            } catch (_) {}
            if (region === 'SabahSarawak') {
              lon = 115; lat = 4;
            } else {
              lon = 102; lat = 4;
            }
            subFocus = true;
          } else {
            [lon, lat] = d3.geoCentroid(f);
          }

          const target = [-lon, -lat, 0];
          const padZ = 10;
          const fitS = subFocus ? null : computeFitScale(f, target, padZ);
          const zoomFocusBoost = 1.38;
          let nextScale = fitS
            ? Math.max(
                baseScale * 0.90,
                Math.min(baseScale * maxZoomK, fitS * zoomFocusBoost)
              )
            : projection.scale();
          if (subFocus) {
            const floor = +countryId === 458 ? baseScale * 3.25 : baseScale * 3.35;
            nextScale = Math.max(nextScale, Math.min(baseScale * maxZoomK, floor));
          }
          /* Extra punch on fit / region floor (cap so wheel zoom stays in sync) */
          nextScale = Math.min(baseScale * maxZoomK, nextScale * 1.65);

          if (!animate) {
            projection.rotate(target);
            projection.scale(nextScale);
            updateAll();
            syncZoomFromProjection();
            return;
          }

          const r0 = projection.rotate();
          const s0 = projection.scale();
          let dLon = target[0] - r0[0];
          while (dLon > 180) dLon -= 360;
          while (dLon < -180) dLon += 360;
          const interpR = t => [r0[0] + t * dLon, r0[1] + t * (target[1] - r0[1]), 0];
          const interpS = d3.interpolateNumber(s0, nextScale);
          svg.interrupt();
          svg.transition().duration(420).tween('termFocus', () => (t) => {
            projection.rotate(interpR(t)).scale(interpS(t));
            updateAll();
          }).on('end', syncZoomFromProjection);
        };

        svg.call(zoom);

        function rotateBy(dx, dy) {
          const r = projection.rotate();
          const sens = 0.06;
          const ddx = Math.abs(dx) < 1.5 ? 0 : dx;
          const ddy = Math.abs(dy) < 1.5 ? 0 : dy;
          projection.rotate([r[0] + ddx * sens, Math.max(-85, Math.min(85, r[1] - ddy * sens)), 0]);
          updateAll();
        }
        svg.style('cursor', 'grab');
        svg.call(d3.drag()
          .on('start', () => svg.style('cursor', 'grabbing'))
          .on('drag', (ev) => rotateBy(ev.dx, ev.dy))
          .on('end', () => svg.style('cursor', 'grab'))
        );

        const zIn = document.getElementById('zoom-in');
        const zOut = document.getElementById('zoom-out');
        /* Use zoom.scaleBy so d3-zoom's internal __zoom stays in sync with projection (wheel + buttons). */
        function zoomStepBy(factor) {
          svg.interrupt();
          svg.transition().duration(140).call(zoom.scaleBy, factor);
        }
        if (zIn) {
          zIn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            zoomStepBy(1.18);
          });
        }
        if (zOut) {
          zOut.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            zoomStepBy(0.85);
          });
        }

        const initialId = window.__terminalSelectedCountryId ?? 458;
        window.__terminalZoomToCountry(initialId, false);

        updateAll();
      });
    }

    // Initial render + resize handling
    renderTerminalMap();
    try {
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        try { renderTerminalMap(); } catch (_) {}
        try {
          const st = window.__terminalRightChartState;
          if (st) renderRightChart({ ...st, animate: false });
        } catch (_) {}
      });
    } catch (_) {}
    // Default selection (allow deep-linking from homepage)
    (function initFromURL() {
      let cid = 458;
      let myRegion = null;
      try {
        const u = new URL(window.location.href);
        const c = parseInt(u.searchParams.get('country') || '', 10);
        if (Number.isFinite(c)) cid = c;
        myRegion = u.searchParams.get('my_region');
      } catch (_) {}

      if (cid === 458 && myRegion) {
        const norm = String(myRegion).toLowerCase();
        if (norm === 'peninsular' || norm === 'semenanjung') setMalaysiaRegion('Semenanjung');
        if (norm === 'east' || norm === 'sabahsarawak') setMalaysiaRegion('SabahSarawak');
      }
      setLeftOverview(cid);
      if (typeof window.__terminalZoomToCountry === 'function') window.__terminalZoomToCountry(cid, false);
    })();
    // Orange-panel pager (highlights timeline)
    (function initPager() {
      const prevBtn = document.getElementById('pager-prev');
      const nextBtn = document.getElementById('pager-next');
      if (!prevBtn || !nextBtn) return;

      const PAGER_COUNTRIES = new Set([360, 458, 702, 96]); // ID + MY + SG + BN

      function syncPager() {
        const cid = +window.__terminalSelectedCountryId;
        const show = PAGER_COUNTRIES.has(cid);
        prevBtn.style.display = show ? '' : 'none';
        nextBtn.style.display = show ? '' : 'none';
        if (!show) return;

        // While data is still loading, keep buttons clickable so the first click can fetch.
        const rows = LOADED_ROWS.get(cid) || null;

        const idx = (typeof getPagerIndex === 'function') ? getPagerIndex(cid) : null;
        const hasRows = Array.isArray(rows) && rows.length > 0;
        if (!hasRows || idx == null) {
          prevBtn.disabled = false;
          nextBtn.disabled = false;
          return;
        }

        const seriesLen = rows.filter(r => r?.date).length || rows.length;
        prevBtn.disabled = idx <= 0;
        // next = newer (towards latest)
        nextBtn.disabled = idx >= (seriesLen - 1);
      }

      // Expose so data render can re-sync after async fetch
      window.__terminalSyncPager = syncPager;

      prevBtn.addEventListener('click', async () => {
        const cid = +window.__terminalSelectedCountryId;
        if (!PAGER_COUNTRIES.has(cid)) return;
        const seriesAsc = await pagerSeries(cid);
        const seriesLen = seriesAsc.filter(r => r?.date).length || seriesAsc.length;
        if (!seriesLen) return;
        let idx = getPagerIndex(cid);
        if (idx == null) idx = seriesLen - 1;
        idx = Math.max(0, idx - 1); // older
        setPagerIndex(cid, idx);
        await updateRightPanelForCountry(cid);
        syncPager();
      });

      nextBtn.addEventListener('click', async () => {
        const cid = +window.__terminalSelectedCountryId;
        if (!PAGER_COUNTRIES.has(cid)) return;
        const seriesAsc = await pagerSeries(cid);
        const seriesLen = seriesAsc.filter(r => r?.date).length || seriesAsc.length;
        if (!seriesLen) return;
        let idx = getPagerIndex(cid);
        if (idx == null) idx = seriesLen - 1;
        idx = Math.min(seriesLen - 1, idx + 1); // newer
        setPagerIndex(cid, idx);
        await updateRightPanelForCountry(cid);
        syncPager();
      });

      // Hook into existing selection updates
      const origSetLeftOverview = setLeftOverview;
      setLeftOverview = function patchedSetLeftOverview(countryId) {
        origSetLeftOverview(countryId);
        // update button state after panel update kicks off
        setTimeout(syncPager, 0);
      };

      // Initial state
      syncPager();
    })();

    const MY_REGION_CYCLE = ['Semenanjung', 'SabahSarawak'];
    function cycleMalaysiaRegion(step) {
      const i = MY_REGION_CYCLE.indexOf(MY_REGION);
      const base = i >= 0 ? i : 0;
      const n = (base + step + MY_REGION_CYCLE.length) % MY_REGION_CYCLE.length;
      setMalaysiaRegion(MY_REGION_CYCLE[n]);
      if (typeof window.__terminalZoomToCountry === 'function') window.__terminalZoomToCountry(458, true);
    }
    function cycleIndonesiaCity(step) {
      const cities = Object.keys(ID_CITY_LONLAT).sort((a, b) => a.localeCompare(b));
      if (!cities.length) return;
      let cur = '';
      try { cur = localStorage.getItem('terminal_id_city') || ''; } catch (_) {}
      let i = cities.indexOf(cur);
      if (i < 0) i = cities.indexOf('Jakarta Pusat');
      if (i < 0) i = 0;
      const n = (i + step + cities.length) % cities.length;
      try { localStorage.setItem('terminal_id_city', cities[n]); } catch (_) {}
      delete PAGER_INDEX[360];
      updateRightPanelForCountry(360).catch(() => {});
      if (typeof window.__terminalSyncPager === 'function') window.__terminalSyncPager();
      if (typeof window.__terminalZoomToCountry === 'function') window.__terminalZoomToCountry(360, true);
    }

    // Keyboard: ↑/↓ = Malaysia region / Indonesia city (+ map); ←/→ = date pager; SG/BN ↑/↓ = zoom; [ ] = date pager
    (function initTerminalKeyboardShortcuts() {
      function isTypingTarget(el) {
        if (!el || el.nodeType !== 1) return false;
        if (el.isContentEditable) return true;
        const tag = (el.tagName || '').toLowerCase();
        if (tag === 'input' || tag === 'textarea' || tag === 'select') return true;
        return !!el.closest?.('[contenteditable="true"]');
      }

      function clickPagerPrev() {
        const prev = document.getElementById('pager-prev');
        if (!prev || prev.style.display === 'none' || prev.disabled) return;
        prev.click();
      }
      function clickPagerNext() {
        const next = document.getElementById('pager-next');
        if (!next || next.style.display === 'none' || next.disabled) return;
        next.click();
      }

      document.addEventListener('keydown', (e) => {
        if (e.defaultPrevented) return;
        if (e.metaKey || e.ctrlKey || e.altKey) return;
        if (isTypingTarget(e.target)) return;

        const cid = +window.__terminalSelectedCountryId;

        if (e.key === 'ArrowUp') {
          if (cid === 458) {
            e.preventDefault();
            cycleMalaysiaRegion(-1);
            return;
          }
          if (cid === 360) {
            e.preventDefault();
            cycleIndonesiaCity(-1);
            return;
          }
          const z = document.getElementById('zoom-in');
          if (!z || typeof z.onclick !== 'function') return;
          e.preventDefault();
          z.click();
          return;
        }
        if (e.key === 'ArrowDown') {
          if (cid === 458) {
            e.preventDefault();
            cycleMalaysiaRegion(1);
            return;
          }
          if (cid === 360) {
            e.preventDefault();
            cycleIndonesiaCity(1);
            return;
          }
          const z = document.getElementById('zoom-out');
          if (!z || typeof z.onclick !== 'function') return;
          e.preventDefault();
          z.click();
          return;
        }
        if (e.key === '[' || e.key === 'BracketLeft') {
          e.preventDefault();
          clickPagerPrev();
          return;
        }
        if (e.key === ']' || e.key === 'BracketRight') {
          e.preventDefault();
          clickPagerNext();
          return;
        }
        if (e.key === 'ArrowLeft') {
          const prev = document.getElementById('pager-prev');
          if (!prev || prev.style.display === 'none' || prev.disabled) return;
          e.preventDefault();
          prev.click();
          return;
        }
        if (e.key === 'ArrowRight') {
          const next = document.getElementById('pager-next');
          if (!next || next.style.display === 'none' || next.disabled) return;
          e.preventDefault();
          next.click();
          return;
        }
      });
    })();

    window.addEventListener('resize', () => {
      // cheap debounce
      clearTimeout(window.__termMapT);
      window.__termMapT = setTimeout(renderTerminalMap, 120);
    });

    // Resizable panels (left/right)
    (function initResizers() {
      const root = document.documentElement;
      const leftKey = 'terminal_leftW';
      const rightKey = 'terminal_rightW';

      function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, n)); }
      function px(n) { return `${Math.round(n)}px`; }

      function applyScales(leftW, rightW) {
        // scale headings smoothly with width
        const leftScale = clamp(leftW / 280, 0.82, 1.22);
        const rightScale = clamp(rightW / 420, 0.82, 1.22);
        root.style.setProperty('--leftScale', leftScale.toFixed(3));
        root.style.setProperty('--rightScale', rightScale.toFixed(3));
      }

      function getNumVar(name, fallback) {
        const v = getComputedStyle(root).getPropertyValue(name).trim();
        const n = parseFloat(v.replace('px', ''));
        return Number.isFinite(n) ? n : fallback;
      }

      // Restore persisted widths (desktop only)
      try {
        const savedLeft = parseFloat(localStorage.getItem(leftKey) || '');
        const savedRight = parseFloat(localStorage.getItem(rightKey) || '');
        if (Number.isFinite(savedLeft)) root.style.setProperty('--leftW', px(savedLeft));
        if (Number.isFinite(savedRight)) root.style.setProperty('--rightW', px(savedRight));
      } catch (_) {}

      function currentSizes() {
        const leftW = getNumVar('--leftW', 280);
        const rightW = getNumVar('--rightW', 420);
        return { leftW, rightW };
      }

      function bounds() {
        const W = window.innerWidth;
        return {
          leftMin: 220,
          leftMax: Math.max(260, Math.min(520, W - 360)),
          rightMin: 320,
          rightMax: Math.max(360, Math.min(560, W - 260)),
        };
      }

      function setLeftW(w) {
        const b = bounds();
        const x = clamp(w, b.leftMin, b.leftMax);
        root.style.setProperty('--leftW', px(x));
        applyScales(x, currentSizes().rightW);
        try { localStorage.setItem(leftKey, String(x)); } catch (_) {}
      }

      function setRightW(w) {
        const b = bounds();
        const x = clamp(w, b.rightMin, b.rightMax);
        root.style.setProperty('--rightW', px(x));
        applyScales(currentSizes().leftW, x);
        try { localStorage.setItem(rightKey, String(x)); } catch (_) {}
      }

      // Initial scale compute
      applyScales(currentSizes().leftW, currentSizes().rightW);

      function drag(gutterEl, which) {
        let startX = 0;
        let startLeft = 0;
        let startRight = 0;

        const onMove = (e) => {
          const x = (e.touches ? e.touches[0].clientX : e.clientX);
          const dx = x - startX;
          if (which === 'left') setLeftW(startLeft + dx);
          if (which === 'right') setRightW(startRight - dx);
        };
        const onUp = () => {
          document.body.classList.remove('resizing');
          gutterEl.classList.remove('dragging');
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
          window.removeEventListener('touchmove', onMove);
          window.removeEventListener('touchend', onUp);
        };
        const onDown = (e) => {
          const x = (e.touches ? e.touches[0].clientX : e.clientX);
          startX = x;
          const s = currentSizes();
          startLeft = s.leftW;
          startRight = s.rightW;
          document.body.classList.add('resizing');
          gutterEl.classList.add('dragging');
          window.addEventListener('mousemove', onMove);
          window.addEventListener('mouseup', onUp);
          window.addEventListener('touchmove', onMove, { passive: true });
          window.addEventListener('touchend', onUp);
        };

        gutterEl.addEventListener('mousedown', onDown);
        gutterEl.addEventListener('touchstart', onDown, { passive: true });

        // Keyboard resizing (accessibility)
        gutterEl.addEventListener('keydown', (e) => {
          const step = e.shiftKey ? 40 : 16;
          if (which === 'left') {
            if (e.key === 'ArrowLeft') setLeftW(currentSizes().leftW - step);
            if (e.key === 'ArrowRight') setLeftW(currentSizes().leftW + step);
          }
          if (which === 'right') {
            if (e.key === 'ArrowLeft') setRightW(currentSizes().rightW + step);
            if (e.key === 'ArrowRight') setRightW(currentSizes().rightW - step);
          }
        });
      }

      const gl = document.getElementById('gutter-left');
      const gr = document.getElementById('gutter-right');
      if (gl) drag(gl, 'left');
      if (gr) drag(gr, 'right');
    })();

    // Collapse/expand left panel
    (function initLeftPanelToggle() {
      const btnBorder = document.getElementById('left-panel-toggle');
      if (!btnBorder) return;

      const storageKey = 'terminal_leftCollapsed';
      const body = document.body;
      const mqMobile = window.matchMedia('(max-width: 720px)');

      function positionBtn() {
        // Keep it on the left panel border, slightly lower than center (less distracting).
        const isCollapsed = body.classList.contains('left-collapsed');
        const leftEl = document.querySelector('aside.left');
        const mapTopbar = document.querySelector('.map-topbar');

        const yTarget = () => {
          if (leftEl) {
            const r = leftEl.getBoundingClientRect();
            // 0.65 down the panel looks calmer than dead-center.
            return Math.round(r.top + r.height * 0.65);
          }
          return Math.round(window.innerHeight * 0.65);
        };

        const clampY = (y) => {
          const padTop = 76;
          const padBottom = 24;
          const lo = padTop;
          const hi = Math.max(lo, window.innerHeight - padBottom);
          return Math.max(lo, Math.min(hi, y));
        };

        if (isCollapsed) {
          // Dock to the map edge; avoid the search topbar area.
          const fallback = yTarget();
          const top = mapTopbar
            ? Math.round(mapTopbar.getBoundingClientRect().top + 140) /* below search */
            : fallback;
          btnBorder.style.left = '12px';
          btnBorder.style.top = `${clampY(top)}px`;
          btnBorder.style.transform = 'translate(0, -50%)';
          return;
        }

        if (leftEl) {
          const r = leftEl.getBoundingClientRect();
          btnBorder.style.left = `${Math.round(r.right)}px`;
          btnBorder.style.top = `${clampY(yTarget())}px`;
          btnBorder.style.transform = 'translate(-50%, -50%)';
          return;
        }

        btnBorder.style.left = '12px';
        btnBorder.style.top = `${clampY(yTarget())}px`;
        btnBorder.style.transform = 'translate(0, -50%)';
      }

      function setCollapsed(next) {
        body.classList.toggle('left-collapsed', !!next);
        const expanded = !next;
        if (btnBorder) btnBorder.setAttribute('aria-expanded', String(expanded));

        // Flip chevron direction (border button points left when open, right when closed)
        const pathBorder = btnBorder ? btnBorder.querySelector('path') : null;
        if (pathBorder) pathBorder.setAttribute('d', next ? 'M9 18l6-6-6-6' : 'M15 18l-6-6 6-6');

        try { localStorage.setItem(storageKey, next ? '1' : '0'); } catch (_) {}

        // If the map is using fixed viewBox based on container size, re-render once.
        clearTimeout(window.__termMapT2);
        window.__termMapT2 = setTimeout(() => {
          try { renderTerminalMap(); } catch (_) {}
        }, 80);

        // Reposition toggle after layout settles
        clearTimeout(window.__termPosT);
        window.__termPosT = setTimeout(positionBtn, 60);
      }

      // Restore
      try { setCollapsed(localStorage.getItem(storageKey) === '1'); } catch (_) {}

      // On mobile we don't show the left panel; keep the toggle out of the way.
      function syncMobileVisibility() {
        if (mqMobile.matches) {
          btnBorder.style.display = 'none';
        } else {
          btnBorder.style.display = '';
          positionBtn();
        }
      }
      syncMobileVisibility();
      mqMobile.addEventListener?.('change', syncMobileVisibility);

      function bind(el) {
        if (!el) return;
        el.addEventListener('click', () => {
          setCollapsed(!body.classList.contains('left-collapsed'));
        });
        el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            setCollapsed(!body.classList.contains('left-collapsed'));
          }
        });
      }
      bind(btnBorder);

      // Initial + responsive repositioning
      positionBtn();
      window.addEventListener('resize', () => {
        clearTimeout(window.__termPosT);
        window.__termPosT = setTimeout(positionBtn, 60);
      });
    })();

    // Mobile bottom-sheet UI removed (desktop-only terminal).
  </script>
</body>
</html>
