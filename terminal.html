<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PetrolPrice — Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/shared.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="assets/config.js"></script>
  <script src="assets/utils.js"></script>
  <style>
    :root{
      --bg: #f1f1f0;
      --panel: #f7f7f6;
      --panel-2: rgba(255,255,255,0.82);
      --text: #0f0f0f;
      --muted: rgba(0,0,0,0.55);
      --line: rgba(0,0,0,0.10);
      --hairline: rgba(0, 0, 0, 0.08);
      --metric-k: rgba(0, 0, 0, 0.52);
      --metric-v: rgba(0, 0, 0, 0.88);
      --shadow: 0 10px 28px rgba(0,0,0,0.08);
      --shadow-2: 0 18px 54px rgba(0,0,0,0.12);
      --orange: #ff6a00;
      --orange-2: #ff4d00;

      /* Resizable layout + fixed left sidebar */
      --railW: 64px;
      /* Defaults scale across common desktop sizes; JS resizer still overrides these vars. */
      --leftW: clamp(240px, 26vw, 360px);
      --rightW: clamp(320px, 36vw, 520px);
      --leftScale: 1;
      --rightScale: 1;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
    }

    .app {
      height: 100%;
      height: 100dvh;
      display: grid;
      grid-template-columns: var(--railW) var(--leftW) 1fr var(--rightW);
      grid-template-rows: 1fr;
      grid-template-areas: "rail left main right";
      position: relative;
    }

    /* Resizer gutters */
    .gutter {
      grid-row: 1;
      z-index: 20;
      width: 14px;
      margin-left: -7px;
      cursor: col-resize;
      position: relative;
      touch-action: none;
    }
    .gutter::before {
      content: '';
      position: absolute;
      top: 10px;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      border-radius: 999px;
      background: rgba(0,0,0,0.10);
      opacity: 0;
      transition: opacity 0.12s ease, background 0.12s ease;
    }
    .gutter:hover::before,
    .gutter.dragging::before {
      opacity: 1;
      background: rgba(255,106,0,0.55);
    }
    .gutter-left { grid-column: 3; }  /* boundary between left and map */
    .gutter-right { grid-column: 4; } /* boundary between map and right */

    body.resizing {
      cursor: col-resize;
      user-select: none;
    }
    body.resizing * {
      pointer-events: none;
    }
    body.resizing .gutter {
      pointer-events: auto;
    }

    /* Floating search (on map) */
    .map-topbar{
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 7;
      display: inline-flex;
      align-items: center;
      gap: 0;
      padding: 0;
      border-radius: 0;
      border: none;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      user-select: none;
      height: 36px;
      max-width: min(520px, calc(100% - 24px));
    }

    .panel-toggle{
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border: none;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(0,0,0,0.08);
      color: rgba(0,0,0,0.72);
      cursor: pointer;
      border-radius: 12px;
      margin-right: 10px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
      transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
    }
    .panel-toggle:hover{
      background: rgba(255,255,255,0.82);
      border-color: rgba(0,0,0,0.12);
      transform: translateY(-1px);
    }
    .panel-toggle:active{ transform: translateY(0px); }
    .panel-toggle svg{ width: 16px; height: 16px; opacity: 0.85; }

    /* Collapsed left panel */
    .left-collapsed .app{
      grid-template-columns: var(--railW) 0px 1fr var(--rightW);
    }
    .left-collapsed .left,
    .left-collapsed #gutter-left{
      display: none !important;
    }
    /* Desktop-only: no responsive overlay behavior */
    .search {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 240px;
      height: 100%;
      padding: 0 10px;
      border-radius: 0;
      border: none;
      background: transparent;
      color: rgba(0,0,0,0.72);
      font-size: 1rem;
    }
    .search svg { opacity: 0.7; width: 16px; height: 16px; }
    .search input {
      border: none;
      outline: none;
      background: transparent;
      font: inherit;
      color: inherit;
      width: min(260px, 42vw);
      height: 100%;
    }
    .search input::placeholder { color: rgba(0,0,0,0.55); }
    .search-menu{
      position: absolute;
      left: 14px;
      top: calc(14px + 36px + 8px);
      z-index: 8;
      min-width: 260px;
      max-width: min(520px, calc(100% - 28px));
      max-height: min(320px, calc(100vh - 120px));
      overflow: auto;
      border: 1px solid rgba(0,0,0,0.10);
      background: rgba(255,255,255,0.96);
      border-radius: 0;
      box-shadow: 0 10px 26px rgba(0,0,0,0.10);
      padding: 4px;
      display: none;
    }
    .search-menu.open{ display: block; }
    .search-item{
      display: flex;
      flex-direction: column;
      gap: 1px;
      padding: 9px 10px;
      border-radius: 0;
      cursor: pointer;
      user-select: none;
      color: rgba(0,0,0,0.86);
    }
    .search-item:hover,
    .search-item.active{
      background: rgba(0,0,0,0.035);
    }
    .search-item .label{
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    .search-item .sub{
      font-size: 0.83rem;
      color: rgba(0,0,0,0.55);
    }
    .search-empty{
      padding: 12px 10px;
      color: rgba(0,0,0,0.55);
      font-size: 0.9rem;
    }
    #info-title.switchable{
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
      cursor: pointer;
    }
    .city-menu{
      position: fixed;
      z-index: 50;
      min-width: 220px;
      max-width: min(320px, calc(100vw - 24px));
      max-height: min(320px, calc(100vh - 24px));
      overflow: auto;
      border: 1px solid rgba(0,0,0,0.12);
      background: rgba(255,255,255,0.97);
      box-shadow: 0 16px 48px rgba(0,0,0,0.14);
      padding: 6px;
      display: none;
    }
    .city-menu.open{ display: block; }
    .city-item{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 10px;
      cursor: pointer;
      user-select: none;
      color: rgba(0,0,0,0.86);
    }
    .city-item:hover{ background: rgba(0,0,0,0.04); }
    .city-item.active{ background: rgba(255,106,0,0.10); }
    .city-item .label{ font-weight: 700; letter-spacing: 0.01em; }
    .city-item .sub{ font-size: 0.82rem; color: rgba(0,0,0,0.55); }
    .spacer { flex: 1; }
    .zoom {
      display: inline-flex;
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 0;
      overflow: hidden;
      background: rgba(0,0,0,0.035);
    }
    .zoom button {
      width: 42px; height: 34px;
      border: none;
      background: transparent;
      font-size: 1.05rem;
      line-height: 1;
      cursor: pointer;
      color: rgba(0,0,0,0.7);
      transition: background 0.12s ease, color 0.12s ease;
    }
    .zoom button + button { border-left: 1px solid var(--line); }
    .zoom button:hover { background: rgba(0,0,0,0.04); color: rgba(0,0,0,0.82); }
    .zoom button:active { background: rgba(0,0,0,0.06); }
    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .icon-btn {
      width: 34px; height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.75);
      border-radius: 10px;
      cursor: not-allowed;
      opacity: 0.85;
    }
    .icon-btn svg { width: 16px; height: 16px; opacity: 0.8; }
    .icon-action{
      width: 34px; height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.75);
      border-radius: 10px;
      cursor: pointer;
      opacity: 0.9;
      transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease, opacity 0.12s ease;
    }
    .icon-action:hover{
      background: rgba(255,255,255,0.88);
      border-color: rgba(0,0,0,0.14);
      opacity: 1;
    }
    .icon-action:active{
      background: rgba(255,255,255,0.95);
    }
    .icon-action svg { width: 16px; height: 16px; opacity: 0.8; }

    /* Left icon rail (global nav) */
    .sidebar-rail {
      grid-area: rail;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 12px 0 16px;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.028) 0%, transparent 42%),
        var(--panel);
      border-right: 1px solid var(--line);
      z-index: 5;
      min-height: 0;
    }
    .sidebar-brand {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
      opacity: 0.94;
      transition: opacity 0.12s ease, transform 0.12s ease;
    }
    .sidebar-brand:hover {
      opacity: 1;
      transform: scale(1.04);
    }
    .sidebar-brand img {
      width: 26px;
      height: 26px;
      display: block;
    }
    .sidebar-items {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      flex: 1;
      min-height: 0;
    }
    .sidebar-icon-link {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid transparent;
      background: transparent;
      color: rgba(0,0,0,0.52);
      text-decoration: none;
      transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
    }
    .sidebar-icon-link svg {
      width: 20px;
      height: 20px;
      opacity: 0.88;
    }
    .sidebar-icon-link:hover {
      background: rgba(0,0,0,0.045);
      color: rgba(0,0,0,0.78);
    }
    .sidebar-icon-link[aria-current="page"] {
      background: rgba(255,106,0,0.12);
      border-color: rgba(255,106,0,0.24);
      color: var(--orange);
    }
    .sidebar-icon-link[aria-current="page"] svg {
      opacity: 1;
    }
    .sidebar-icon-link:focus-visible,
    .sidebar-brand:focus-visible {
      outline: 2px solid rgba(255,106,0,0.55);
      outline-offset: 2px;
    }

    /* Left panel */
    .left {
      grid-area: left;
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 16px 18px 22px;
      overflow: hidden;
      position: relative;
    }

    /* Toggle sits on the left panel border */
    /* Put the left-panel toggle above the map/panels */
    #left-panel-toggle{
      position: fixed;
      z-index: 999;
      border-radius: 999px;
      width: 36px;
      height: 36px;
      margin: 0;
      box-shadow: 0 12px 28px rgba(0,0,0,0.14);
    }
    .left-head {
      margin-top: 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .title {
      margin: 0;
      font-size: calc(1.75rem * var(--leftScale));
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.02;
    }
    .left-actions {
      display: flex;
      gap: 8px;
      opacity: 0.9;
    }
    .mini-btn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.10);
      background: rgba(255,255,255,0.75);
      display: grid;
      place-items: center;
      cursor: not-allowed;
    }
    .mini-btn svg { width: 16px; height: 16px; opacity: 0.75; }
    .ghost-btn{
      border: 1px solid rgba(0,0,0,0.10);
      background: rgba(255,255,255,0.70);
      border-radius: 12px;
      padding: 9px 10px;
      font-family: var(--font);
      font-weight: 800;
      font-size: 0.66rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.62);
      cursor: pointer;
      transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
      user-select: none;
    }
    .ghost-btn:hover{
      background: rgba(255,255,255,0.86);
      border-color: rgba(255,106,0,0.35);
      color: rgba(0,0,0,0.74);
    }
    .ghost-btn:active{
      background: rgba(255,255,255,0.92);
    }
    .ghost-btn[aria-pressed="true"]{
      border-color: rgba(255,106,0,0.40);
    }

    .left-stack {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-top: 8px;
    }
    .card {
      border: 1px solid rgba(0,0,0,0.10);
      background: rgba(255,255,255,0.75);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .left-card {
      padding: 14px 14px 10px;
    }
    /* Make the primary country card feel "floating" + compact */
    .country-card {
      align-self: flex-start;
      padding: 12px 12px 12px;
    }
    .country-card .card-title { font-size: 0.98rem; }
    .country-card .mini-bars { display: none; }
    .oil-context{
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(0,0,0,0.08);
      color: rgba(0,0,0,0.72);
      font-size: 0.9rem;
      line-height: 1.35;
    }
    .oil-context .k{
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.72;
      margin-bottom: 6px;
    }
    .oil-context .v{
      font-weight: 600;
      color: rgba(0,0,0,0.76);
    }
    .card-topline {
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.55);
    }
    .card-topline-row{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .card-topline-row .ghost-btn{
      padding: 7px 9px;
      border-radius: 999px;
      font-size: 0.6rem;
      letter-spacing: 0.14em;
    }
    .card-title {
      margin-top: 10px;
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      line-height: 1.12;
    }
    .pill-row {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border: 1px solid rgba(0,0,0,0.10);
      background: rgba(255,255,255,0.7);
      border-radius: 999px;
      font-family: var(--font);
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      color: rgba(0,0,0,0.7);
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(0,0,0,0.25);
    }
    .dot.orange { background: var(--orange); }
    .dot.green { background: #16a34a; }

    /* Overview numbers — match app.html #card-overview metrics */
    .overview-metrics{
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-top: 14px;
    }
    .overview-row{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      border-top: 1px solid var(--hairline);
      padding-top: 10px;
      padding-bottom: 14px;
    }
    .overview-metric-empty{
      min-width: 0;
      pointer-events: none;
    }
    .overview-metrics .metric{
      min-width: 0;
    }
    .overview-metrics .metric .k{
      font-family: var(--font);
      font-size: 0.66rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--metric-k);
    }
    .overview-metrics .metric .v{
      margin-top: 6px;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
      color: var(--metric-v);
      line-height: 1.25;
    }

    .mini-bars {
      height: 76px;
      border-top: 1px solid rgba(0,0,0,0.08);
      margin-top: 12px;
      padding-top: 12px;
      display: grid;
      grid-template-columns: repeat(16, 1fr);
      gap: 5px;
      align-items: end;
      opacity: 0.72;
    }
    .mini-bars span{
      display: block;
      height: 40%;
      border-radius: 6px;
      background: rgba(0,0,0,0.08);
    }
    .mini-bars span:nth-child(3n){ height: 65%; }
    .mini-bars span:nth-child(4n){ height: 25%; }
    .mini-bars span:nth-child(5n){ height: 85%; }

    /* Main map area */
    .main {
      grid-area: main;
      position: relative;
      background:
        radial-gradient(900px 520px at 55% 48%, rgba(255,106,0,0.14) 0%, rgba(255,106,0,0.06) 30%, rgba(255,106,0,0.00) 62%),
        radial-gradient(1200px 680px at 44% 56%, rgba(0,0,0,0.06) 0%, rgba(0,0,0,0.00) 62%),
        linear-gradient(0deg, rgba(255,255,255,0.6), rgba(255,255,255,0.6)),
        #d7d7d7;
      overflow: hidden;
    }
    .main::before{
      content:'';
      position:absolute;
      inset:0;
      background:
        repeating-linear-gradient(0deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 8px);
      opacity: 0.26;
      pointer-events:none;
    }
    .main::after{
      content:'';
      position:absolute;
      inset:-40px;
      background:
        radial-gradient(circle at 35% 50%, rgba(0,0,0,0.08) 0 1px, transparent 2px) 0 0/32px 32px;
      opacity: 0.12;
      pointer-events:none;
    }
    /* Fade map near the top so the search bar stays clean */
    .main .map-fade-top{
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 120px;
      z-index: 6; /* above the map, below search (7/8) */
      pointer-events: none;
      background: linear-gradient(
        to bottom,
        rgba(241,241,240,0.98) 0%,
        rgba(241,241,240,0.92) 18%,
        rgba(241,241,240,0.70) 42%,
        rgba(241,241,240,0.00) 100%
      );
    }

    /* Floating map controls (zoom only) */
    .map-controls {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 6;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0;
      border-radius: 0;
      border: none;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      user-select: none;
    }
    .map-controls .zoom {
      border-radius: 0;
      background: rgba(255,255,255,0.65);
      border-color: rgba(0,0,0,0.08);
    }
    .map-controls .zoom button {
      width: 44px;
      height: 36px;
      font-size: 1.15rem;
      color: rgba(0,0,0,0.75);
    }
    .map-controls .zoom button + button { border-left: 1px solid rgba(0,0,0,0.10); }
    /* ── Map (reuse homepage style) ─────────────────────────────── */
    .terminal-map-wrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 1;
    }
    .terminal-map-wrap svg{
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.06));
    }
    .terminal-map-wrap svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    /* Slightly bluer ocean so the globe reads on mobile */
    .sphere { fill: #e7eef7; }
    .graticule { fill: none; stroke: rgba(48,48,48,0.05); stroke-width: 0.3; }
    .country {
      fill: #d9d6d2;
      stroke: none;
      cursor: default;
      transition: fill 0.12s;
    }
    .country:hover { fill: #d6d3d0; }
    .country.sea {
      fill: #d8d5d2;
      stroke: none;
      cursor: pointer;
    }
    .country.sea:hover { fill: #c8c4c0; }
    .country.live {
      fill: rgba(17, 24, 39, 0.28); /* dark grey for non-selected live */
      stroke: none;
      cursor: pointer;
    }
    .country.live:hover { fill: rgba(17, 24, 39, 0.38); }
    .country.live.selected {
      fill: rgba(254,94,14,0.26); /* orange for selected */
    }
    .country.live.selected:hover { fill: rgba(254,94,14,0.34); }
    .terrain-img { opacity: 0.5; mix-blend-mode: soft-light; filter: grayscale(1) contrast(1.2); pointer-events: none; }

      fill: none;

      fill: none;
      stroke: rgba(17, 24, 39, 0.45); /* dark grey for non-selected live */

      pointer-events: none;

    .border-live.selected {
      stroke: rgba(254,94,14,0.75); /* orange for selected only */

    .ping-dot {
      fill: #fe5e0e;
      filter: drop-shadow(0 0 3px rgba(254,94,14,0.6));
    }
    .live-tag {
      font-family: var(--font);
      font-weight: 700;
      fill: #fe5e0e;
      dominant-baseline: middle;
      text-anchor: start;
      letter-spacing: 0.12em;

    /* Tooltip (reuse homepage) */
    #tooltip {
      position: fixed;
      z-index: 500;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s ease;
      background: rgba(255,255,255,0.97);

    .tt-country {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      color: rgba(0,0,0,0.9);

    /* Right panel */
    .right {
      grid-area: right;
      background: var(--panel);
      border-left: 1px solid var(--line);
      display: grid;
      grid-template-rows: 1fr 1fr;
      min-height: 0;
    }

    /* Desktop layout: chart (white) on top, highlights (orange) below */
    .chart {
      padding: 28px 26px;
      border-bottom: 1px solid var(--line);

        linear-gradient(0deg, rgba(255,255,255,0.6), rgba(255,255,255,0.6)),

      flex-direction: column;
      gap: 14px;
      min-height: 0;
      overflow: auto;

      letter-spacing: -0.04em;

    /* Hide the large country title in the white panel */
    #right-title { display: none; }
    .chart .small {
      color: rgba(0,0,0,0.55);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .chart .statgrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 18px;
      margin-top: 4px;

    .chart .stat .k {
      font-size: 0.66rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.5);
    }
    .chart .stat .v {
      margin-top: 6px;
      font-family: var(--font);
      font-weight: 800;
      letter-spacing: 0.02em;
    }
    .chart .toolbar {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }
    /* Inline legend (replaces "Gov API" tag) */
    #right-subtag{
      display: inline-flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      color: rgba(0,0,0,0.55);
      font-family: var(--font);
      font-weight: 700;
      letter-spacing: 0.02em;

    .legend-item{
      display: inline-flex;

    .legend-dot{
      width: 8px;
      height: 8px;
      border-radius: 999px;

    /* export buttons now use .icon-action */

    .chart-canvas-wrap {
      position: relative;
      flex: 1;
      min-height: 220px;
      border: 1px solid rgba(0,0,0,0.08);

    .chart-canvas-wrap canvas {

    .info {
      background: var(--orange);

      display: flex;
      flex-direction: column;

    .pager {

      opacity: 0.35;

  <script>
    // Simple UI state (we'll expand this over time)
    const TERMINAL_COUNTRIES = {
      458: { name: 'Malaysia',   subtitle: '', defaultCardTitle: 'Malaysia' },
      702: { name: 'Singapore',  subtitle: '', defaultCardTitle: 'Singapore' },
      96:  { name: 'Brunei',     subtitle: '', defaultCardTitle: 'Brunei' },
      360: { name: 'Indonesia',  subtitle: '', defaultCardTitle: 'Indonesia' },
    };

    /** Oil context + overview metrics — same `metricRows` layout as app.html */
    const COUNTRY_OVERVIEW = {
      458: {
        oilContext:
          'Mid-sized upstream producer with an economy shaped by oil & gas; exports some crude and petroleum products, while still importing certain grades/volumes to meet refinery and fuel demand.',
        metricRows: [
          [['BOPD', '570,000'], ['1P Reserves', '2.7B Barrels']],
          [['Refinery Intake', '747,000'], null],
          [['Export Value', 'RM6.2bil'], ['Import Value', 'RM13.6bil']],
          [['Status', 'Net Importer'], null],
        ],
      },
      96: {
        oilContext:
          'Small, wealthy upstream producer with an economy almost entirely dependent on oil & gas; exports the vast majority of its crude and refined products, with domestic consumption representing only a tiny fraction of production.',
        metricRows: [
          [['BOPD', '102,677'], ['1P Reserves', '1.1B Barrels']],
          [['Refinery Intake', '16,338'], null],
          [['Export Value', 'BND 13.45bil'], ['Import Value', 'BND 8.62bil']],
          [['Status', 'Net Exporter'], null],
        ],
      },
      360: {
        oilContext:
          "Southeast Asia's largest economy and a former OPEC member; production has declined significantly from its peak, forcing the country to rely heavily on imported refined products despite still being a notable crude oil producer.",
        metricRows: [
          [['BOPD', '608,100'], ['1P Reserves', '2.41B Barrels']],
          [['Refinery Intake', '1,626,878'], null],
          [['Export Value', 'US$13.07bil'], ['Import Value', 'US$32.77bil']],
          [['Status', 'Net Importer'], null],
        ],
      },
      702: {
        oilContext:
          'Global refining and trading hub with no domestic oil production; imports massive volumes of crude for refining into high-value petroleum products, most of which are re-exported.',
        metricRows: [
          [['BOPD', '0'], ['1P Reserves', '0 Barrels']],
          [['Refinery Intake', '~1,100,000'], null],
          [['Export Value', 'Not specified in available data'], ['Import Value', 'Not specified in available data']],
          [['Status', 'Net Importer (refining hub)'], null],
        ],
      },
    };

    // Indonesia city-based pricing (from existing Google Sheet)
    let ID_ROWS = null;

    async function ensureIndonesiaRows() {
      if (ID_ROWS) return ID_ROWS;
      const res = await fetch(ID_SHEET_URL, { cache: 'no-store' });
      const text = await res.text();
      ID_ROWS = parseCSV(text);
      return ID_ROWS;
    }

    // Country-wide data fetch helpers

    let MY_ROWS = null;
    let SG_ROWS = null;
    let BN_ROWS = null;
    let MY_INDEX = null; // selected week index in ascending series
    // Per-country selected index for the highlights pager (all non-Malaysia).
    const TERMINAL_PAGER_INDEX = Object.create(null);
    function getPagerIndex(countryId) {
      if (+countryId === 458) return MY_INDEX;
      return TERMINAL_PAGER_INDEX[+countryId] ?? null;
    }
    function setPagerIndex(countryId, idx) {
      if (+countryId === 458) { MY_INDEX = idx; return; }
      TERMINAL_PAGER_INDEX[+countryId] = idx;
    }

    const MY_REGIONS = [
      { key: 'Semenanjung', label: 'Semenanjung' },
      { key: 'SabahSarawak', label: 'East Malaysia' },
    ];
    let MY_REGION = localStorage.getItem('terminal_my_region') || 'Semenanjung';

    /** Geo boxes for orthographic fit — map focus only (matches app.html logic). */
    const TERMINAL_MY_SUBREGION_FOCUS = {
      Semenanjung: {
        type: 'Feature',
        properties: {},
        geometry: {
          type: 'Polygon',
          coordinates: [[
            [99.5, 0.75], [104.95, 0.75], [104.95, 6.95], [99.5, 6.95], [99.5, 0.75],
          ]],
        },
      },
      SabahSarawak: {
        type: 'Feature',
        properties: {},
        geometry: {
          type: 'Polygon',
          coordinates: [[
            [108.8, 0.45], [119.6, 0.45], [119.6, 7.55], [108.8, 7.55], [108.8, 0.45],
          ]],
        },
      },
    };

    /** [lon, lat] — keys match `city` in the Indonesia sheet (see app.html). */
    const TERMINAL_ID_CITY_LONLAT = {
      'Jakarta Pusat': [106.8456, -6.2088],
      'Jakarta Selatan': [106.81, -6.26],
      'Jakarta Barat': [106.74, -6.15],
      'Jakarta Timur': [106.9, -6.22],
      'Jakarta Utara': [106.88, -6.13],
      Bekasi: [106.99, -6.24],
      Bogor: [106.8, -6.6],
      Depok: [106.82, -6.4],
      Tangerang: [106.63, -6.18],
      'Tangerang Selatan': [106.71, -6.29],
      Bandung: [107.62, -6.92],
      Semarang: [110.42, -6.99],
      Surabaya: [112.75, -7.26],
      Surakarta: [110.82, -7.57],
      Yogyakarta: [110.36, -7.8],
      Medan: [98.67, 3.59],
      Palembang: [104.75, -2.98],
      Pekanbaru: [101.45, 0.51],
      Denpasar: [115.22, -8.65],
      Makassar: [119.43, -5.15],
    };

    function terminalLonLatBoxFeature(lon, lat, padDeg) {
      const p = padDeg ?? 1.18;
      return {
        type: 'Feature',
        properties: {},
        geometry: {
          type: 'Polygon',
          coordinates: [[
            [lon - p, lat - p],
            [lon + p, lat - p],
            [lon + p, lat + p],
            [lon - p, lat + p],
            [lon - p, lat - p],
          ]],
        },
      };
    }

    /** Same heuristics as app.html `appMalaysiaRegionFromLngLat` for click → MY_REGION. */
    function terminalMalaysiaRegionFromLngLat(lon, lat) {
      const PEN = { minLon: 99.5, maxLon: 104.95, minLat: 0.75, maxLat: 6.95 };
      const EAST = { minLon: 108.8, maxLon: 119.6, minLat: 0.45, maxLat: 7.55 };
      const inPen = lon >= PEN.minLon && lon <= PEN.maxLon && lat >= PEN.minLat && lat <= PEN.maxLat;
      const inEast = lon >= EAST.minLon && lon <= EAST.maxLon && lat >= EAST.minLat && lat <= EAST.maxLat;
      if (inEast && !inPen) return 'SabahSarawak';
      if (inPen && !inEast) return 'Semenanjung';
      if (inEast && inPen) return lon >= 106.5 ? 'SabahSarawak' : 'Semenanjung';
      if (inEast) return 'SabahSarawak';
      if (inPen) return 'Semenanjung';
      return lon >= 106.5 ? 'SabahSarawak' : 'Semenanjung';
    }

    /** Valid key for TERMINAL_MY_SUBREGION_FOCUS — prefers live MY_REGION, then localStorage. */
    function terminalResolveMalaysiaRegionForMap() {
      let k = typeof MY_REGION === 'string' ? MY_REGION.trim() : '';
      if (!TERMINAL_MY_SUBREGION_FOCUS[k]) {
        try {
          const s = localStorage.getItem('terminal_my_region');
          const t = s && String(s).trim();
          if (TERMINAL_MY_SUBREGION_FOCUS[t]) k = t;
        } catch (_) {}
      }
      return TERMINAL_MY_SUBREGION_FOCUS[k] ? k : 'Semenanjung';
    }

    function myIsEastMalaysia(regionKey) {
      return regionKey === 'SabahSarawak';
    }
    function setMalaysiaRegion(regionKey) {
      regionKey = String(regionKey || '').trim();
      if (!regionKey) return;
      MY_REGION = regionKey;
      try { localStorage.setItem('terminal_my_region', regionKey); } catch (_) {}
      if (window.__terminalSelectedCountryId === 458) {
        const hiTitle = document.getElementById('info-title');
        const label = (MY_REGIONS.find(r => r.key === MY_REGION)?.label) || MY_REGION;
        if (hiTitle) hiTitle.textContent = `${label}`;
        updateRightPanelForCountry(458).catch(() => {});
      }
    }

    async function ensureMalaysiaRows() {
      if (MY_ROWS) return MY_ROWS;
      const res = await fetch(MY_API_URL);
      const json = await res.json();
      MY_ROWS = (json || []).filter(r => r.series_type === 'level');
      return MY_ROWS;
    }
    async function ensureSheetRows(url) {
      const res = await fetch(url, { cache: 'no-store' });
      const text = await res.text();
      return parseCSV(text);
    }
    async function ensureSingaporeRows() {
      if (SG_ROWS) return SG_ROWS;
      SG_ROWS = await ensureSheetRows(SG_SHEET_URL);
      return SG_ROWS;
    }
    async function ensureBruneiRows() {
      if (BN_ROWS) return BN_ROWS;
      BN_ROWS = await ensureSheetRows(BN_SHEET_URL);
      return BN_ROWS;
    }

    /** Sorted rows for the currently selected Indonesia city (for highlights pager). */
    function terminalIndonesiaSortedCityRows() {
      if (!ID_ROWS) return [];
      const city = localStorage.getItem('terminal_id_city') || 'Jakarta Pusat';
      return sortRowsByDate(ID_ROWS.filter((r) => r.city === city));
    }

    async function terminalPagerSeries(cid) {
      if (cid === 458) return sortRowsByDate((await ensureMalaysiaRows()) || []);
      if (cid === 702) return sortRowsByDate((await ensureSingaporeRows()) || []);
      if (cid === 96) return sortRowsByDate((await ensureBruneiRows()) || []);
      if (cid === 360) {
        await ensureIndonesiaRows();
        return terminalIndonesiaSortedCityRows();
      }
      return [];
    }

    /* Matches app.js / country pages — synced via localStorage key "currency" */
    function isTerminalUsd() {
      return (localStorage.getItem('currency') || 'local') === 'usd';
    }
    function fmtTerminalPerL(localSym, n, decimals = 2) {
      if (!isFinite(n)) return '—';
      const rate = USD_RATES[localSym];
      if (isTerminalUsd() && rate != null) {
        return `USD ${(n * rate).toFixed(3)}/L`;
      }
      return fmtPerL(localSym, n, decimals);
    }
    function fmtIDR(v) {
      if (!isFinite(v)) return '—';
      if (isTerminalUsd()) {
        return `USD ${(v * USD_RATES.IDR).toFixed(4)}/L`;
      }
      return `IDR ${Math.round(v).toLocaleString('en-US')}/L`;
    }

    function setRightPanel({ kicker, titleA, titleB, subtag, infoTitle, infoSub, infoLines }) {
      window.__terminalRightPanelState = { kicker, titleA, titleB, subtag, infoTitle, infoSub, infoLines };
      const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
      set('right-kicker', kicker);
      const rt = document.getElementById('right-title');
      if (rt) rt.innerHTML = `${titleA}<br/>${titleB}`;
      const st = document.getElementById('right-subtag');
      if (st) st.innerHTML = subtag || '';

      set('info-title', infoTitle);
      set('info-sub', infoSub);
      const lines = document.getElementById('info-lines');
      if (lines && Array.isArray(infoLines)) {
        // Animate numeric values in highlights when they change.
        const numToken = /(-?\d[\d,]*\.?\d*)/;
        const parseNumText = (text) => {
          const s = String(text ?? '').trim();
          const m = s.match(numToken);
          if (!m) return null;
          const raw = m[1];
          const n = parseFloat(raw.replace(/,/g, ''));
          if (!Number.isFinite(n)) return null;
          const idx = m.index ?? s.indexOf(raw);
          const prefix = s.slice(0, idx);
          const suffix = s.slice(idx + raw.length);
          const dec = (raw.split('.')[1] || '').length;
          return { n, prefix, suffix, dec };
        };
        const fmt = (n, dec) => {
          try {
            return new Intl.NumberFormat(undefined, {
              minimumFractionDigits: dec,
              maximumFractionDigits: dec,
            }).format(n);
          } catch (_) {
            return n.toFixed(dec);
          }
        };
        const animateNumber = (el, from, to, dec, prefix, suffix) => {
          const duration = 520;
          const t0 = performance.now();
          const ease = (t) => 1 - Math.pow(1 - t, 3); // easeOutCubic

          const step = (now) => {
            const p = Math.min(1, (now - t0) / duration);
            const v = from + (to - from) * ease(p);
            el.textContent = `${prefix}${fmt(v, dec)}${suffix}`;
            if (p < 1) requestAnimationFrame(step);
          };
          requestAnimationFrame(step);
        };

        // Build (or reuse) rows keyed by label.
        const existing = new Map();
        lines.querySelectorAll('.kv').forEach(row => {
          const kEl = row.querySelector('.k');
          const vEl = row.querySelector('.v');
          const key = kEl ? kEl.textContent : null;
          if (key && vEl) existing.set(key, { row, vEl });
        });

        // Remove rows that no longer exist.
        const nextKeys = new Set(infoLines.map(([k]) => String(k)));
        existing.forEach(({ row }, key) => {
          if (!nextKeys.has(key)) row.remove();
        });

        // Upsert rows in order.
        for (const [kRaw, vRaw] of infoLines) {
          const k = String(kRaw);
          const v = String(vRaw);
          let row = existing.get(k)?.row || null;
          let vEl = existing.get(k)?.vEl || null;

          if (!row || !vEl) {
            row = document.createElement('div');
            row.className = 'kv';
            const kEl = document.createElement('span');
            kEl.className = 'k';
            kEl.textContent = k;
            vEl = document.createElement('span');
            vEl.className = 'v';
            const next = parseNumText(v);
            if (next) {
              // Animate in on first render too (e.g. switching countries/cities).
              vEl.textContent = `${next.prefix}${fmt(0, next.dec)}${next.suffix}`;
              vEl.dataset.num = String(next.n);
              // Start animation next frame so layout is stable.
              requestAnimationFrame(() => animateNumber(vEl, 0, next.n, next.dec, next.prefix, next.suffix));
            } else {
              vEl.textContent = v;
            }
            row.appendChild(kEl);
            row.appendChild(vEl);
            lines.appendChild(row);
            existing.set(k, { row, vEl });
            continue;
          }

          // Update value with optional counting animation.
          const prev = parseNumText(vEl.textContent);
          const next = parseNumText(v);
          if (prev && next && prev.n !== next.n && prev.prefix === next.prefix && prev.suffix === next.suffix) {
            vEl.dataset.num = String(next.n);
            animateNumber(vEl, prev.n, next.n, next.dec, next.prefix, next.suffix);
          } else {
            vEl.textContent = v;
            const n = next?.n;
            if (Number.isFinite(n)) vEl.dataset.num = String(n);
            else delete vEl.dataset.num;
          }
        }
      }
    }

    // Right-panel chart
    let RIGHT_CHART = null;
    let RIGHT_CHART_COUNTRY = null;
    let RIGHT_CHART_MY_DIESEL_KEY = null;
    function destroyRightChart() {
      if (RIGHT_CHART) {
        RIGHT_CHART.destroy();
        RIGHT_CHART = null;
      }
      RIGHT_CHART_COUNTRY = null;
      RIGHT_CHART_MY_DIESEL_KEY = null;
      window.__terminalIndonesiaChartKey = null;
    }

    function renderRightChart({ labels, datasets, countryId, animate = true }) {
      window.__terminalRightChartState = { labels, datasets, countryId };
      const cv = document.getElementById('right-chart');
      if (!cv || !window.Chart) return;

      const ctx = cv.getContext('2d');
      function withAlpha(c, a) {
        if (!c) return c;
        const s = String(c).trim();
        // rgba(r,g,b,a)
        if (/^rgba\(/i.test(s)) return s.replace(/rgba\(([^)]+)\)/i, (m, inner) => {
          const parts = inner.split(',').map(p => p.trim());
          if (parts.length < 3) return s;
          return `rgba(${parts[0]}, ${parts[1]}, ${parts[2]}, ${a})`;
        });
        // rgb(r,g,b)
        if (/^rgb\(/i.test(s)) return s.replace(/rgb\(([^)]+)\)/i, (m, inner) => {
          const parts = inner.split(',').map(p => p.trim());
          if (parts.length < 3) return s;
          return `rgba(${parts[0]}, ${parts[1]}, ${parts[2]}, ${a})`;
        });
        // #RRGGBB or #RGB
        if (/^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(s)) {
          const hex = s.slice(1);
          const full = hex.length === 3 ? hex.split('').map(ch => ch + ch).join('') : hex;
          const r = parseInt(full.slice(0, 2), 16);
          const g = parseInt(full.slice(2, 4), 16);
          const b = parseInt(full.slice(4, 6), 16);
          return `rgba(${r}, ${g}, ${b}, ${a})`;
        }
        return s;
      }
      const mkFill = (stroke) => {
        const grad = ctx.createLinearGradient(0, 0, 0, cv.height || 220);
        grad.addColorStop(0, withAlpha(stroke, 0.18));
        grad.addColorStop(1, withAlpha(stroke, 0));
        return grad;
      };

      const CHART_CCY = { 360: 'IDR', 458: 'MYR', 702: 'SGD', 96: 'BND' };
      const ccyKey = CHART_CCY[countryId];
      const usdMult =
        isTerminalUsd() && ccyKey && USD_RATES[ccyKey] != null
          ? USD_RATES[ccyKey]
          : 1;

      const nextDs = (datasets || []).map(ds => ({
        label: ds.label,
        data: (ds.data || []).map(v =>
          v == null || !Number.isFinite(v) ? v : v * usdMult
        ),
        borderColor: ds.color,
        backgroundColor: mkFill(ds.color),
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 4,
        pointHoverBackgroundColor: ds.color,
        tension: 0.35,
        fill: true,
        spanGaps: true,
      }));

      const canUpdateInPlace =
        !!RIGHT_CHART &&
        (RIGHT_CHART_COUNTRY === (countryId ?? null)) &&
        Array.isArray(RIGHT_CHART.data?.datasets) &&
        RIGHT_CHART.data.datasets.length === nextDs.length;

      if (canUpdateInPlace) {
        RIGHT_CHART.data.labels = labels;
        nextDs.forEach((ds, i) => {
          RIGHT_CHART.data.datasets[i] = { ...RIGHT_CHART.data.datasets[i], ...ds };
        });

        if (animate) {
          const prevAnim = RIGHT_CHART.options.animation;
          RIGHT_CHART.options.animation = { duration: 650, easing: 'easeOutCubic' };
          RIGHT_CHART.update();
          RIGHT_CHART.options.animation = prevAnim;
        } else {
          RIGHT_CHART.update('none');
        }
        return;
      }

      destroyRightChart();
      RIGHT_CHART = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets: nextDs },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: animate ? { duration: 0 } : { duration: 0 },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(255,255,255,0.96)',
              borderColor: 'rgba(0,0,0,0.12)',
              borderWidth: 1,
              titleColor: 'rgba(0,0,0,0.9)',
              bodyColor: 'rgba(0,0,0,0.75)',
              titleFont: { family: 'Inter', size: 12, weight: '700' },
              bodyFont:  { family: 'Inter', size: 12, weight: '600' },
            },
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { color: 'rgba(0,0,0,0.45)', font: { family: 'Inter', size: 11 }, maxRotation: 0 },
            },
            y: {
              grid: { color: 'rgba(0,0,0,0.06)' },
              ticks: { color: 'rgba(0,0,0,0.45)', font: { family: 'Inter', size: 11 } },
            },
          },
        },
      });
      RIGHT_CHART_COUNTRY = countryId ?? null;
    }

    function waitForChartJs() {
      if (window.Chart) return Promise.resolve();
      return new Promise(resolve => {
        const t = setInterval(() => {
          if (window.Chart) { clearInterval(t); resolve(); }
        }, 30);
        setTimeout(() => { clearInterval(t); resolve(); }, 2500);
      });
    }

    async function updateRightPanelForCountry(countryId) {
      // Default skeleton
      const meta = TERMINAL_COUNTRIES[countryId];
      if (!meta) return;
      await waitForChartJs();

      const takeLast = (arr, n) => arr.slice(Math.max(0, arr.length - n));
      const asNum = (v) => {
        const n = parseFloat(v);
        return Number.isFinite(n) ? n : null;
      };
      const legendHtml = (datasets) => {
        if (!datasets?.length) return '';
        return datasets.map(ds => {
          const c = ds.color || '#999';
          const label = ds.label || '';
          return `<span class="legend-item"><span class="legend-dot" style="background:${c}"></span>${label}</span>`;
        }).join('');
      };
      const buildSeries = ({ rows, keys, labels, colorOffset = 0 }) => {
        return keys.map((k, i) => ({
          label: k.label,
          color: CHART_COLORS[(colorOffset + i) % CHART_COLORS.length],
          data: labels.map(d => {
            const r = rows.find(x => x.__label === d);
            return r ? asNum(r[k.key]) : null;
          }),
        }));
      };

      // Indonesia: reflect selected city/fuel from city card (pager = history rows for this city)
      if (countryId === 360) {
        const rows = await ensureIndonesiaRows();
        const city = localStorage.getItem('terminal_id_city') || 'Jakarta Pusat';
        const seriesAsc = sortRowsByDate(rows.filter((r) => r.city === city));

        let idx = getPagerIndex(360);
        if (idx == null) idx = Math.max(0, seriesAsc.length - 1);
        if (seriesAsc.length) idx = Math.max(0, Math.min(seriesAsc.length - 1, idx));
        else idx = 0;
        setPagerIndex(360, idx);

        const rSel = seriesAsc[idx] || {};
        const sliceRows = takeLast(seriesAsc, 13).map(r => ({ ...r, __label: fmtDate(r.date) }));
        const labels = sliceRows.map(r => r.__label);
        const datasets = buildSeries({ rows: sliceRows, keys: ID_FUELS, labels });
        setRightPanel({
          kicker: 'Indonesia Petrol Prices History',
          titleA: 'Indonesia',
          titleB: 'Overview',
          subtag: legendHtml(datasets),
          infoTitle: city,
          infoSub: `As of ${fmtDate(rSel.date)} · Indonesia`,
          infoLines: ID_FUELS.map((f) => [f.label, fmtIDR(parseFloat(rSel[f.key]))]),
        });
        const idChartMode = isTerminalUsd() ? 'usd' : 'local';
        const idChartKey = `${city}|${idChartMode}`;
        if (RIGHT_CHART_COUNTRY !== 360 || window.__terminalIndonesiaChartKey !== idChartKey) {
          renderRightChart({
            labels,
            datasets,
            countryId: 360,
            animate: true,
          });
          window.__terminalIndonesiaChartKey = idChartKey;
        }
        if (typeof window.__terminalSyncPager === 'function') window.__terminalSyncPager();
        return;
      }

      // Malaysia
      if (countryId === 458) {
        const rows = await ensureMalaysiaRows();
        const seriesAsc = sortRowsByDate(rows || []);

        if (MY_INDEX == null) MY_INDEX = Math.max(0, seriesAsc.length - 1); // default: latest
        MY_INDEX = Math.max(0, Math.min(seriesAsc.length - 1, MY_INDEX));

        const rSel = seriesAsc[MY_INDEX] || {};
        // Keep the chart stable (always show the latest window),
        // while the pager changes only the selected-week details.
        const slice = takeLast(seriesAsc, 13);
        const sliceRows = slice.map(r => ({ ...r, __label: fmtDate(r.date) }));
        const labels = sliceRows.map(r => r.__label);
        const isEast = myIsEastMalaysia(MY_REGION);
        const dieselKey = isEast ? 'diesel_eastmsia' : 'diesel';
        const dieselLabel = isEast ? 'Diesel (East MY)' : 'Diesel';
        const keys = [
          { key: 'ron95', label: 'RON95' },
          { key: 'ron97', label: 'RON97' },
          { key: dieselKey, label: dieselLabel },
        ];
        const datasets = buildSeries({ rows: sliceRows, keys, labels, colorOffset: 0 }).map(ds => {
          if (ds.label === 'RON95') return { ...ds, color: '#fbbf24' }; // yellow/amber
          if (ds.label === 'RON97') return { ...ds, color: '#16a34a' }; // green
          if (ds.label === dieselLabel) return { ...ds, color: '#111827' }; // near-black
          return ds;
        });
        setRightPanel({
          kicker: 'Malaysia Petrol Prices History',
          titleA: 'Malaysia',
          titleB: 'Overview',
          subtag: legendHtml(datasets),
          infoTitle: `${(MY_REGIONS.find(r => r.key === MY_REGION)?.label) || MY_REGION}`,
          infoSub: `As of ${fmtDate(rSel.date)} · Malaysia`,
          infoLines: [
            ['BUDI95', fmtTerminalPerL('MYR', parseFloat(rSel.ron95_budi95), 2)],
            ['RON95', fmtTerminalPerL('MYR', parseFloat(rSel.ron95), 2)],
            ['RON97', fmtTerminalPerL('MYR', parseFloat(rSel.ron97), 2)],
            [dieselLabel, fmtTerminalPerL('MYR', parseFloat(rSel[dieselKey]), 2)],
          ],
        });
        // Don't re-render the chart on pager clicks; keep it visually still (still refresh on currency / diesel key).
        const chartMode = isTerminalUsd() ? 'usd' : 'local';
        if (RIGHT_CHART_COUNTRY !== 458 || RIGHT_CHART_MY_DIESEL_KEY !== dieselKey || window.__terminalMalaysiaChartMode !== chartMode) {
          renderRightChart({
            labels,
            datasets,
            countryId: 458,
            animate: true,
          });
          RIGHT_CHART_MY_DIESEL_KEY = dieselKey;
          window.__terminalMalaysiaChartMode = chartMode;
        }
        // Ensure pager buttons become clickable once data is ready
        if (typeof window.__terminalSyncPager === 'function') window.__terminalSyncPager();

      // Singapore
      if (countryId === 702) {
        const rows = await ensureSingaporeRows();

        setPagerIndex(702, idx);

        const rSel = seriesAsc[idx] || {};
        const slice = takeLast(seriesAsc, 13);
        const sliceRows = slice.map(r => ({ ...r, __label: fmtDate(r.date) }));
        const labels = sliceRows.map(r => r.__label);
        const keys = [
          { key: 'ron92', label: 'RON92' },
          { key: 'ron95', label: 'RON95' },
          { key: 'ron98', label: 'RON98' },
          { key: 'premium', label: 'Premium' },
          { key: 'diesel', label: 'Diesel' },

        const datasets = buildSeries({ rows: sliceRows, keys, labels, colorOffset: 0 });
        setRightPanel({
          kicker: 'Singapore Petrol Prices History',
          titleA: 'Singapore',
          titleB: 'Overview',
          subtag: legendHtml(datasets),
          infoTitle: 'National',
          infoSub: `As of ${fmtDate(rSel.date)} · Singapore`,
          infoLines: [
            ['RON92', fmtTerminalPerL('SGD', parseFloat(rSel.ron92), 2)],
            ['RON95', fmtTerminalPerL('SGD', parseFloat(rSel.ron95), 2)],
            ['RON98', fmtTerminalPerL('SGD', parseFloat(rSel.ron98), 2)],
            ['Premium', fmtTerminalPerL('SGD', parseFloat(rSel.premium), 2)],
            ['Diesel', fmtTerminalPerL('SGD', parseFloat(rSel.diesel), 2)],
          ],
        });
        renderRightChart({
          labels,
          datasets,
          countryId: 702,
        });
        if (typeof window.__terminalSyncPager === 'function') window.__terminalSyncPager();
        return;
      }

      // Brunei
      if (countryId === 96) {
        const rows = await ensureBruneiRows();
        const seriesAsc = sortRowsByDate(rows || []);

        let idx = getPagerIndex(96);
        if (idx == null) idx = Math.max(0, seriesAsc.length - 1);
        idx = Math.max(0, Math.min(seriesAsc.length - 1, idx));
        setPagerIndex(96, idx);

        const rSel = seriesAsc[idx] || {};
        const slice = takeLast(seriesAsc, 13);
        const sliceRows = slice.map(r => ({ ...r, __label: fmtDate(r.date) }));
        const labels = sliceRows.map(r => r.__label);
        const keys = [
          { key: 'gasoline', label: 'Gasoline' },
          { key: 'diesel', label: 'Diesel' },
          { key: 'vpower_gasoline', label: 'V-Power Gasoline' },
          { key: 'vpower_diesel', label: 'V-Power Diesel' },
        ];
        const datasets = buildSeries({ rows: sliceRows, keys, labels, colorOffset: 0 });
        setRightPanel({
          kicker: 'Brunei Petrol Prices History',
          titleA: 'Brunei',
          titleB: 'Overview',
          subtag: legendHtml(datasets),
          infoTitle: 'National',
          infoSub: `As of ${fmtDate(rSel.date)} · Brunei`,
          infoLines: [
            ['Gasoline', fmtTerminalPerL('BND', parseFloat(rSel.gasoline), 2)],
            ['Diesel', fmtTerminalPerL('BND', parseFloat(rSel.diesel), 2)],
            ['V-Power Gasoline', fmtTerminalPerL('BND', parseFloat(rSel.vpower_gasoline), 2)],
            ['V-Power Diesel', fmtTerminalPerL('BND', parseFloat(rSel.vpower_diesel), 2)],

          labels,
          datasets,
          countryId: 96,

        if (typeof window.__terminalSyncPager === 'function') window.__terminalSyncPager();

    }

    // Malaysia region dropdown (click the underlined title)
    (function initMalaysiaRegionMenu(){
      const titleEl = document.getElementById('info-title');
      const menu = document.getElementById('my-city-menu');
      if (!titleEl || !menu) return;

      let open = false;

      function closeMenu(){
        if (!open) return;
        open = false;
        menu.classList.remove('open');
        titleEl.setAttribute('aria-expanded', 'false');
      }

      function positionMenu(){
        const r = titleEl.getBoundingClientRect();
        const left = Math.min(Math.max(12, r.left), window.innerWidth - 12);
        const top  = Math.min(r.bottom + 8, window.innerHeight - 12);
        menu.style.left = `${left}px`;
        menu.style.top  = `${top}px`;
      }

      function renderMenu(){
        const cur = MY_REGION;
        menu.innerHTML = MY_REGIONS.map(r => `
          <div class="city-item ${r.key === cur ? 'active' : ''}" role="option" aria-selected="${r.key === cur ? 'true' : 'false'}" data-region="${r.key}">
            <div style="display:flex;flex-direction:column;gap:1px;">
              <div class="label">${r.label}</div>
            </div>
            <div style="font-size:0.9rem;opacity:${r.key === cur ? '0.85' : '0'}">✓</div>
          </div>
        `).join('');

        menu.querySelectorAll('.city-item').forEach(el => {
          el.addEventListener('click', () => {
            const region = el.getAttribute('data-region');
            setMalaysiaRegion(region);
            if (typeof window.__terminalZoomToCountry === 'function') window.__terminalZoomToCountry(458, true);
            closeMenu();
          });
        });
      }

      function openMenu(){
        if (open) return;
        open = true;
        renderMenu();
        positionMenu();
        menu.classList.add('open');
        titleEl.setAttribute('aria-expanded', 'true');
      }

      titleEl.setAttribute('role', 'button');
      titleEl.setAttribute('tabindex', '0');
      titleEl.setAttribute('aria-haspopup', 'listbox');
      titleEl.setAttribute('aria-expanded', 'false');

      titleEl.addEventListener('click', e => {
        if (window.__terminalSelectedCountryId !== 458) return;
        e.stopPropagation();
        open ? closeMenu() : openMenu();
      });
      titleEl.addEventListener('keydown', e => {
        if (window.__terminalSelectedCountryId !== 458) return;
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open ? closeMenu() : openMenu(); }
        if (e.key === 'Escape') { closeMenu(); }
      });

      document.addEventListener('click', e => {
        if (!open) return;
        if (e.target === titleEl || titleEl.contains(e.target)) return;
        if (e.target === menu || menu.contains(e.target)) return;
        closeMenu();
      });
      window.addEventListener('resize', () => { if (open) positionMenu(); });
      window.addEventListener('scroll', () => { if (open) closeMenu(); }, { passive: true });
      document.addEventListener('keydown', e => { if (open && e.key === 'Escape') closeMenu(); });

    // Country search dropdown
    (function initCountrySearch(){
      const input = document.getElementById('country-search');
      const menu  = document.getElementById('country-search-menu');
      if (!input || !menu) return;

      const all = Object.entries(TERMINAL_COUNTRIES).map(([id, meta]) => ({
        id: +id,
        name: meta.name,
        subtitle: meta.subtitle || ''
      })).sort((a, b) => a.name.localeCompare(b.name));

      let isOpen = false;
      let activeIndex = -1;

      function openMenu(){
        if (isOpen) return;
        isOpen = true;
        menu.classList.add('open');
        input.setAttribute('aria-expanded', 'true');
      }
      function closeMenu(){
        if (!isOpen) return;
        isOpen = false;
        activeIndex = -1;
        menu.classList.remove('open');
        input.setAttribute('aria-expanded', 'false');
      }
      function setActive(idx){
        activeIndex = idx;
        const items = Array.from(menu.querySelectorAll('.search-item'));
        items.forEach((el, i) => el.classList.toggle('active', i === activeIndex));
        if (activeIndex >= 0 && items[activeIndex]) {
          items[activeIndex].scrollIntoView({ block: 'nearest' });
        }
      }
      function selectCountry(id){
        const meta = TERMINAL_COUNTRIES[id];
        if (!meta) return;
        input.value = meta.name;
        setLeftOverview(id);
        // Keep map selection highlight in sync when chosen from dropdown
        document.querySelectorAll('.country.live').forEach(el => {
          const did = el && el.__data__ ? +el.__data__.id : NaN;
          el.classList.toggle('selected', did === +id);
        });
        document.querySelectorAll('.border-live').forEach(el => {
          const did = el && el.__data__ ? +el.__data__.id : NaN;
          el.classList.toggle('selected', did === +id);
        });
        if (typeof window.__terminalZoomToCountry === 'function') window.__terminalZoomToCountry(id, true);
        closeMenu();
        input.blur();
      }

      function render(list){
        if (!list.length) {
          menu.innerHTML = `<div class="search-empty">No matches</div>`;
          return;
        }
        menu.innerHTML = list.map((c, idx) => `
          <div class="search-item" role="option" data-id="${c.id}" data-idx="${idx}">
            <div class="label">${c.name}</div>
            <div class="sub">${c.subtitle}</div>
          </div>
        `).join('');
      }

      function getFiltered(){
        const q = (input.value || '').trim().toLowerCase();
        if (!q) return all;
        return all.filter(c =>
          c.name.toLowerCase().includes(q) ||
          c.subtitle.toLowerCase().includes(q)
        );
      }

        const filtered = getFiltered();
        render(filtered);
        setActive(filtered.length ? 0 : -1);

      input.setAttribute('aria-expanded', 'false');

      input.addEventListener('focus', () => { openMenu(); refresh(); });
      input.addEventListener('click',  () => { openMenu(); refresh(); });
      input.addEventListener('input',  () => { openMenu(); refresh(); });
      input.addEventListener('keydown', (e) => {
        if (!isOpen && (e.key === 'ArrowDown' || e.key === 'ArrowUp')) {
          openMenu();
          refresh();
          e.preventDefault();
          return;
        }
        if (!isOpen) return;

        const items = Array.from(menu.querySelectorAll('.search-item'));
        if (e.key === 'Escape') { closeMenu(); e.preventDefault(); return; }
        if (e.key === 'ArrowDown') { setActive(Math.min(items.length - 1, activeIndex + 1)); e.preventDefault(); return; }
        if (e.key === 'ArrowUp') { setActive(Math.max(0, activeIndex - 1)); e.preventDefault(); return; }
        if (e.key === 'Enter') {
          const el = items[activeIndex];
          const id = el ? +el.getAttribute('data-id') : null;
          if (id) selectCountry(id);
          e.preventDefault();
        }
      });

      menu.addEventListener('mousemove', (e) => {
        const item = e.target.closest('.search-item');

      menu.addEventListener('mousedown', (e) => {

      document.addEventListener('pointerdown', onDocPointerDown, true);

      document.addEventListener('keydown', (e) => {
        const isMacFind = (e.metaKey && !e.ctrlKey && (e.key === 'f' || e.key === 'F'));
        const isWinFind = (e.ctrlKey && !e.metaKey && (e.key === 'f' || e.key === 'F'));
        if (!isMacFind && !isWinFind) return;

        e.preventDefault();
        e.stopPropagation();
        openMenu();
        refresh();
        input.focus();

        try { input.select(); } catch (_) {}

            .on('click', () => { setLeftOverview(702); if (typeof window.__terminalZoomToCountry === 'function') window.__terminalZoomToCountry(702, true); })
            .on('touchend', e => { e.preventDefault(); setLeftOverview(702); if (typeof window.__terminalZoomToCountry === 'function') window.__terminalZoomToCountry(702, true); })
            .on('touchstart', e => {

          const MY = countries.features.find(f => +f.id === 458);
          const myPingG = mapG.append('g').attr('pointer-events', 'none');
          const myDot = myPingG.append('circle').attr('class', 'ping-dot').attr('r', mobile ? 3.5 : 4);
          const myText = myPingG.append('text').attr('class', 'live-tag')
            .attr('font-size', mobile ? 8 : 7).text('LIVE');
          if (MY) {
            // positioned by updateAll()
          }

          const zIn  = document.getElementById('zoom-in');
          const zOut = document.getElementById('zoom-out');

          function updateAll(){
            spherePath.attr('d', path);
            graticulePath.attr('d', path);
            bgPaths.attr('d', path);
            seaPaths.attr('d', path);
            livePaths.attr('d', path);
            borderMesh.attr('d', path);
            liveBorders.attr('d', path);

            const [sgx, sgy] = projection([103.82, 1.35]) || [NaN, NaN];
            const sgVisible = isFinite(sgx) && isFinite(sgy) && sgx >= 0 && sgx <= W && sgy >= 0 && sgy <= H;
            sgCircle.attr('display', sgVisible ? null : 'none')
              .attr('cx', sgx).attr('cy', sgy);

              const [cx, cy] = path.centroid(MY);
              const dotR = mobile ? 3.5 : 4;

            } else {
              myDot.attr('display', 'none');
              myText.attr('display', 'none');

          }

          function setScale(next, animate = true){
            const s = Math.max(baseScale * 0.75, Math.min(baseScale * 4.8, next));
            if (!animate) {
              projection.scale(s);
              updateAll();
              return;
            }
            const s0 = projection.scale();
            const interp = d3.interpolateNumber(s0, s);
            svg.transition().duration(160).tween('globeScale', () => t => {
              projection.scale(interp(t));
              updateAll();
            });
          }

          function rotateBy(dx, dy){
            const r = projection.rotate(); // [lambda, phi, gamma]
            // Lower sensitivity so the globe feels less twitchy,
            // especially on trackpads and high-DPI touch devices.
            const sens = 0.06;
            // Deadzone to ignore tiny micro-movements.
            const ddx = Math.abs(dx) < 1.5 ? 0 : dx;
            const ddy = Math.abs(dy) < 1.5 ? 0 : dy;
            const next = [
              r[0] + ddx * sens,
              Math.max(-85, Math.min(85, r[1] - ddy * sens)),
              0
            ];
            projection.rotate(next);
            updateAll();
          }

          // Drag to rotate (globe motion)
          svg.style('cursor', 'grab');
          svg.call(d3.drag()
            .on('start', () => svg.style('cursor', 'grabbing'))
            .on('drag', (event) => { rotateBy(event.dx, event.dy); })
            .on('end', () => svg.style('cursor', 'grab'))
          );

          // Wheel to zoom (change globe scale)
          svg.on('wheel', (event) => {
            event.preventDefault();
            const k = event.deltaY < 0 ? 1.10 : 0.90;
            setScale(projection.scale() * k, false);
          }, { passive: false });

          /** Orthographic fit without mutating the live projection (d3-geo fitExtent). */
          function terminalProjectionFitFeature(feature, padPx) {
            const c = d3.geoCentroid(feature);
            if (!Number.isFinite(c[0]) || !Number.isFinite(c[1])) return null;
            const p = d3.geoOrthographic()
              .clipAngle(90)
              .precision(0.3)
              .rotate([-c[0], -c[1], 0]);
            try {
              p.fitExtent([[padPx, padPx], [W - padPx, H - padPx]], feature);
            } catch (_) {
              return null;
            }
            const sc = p.scale();
            const tr = p.translate();
            const rot = p.rotate();
            if (!Number.isFinite(sc) || sc <= 0) return null;
            if (!Array.isArray(tr) || tr.length < 2 || !Number.isFinite(tr[0]) || !Number.isFinite(tr[1])) return null;
            return {
              scale: sc,
              translate: [tr[0], tr[1]],
              rotate: [rot[0], rot[1], rot[2] || 0],
            };
          }

          /** Same approach as app.html: bounds at scale 1, then absolute scale. */
          function computeFitScaleBounds(feature, rotateArr, padPx) {
            const s0 = projection.scale();
            const r0 = projection.rotate();
            const t0 = projection.translate();
            try {
              projection.scale(1).rotate(rotateArr).translate([W / 2, H / 2]);
              const b = path.bounds(feature);
              const dx = b[1][0] - b[0][0];
              const dy = b[1][1] - b[0][1];
              if (!(dx > 0) || !(dy > 0)) return null;
              const s = Math.min((W - padPx) / dx, (H - padPx) / dy);
              if (!Number.isFinite(s) || s <= 0) return null;
              return s;
            } finally {
              projection.scale(s0).rotate(r0).translate(t0);
            }
          }

          function terminalInterpRotate(from, to) {
            let dLon = to[0] - from[0];
            while (dLon > 180) dLon -= 360;
            while (dLon < -180) dLon += 360;
            const r0 = from[0];
            const r1 = from[1];
            const r2 = from[2] || 0;
            return t => [
              r0 + t * dLon,
              r1 + t * (to[1] - r1),
              r2 + t * ((to[2] || 0) - r2),
            ];
          }

          // Programmatic "focus": rotate + zoom to country (or sub-region / city when applicable)
          window.__terminalZoomToCountry = function zoomToCountry(countryId, animate = true) {
            const base = countries.features.find(x => +x.id === +countryId);
            if (!base) return;
            let f = base;
            let subFocus458 = false;
            let subFocus360 = false;
            if (+countryId === 458) {
              const myKey = terminalResolveMalaysiaRegionForMap();
              if (TERMINAL_MY_SUBREGION_FOCUS[myKey]) {

            const [lon, lat] = d3.geoCentroid(f);
            if (!Number.isFinite(lon) || !Number.isFinite(lat)) return;
            const target = [-lon, -lat, 0];
            const padZ = mobile ? 52 : 74;

            const fitted = terminalProjectionFitFeature(f, padZ);
            let nextScale;
            let nextTranslate;
            let nextRotate;
            if (fitted) {
              nextScale = fitted.scale;
              nextTranslate = fitted.translate;
              nextRotate = fitted.rotate;
            } else {
              const fitS = computeFitScaleBounds(f, target, padZ);
              nextScale = fitS
                ? Math.max(baseScale * 0.85, Math.min(baseScale * 4.8, fitS))
                : projection.scale();
              nextTranslate = [W / 2, H / 2];
              nextRotate = target;
            }

            nextScale = Math.max(baseScale * 0.75, Math.min(baseScale * 4.8, nextScale));
            if (subFocus458) {
              const myKey = terminalResolveMalaysiaRegionForMap();
              const floor = baseScale * (myKey === 'SabahSarawak' ? 2.45 : 2.12);
              nextScale = Math.max(nextScale, Math.min(baseScale * 4.8, floor));
            }
            if (subFocus360) {
              const floor = baseScale * 2.15;
              nextScale = Math.max(nextScale, Math.min(baseScale * 4.8, floor));
            }
            if (!animate) {
              projection.rotate(nextRotate).scale(nextScale).translate(nextTranslate);
              updateAll();
              return;
            }
            svg.interrupt();
            const r0 = projection.rotate();
            const s0 = projection.scale();
            const tr0 = projection.translate();
            const interpR = terminalInterpRotate(r0, nextRotate);
            const interpS = d3.interpolateNumber(s0, nextScale);
            const interpT = d3.interpolate(tr0, nextTranslate);
            svg.transition().duration(360).tween('globeFocus', () => t => {
              projection.rotate(interpR(t)).scale(interpS(t)).translate(interpT(t));
              updateAll();
            });
          };

          // On first render, focus on selected country
          const initialId = window.__terminalSelectedCountryId ?? 458;
          window.__terminalZoomToCountry(initialId, false);

          if (zIn) zIn.onclick = () => setScale(projection.scale() * 1.18, true);
          if (zOut) zOut.onclick = () => setScale(projection.scale() * 0.85, true);

          // Initial paint
          updateAll();
        });
    }

    // Orange-panel pager (highlights timeline)
    (function initPager() {

      const PAGER_COUNTRIES = new Set([360, 458, 702, 96]); // ID + MY + SG + BN

      function syncPager() {
