          <div class="left-head">

          <div class="left-stack">
            <div class="country-card" aria-label="Country overview">

              <div class="oil-context" aria-label="Oil context">

              <div class="mini-bars" aria-hidden="true">
                <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>

    <div class="gutter gutter-left" id="gutter-left" role="separator" aria-label="Resize left panel" aria-orientation="vertical" tabindex="0"></div>

    <main class="main" aria-label="Country map">
      <div class="map-topbar" aria-label="Map toolbar">

    <div class="gutter gutter-right" id="gutter-right" role="separator" aria-label="Resize right panel" aria-orientation="vertical" tabindex="0"></div>

    <aside class="right" aria-label="Details">
      <div class="chart">
        <div class="small" id="right-kicker">Fuel prices</div>

  <!-- Region / city / provider switcher (Malaysia, Indonesia, Singapore, Laos) -->
  <div id="terminal-switcher-menu" class="city-menu" role="listbox" aria-label="Options"></div>

  <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="assets/config.js?v=idfuels-2"></script>
  <script src="assets/utils.js"></script>
  <script src="assets/terminal-map-mapkit.js"></script>
  <script src="assets/terminal-map-openfreemap.js"></script>
  <script>
    // COUNTRIES, COUNTRY_OVERVIEW_FALLBACK, OVERVIEW_SHEET_URL, ID_CITY_LONLAT, LA_PROVINCE_LONLAT, MY_REGIONS, TH_FUELS, PH_FUELS, KH/MM/LA fuels — from config.js
    // ensureMalaysiaRows, ensureSheetRows, mergeCurrencySheetRowsIntoUsdRates, cssVar, withAlpha, takeLastN, rowsForPriceChart, asNum, buildChartSeries — from utils.js

    let MY_INDEX = null; // selected week index in ascending series
    // Per-country selected index for the highlights pager (all non-Malaysia).
    const PAGER_INDEX = Object.create(null);
    const LOADED_ROWS = new Map();
    let _idAllRows = null;
    let _laAllRows = null;
    let _sgAllRows = null;
    let _mmAllRows = null;
    let _vnAllRows = null;

    function getLaosProvince() {
      try {
        return localStorage.getItem('terminal_la_province') || 'Vientiane Capital';
      } catch (_) {
        return 'Vientiane Capital';
      }
    }

    function getMyanmarRegion() {
      try {
        const s = localStorage.getItem('terminal_mm_region');
        if (s && String(s).trim()) return String(s).trim();
      } catch (_) {}
      return 'Thuwanna';
    }

    function getVietnamArea() {
      try {
        const s = localStorage.getItem('terminal_vn_area');
        if (s && String(s).trim()) {
          const t = String(s).trim();
          return canonVietnamAreaKey(t) || t;
        }
      } catch (_) {}
      return 'area_1';
    }

    function labelVietnamArea(areaKey) {
      const a = normalizeSheetString(areaKey).toLowerCase();
      const m = /^area[_-]?(\d+)$/.exec(a);
      if (m) return `Area ${m[1]}`;
      return normalizeSheetString(areaKey) || 'Area 1';
    }

    function getPagerIndex(countryId) {
      if (+countryId === 458) return MY_INDEX;
      return PAGER_INDEX[+countryId] ?? null;
    }
    function setPagerIndex(countryId, idx) {
      if (+countryId === 458) { MY_INDEX = idx; return; }
      PAGER_INDEX[+countryId] = idx;
    }

    let MY_REGION = localStorage.getItem('terminal_my_region') || 'Semenanjung';

    function myIsEastMalaysia(regionKey) {
      return regionKey === 'SabahSarawak';
    }
    function setMalaysiaRegion(regionKey) {
      regionKey = String(regionKey || '').trim();
      if (!regionKey) return;
      MY_REGION = regionKey;
      try { localStorage.setItem('terminal_my_region', regionKey); } catch (_) {}
      if (window.__terminalSelectedCountryId === 458) {
        const hiTitle = document.getElementById('info-title');
        const label = (MY_REGIONS.find(r => r.key === MY_REGION)?.label) || MY_REGION;
        if (hiTitle) hiTitle.textContent = `${label}`;
        updateRightPanelForCountry(458).catch(() => {});
      }
    }

    async function ensureSingaporeRows() {
      const rows = await ensureSheetRows(SG_SHEET_URL);
      _sgAllRows = rows;
      return rows;
    }

    /** Sorted rows for the selected Singapore provider (highlights pager + chart window). */
    function singaporeSortedProviderRows() {
      const rows = _sgAllRows || [];
      const prov = resolveSingaporeProviderSelection(rows);
      if (prov) {
        try { localStorage.setItem('terminal_sg_provider', prov); } catch (_) {}
      }
      const pNorm = normalizeSheetString(prov);
      return sortRowsByDate(rows.filter((r) => normalizeSheetString(r.provider) === pNorm));
    }

    /** Sorted rows for the currently selected Indonesia city (for highlights pager). */
    function indonesiaSortedCityRows() {
      if (!_idAllRows) return [];
      const city = localStorage.getItem('terminal_id_city') || 'Jakarta Pusat';
      const cn = normalizeSheetString(city);
      return sortRowsByDate(_idAllRows.filter(r => normalizeSheetString(r.city) === cn));
    }

    function laosSortedProvinceRows() {
      if (!_laAllRows) return [];
      const pn = normalizeSheetString(getLaosProvince());
      return sortRowsByDate(_laAllRows.filter((r) => normalizeSheetString(r.province) === pn));
    }

    function myanmarSortedRegionRows() {
      if (!_mmAllRows) return [];
      const reg = normalizeSheetString(getMyanmarRegion());
      return sortRowsByDate(_mmAllRows.filter((r) => normalizeSheetString(r.region) === reg));
    }

    function vietnamSortedAreaRows() {
      if (!_vnAllRows) return [];
      const want = canonVietnamAreaKey(getVietnamArea());
      return sortRowsByDate(_vnAllRows.filter((r) => canonVietnamAreaKey(r.area) === want));
    }

    async function pagerSeries(cid) {
      if (cid === 458) return sortRowsByDate((await ensureMalaysiaRows()) || []);
      if (cid === 702) {
        await ensureSingaporeRows();
        return singaporeSortedProviderRows();
      }
      if (cid === 96) return sortRowsByDate((await ensureSheetRows(BN_SHEET_URL)) || []);
      if (cid === 764) return sortRowsByDate((await ensureSheetRows(TH_SHEET_URL)) || []);
      if (cid === 608) return sortRowsByDate((await ensureSheetRows(PH_SHEET_URL)) || []);
      if (cid === 116) return sortRowsByDate((await ensureSheetRows(KH_SHEET_URL)) || []);
      if (cid === 104) {
        _mmAllRows = await ensureSheetRows(MM_SHEET_URL);
        return myanmarSortedRegionRows();
      }
      if (cid === 704) {
        _vnAllRows = await ensureSheetRows(VN_SHEET_URL);
        return vietnamSortedAreaRows();
      }
      if (cid === 360) {
        _idAllRows = await ensureSheetRows(ID_SHEET_URL);
        return indonesiaSortedCityRows();
      }
      if (cid === 418) {
        _laAllRows = await ensureSheetRows(LA_SHEET_URL);
        return laosSortedProvinceRows();
      }
      return [];
    }

    /* Matches app.js / country pages — synced via localStorage key "currency" */
    function isTerminalUsd() {
      return (localStorage.getItem('currency') || 'local') === 'usd';
    }
    function fmtTerminalPerL(localSym, n, decimals = 2) {
      const x = typeof n === 'number' && Number.isFinite(n) ? n : parseFloat(String(n).replace(/,/g, '').trim());
      if (!Number.isFinite(x)) return 'Unavailable';
      const dec =
        Number.isFinite(decimals) && decimals >= 0 ? Math.min(20, Math.floor(decimals)) : 2;
      const rate = USD_RATES[localSym];
      if (isTerminalUsd() && rate != null) {
        return `USD ${formatNumberCommas(x * rate, 2, 2)}/L`;
      }
      const s = fmtPerL(localSym, x, dec);
      return s === '—' ? 'Unavailable' : s;
    }
    function fmtIDR(v) {
      if (!isFinite(v)) return 'Unavailable';
      if (isTerminalUsd()) {
        return `USD ${formatNumberCommas(v * USD_RATES.IDR, 2, 2)}/L`;
      }
      return `IDR ${formatNumberCommas(Math.round(v), 0, 0)}/L`;
    }

    /** vs previous history row; '-' if unchanged / no comparison (ASCII hyphen). Respects USD toggle. */
    function fmtTerminalDeltaPerL(localSym, currentVal, prevVal, decimals = 2) {
      const cur = parseFloat(String(currentVal).replace(/,/g, ''));
      const prev = parseFloat(String(prevVal).replace(/,/g, ''));
      if (!Number.isFinite(cur) || !Number.isFinite(prev)) return '-';
      const dec =
        Number.isFinite(decimals) && decimals >= 0 ? Math.min(20, Math.floor(decimals)) : 2;
      if (cur.toFixed(dec) === prev.toFixed(dec)) return '-';
      const diff = cur - prev;
      const rate = USD_RATES[localSym];
      if (isTerminalUsd() && rate != null) {
        const dUsd = diff * rate;
        const mag = formatNumberCommas(Math.abs(dUsd), 2, 2);
        if (dUsd > 0) return `+USD ${mag}`;
        return `-USD ${mag}`;
      }
      const mag = formatNumberCommas(Math.abs(diff), dec, dec);
      if (diff > 0) return `+${localSym} ${mag}`;
      return `-${localSym} ${mag}`;
    }

    function fmtTerminalDeltaIDR(currentVal, prevVal) {
      const cur = parseFloat(String(currentVal).replace(/,/g, ''));
      const prev = parseFloat(String(prevVal).replace(/,/g, ''));
      if (!Number.isFinite(cur) || !Number.isFinite(prev)) return '-';
      const a = Math.round(cur);
      const b = Math.round(prev);
      if (a === b) return '-';
      const diff = a - b;
      const rate = USD_RATES.IDR;
      if (isTerminalUsd() && rate != null) {
        const dUsd = diff * rate;
        const mag = formatNumberCommas(Math.abs(dUsd), 2, 2);
        if (dUsd > 0) return `+USD ${mag}`;
        return `-USD ${mag}`;
      }
      const abs = formatNumberCommas(Math.abs(diff), 0, 0);
      if (diff > 0) return `+IDR ${abs}/L`;
      return `-IDR ${abs}/L`;
    }

    function terminalSwitcherHasOptions(cid) {
      const c = +cid;
      if (c === 458) return MY_REGIONS.length > 1;
      if (c === 360) return Object.keys(ID_CITY_LONLAT || {}).length > 1;
      if (c === 702) return sortedSingaporeProviders(_sgAllRows || []).length > 1;
      if (c === 418) return Object.keys(LA_PROVINCE_LONLAT || {}).length > 1;
      if (c === 104) {
        const regs = new Set((_mmAllRows || []).map((r) => normalizeSheetString(r.region)).filter(Boolean));
        return regs.size > 1;
      }
      if (c === 704) {
        const areas = new Set((_vnAllRows || []).map((r) => canonVietnamAreaKey(r.area)).filter(Boolean));
        return areas.size > 1;
      }
      return false;
    }

    function syncTerminalInfoTitleSwitchable() {
      const hiTitle = document.getElementById('info-title');
      const menu = document.getElementById('terminal-switcher-menu');
      if (!hiTitle) return;
      const cid = +window.__terminalSelectedCountryId;
      const on = terminalSwitcherHasOptions(cid);
      const menuOpen = !!(menu && menu.classList.contains('open'));
      hiTitle.classList.toggle('switchable', on);
      if (on) {
        hiTitle.removeAttribute('aria-disabled');
        hiTitle.tabIndex = 0;
        hiTitle.setAttribute('role', 'button');
        hiTitle.setAttribute('aria-haspopup', 'listbox');
        hiTitle.setAttribute('aria-controls', 'terminal-switcher-menu');
        if (!menuOpen) hiTitle.setAttribute('aria-expanded', 'false');
        const tips = {
          458: 'Choose Malaysia pricing region',
          360: 'Choose Indonesia city',
          702: 'Choose Singapore fuel provider',
          418: 'Choose Laos province',
          104: 'Choose Myanmar station',
          704: 'Choose Vietnam pricing area',
        };
        hiTitle.title = tips[cid] || 'Choose option';
      } else {
        if (menu) menu.classList.remove('open');
        hiTitle.setAttribute('aria-expanded', 'false');
        hiTitle.setAttribute('aria-disabled', 'true');
        hiTitle.tabIndex = -1;
        hiTitle.removeAttribute('role');
        hiTitle.removeAttribute('aria-haspopup');
        hiTitle.removeAttribute('aria-controls');
        hiTitle.removeAttribute('title');
      }
    }

    function setRightPanel({ kicker, titleA, titleB, subtag, infoTitle, infoSub, infoLines }) {
      window.__terminalRightPanelState = { kicker, titleA, titleB, subtag, infoTitle, infoSub, infoLines };
      const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
      set('right-kicker', kicker);
      const rt = document.getElementById('right-title');
      if (rt) rt.innerHTML = `${titleA}<br/>${titleB}`;
      const st = document.getElementById('right-subtag');
      if (st) st.innerHTML = subtag || '';

      set('info-title', infoTitle);
      set('info-sub', infoSub);
      const lines = document.getElementById('info-lines');
      if (lines && Array.isArray(infoLines)) {
        // Animate numeric values in highlights when they change.
        const numToken = /(-?\d[\d,]*\.?\d*)/;
        const parseNumText = (text) => {
          const s = String(text ?? '').trim();
          const m = s.match(numToken);
          if (!m) return null;
          const raw = m[1];
          const n = parseFloat(raw.replace(/,/g, ''));
          if (!Number.isFinite(n)) return null;
          const idx = m.index ?? s.indexOf(raw);
          const prefix = s.slice(0, idx);
          const suffix = s.slice(idx + raw.length);
          const dec = (raw.split('.')[1] || '').length;
          return { n, prefix, suffix, dec };
        };
        const fmt = (n, dec) => {
          try {
            return formatNumberCommas(n, dec, dec);
          } catch (_) {
            return Number.isFinite(n) ? String(n) : '';
          }
        };
        const animateNumber = (el, from, to, dec, prefix, suffix) => {
          const duration = 520;
          const t0 = performance.now();
          const ease = (t) => 1 - Math.pow(1 - t, 3); // easeOutCubic

          const step = (now) => {
            const p = Math.min(1, (now - t0) / duration);
            const v = from + (to - from) * ease(p);
            el.textContent = `${prefix}${fmt(v, dec)}${suffix}`;
            if (p < 1) requestAnimationFrame(step);
          };
          requestAnimationFrame(step);
        };

        // Build (or reuse) rows keyed by label (.v inside .v-wrap when deltas are used).
        const existing = new Map();
        lines.querySelectorAll('.kv').forEach((row) => {
          const kEl = row.querySelector('.k');
          const key = kEl ? kEl.textContent : null;
          const wrap = row.querySelector('.v-wrap');
          const vEl = wrap ? wrap.querySelector('.v') : row.querySelector('.v');
          const dEl = wrap ? wrap.querySelector('.v-delta') : null;
          if (key && vEl) existing.set(key, { row, wrap: wrap || null, vEl, dEl });
        });

        // Remove rows that no longer exist.
        const nextKeys = new Set(infoLines.map(([k]) => String(k)));
        existing.forEach(({ row }, key) => {
          if (!nextKeys.has(key)) row.remove();
        });

        const ensureWrap = (row, vEl) => {
          let wrap = row.querySelector('.v-wrap');
          if (!wrap) {
            wrap = document.createElement('span');
            wrap.className = 'v-wrap';
            vEl.replaceWith(wrap);
            wrap.appendChild(vEl);
          }
          return wrap;
        };

        // Upsert rows in order.
        for (const item of infoLines) {
          const k = String(item[0]);
          const v = String(item[1]);
          const d = item.length >= 3 ? String(item[2]) : '';

          let row = existing.get(k)?.row || null;
          let vEl = existing.get(k)?.vEl || null;
          let dEl = existing.get(k)?.dEl || null;
          let wrap = existing.get(k)?.wrap || null;

          if (!row || !vEl) {
            row = document.createElement('div');
            row.className = 'kv';
            const kEl = document.createElement('span');
            kEl.className = 'k';
            kEl.textContent = k;
            wrap = document.createElement('span');
            wrap.className = 'v-wrap';
            vEl = document.createElement('span');
            vEl.className = 'v';
            const next = parseNumText(v);
            if (next) {
              vEl.textContent = `${next.prefix}${fmt(0, next.dec)}${next.suffix}`;
              vEl.dataset.num = String(next.n);
              requestAnimationFrame(() => animateNumber(vEl, 0, next.n, next.dec, next.prefix, next.suffix));
            } else {
              vEl.textContent = v;
            }
            wrap.appendChild(vEl);
            if (item.length >= 3) {
              dEl = document.createElement('span');
              dEl.className = 'v-delta';
              dEl.textContent = d;
              wrap.appendChild(dEl);
            }
            row.appendChild(kEl);
            row.appendChild(wrap);
            lines.appendChild(row);
            existing.set(k, { row, wrap, vEl, dEl: dEl || null });
            continue;
          }

          wrap = wrap || ensureWrap(row, vEl);
          vEl = wrap.querySelector('.v') || vEl;
          dEl = wrap.querySelector('.v-delta');

          const prev = parseNumText(vEl.textContent);
          const next = parseNumText(v);
          if (prev && next && prev.n !== next.n && prev.prefix === next.prefix && prev.suffix === next.suffix) {
            vEl.dataset.num = String(next.n);
            animateNumber(vEl, prev.n, next.n, next.dec, next.prefix, next.suffix);
          } else {
            vEl.textContent = v;
            const n = next?.n;
            if (Number.isFinite(n)) vEl.dataset.num = String(n);
            else delete vEl.dataset.num;
          }

          if (item.length >= 3) {
            if (!dEl) {
              dEl = document.createElement('span');
              dEl.className = 'v-delta';
              wrap.appendChild(dEl);
            }
            dEl.textContent = d;
          } else if (dEl) {
            dEl.remove();
            dEl = null;
          }

          existing.set(k, { row, wrap, vEl, dEl });
        }

        for (const item of infoLines) {
          const want = String(item[0]);
          const match = [...lines.querySelectorAll('.kv')].find((r) => {
            const kEl = r.querySelector('.k');
            return kEl && kEl.textContent === want;
          });

    // Right-panel chart
    function chartThemeOptions(countryId) {
      const tick = cssVar('--term-chart-tick', 'rgba(0,0,0,0.45)');
      return {
        tooltip: {
          backgroundColor: cssVar('--term-chart-tooltip-bg', 'rgba(255,255,255,0.96)'),
          borderColor: cssVar('--term-chart-tooltip-border', 'rgba(0,0,0,0.12)'),
          borderWidth: 1,
          titleColor: cssVar('--term-chart-tooltip-title', 'rgba(0,0,0,0.9)'),
          bodyColor: cssVar('--term-chart-tooltip-body', 'rgba(0,0,0,0.75)'),
          titleFont: { family: 'Inter', size: 12, weight: '700' },
          bodyFont: { family: 'Inter', size: 12, weight: '600' },
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { color: tick, font: { family: 'Inter', size: 11 }, maxRotation: 0 },
          },
          y: {
            grid: { color: cssVar('--term-chart-grid', 'rgba(0,0,0,0.06)') },
            ticks: {
              color: tick,
              font: { family: 'Inter', size: 11 },
              callback(v) {
                if (countryId === 360) {
                  const nv = Number(v);
                  if (!Number.isFinite(nv)) return v;
                  if (nv >= 1e6) return `${formatNumberCommas(nv / 1e6, 1, 1)}M`;
                  return `${formatNumberCommas(Math.round(nv / 1000), 0, 0)}k`;
                }
                if (countryId === 116 || countryId === 418 || countryId === 104 || countryId === 704) {
                  const n = Number(v);
                  if (!Number.isFinite(n)) return v;
                  if (Math.abs(n) >= 1e6) return `${formatNumberCommas(n / 1e6, 1, 1)}M`;
                  if (Math.abs(n) >= 1000) return `${formatNumberCommas(Math.round(n / 1000), 0, 0)}k`;
                  return formatNumberCommas(Math.round(n), 0, 0);
                }
                const n = Number(v);
                return Number.isFinite(n)
                  ? formatNumberCommas(parseFloat(n.toFixed(6)), 0, 6)
                  : v;
              },
            },
          },
        },
      };
    }

    function applyChartTheme(chart) {
      if (!chart?.options?.plugins?.tooltip || !chart?.options?.scales) return;
      const t = chartThemeOptions(RIGHT_CHART_COUNTRY);
      Object.assign(chart.options.plugins.tooltip, t.tooltip);
      chart.options.scales.x.grid = { ...chart.options.scales.x.grid, ...t.scales.x.grid };
      chart.options.scales.x.ticks = { ...chart.options.scales.x.ticks, ...t.scales.x.ticks };
      chart.options.scales.y.grid = { ...chart.options.scales.y.grid, ...t.scales.y.grid };
      chart.options.scales.y.ticks = { ...chart.options.scales.y.ticks, ...t.scales.y.ticks };
    }

    let RIGHT_CHART = null;
    let RIGHT_CHART_COUNTRY = null;
    let RIGHT_CHART_MY_DIESEL_KEY = null;
    function destroyRightChart() {
      if (RIGHT_CHART) {
        RIGHT_CHART.destroy();
        RIGHT_CHART = null;
      }
      RIGHT_CHART_COUNTRY = null;
      RIGHT_CHART_MY_DIESEL_KEY = null;
      window.__terminalIndonesiaChartKey = null;
      window.__terminalSingaporeChartKey = null;
      window.__terminalLaosChartKey = null;
    }

    function renderRightChart({ labels, datasets, countryId, animate = true }) {
      window.__terminalRightChartState = { labels, datasets, countryId };
      const cv = document.getElementById('right-chart');
      if (!cv || !window.Chart) return;

      const ctx = cv.getContext('2d');
      const mkFill = (stroke) => {
        const grad = ctx.createLinearGradient(0, 0, 0, cv.height || 220);
        grad.addColorStop(0, withAlpha(stroke, 0.18));
        grad.addColorStop(1, withAlpha(stroke, 0));
        return grad;
      };

      const CHART_CCY = {
        360: 'IDR', 458: 'MYR', 702: 'SGD', 96: 'BND', 764: 'THB', 608: 'PHP',
        116: 'KHR', 418: 'LAK', 104: 'MMK', 704: 'VND',
      };
      const ccyKey = CHART_CCY[countryId];
      const usdMult =
        isTerminalUsd() && ccyKey && USD_RATES[ccyKey] != null
          ? USD_RATES[ccyKey]
          : 1;

      const nextDs = (datasets || []).map(ds => ({
        label: ds.label,
        data: (ds.data || []).map(v =>
          v == null || !Number.isFinite(v) ? v : v * usdMult
        ),
        borderColor: ds.color,
        backgroundColor: mkFill(ds.color),
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 4,
        pointHoverBackgroundColor: ds.color,
        tension: 0.55,
        cubicInterpolationMode: 'default',
        fill: true,
        spanGaps: true,
      }));

      const canUpdateInPlace =
        !!RIGHT_CHART &&
        (RIGHT_CHART_COUNTRY === (countryId ?? null)) &&
        Array.isArray(RIGHT_CHART.data?.datasets) &&
        RIGHT_CHART.data.datasets.length === nextDs.length;

      if (canUpdateInPlace) {
        RIGHT_CHART.data.labels = labels;
        nextDs.forEach((ds, i) => {
          RIGHT_CHART.data.datasets[i] = { ...RIGHT_CHART.data.datasets[i], ...ds };
        });
        applyChartTheme(RIGHT_CHART);

        if (animate) {
          const prevAnim = RIGHT_CHART.options.animation;
          RIGHT_CHART.options.animation = { duration: 650, easing: 'easeOutCubic' };
          RIGHT_CHART.update();
          RIGHT_CHART.options.animation = prevAnim;
        } else {
          RIGHT_CHART.update('none');
        }
        return;
      }

      destroyRightChart();
      const themeChart = chartThemeOptions(countryId);
      try {
        RIGHT_CHART = new Chart(ctx, {
          type: 'line',
          data: { labels, datasets: nextDs },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: animate ? { duration: 0 } : { duration: 0 },
            plugins: {
              legend: { display: false },
              tooltip: themeChart.tooltip,
            },
            scales: themeChart.scales,
          },
        });
      } catch (err) {
        console.error('Terminal chart failed', err);
        RIGHT_CHART = null;
      }
      RIGHT_CHART_COUNTRY = countryId ?? null;
    }

    function waitForChartJs() {
      if (window.Chart) return Promise.resolve();
      return new Promise(resolve => {
        const t = setInterval(() => {
          if (window.Chart) { clearInterval(t); resolve(); }
        }, 30);
        setTimeout(() => { clearInterval(t); resolve(); }, 2500);
      });
    }

    /** Match `buildTerminalSearchRegionsList` row to current map selection + localStorage (sync). */
    function findTerminalSearchRowForSelection(rows, cid) {
      if (!rows || !rows.length) return null;
      const id = +cid;
      const m = rows.filter((r) => +r.id === id);
      if (!m.length) return null;
      if (id === 458) {
        const want = getMalaysiaRegion();
        return m.find((r) => (r.myRegion || '') === want) || m[0];
      }
      if (id === 360) {
        const city = getIndonesiaCity();
        return m.find((r) => (r.idCity || '') === city) || m[0];
      }
      if (id === 702) {
        let stored = '';
        try {
          stored = normalizeSheetString(localStorage.getItem('terminal_sg_provider') || '');
        } catch (_) {}
        if (stored) {
          const hit = m.find((r) => normalizeSheetString(r.sgProvider || '') === stored);
          if (hit) return hit;
        }
        return m.find((r) => !r.sgProvider) || m[0];
      }
      if (id === 418) {
        const prov = getLaosProvince();
        return m.find((r) => (r.laProvince || '') === prov) || m[0];
      }
      if (id === 104) {
        const reg = getMyanmarRegion();
        return m.find((r) => (r.mmRegion || '') === reg) || m[0];
      }
      if (id === 704) {
        const want = canonVietnamAreaKey(getVietnamArea()) || getVietnamArea();
        const hit = m.find((r) => canonVietnamAreaKey(r.vnArea || '') === want || (r.vnArea || '') === want);
        return hit || m[0];
      }
      return m[0];
    }

        const p = `${countryName} - `;
        const s = String(fullLabel || '');
        return s.startsWith(p) ? s.slice(p.length) : s;
      }

      function pickRowHtmlTerm(c, displayOverride, nested) {
        const id = c.id;
        const shown = displayOverride != null ? escHtml(displayOverride) : escHtml(c.label);
        const nest = nested ? ' search-item-nested' : '';
        return `<div class="search-item search-item-pick${nest}" role="option" data-id="${id}" data-label="${escAttr(c.label)}" data-my-region="${escAttr(c.myRegion ?? '')}" data-id-city="${escAttr(c.idCity ?? '')}" data-la-province="${escAttr(c.laProvince ?? '')}" data-sg-provider="${c.sgProvider != null ? escAttr(c.sgProvider) : ''}" data-mm-region="${escAttr(c.mmRegion ?? '')}" data-vn-area="${escAttr(c.vnArea ?? '')}"><div class="label">${shown}</div></div>`;
      }

      function renderFlat(list) {
        if (!list.length) {
          setMenuInnerHTML(`<div class="search-empty">No matches</div>`);
          return;
        }
        setMenuInnerHTML(list.map((c) => pickRowHtmlTerm(c)).join(''));
      }

      function renderCountries(groups) {
        if (!groups.length) {
          setMenuInnerHTML(`<div class="search-empty">No matches</div>`);
          return;
        }
        const chevronSvg =
          '<svg class="search-item-dropdown-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>';
        const parts = [];
        for (const g of groups) {
          if (g.rows.length > 1) {
            const isOpen = expandedCountryId === g.countryId;
            parts.push(
              `<div class="search-item search-item-expand${isOpen ? ' search-item-expand-open' : ''}" role="button" tabindex="-1" aria-expanded="${isOpen ? 'true' : 'false'}" data-expand="${g.countryId}"><div class="label">${escHtml(g.name)}</div><span class="search-item-chevron${isOpen ? ' search-item-chevron-open' : ''}" aria-hidden="true">${chevronSvg}</span></div>`,
            );
            if (isOpen) {
              for (const c of g.rows) {
                parts.push(pickRowHtmlTerm(c, regionShortLabel(g.name, c.label), true));
              }
            }
          } else {
            parts.push(pickRowHtmlTerm(g.rows[0], g.name));
          }
        }
        setMenuInnerHTML(parts.join(''));
      }

      function showsCountryPicker() {
        const raw = (input.value || '').trim();
        const q = raw.toLowerCase();
        const committed = (lastCommittedLabel || '').trim().toLowerCase();
        return !q || q === committed;

      function applySearchPick(el) {
        if (!el || !el.classList.contains('search-item-pick')) return;
        const id = +el.getAttribute('data-id');
        if (!COUNTRIES[id]) return;
        const mr = el.getAttribute('data-my-region') || '';
        const ic = el.getAttribute('data-id-city') || '';
        const laProv = el.getAttribute('data-la-province') || '';
        const sgProv = el.getAttribute('data-sg-provider') || '';
        const mmReg = el.getAttribute('data-mm-region') || '';
        const vnArea = el.getAttribute('data-vn-area') || '';
        const displayLabel = el.getAttribute('data-label') || '';

        if (id === 458 && mr) setMalaysiaRegion(mr);
        else if (mr) {
          try { localStorage.setItem('terminal_my_region', mr); } catch (_) {}
        }
        if (ic) {
          try { localStorage.setItem('terminal_id_city', ic); } catch (_) {}
          delete PAGER_INDEX[360];
        }
        if (laProv) {
          try { localStorage.setItem('terminal_la_province', laProv); } catch (_) {}
          delete PAGER_INDEX[418];

        if (id === 702) {
          try {
            if (sgProv) localStorage.setItem('terminal_sg_provider', sgProv);
            else localStorage.removeItem('terminal_sg_provider');
          } catch (_) {}
          delete PAGER_INDEX[702];
        }
        if (mmReg && id === 104) {
          try { localStorage.setItem('terminal_mm_region', mmReg); } catch (_) {}
          delete PAGER_INDEX[104];
        }
        if (vnArea && id === 704) {
          try { localStorage.setItem('terminal_vn_area', vnArea); } catch (_) {}
          delete PAGER_INDEX[704];
        }

        const picked = (displayLabel || COUNTRIES[id].name).trim();
        input.value = picked;
        lastCommittedLabel = picked;
        setLeftOverview(id);
        document.querySelectorAll('.country.live').forEach((el) => {

      function refresh() {
        const raw = (input.value || '').trim();
        const q = raw.toLowerCase();
        const committed = (lastCommittedLabel || '').trim().toLowerCase();
        const groups = buildCountryGroups(all);

        if (!showsCountryPicker()) {
          expandedCountryId = null;
          const items = all.filter((c) => c.label.toLowerCase().includes(q));
          renderFlat(items);
        } else if (!q || q === committed) {
          renderCountries(groups);
        } else {
          const byCountry = groups.filter((g) => g.name.toLowerCase().includes(q));
          if (byCountry.length) {
            if (expandedCountryId != null && !byCountry.some((g) => g.countryId === expandedCountryId)) {
              expandedCountryId = null;
            }
            renderCountries(byCountry);
          } else {
            expandedCountryId = null;
            const hits = all.filter((c) => c.label.toLowerCase().includes(q));
            renderFlat(hits);
          }

        const items = Array.from(menu.querySelectorAll('.search-item'));
        let startIdx = items.length ? 0 : -1;

      input.addEventListener('keydown', (e) => {

          void rebuildAll().then(() => {
            expandedCountryId = null;
            openMenu();
            refresh();

          e.preventDefault();
          return;

        if (!isOpen) return;

        const items = Array.from(menu.querySelectorAll('.search-item'));
        if (e.key === 'Escape') {
          if (expandedCountryId != null) {
            expandedCountryId = null;
            refresh();
          } else {
            closeMenu();
          }
          e.preventDefault();
          return;
        }
        if (e.key === 'ArrowDown') { setActive(Math.min(items.length - 1, activeIndex + 1)); e.preventDefault(); return; }
        if (e.key === 'ArrowUp') { setActive(Math.max(0, activeIndex - 1)); e.preventDefault(); return; }
        if (e.key === 'Enter') {
          const el = items[activeIndex];
          if (el && el.classList.contains('search-item-expand')) {
            const id = +el.getAttribute('data-expand');
            expandedCountryId = expandedCountryId === id ? null : id;
            refresh();
          } else if (el && el.classList.contains('search-item-pick')) {
            applySearchPick(el);
          }
          e.preventDefault();
        }
      });

      menu.addEventListener('mousemove', (e) => {
        const item = e.target.closest('.search-item');
        if (!item) return;
        const items = Array.from(menu.querySelectorAll('.search-item'));
        const idx = items.indexOf(item);

      menu.addEventListener('pointerdown', (e) => {

        const item = e.target.closest('.search-item-pick');

        e.preventDefault();

      function onDocPointerDown(e) {

      document.addEventListener('pointerdown', onDocPointerDown, true);

      document.addEventListener('keydown', (e) => {
        const isMacFind = (e.metaKey && !e.ctrlKey && (e.key === 'f' || e.key === 'F'));
        const isWinFind = (e.ctrlKey && !e.metaKey && (e.key === 'f' || e.key === 'F'));

    let __terminalMapKitLoadPromise = null;

    function ensureMapKitCoreLoaded(jwt) {
      if (window.mapkit) return Promise.resolve();
      if (__terminalMapKitLoadPromise) return __terminalMapKitLoadPromise;
      __terminalMapKitLoadPromise = new Promise((resolve, reject) => {
        const cbName = '__terminalMapKitCoreCb';
        window[cbName] = function () {
          try {
            delete window[cbName];
          } catch (_) {}
          __terminalMapKitLoadPromise = null;
          resolve();
        };
        const s = document.createElement('script');
        s.src = 'https://cdn.apple-mapkit.com/mk/5.x.x/mapkit.core.js';
        s.crossOrigin = 'anonymous';
        s.async = true;
        s.setAttribute('data-callback', cbName);
        s.setAttribute('data-libraries', 'full-map,annotations,overlays');
        s.setAttribute('data-token', jwt);
        s.onerror = () => {
          __terminalMapKitLoadPromise = null;
          try {
            delete window[cbName];
          } catch (_) {}
          reject(new Error('MapKit script load failed'));
        };
        document.head.appendChild(s);
      });
      return __terminalMapKitLoadPromise;
    }

    // Orange-panel pager (highlights timeline)
    (function initPager() {
      const prevBtn = document.getElementById('pager-prev');
      const nextBtn = document.getElementById('pager-next');
      if (!prevBtn || !nextBtn) return;

      const PAGER_COUNTRIES = new Set([360, 458, 702, 96, 764, 608, 704, 116, 104, 418]);

      function syncPager() {
        const cid = +window.__terminalSelectedCountryId;
        const show = PAGER_COUNTRIES.has(cid);
        prevBtn.style.display = show ? '' : 'none';
        nextBtn.style.display = show ? '' : 'none';
        if (!show) return;

        // While data is still loading, keep buttons clickable so the first click can fetch.
        const rows = LOADED_ROWS.get(cid) || null;

        const idx = (typeof getPagerIndex === 'function') ? getPagerIndex(cid) : null;
        const hasRows = Array.isArray(rows) && rows.length > 0;
        if (!hasRows || idx == null) {
          prevBtn.disabled = false;
          nextBtn.disabled = false;
          return;
        }

        const seriesLen = rows.filter(r => r?.date).length || rows.length;
        prevBtn.disabled = idx <= 0;
        // next = newer (towards latest)
        nextBtn.disabled = idx >= (seriesLen - 1);
      }

      // Expose so data render can re-sync after async fetch
      window.__terminalSyncPager = syncPager;

      prevBtn.addEventListener('click', async () => {
        const cid = +window.__terminalSelectedCountryId;
        if (!PAGER_COUNTRIES.has(cid)) return;
        const seriesAsc = await pagerSeries(cid);
        const seriesLen = seriesAsc.filter(r => r?.date).length || seriesAsc.length;
        if (!seriesLen) return;
        let idx = getPagerIndex(cid);
        if (idx == null) idx = seriesLen - 1;
        idx = Math.max(0, idx - 1); // older
        setPagerIndex(cid, idx);
        await updateRightPanelForCountry(cid);
        syncPager();
      });

      nextBtn.addEventListener('click', async () => {
        const cid = +window.__terminalSelectedCountryId;
        if (!PAGER_COUNTRIES.has(cid)) return;
        const seriesAsc = await pagerSeries(cid);
        const seriesLen = seriesAsc.filter(r => r?.date).length || seriesAsc.length;
        if (!seriesLen) return;
        let idx = getPagerIndex(cid);
        if (idx == null) idx = seriesLen - 1;
        idx = Math.min(seriesLen - 1, idx + 1); // newer
        setPagerIndex(cid, idx);
        await updateRightPanelForCountry(cid);
        syncPager();

    async function cycleMyanmarRegion(step) {
      let rows = _mmAllRows;
      if (!rows || !rows.length) {

      }
      const regs = [...new Set(rows.map((r) => normalizeSheetString(r.region)).filter(Boolean))].sort((a, b) =>
        a.localeCompare(b),
      );
      if (regs.length < 2) return;
      const curN = normalizeSheetString(getMyanmarRegion());
      let i = regs.findIndex((r) => normalizeSheetString(r) === curN);
      if (i < 0) i = 0;
      const n = (i + step + regs.length) % regs.length;
      try { localStorage.setItem('terminal_mm_region', regs[n]); } catch (_) {}
      delete PAGER_INDEX[104];
      await updateRightPanelForCountry(104);
      if (typeof window.__terminalSyncPager === 'function') window.__terminalSyncPager();
    }

    async function cycleVietnamArea(step) {
      let rows = _vnAllRows;
      if (!rows || !rows.length) {
        rows = await ensureSheetRows(VN_SHEET_URL);
        _vnAllRows = rows;
      }
      const areas = [...new Set(rows.map((r) => canonVietnamAreaKey(r.area)).filter(Boolean))].sort((a, b) =>
        a.localeCompare(b),
      );
      if (areas.length < 2) return;
      const curCanon = canonVietnamAreaKey(getVietnamArea());
      let i = areas.findIndex((a) => canonVietnamAreaKey(a) === curCanon);
      if (i < 0) i = 0;
      const n = (i + step + areas.length) % areas.length;
      try { localStorage.setItem('terminal_vn_area', areas[n]); } catch (_) {}
      delete PAGER_INDEX[704];
      await updateRightPanelForCountry(704);
      if (typeof window.__terminalSyncPager === 'function') window.__terminalSyncPager();
    }

    async function cycleSingaporeProvider(step) {
      await ensureSingaporeRows();
      const providers = sortedSingaporeProviders(_sgAllRows || []);
      if (providers.length < 2) return;
      let cur = resolveSingaporeProviderSelection(_sgAllRows || []);
      let i = providers.findIndex((p) => normalizeSheetString(p) === normalizeSheetString(cur));
      if (i < 0) i = 0;
      const n = (i + step + providers.length) % providers.length;
      try { localStorage.setItem('terminal_sg_provider', providers[n]); } catch (_) {}
      delete PAGER_INDEX[702];
      await updateRightPanelForCountry(702);
      if (typeof window.__terminalSyncPager === 'function') window.__terminalSyncPager();
    }

    // Keyboard: ↑/↓ = Malaysia region / Indonesia city / Singapore provider / Laos / Myanmar / Vietnam; ←/→ = date pager; else ↑/↓ = map zoom; [ ] = date pager
    (function initTerminalKeyboardShortcuts() {
      function isTypingTarget(el) {
        if (!el || el.nodeType !== 1) return false;
        if (el.isContentEditable) return true;
        const tag = (el.tagName || '').toLowerCase();
        if (tag === 'input' || tag === 'textarea' || tag === 'select') return true;
        return !!el.closest?.('[contenteditable="true"]');
      }

      function clickPagerPrev() {
        const prev = document.getElementById('pager-prev');
        if (!prev || prev.style.display === 'none' || prev.disabled) return;
        prev.click();
      }
      function clickPagerNext() {
        const next = document.getElementById('pager-next');
        if (!next || next.style.display === 'none' || next.disabled) return;
        next.click();
      }

      function stopForTerminalMapKeys(e) {
        e.preventDefault();
        e.stopPropagation();
      }

      document.addEventListener(
        'keydown',
        (e) => {
          if (e.defaultPrevented) return;
          if (e.metaKey || e.ctrlKey || e.altKey) return;
          if (isTypingTarget(e.target)) return;

          const cid = +window.__terminalSelectedCountryId;

          if (e.key === 'ArrowUp') {
            if (cid === 458) {
              stopForTerminalMapKeys(e);
              cycleMalaysiaRegion(-1);
              return;
            }
            if (cid === 360) {
              stopForTerminalMapKeys(e);
              cycleIndonesiaCity(-1);
              return;
            }
            if (cid === 702) {
              stopForTerminalMapKeys(e);
              cycleSingaporeProvider(-1).catch(() => {});
              return;
            }
            if (cid === 418) {
              stopForTerminalMapKeys(e);
              cycleLaosProvince(-1);
              return;
            }
            if (cid === 104) {
              stopForTerminalMapKeys(e);
              cycleMyanmarRegion(-1).catch(() => {});
              return;
            }
            if (cid === 704) {
              stopForTerminalMapKeys(e);
              cycleVietnamArea(-1).catch(() => {});
              return;
            }
            const z = document.getElementById('zoom-in');
            if (!z || typeof z.onclick !== 'function') return;
            stopForTerminalMapKeys(e);
            z.click();
            return;
          }
          if (e.key === 'ArrowDown') {
            if (cid === 458) {
              stopForTerminalMapKeys(e);
              cycleMalaysiaRegion(1);
              return;
            }
            if (cid === 360) {
              stopForTerminalMapKeys(e);
              cycleIndonesiaCity(1);
              return;
            }
            if (cid === 702) {
              stopForTerminalMapKeys(e);
              cycleSingaporeProvider(1).catch(() => {});
              return;
            }
            if (cid === 418) {
              stopForTerminalMapKeys(e);
              cycleLaosProvince(1);
              return;
            }
            if (cid === 104) {
              stopForTerminalMapKeys(e);
              cycleMyanmarRegion(1).catch(() => {});
              return;
            }
            if (cid === 704) {
              stopForTerminalMapKeys(e);
              cycleVietnamArea(1).catch(() => {});
              return;
            }
            const z = document.getElementById('zoom-out');
            if (!z || typeof z.onclick !== 'function') return;
            stopForTerminalMapKeys(e);
            z.click();
            return;
          }
          if (e.key === '[' || e.key === 'BracketLeft') {
            stopForTerminalMapKeys(e);
            clickPagerPrev();
            return;
          }
          if (e.key === ']' || e.key === 'BracketRight') {
            stopForTerminalMapKeys(e);
            clickPagerNext();
            return;
          }
          if (e.key === 'ArrowLeft') {
            const prev = document.getElementById('pager-prev');
            if (!prev || prev.style.display === 'none' || prev.disabled) return;
            stopForTerminalMapKeys(e);
            prev.click();
            return;
          }
          if (e.key === 'ArrowRight') {
            const next = document.getElementById('pager-next');
            if (!next || next.style.display === 'none' || next.disabled) return;
            stopForTerminalMapKeys(e);
            next.click();
            return;
          }
        },
        true
      );
    })();

    window.addEventListener('resize', () => {
      // cheap debounce
      clearTimeout(window.__termMapT);
      window.__termMapT = setTimeout(renderTerminalMap, 120);
    });

    // Resizable panels (left/right)
    (function initResizers() {
      const root = document.documentElement;
      const leftKey = 'terminal_leftW';
      const rightKey = 'terminal_rightW';

      function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, n)); }
      function px(n) { return `${Math.round(n)}px`; }

      function applyScales(leftW, rightW) {
        // scale headings smoothly with width
        const leftScale = clamp(leftW / 280, 0.82, 1.22);
        const rightScale = clamp(rightW / 420, 0.82, 1.22);
        root.style.setProperty('--leftScale', leftScale.toFixed(3));
        root.style.setProperty('--rightScale', rightScale.toFixed(3));
      }

      function getNumVar(name, fallback) {
        const v = getComputedStyle(root).getPropertyValue(name).trim();
        const n = parseFloat(v.replace('px', ''));
        return Number.isFinite(n) ? n : fallback;
      }

      // Restore persisted widths (desktop only)
      try {
        const savedLeft = parseFloat(localStorage.getItem(leftKey) || '');
        const savedRight = parseFloat(localStorage.getItem(rightKey) || '');
        if (Number.isFinite(savedLeft)) root.style.setProperty('--leftW', px(savedLeft));
        if (Number.isFinite(savedRight)) root.style.setProperty('--rightW', px(savedRight));
      } catch (_) {}

      function currentSizes() {
        const leftW = getNumVar('--leftW', 280);
        const rightW = getNumVar('--rightW', 420);
        return { leftW, rightW };
      }

      function bounds() {
        const W = window.innerWidth;
        return {
          leftMin: 220,
          leftMax: Math.max(260, Math.min(520, W - 360)),
          rightMin: 320,
          rightMax: Math.max(360, Math.min(560, W - 260)),
        };
      }

      function setLeftW(w) {
        const b = bounds();
        const x = clamp(w, b.leftMin, b.leftMax);
        root.style.setProperty('--leftW', px(x));
        applyScales(x, currentSizes().rightW);
        try { localStorage.setItem(leftKey, String(x)); } catch (_) {}
      }

      function setRightW(w) {
        const b = bounds();
        const x = clamp(w, b.rightMin, b.rightMax);
        root.style.setProperty('--rightW', px(x));
        applyScales(currentSizes().leftW, x);
        try { localStorage.setItem(rightKey, String(x)); } catch (_) {}
      }

      // Initial scale compute
      applyScales(currentSizes().leftW, currentSizes().rightW);

      function drag(gutterEl, which) {
        let startX = 0;
        let startLeft = 0;
        let startRight = 0;

        const onMove = (e) => {
          const x = (e.touches ? e.touches[0].clientX : e.clientX);
          const dx = x - startX;
          if (which === 'left') setLeftW(startLeft + dx);
          if (which === 'right') setRightW(startRight - dx);
        };
        const onUp = () => {
          document.body.classList.remove('resizing');
          gutterEl.classList.remove('dragging');
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
          window.removeEventListener('touchmove', onMove);
          window.removeEventListener('touchend', onUp);
        };
        const onDown = (e) => {
          const x = (e.touches ? e.touches[0].clientX : e.clientX);
          startX = x;
          const s = currentSizes();
          startLeft = s.leftW;
          startRight = s.rightW;
          document.body.classList.add('resizing');
          gutterEl.classList.add('dragging');
          window.addEventListener('mousemove', onMove);
          window.addEventListener('mouseup', onUp);
          window.addEventListener('touchmove', onMove, { passive: true });
          window.addEventListener('touchend', onUp);
        };

        gutterEl.addEventListener('mousedown', onDown);
        gutterEl.addEventListener('touchstart', onDown, { passive: true });

        // Keyboard resizing (accessibility)
        gutterEl.addEventListener('keydown', (e) => {
          const step = e.shiftKey ? 40 : 16;
          if (which === 'left') {
            if (e.key === 'ArrowLeft') setLeftW(currentSizes().leftW - step);
            if (e.key === 'ArrowRight') setLeftW(currentSizes().leftW + step);
          }
          if (which === 'right') {
            if (e.key === 'ArrowLeft') setRightW(currentSizes().rightW + step);
            if (e.key === 'ArrowRight') setRightW(currentSizes().rightW - step);
          }
        });
      }

      const gl = document.getElementById('gutter-left');
      const gr = document.getElementById('gutter-right');
      if (gl) drag(gl, 'left');
      if (gr) drag(gr, 'right');
    })();

    // Mobile bottom-sheet UI removed (desktop-only terminal).
  </script>
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
