<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PetrolPrice — Singapore Fuel Prices</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
  <link rel="stylesheet" href="style.css" />
  <style>
    .country-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0 4px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 16px;
    }
    .country-flag { font-size: 1.25rem; line-height: 1; }
    .country-name { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; }
    .country-status-pill {
      margin-left: auto;
      font-size: 0.56rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 3px 9px; border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.04);
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .country-status-pill.live { color: #00d4ff; border-color: rgba(0,212,255,0.3); background: rgba(0,212,255,0.08); }
    .back-link {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.6rem; color: var(--text-muted, #888);
      letter-spacing: 0.1em; text-transform: uppercase;
      text-decoration: none; margin-bottom: 14px; transition: color 0.15s;
    }
    .back-link:hover { color: var(--text, #f0f0f0); }
  </style>
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>

  <div class="container">
    <header>
      <a href="./index.html" class="country-page-brand" aria-label="Home">
        <img src="logo.svg" alt="PetrolPrice logo" class="site-logo" />
        <span>Singapore</span>
      </a>
      <div class="currency-toggle" role="group" aria-label="Currency display">
        <button class="curr-opt" data-curr="local" onclick="setCurrency('local')">SGD</button>
        <button class="curr-opt" data-curr="usd"   onclick="setCurrency('usd')"  >USD</button>
      </div>
    </header>

    <!-- Meta bar -->
    <div class="meta-bar">
      <div class="meta-item">
        <span class="meta-label">Last Updated</span>
        <span class="meta-value" id="last-updated">—</span>
      </div>
      <div class="meta-item">
        <span class="status-dot" id="status-dot"></span>
        <span class="meta-value" id="status-text">Loading…</span>
      </div>
    </div>

    <a href="./index.html" class="back-link">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
      All countries
    </a>

    <div class="country-bar">
      <span class="country-flag">🇸🇬</span>
      <span class="country-name">Singapore</span>
      <span class="country-status-pill" id="country-status">Loading…</span>
    </div>

    <!-- Fuel Cards -->
    <main class="cards-grid" id="cards-grid">
      <div class="skeleton-card" aria-busy="true"></div>
      <div class="skeleton-card" aria-busy="true"></div>
      <div class="skeleton-card" aria-busy="true"></div>
      <div class="skeleton-card" aria-busy="true"></div>
      <div class="skeleton-card" aria-busy="true"></div>
    </main>

    <footer>
      <nav class="footer-nav">
        <a href="./index.html#about">About</a>
        <span class="footer-sep">·</span>
        <a href="mailto:hello@petrolprice.xyz">Contact</a>
        <span class="footer-sep">·</span>
        <a href="https://github.com/aaronagai/PetrolPrice.xyz" target="_blank" rel="noopener">GitHub</a>
        <span class="footer-sep">·</span>
        <a href="./index.html#privacy">Privacy</a>
      </nav>
      <p class="footer-copy">© 2025 PetrolPrice.xyz. Open source under MIT License.</p>
    </footer>
  </div>

  <script>
    /* ── Theme (site is dark-only) ── */
    const currentTheme = 'dark';

    /* ── Currency ── */
    const SGD_TO_USD = 0.74;
    let currentCurrency = localStorage.getItem('currency') || 'local';
    function updateCurrencyBtns() {
      document.querySelectorAll('.curr-opt').forEach(b => b.classList.toggle('active', b.dataset.curr === currentCurrency));
    }
    window.setCurrency = function(c) {
      currentCurrency = c;
      localStorage.setItem('currency', c);
      updateCurrencyBtns();
      if (window._sgData) renderCards(window._sgData);
    };
    updateCurrencyBtns();

    /* ── Fuel config ── */
    const FUEL_KEYS = [
      { key: 'ron92',   label: 'RON92',   icon: '⚪', accent: '#aaaaaa', lightAccent: '#888888' },
      { key: 'ron95',   label: 'RON95',   icon: '🟢', accent: '#00ff64', lightAccent: '#16a34a' },
      { key: 'ron98',   label: 'RON98',   icon: '🔵', accent: '#00d4ff', lightAccent: '#0ea5e9' },
      { key: 'premium', label: 'Premium', icon: '⭐', accent: '#b478ff', lightAccent: '#9333ea' },
      { key: 'diesel',  label: 'Diesel',  icon: '🟠', accent: '#ffaa00', lightAccent: '#ea580c' },
    ];

    /* ── CSV parser ── */
    function parseCSV(text) {
      const rows = text.trim().split('\n').map(r =>
        r.split(',').map(c => c.replace(/^"|"$/g, '').trim())
      );
      const headers = rows[0];
      return rows.slice(1).map(r => {
        const obj = {};
        headers.forEach((h, i) => { obj[h] = r[i]; });
        return obj;
      });
    }

    function sheetRowDateMs(v) {
      if (v == null || v === '') return NaN;
      const s = String(v).trim();
      const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (iso) return Date.UTC(+iso[1], +iso[2] - 1, +iso[3]);
      const dmy = s.match(/^(\d{1,2})[/.-](\d{1,2})[/.-](\d{4})(?:\s|$)/);
      if (dmy) {
        const d = +dmy[1];
        const m = +dmy[2];
        const y = +dmy[3];
        if (m >= 1 && m <= 12 && d >= 1 && d <= 31) return Date.UTC(y, m - 1, d);
      }
      const t = new Date(s).getTime();
      return Number.isFinite(t) ? t : NaN;
    }

    function sortSheetRowsByDate(rows) {
      return (rows || [])
        .slice()
        .filter((r) => r?.date)
        .sort((a, b) => {
          const ta = sheetRowDateMs(a.date);
          const tb = sheetRowDateMs(b.date);
          if (Number.isFinite(ta) && Number.isFinite(tb)) return ta - tb;
          if (Number.isFinite(ta)) return -1;
          if (Number.isFinite(tb)) return 1;
          return String(a.date).localeCompare(String(b.date));
        });
    }

    /* ── Render ── */
    function renderCards(data) {
      const grid = document.getElementById('cards-grid');
      grid.innerHTML = '';

      FUEL_KEYS.forEach(({ key, label, accent, lightAccent }) => {
        const activeAccent = (currentTheme === 'light' && lightAccent) ? lightAccent : accent;

        const prices = data
          .map(row => parseFloat(row[key]))
          .filter(v => !isNaN(v) && v > 0);

        const current = prices[prices.length - 1];
        const prev    = prices[prices.length - 2];
        if (current === undefined) return;

        const isUSD = currentCurrency === 'usd';
        const rate  = isUSD ? SGD_TO_USD : 1;
        const sym   = isUSD ? 'USD' : 'S$';
        const disp  = current * rate;
        const dispP = prev !== undefined ? prev * rate : undefined;

        const diff        = dispP !== undefined ? +(disp - dispP).toFixed(3) : 0;
        const changeClass = diff > 0 ? 'up' : diff < 0 ? 'down' : 'same';
        const arrow       = diff > 0 ? '▲' : diff < 0 ? '▼' : '─';
        const changeLabel = diff === 0
          ? 'Unchanged'
          : `${diff > 0 ? '+' : ''}${sym} ${Math.abs(diff).toFixed(2)}`;

        const card = document.createElement('div');
        card.className = 'fuel-card';
        card.style.setProperty('--card-accent', activeAccent);
        card.innerHTML = `
          <div class="card-header">
            <div>
              <div class="card-name">${label} Petrol</div>
              <div class="card-name-sub">Singapore-Wide</div>
            </div>
            <span class="card-type-badge" style="color:${activeAccent};border-color:${activeAccent}40;background:${activeAccent}12;">${label}</span>
          </div>
          <div class="card-price-row">
            <span class="card-currency">${sym}</span>
            <span class="card-price" style="color:${activeAccent}">${disp.toFixed(2)}</span>
            <span class="card-currency">/L</span>
          </div>
          <div class="card-change ${changeClass}">
            <span class="change-arrow">${arrow}</span>
            <span class="change-label">${changeLabel}</span>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    /* ── Fetch ── */
    const SHEET_ID   = '1kvbA3aTL_4VvjSjsx7n0kcOLbjrXvDRnru8NEF1pDCE';
    const SHEET_NAME = 'Singapore';
    const SHEET_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`;

    async function loadData() {
      const statusDot  = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');
      const countryPill = document.getElementById('country-status');

      try {
        const res  = await fetch(SHEET_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const data = sortSheetRowsByDate(parseCSV(text));
        window._sgData = data;

        renderCards(data);

        // Last updated
        const lastRow = data[data.length - 1];
        if (lastRow?.date) {
          document.getElementById('last-updated').textContent =
            new Date(lastRow.date).toLocaleDateString('en-SG', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        statusDot.classList.remove('error');
        statusText.textContent = 'Connected';
        countryPill.textContent = '● Live';
        countryPill.classList.add('live');
      } catch (err) {
        console.error(err);
        statusDot.classList.add('error');
        statusText.textContent = 'Failed to load. Retrying…';
        countryPill.textContent = '○ Error';
        document.getElementById('cards-grid').innerHTML =
          `<p class="error-msg">Could not load Singapore data. Please try again later.</p>`;
      }
    }

    loadData();
  </script>

  <script>
    (function() {
      var hdr = document.querySelector('header');
      window.addEventListener('scroll', function() {
        hdr.classList.toggle('scrolled', window.scrollY > 50);
      }, { passive: true });
    })();
  </script>
</body>
</html>
