<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gasly — World Live Fuel Prices</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    (function(){
      var t = localStorage.getItem('theme') ||
        (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <style>
    :root {
      --bg:         #0a0a0a;
      --bg-card:    rgba(18,18,18,0.85);
      --text:       #f0f0f0;
      --text-muted: #888;
      --blue:       #00d4ff;
      --border:     rgba(255,255,255,0.08);
      --radius:     14px;
      --font:       'JetBrains Mono', 'Fira Code', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow-x: hidden;   /* page is vertically scrollable now */
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse at 58% 45%, rgba(0,212,255,0.055) 0%, transparent 60%);
    }

    /* CRT scanlines */
    .scanlines {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.055) 2px, rgba(0,0,0,0.055) 4px
      );
    }

    /* ════════════════���══════════════════════════════════════════
       HERO — fills the viewport (header + map)
    ═══════════════════════════════════════════════════════════ */
    .hero {
      position: relative; z-index: 2;
      height: 100vh;
      height: 100svh; /* respects mobile browser chrome */
      display: flex; flex-direction: column;
    }

    /* ── Header ────────────���────────────────────────────────── */
    header {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 28px 16px;
      border-bottom: 1px solid var(--border);
    }

    .logo-block { display: flex; align-items: center; gap: 10px; }
    .site-logo  { height: 34px; width: auto; }

    .site-title {
      font-size: 0.95rem; font-weight: 700;
      letter-spacing: 0.1em; line-height: 1;
    }
    .title-regular { font-weight: 400; color: #fff; }
    .title-bold    { font-weight: 700; color: #fff; }

    .site-subtitle {
      font-size: 0.6rem; color: var(--text-muted);
      letter-spacing: 0.14em; text-transform: uppercase; margin-top: 4px;
    }

    .status-pill {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 11px;
      border: 1px solid rgba(0,212,255,0.22);
      border-radius: 20px;
      background: rgba(0,212,255,0.07);
      font-size: 0.6rem; font-weight: 600;
      color: var(--blue); letter-spacing: 0.1em; text-transform: uppercase;
    }

    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--blue); box-shadow: 0 0 6px var(--blue);
      animation: blink 2s ease-in-out infinite; flex-shrink: 0;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    /* ── Map ──────────────────────────────────────���─────────── */
    .map-wrap {
      flex: 1; position: relative; overflow: hidden; min-height: 0;
    }

    .map-wrap svg {
      position: absolute; inset: 0;
      width: 100%; height: 100%; display: block;
    }

    /* Ocean */
    .sphere { fill: rgba(0,212,255,0.012); }

    /* Grid lines */
    .graticule { fill: none; stroke: rgba(255,255,255,0.04); stroke-width: 0.3; }

    /* Rest of world */
    .country {
      fill: rgba(255,255,255,0.018); stroke: rgba(255,255,255,0.2); stroke-width: 0.5;
      cursor: default; transition: fill 0.12s, stroke 0.12s;
    }
    .country:hover { fill: rgba(255,255,255,0.05); stroke: rgba(255,255,255,0.3); }

    /* Southeast Asia */
    .country.sea {
      fill: rgba(255,255,255,0.02); stroke: rgba(255,255,255,0.28); stroke-width: 0.55;
      cursor: pointer;
    }
    .country.sea:hover { fill: rgba(255,255,255,0.07); stroke: rgba(255,255,255,0.5); }

    /* Malaysia — live */
    .country.live {
      fill: rgba(0,212,255,0.16); stroke: rgba(0,212,255,0.88); stroke-width: 0.9;
      cursor: pointer;
    }
    .country.live:hover { fill: rgba(0,212,255,0.26); stroke: #00d4ff; }

    /* Malaysia glow halo */
    .glow-halo {
      fill: rgba(0,212,255,0.06); stroke: rgba(0,212,255,0.35); stroke-width: 5;
      pointer-events: none;
      animation: haloPulse 2.8s ease-in-out infinite;
    }
    @keyframes haloPulse {
      0%, 100% { opacity: 0.4; stroke-width: 5; }
      50%       { opacity: 1;   stroke-width: 9; }
    }

    /* Ping rings */
    .ping-ring {
      fill: none; stroke: #00d4ff;
      animation: pingOut 2.6s ease-out infinite;
    }
    .ping-ring:nth-child(2) { animation-delay: 0.87s; }
    .ping-ring:nth-child(3) { animation-delay: 1.73s; }

    /* Centre dot */
    .ping-dot {
      fill: #00d4ff;
      filter: drop-shadow(0 0 4px #00d4ff) drop-shadow(0 0 8px rgba(0,212,255,0.5));
    }

    /* LIVE label */
    .live-tag {
      font-family: var(--font); font-weight: 700; fill: #00d4ff;
      dominant-baseline: middle; text-anchor: start; letter-spacing: 0.14em;
      filter: drop-shadow(0 0 5px rgba(0,212,255,0.9));
    }

    /* Country name labels */
    .cname {
      font-family: var(--font); font-weight: 500; letter-spacing: 0.1em;
      text-anchor: middle; dominant-baseline: middle;
      pointer-events: none; text-transform: uppercase;
    }
    .cname.sea-name      { fill: rgba(255,255,255,0.45); }
    .cname.neighbor-name { fill: rgba(255,255,255,0.13); }

    /* Edge vignette */
    .map-vignette {
      position: absolute; inset: 0; z-index: 1; pointer-events: none;
      background:
        linear-gradient(to right,  rgba(10,10,10,0.88) 0%, rgba(10,10,10,0) 13%, rgba(10,10,10,0) 87%, rgba(10,10,10,0.88) 100%),
        linear-gradient(to bottom, rgba(10,10,10,0.72) 0%, rgba(10,10,10,0) 16%, rgba(10,10,10,0) 78%, rgba(10,10,10,0.88) 100%);
    }

    /* Map hint */
    .map-hint {
      position: absolute; bottom: 40px; left: 50%;
      transform: translateX(-50%);
      z-index: 2; pointer-events: none;
      font-size: 0.58rem; color: var(--text-muted);
      letter-spacing: 0.12em; text-transform: uppercase;
      opacity: 0.4; white-space: nowrap;
    }

    /* Scroll-down nudge */
    .scroll-nudge {
      position: absolute; bottom: 14px; left: 50%;
      transform: translateX(-50%);
      z-index: 2; pointer-events: none;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      opacity: 0.28;
      animation: nudgeBounce 2.2s ease-in-out infinite;
    }
    .scroll-nudge span {
      font-size: 0.52rem; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--text-muted);
    }
    .scroll-nudge svg { color: var(--text-muted); }
    @keyframes nudgeBounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(4px); }
    }

    /* ═══════════════════════════════════════════════════════════
       COUNTRIES SECTION
    ═══════════════════════════════════════════════════════════ */
    .countries-section {
      position: relative; z-index: 2;
      background: var(--bg);
      padding: 36px 0 52px;
      border-top: 1px solid var(--border);
    }

    /* Section header */
    .cs-header {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 0 28px 22px;
      flex-wrap: wrap; gap: 8px;
    }

    .cs-title {
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.18em;
      color: var(--text-muted);
    }

    .cs-sub {
      font-size: 0.6rem; color: var(--text-muted);
      opacity: 0.5; letter-spacing: 0.08em;
    }

    /* Desktop arrow nav */
    .cs-arrows {
      display: flex; gap: 6px; align-items: center;
    }

    .cs-arrow {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 0.8rem;
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      line-height: 1;
    }
    .cs-arrow:hover {
      background: rgba(255,255,255,0.1);
      color: var(--text);
      border-color: rgba(255,255,255,0.2);
    }

    /* Scroll track */
    .cs-scroll {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      padding: 6px 28px 10px;
      scroll-padding-left: 28px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .cs-scroll::-webkit-scrollbar { display: none; }

    /* ── Country card ───────────────���───────────────────────── */
    .cc {
      flex: 0 0 auto;
      width: 210px;
      scroll-snap-align: start;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 18px 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex; flex-direction: column; gap: 8px;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      cursor: default;
    }

    .cc.clickable {
      cursor: pointer;
    }

    .cc.clickable:hover {
      transform: translateY(-3px);
      border-color: rgba(0,212,255,0.4);
      box-shadow: 0 8px 32px rgba(0,212,255,0.08);
    }

    .cc:not(.clickable) {
      opacity: 0.6;
    }

    /* Card top row: flag + status badge */
    .cc-top {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px;
    }

    .cc-flag { font-size: 1.6rem; line-height: 1; flex-shrink: 0; }

    .cc-badge {
      font-size: 0.56rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 5px; border: 1px solid;
      white-space: nowrap;
    }
    .cc-badge.live {
      color: var(--blue);
      background: rgba(0,212,255,0.1);
      border-color: rgba(0,212,255,0.3);
    }
    .cc-badge.soon {
      color: var(--text-muted);
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.1);
    }

    /* Card body */
    .cc-name {
      font-size: 0.92rem; font-weight: 700;
      letter-spacing: 0.06em; color: var(--text);
    }

    .cc-fuel-list {
      display: flex; flex-wrap: wrap; gap: 4px;
    }

    .cc-fuel-pill {
      font-size: 0.52rem; letter-spacing: 0.04em;
      padding: 2px 7px; border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-muted); white-space: nowrap;
    }

    .cc-see-more {
      font-size: 0.52rem; letter-spacing: 0.06em;
      color: var(--text-muted); opacity: 0.45;
      cursor: pointer; text-decoration: underline;
      text-underline-offset: 2px; white-space: nowrap;
      align-self: center;
    }

    .cc-currency {
      font-size: 0.58rem; color: var(--text-muted);
      opacity: 0.55; letter-spacing: 0.08em;
    }

    /* Card CTA */
    .cc-cta {
      margin-top: 4px;
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--blue);
      transition: opacity 0.15s;
    }
    .cc.clickable:hover .cc-cta { opacity: 0.75; }

    /* See more card */
    .cc-see-more-card {
      opacity: 0.5;
      border-style: dashed;
      align-items: center; justify-content: center;
      min-height: 160px;
    }

    .cc-more-inner {
      display: flex; flex-direction: column;
      align-items: center; gap: 4px; text-align: center;
    }

    .cc-more-count {
      font-size: 1.6rem; font-weight: 700;
      color: var(--text-muted); letter-spacing: 0.04em; line-height: 1;
    }

    .cc-more-label {
      font-size: 0.65rem; font-weight: 600;
      color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase;
    }

    .cc-more-sub {
      font-size: 0.55rem; color: var(--text-muted);
      opacity: 0.55; letter-spacing: 0.08em; margin-top: 2px;
    }

    /* Live pulsing dot in card */
    .cc-live-dot {
      display: inline-block;
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--blue); box-shadow: 0 0 5px var(--blue);
      margin-right: 5px; vertical-align: middle;
      animation: blink 2s ease-in-out infinite;
    }

    /* ══════════════════���════════════════════════���═══════════════
       FOOTER
    ═══════════════════════════════════════════════════════════ */
    footer {
      position: relative; z-index: 2;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 28px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }
    .footer-text {
      font-size: 0.6rem; color: var(--text-muted); opacity: 0.45; letter-spacing: 0.06em;
    }
    .footer-text a { color: var(--text-muted); text-decoration: none; transition: color 0.15s; }
    .footer-text a:hover { color: var(--text); opacity: 1; }

    /* ── Theme button ─────────────────────────────────────────── */
    .theme-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 8px;
      color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .theme-btn:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.06);
    }

    /* ── Light mode ────────────────────────────────────────────── */
    [data-theme="light"] {
      --bg:         #f5f4f0;
      --bg-card:    rgba(255,255,255,0.92);
      --text:       #1a1a1a;
      --text-muted: #555;
      --border:     rgba(0,0,0,0.1);
    }
    [data-theme="light"] body { background: var(--bg); }
    [data-theme="light"] body::before {
      background: radial-gradient(ellipse at 58% 45%, rgba(0,150,180,0.04) 0%, transparent 60%);
    }
    [data-theme="light"] .scanlines { display: none; }
    [data-theme="light"] .title-regular,
    [data-theme="light"] .title-bold { color: #1a1a1a; }
    [data-theme="light"] .site-subtitle { color: #777; }

    /* Map — light */
    [data-theme="light"] .sphere     { fill: rgba(0,170,210,0.07); }
    [data-theme="light"] .graticule  { stroke: rgba(0,0,0,0.06); }
    [data-theme="light"] .country    { fill: rgba(0,0,0,0.055); stroke: rgba(0,0,0,0.22); }
    [data-theme="light"] .country:hover { fill: rgba(0,0,0,0.11); stroke: rgba(0,0,0,0.4); }
    [data-theme="light"] .country.sea   { fill: rgba(0,0,0,0.04); stroke: rgba(0,0,0,0.32); }
    [data-theme="light"] .country.sea:hover { fill: rgba(0,0,0,0.1); stroke: rgba(0,0,0,0.52); }
    [data-theme="light"] .cname.sea-name      { fill: rgba(0,0,0,0.5); }
    [data-theme="light"] .cname.neighbor-name { fill: rgba(0,0,0,0.22); }
    [data-theme="light"] .map-vignette {
      background:
        linear-gradient(to right,  rgba(245,244,240,0.9) 0%, transparent 13%, transparent 87%, rgba(245,244,240,0.9) 100%),
        linear-gradient(to bottom, rgba(245,244,240,0.75) 0%, transparent 16%, transparent 78%, rgba(245,244,240,0.9) 100%);
    }

    /* Cards — light */
    [data-theme="light"] .countries-section { background: var(--bg); }
    [data-theme="light"] .cc              { background: rgba(255,255,255,0.9); }
    [data-theme="light"] .cc-fuel-pill    { border-color: rgba(0,0,0,0.12); color: #666; }
    [data-theme="light"] .cc-see-more-card { background: rgba(0,0,0,0.02); }
    [data-theme="light"] footer           { background: var(--bg); }
    [data-theme="light"] .theme-btn:hover { background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.2); }

    /* ── Tooltip ──────────────────────────────────────────────── */
    #tooltip {
      position: fixed; z-index: 500; pointer-events: none;
      opacity: 0; transition: opacity 0.12s ease;
      background: rgba(8,8,8,0.94);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 9px 14px 8px;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      min-width: 148px;
    }
    #tooltip.show { opacity: 1; }

    .tt-country {
      display: block; font-size: 0.75rem; font-weight: 600;
      color: var(--text); letter-spacing: 0.04em; margin-bottom: 3px;
    }
    .tt-status {
      display: block; font-size: 0.58rem;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .tt-status.live { color: var(--blue); }
    .tt-status.soon { color: var(--text-muted); opacity: 0.65; }

    /* ════════════════════���════════════════════════════════��═════
       MOBILE  (< 640px)
    ══════════════════════════════════════���════════════════════ */
    @media (max-width: 639px) {
      header { padding: 14px 16px 12px; }

      .site-logo    { height: 28px; }
      .site-title   { font-size: 0.85rem; }
      .site-subtitle { display: none; }
      .status-pill  { font-size: 0.56rem; padding: 4px 9px; gap: 5px; }
      .status-dot   { width: 5px; height: 5px; }

      .map-vignette {
        background:
          linear-gradient(to right,  rgba(10,10,10,0.6) 0%, rgba(10,10,10,0) 8%,  rgba(10,10,10,0) 92%, rgba(10,10,10,0.6) 100%),
          linear-gradient(to bottom, rgba(10,10,10,0.7) 0%, rgba(10,10,10,0) 12%, rgba(10,10,10,0) 80%, rgba(10,10,10,0.85) 100%);
      }

      .map-hint    { font-size: 0.5rem; bottom: 38px; }
      .scroll-nudge { bottom: 10px; }

      /* Countries section */
      .countries-section { padding: 28px 0 40px; }
      .cs-header { padding: 0 16px 18px; }
      .cs-arrows { display: none; } /* arrows not needed on mobile */
      .cs-scroll { padding: 6px 16px 10px; scroll-padding-left: 16px; gap: 12px; }

      /* Cards: ~1.4 visible at once to signal swipe */
      .cc { width: min(72vw, 240px); }

      footer { padding: 10px 16px; }
    }
  </style>
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>

  <!-- ── Hero: full viewport ───────────────────��─────────────── -->
  <div class="hero">
    <header>
      <div class="logo-block">
        <img src="logo.svg" alt="Gasly logo" class="site-logo" />
        <div>
          <h1 class="site-title">
            <span class="title-regular">Gas</span><span class="title-bold">ly</span>
          </h1>
          <p class="site-subtitle">World Live Fuel Prices</p>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <button id="theme-btn" class="theme-btn" onclick="toggleTheme()" aria-label="Toggle light/dark mode"></button>
        <div class="status-pill">
          <span class="status-dot"></span>
          <span>1 country live</span>
        </div>
      </div>
    </header>

    <div class="map-wrap" id="map-wrap">
      <div class="map-vignette"></div>
      <div class="map-hint">Tap the glowing country to view live prices</div>
      <div class="scroll-nudge" aria-hidden="true">
        <span>scroll</span>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
      </div>
    </div>
  </div>

  <!-- ── Countries section ──────────────────────────────���────── -->
  <section class="countries-section" id="countries">
    <div class="cs-header">
      <div>
        <div class="cs-title">Fuel Prices by Country</div>
        <div class="cs-sub">Southeast Asia · more regions coming</div>
      </div>
      <div class="cs-arrows">
        <button class="cs-arrow" onclick="scrollCards(-1)" aria-label="Previous">&#8592;</button>
        <button class="cs-arrow" onclick="scrollCards(1)"  aria-label="Next">&#8594;</button>
      </div>
    </div>
    <div class="cs-scroll" id="cs-scroll">
      <!-- Injected by JS -->
    </div>
  </section>

  <!-- ── Footer ───────────────────────────────��──────────────── -->
  <footer>
    <span class="footer-text">Southeast Asia · expanding globally</span>
    <span class="footer-text">
      <a href="https://github.com/aaronagai/Gasly" target="_blank" rel="noopener">github.com/aaronagai/Gasly</a>
    </span>
  </footer>

  <!-- Tooltip -->
  <div id="tooltip">
    <span class="tt-country" id="tt-country"></span>
    <span class="tt-status"  id="tt-status"></span>
  </div>

  <script>
    /* ── Theme ───────────────────────────────────────────────── */
    const ICON_SUN  = `<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.25a.75.75 0 0 1 .75.75v2.25a.75.75 0 0 1-1.5 0V3a.75.75 0 0 1 .75-.75ZM7.5 12a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0Zm11.394-5.834a.75.75 0 0 0-1.06-1.06l-1.591 1.59a.75.75 0 1 0 1.06 1.061l1.591-1.59ZM21.75 12a.75.75 0 0 1-.75.75h-2.25a.75.75 0 0 1 0-1.5H21a.75.75 0 0 1 .75.75Zm-3.916 5.834a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 1 0-1.061 1.06l1.59 1.591ZM12 18a.75.75 0 0 1 .75.75V21a.75.75 0 0 1-1.5 0v-2.25A.75.75 0 0 1 12 18Zm-4.242-.697a.75.75 0 0 0-1.061-1.06l-1.591 1.59a.75.75 0 0 0 1.06 1.061l1.591-1.59ZM6 12a.75.75 0 0 1-.75.75H3a.75.75 0 0 1 0-1.5h2.25A.75.75 0 0 1 6 12Zm.697-4.243a.75.75 0 0 0 1.06-1.06L6.166 5.106a.75.75 0 0 0-1.06 1.06l1.59 1.591Z"/></svg>`;
    const ICON_MOON = `<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M9.528 1.718a.75.75 0 0 1 .162.819A8.97 8.97 0 0 0 9 6a9 9 0 0 0 9 9 8.97 8.97 0 0 0 3.463-.69.75.75 0 0 1 .981.98 10.503 10.503 0 0 1-9.694 6.46c-5.799 0-10.5-4.701-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 0 1 .818.162Z" clip-rule="evenodd"/></svg>`;

    let currentTheme = localStorage.getItem('theme') ||
      (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');

    function updateThemeBtn() {
      const btn = document.getElementById('theme-btn');
      if (btn) btn.innerHTML = currentTheme === 'dark' ? ICON_SUN : ICON_MOON;
    }
    window.toggleTheme = function() {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('theme', currentTheme);
      document.documentElement.setAttribute('data-theme', currentTheme);
      updateThemeBtn();
    };
    updateThemeBtn();

    /* ── Country cards data ───────────────────────────────────── */
    const COUNTRIES = [
      { id: 458, flag: '🇲🇾', name: 'Malaysia',    fuels: ['RON95','RON97','Diesel'],                              currency: 'MYR / L', url: './malaysia.html', live: true  },
      { id: 702, flag: '🇸🇬', name: 'Singapore',   fuels: ['RON92','RON95','RON98','Premium','Diesel'],           currency: 'SGD / L', url: './singapore.html', live: false },
      { id: 96,  flag: '🇧🇳', name: 'Brunei',      fuels: ['RON95','RON97','Diesel'],                              currency: 'BND / L', url: './brunei.html',   live: false },
      { id: 764, flag: '🇹🇭', name: 'Thailand',    fuels: ['RON91','RON95','E20','E85','Diesel','Biodiesel B7'],   currency: 'THB / L', url: null,              live: false },
      { id: 360, flag: '🇮🇩', name: 'Indonesia',   fuels: ['Pertalite','Pertamax','Pertamax Turbo','Dexlite','Biosolar B35'], currency: 'IDR / L', url: null, live: false },
      { id: 704, flag: '🇻🇳', name: 'Vietnam',     fuels: ['RON95','E5 RON92','Diesel'],                           currency: 'VND / L', url: null,              live: false },
      { id: 608, flag: '🇵🇭', name: 'Philippines', fuels: ['RON91','RON95','RON97','Diesel'],                      currency: 'PHP / L', url: null,              live: false },
      { id: 116, flag: '🇰🇭', name: 'Cambodia',    fuels: ['RON92','RON95','Diesel'],                              currency: 'KHR / L', url: null,              live: false },
      { id: 418, flag: '🇱🇦', name: 'Laos',        fuels: ['RON95','Diesel'],                                      currency: 'LAK / L', url: null,              live: false },
      { id: 104, flag: '🇲🇲', name: 'Myanmar',     fuels: ['RON92','RON95','Diesel'],                              currency: 'MMK / L', url: null,              live: false },
    ];

    function renderCountryCards() {
      const scroll = document.getElementById('cs-scroll');
      const visible = COUNTRIES.slice(0, 4);

      visible.forEach(c => {
        const card = document.createElement('div');
        card.className = 'cc' + (c.live ? ' clickable' : '');
        if (c.url) {
          card.setAttribute('role', 'button');
          card.setAttribute('tabindex', '0');
          card.addEventListener('click', () => { window.location.href = c.url; });
          card.addEventListener('keydown', e => { if (e.key === 'Enter') window.location.href = c.url; });
        }

        const badgeTxt = c.live ? '● Live' : '○ Soon';
        const badgeCls = c.live ? 'live' : 'soon';
        const ctaHtml  = c.live
          ? `<div class="cc-cta"><span class="cc-live-dot"></span>View prices →</div>`
          : `<div class="cc-cta" style="color:var(--text-muted);opacity:0.4">Coming soon</div>`;

        const MAX_FUELS = 4;
        const shown  = c.fuels.slice(0, MAX_FUELS);
        const extra  = c.fuels.length - shown.length;
        const pillsHtml = shown.map(f => `<span class="cc-fuel-pill">${f}</span>`).join('');
        const moreHtml  = extra > 0 ? `<span class="cc-see-more">+${extra} more</span>` : '';

        card.innerHTML = `
          <div class="cc-top">
            <span class="cc-flag">${c.flag}</span>
            <span class="cc-badge ${badgeCls}">${badgeTxt}</span>
          </div>
          <div class="cc-name">${c.name}</div>
          <div class="cc-fuel-list">${pillsHtml}${moreHtml}</div>
          <div class="cc-currency">${c.currency}</div>
          ${ctaHtml}
        `;
        scroll.appendChild(card);
      });

      /* See more card */
      const remaining = COUNTRIES.length - visible.length;
      const more = document.createElement('div');
      more.className = 'cc cc-see-more-card';
      more.innerHTML = `
        <div class="cc-more-inner">
          <div class="cc-more-count">+${remaining}</div>
          <div class="cc-more-label">more countries</div>
          <div class="cc-more-sub">coming soon</div>
        </div>
      `;
      scroll.appendChild(more);
    }

    renderCountryCards();

    /* Arrow scroll (desktop) */
    function scrollCards(dir) {
      const el = document.getElementById('cs-scroll');
      el.scrollBy({ left: dir * 230, behavior: 'smooth' });
    }

    /* ──────────────────────────���───────────────────���──────────
       MAP
    ─────────────────────────────────────────────────────��─── */
    const SEA  = new Set([96, 104, 116, 360, 418, 458, 608, 626, 702, 704, 764]);
    const LIVE = { 458: { name: 'Malaysia', url: './malaysia.html' } };

    const NAMES = {
      36:'Australia', 50:'Bangladesh', 96:'Brunei', 104:'Myanmar',
      116:'Cambodia', 144:'Sri Lanka', 156:'China', 158:'Taiwan',
      356:'India', 360:'Indonesia', 392:'Japan', 410:'South Korea',
      418:'Laos', 458:'Malaysia', 598:'Papua New Guinea', 608:'Philippines',
      626:'Timor-Leste', 702:'Singapore', 704:'Vietnam', 764:'Thailand',
    };

    const MAP_LABELS = {
      104:'Myanmar',  116:'Cambodia',    360:'Indonesia',
      418:'Laos',     608:'Philippines', 764:'Thailand', 704:'Vietnam',
      156:'China',    356:'India',       36:'Australia', 392:'Japan',
    };
    const SEA_LABEL_IDS = new Set([104, 116, 360, 418, 608, 764, 704]);

    const mobile = window.innerWidth < 640;
    const W = mobile ? 480 : 960;
    const H = mobile ? 820 : 500;
    const SCALE  = mobile ? 640 : 730;
    const CENTER = [115, mobile ? 6 : 9];

    const svg = d3.select('#map-wrap')
      .insert('svg', ':first-child')
      .attr('viewBox', `0 0 ${W} ${H}`)
      .attr('preserveAspectRatio', 'xMidYMid meet');

    const defs   = svg.append('defs');
    const filter = defs.append('filter')
      .attr('id', 'blur-glow')
      .attr('x', '-60%').attr('y', '-60%')
      .attr('width', '220%').attr('height', '220%');
    filter.append('feGaussianBlur').attr('stdDeviation', mobile ? 5 : 7).attr('result', 'blur');
    const merge = filter.append('feMerge');
    merge.append('feMergeNode').attr('in', 'blur');
    merge.append('feMergeNode').attr('in', 'SourceGraphic');

    const projection = d3.geoMercator()
      .center(CENTER).scale(SCALE).translate([W / 2, H / 2]);

    const path = d3.geoPath().projection(projection);

    svg.append('path').datum({ type: 'Sphere' }).attr('class', 'sphere').attr('d', path);
    svg.append('path').datum(d3.geoGraticule().step([10, 10])()).attr('class', 'graticule').attr('d', path);

    /* Tooltip */
    const tooltip   = document.getElementById('tooltip');
    const ttCountry = document.getElementById('tt-country');
    const ttStatus  = document.getElementById('tt-status');

    function showTip(e, id) {
      const name = NAMES[id];
      if (!name) return;
      const live = !!LIVE[id];
      ttCountry.textContent = name;
      ttStatus.textContent  = live ? '● Live data' : '○ Coming soon';
      ttStatus.className    = 'tt-status ' + (live ? 'live' : 'soon');
      tooltip.classList.add('show');
      moveTip(e.clientX, e.clientY);
    }

    function moveTip(cx, cy) {
      let x = cx + 14, y = cy - 46;
      if (x + 170 > window.innerWidth) x = cx - 170;
      if (y < 8)                        y = cy + 14;
      tooltip.style.left = x + 'px';
      tooltip.style.top  = y + 'px';
    }

    function hideTip() { tooltip.classList.remove('show'); }

    document.addEventListener('touchstart', hideTip, { passive: true });

    d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
      .then(world => {
        const countries = topojson.feature(world, world.objects.countries);

        /* Glow halo (bottom-most) */
        svg.selectAll('.glow-halo')
          .data(countries.features.filter(d => LIVE[+d.id]))
          .enter().append('path')
          .attr('class', 'glow-halo').attr('d', path)
          .attr('filter', 'url(#blur-glow)');

        /* Rest of world */
        svg.selectAll('.bg')
          .data(countries.features.filter(d => !SEA.has(+d.id)))
          .enter().append('path').attr('class', 'country').attr('d', path)
          .on('mousemove', (e, d) => showTip(e, +d.id))
          .on('mouseleave', hideTip)
          .on('touchstart', (e, d) => {
            e.stopPropagation();
            const t = e.touches[0];
            showTip({ clientX: t.clientX, clientY: t.clientY }, +d.id);
          }, { passive: true });

        /* SEA (non-live) */
        svg.selectAll('.sea-c')
          .data(countries.features.filter(d => SEA.has(+d.id) && !LIVE[+d.id]))
          .enter().append('path').attr('class', 'country sea').attr('d', path)
          .on('mousemove', (e, d) => showTip(e, +d.id))
          .on('mouseleave', hideTip)
          .on('touchstart', (e, d) => {
            e.stopPropagation();
            const t = e.touches[0];
            showTip({ clientX: t.clientX, clientY: t.clientY }, +d.id);
          }, { passive: true });

        /* Malaysia */
        svg.selectAll('.live-c')
          .data(countries.features.filter(d => LIVE[+d.id]))
          .enter().append('path').attr('class', 'country live').attr('d', path)
          .on('mousemove', (e, d) => showTip(e, +d.id))
          .on('mouseleave', hideTip)
          .on('click', (e, d) => { const c = LIVE[+d.id]; if (c) window.location.href = c.url; })
          .on('touchend', (e, d) => {
            e.preventDefault();
            const c = LIVE[+d.id]; if (c) window.location.href = c.url;
          });

        /* Country labels */
        const labelSize = mobile ? 9 : 8;
        countries.features.forEach(f => {
          const id = +f.id, name = MAP_LABELS[id];
          if (!name) return;
          const [lx, ly] = path.centroid(f);
          if (isNaN(lx) || isNaN(ly) || lx < 0 || lx > W || ly < 0 || ly > H) return;
          svg.append('text')
            .attr('class', SEA_LABEL_IDS.has(id) ? 'cname sea-name' : 'cname neighbor-name')
            .attr('x', lx).attr('y', ly).attr('font-size', labelSize)
            .text(name);
        });

        /* Singapore pin */
        const [sgx, sgy] = projection([103.82, 1.35]);
        if (sgx > 0 && sgx < W && sgy > 0 && sgy < H) {
          const ox = mobile ? 18 : 22, oy = mobile ? 18 : 22;
          const lx = sgx - ox, ly = sgy - oy;
          const sg = svg.append('g').attr('class', 'sg-pin');

          sg.append('line')
            .attr('x1', sgx).attr('y1', sgy)
            .attr('x2', lx + (mobile ? 16 : 20)).attr('y2', ly)
            .attr('stroke', 'rgba(255,255,255,0.3)').attr('stroke-width', 0.6)
            .attr('pointer-events', 'none');

          sg.append('circle')
            .attr('cx', sgx).attr('cy', sgy).attr('r', mobile ? 2 : 2.5)
            .attr('fill', 'rgba(255,255,255,0.55)')
            .attr('stroke', 'rgba(255,255,255,0.8)').attr('stroke-width', 0.5)
            .attr('pointer-events', 'none');

          sg.append('text')
            .attr('class', 'cname sea-name')
            .attr('x', lx).attr('y', ly).attr('text-anchor', 'middle')
            .attr('font-size', mobile ? 7 : 6.5).attr('pointer-events', 'none')
            .text('SGP');

          sg.append('circle')
            .attr('cx', sgx).attr('cy', sgy).attr('r', mobile ? 18 : 14)
            .attr('fill', 'transparent').attr('cursor', 'pointer')
            .on('mousemove', e => showTip(e, 702)).on('mouseleave', hideTip)
            .on('touchstart', e => {
              e.stopPropagation();
              const t = e.touches[0];
              showTip({ clientX: t.clientX, clientY: t.clientY }, 702);
            }, { passive: true });
        }

        /* Malaysia ping + LIVE badge */
        const MY = countries.features.find(f => +f.id === 458);
        if (MY) {
          const [cx, cy] = path.centroid(MY);
          const ringMax = mobile ? 28 : 32;
          const dotR    = mobile ? 3.5 : 4;
          const tagSize = mobile ? 8 : 7;
          const g = svg.append('g').attr('pointer-events', 'none');

          [0, 0.87, 1.73].forEach(delay => {
            g.append('circle').attr('class', 'ping-ring')
              .attr('cx', cx).attr('cy', cy).attr('r', dotR)
              .style('animation-delay', `${delay}s`);
          });
          g.append('circle').attr('class', 'ping-dot')
            .attr('cx', cx).attr('cy', cy).attr('r', dotR);
          g.append('text').attr('class', 'live-tag')
            .attr('x', cx + dotR + 5).attr('y', cy - 10)
            .attr('font-size', tagSize).text('LIVE');
        }
      });

    /* Inject ping keyframes with correct max radius */
    const pingMax = mobile ? 28 : 32;
    const st = document.createElement('style');
    st.textContent = `
      @keyframes pingOut {
        0%   { r: ${mobile ? 3.5 : 4}; stroke-width: 1.5; opacity: 0.9; }
        100% { r: ${pingMax};           stroke-width: 0.3; opacity: 0;   }
      }
    `;
    document.head.appendChild(st);
  </script>
</body>
</html>
