<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PetrolPrice — Malaysia Fuel Prices</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://api.data.gov.my" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Scanline overlay -->
  <div class="scanlines" aria-hidden="true"></div>

  <div class="container">
    <!-- Header -->
    <header>
      <a href="./index.html" aria-label="Home">
        <img src="logo.svg" alt="PetrolPrice logo" class="site-logo" />
      </a>
      <div class="currency-toggle" role="group" aria-label="Currency display">
        <button class="curr-opt" data-curr="local" onclick="setCurrency('local')">RM</button>
        <button class="curr-opt" data-curr="usd"   onclick="setCurrency('usd')"  >USD</button>
      </div>
    </header>

    <!-- Meta bar -->
    <div class="meta-bar">
      <div class="meta-item">
        <span class="meta-label" data-i18n="lastUpdated">Last Updated</span>
        <span class="meta-value" id="last-updated">—</span>
      </div>
      <div class="meta-item">
        <span class="meta-label" data-i18n="nextUpdate">Next Update</span>
        <span class="meta-value" id="next-update-countdown">—</span>
        <span class="status-dot" id="status-dot"></span>
        <span class="meta-value" id="status-text">Loading…</span>
      </div>
    </div>

    <!-- Region Toggle -->
    <div class="region-strip">
      <button id="rbtn-peninsular" class="region-btn active" onclick="setRegion('peninsular')">PENINSULAR</button>
      <span class="region-sep">/</span>
      <button id="rbtn-east" class="region-btn" onclick="setRegion('east')">SABAH/SARAWAK</button>
    </div>

    <!-- Fuel Cards Grid -->
    <main class="cards-grid" id="cards-grid">
      <!-- Cards injected by JS -->
      <div class="skeleton-card" aria-busy="true"></div>
      <div class="skeleton-card" aria-busy="true"></div>
      <div class="skeleton-card" aria-busy="true"></div>
      <div class="skeleton-card" aria-busy="true"></div>
      <div class="skeleton-card" aria-busy="true"></div>
    </main>

    <!-- 3-Month Price History Chart -->
    <section class="history-section">
      <div class="history-header">
        <span class="section-title" data-i18n="historyTitle">3-Month Price History</span>
        <button class="card-export-btn history-export-btn" onclick="showHistoryExportModal()" aria-label="Share history as Instagram Story">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v13"/><polyline points="8 7 12 3 16 7"/><path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
        </button>
      </div>
      <div class="history-chart-wrap">
        <canvas id="history-chart"></canvas>
      </div>
    </section>

    <!-- Footer -->
    <footer>
      <p class="footer-powered">Data sourced from <a href="https://data.gov.my" target="_blank" rel="noopener">data.gov.my</a> — Official Government Open Data</p>
      <nav class="footer-nav">
        <a href="./index.html#about">About</a>
        <span class="footer-sep">·</span>
        <a href="mailto:hello@petrolprice.xyz">Contact</a>
        <span class="footer-sep">·</span>
        <a href="https://github.com/aaronagai/PetrolPrice.xyz" target="_blank" rel="noopener">GitHub</a>
        <span class="footer-sep">·</span>
        <a href="./index.html#privacy">Privacy</a>
      </nav>
      <p class="footer-copy">© 2025 PetrolPrice.xyz. Open source under MIT License.</p>
    </footer>
  </div>

  <!-- Export / Instagram Story Modal -->
  <div id="export-modal" class="export-modal" role="dialog" aria-modal="true" aria-label="Share as Instagram Story">
    <div class="export-backdrop" onclick="closeExportModal()"></div>
    <div class="export-sheet">
      <button class="export-close" onclick="closeExportModal()" aria-label="Close">✕</button>
      <p class="export-hint" id="export-hint">Generating…</p>
      <div class="export-preview-wrap">
        <div class="export-spinner" id="export-spinner">
          <span class="export-spinner-dot"></span>
          <span class="export-spinner-dot"></span>
          <span class="export-spinner-dot"></span>
        </div>
        <img id="export-preview" class="export-preview-img" alt="Story preview" />
      </div>
      <button class="export-save-btn" id="export-save-btn" onclick="saveStoryImage()">Save / Share</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
  <script src="app.js" defer></script>

  <script>
    (function() {
      var hdr = document.querySelector('header');
      window.addEventListener('scroll', function() {
        hdr.classList.toggle('scrolled', window.scrollY > 50);
      }, { passive: true });
    })();
  </script>
</body>
</html>
