<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="application-name" content="PetrolPrice" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ff6a00" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1a1a1a" />
  <link rel="icon" type="image/png" href="assets/appicon.png" />
  <title>Prices | PetrolPrice</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@600&family=Inter:wght@200;300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="assets/shared.css" />
  <link rel="stylesheet" href="assets/app.css?v=38" />
</head>
<body>
  <div class="app-dashboard app-dashboard--page" id="app-dashboard" aria-hidden="false">
    <header class="app-dashboard-top">
      <a href="app.html" class="app-dashboard-back" aria-label="Back to map">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </a>
      <div class="app-dashboard-top-brand-row">
        <a href="index.html" class="app-dashboard-brand site-wordmark site-wordmark-lockup" aria-label="PetrolPrice.xyz home">
          <img src="assets/logo.svg" alt="" class="site-wordmark-logo" width="28" height="28" decoding="async" />
          <span>petrolprice.xyz</span>
        </a>
        <span class="header-context-sep" aria-hidden="true">|</span>
        <span class="header-context-label" aria-current="page">Dashboard</span>
      </div>
    </header>
    <div class="app-dashboard-scroll">
      <p class="app-dashboard-sub" id="app-dashboard-sub">Live retail prices in USD per litre (FX from Currency sheet) · change vs observation on or before each period</p>
      <div class="app-dashboard-toolbar">
        <div class="app-dashboard-toolbar-field">
          <label for="app-dashboard-fuel" class="app-dashboard-toolbar-label">Fuel</label>
          <select id="app-dashboard-fuel" class="app-dashboard-fuel-select" aria-label="Petrol or diesel grade">
            <option value="default">Default by region</option>
            <option value="mid">Mid-grade unleaded</option>
            <option value="premium">Premium unleaded</option>
            <option value="entry">Entry unleaded (91–92)</option>
            <option value="diesel">Diesel</option>
          </select>
        </div>
        <div class="app-dashboard-toolbar-field app-dashboard-toolbar-field--filter">
          <div class="app-dashboard-filter-wrap" id="app-dashboard-filter">
            <button
              type="button"
              id="app-dashboard-filter-trigger"
              class="app-dashboard-filter-btn"
              aria-expanded="false"
              aria-haspopup="true"
              aria-controls="app-dashboard-filter-panel"
            >
              <svg class="app-dashboard-filter-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path
                  d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linejoin="round"
                />
              </svg>
              Filter
            </button>
            <div id="app-dashboard-filter-panel" class="app-dashboard-filter-panel" role="dialog" aria-label="Filter by country" hidden>
              <div class="app-dashboard-filter-field-label" id="app-dashboard-filter-countries-label">Countries</div>
              <div id="app-dashboard-filter-countries" class="app-dashboard-filter-countries" role="group" aria-labelledby="app-dashboard-filter-countries-label"></div>
            </div>
          </div>
        </div>
        <div class="app-dashboard-toolbar-field">
          <label for="app-dashboard-sort" class="app-dashboard-toolbar-label">Sort</label>
          <select id="app-dashboard-sort" class="app-dashboard-sort-select" aria-label="Sort table">
            <option value="default">Default order</option>
            <option value="region_az">Region A–Z</option>
            <option value="region_za">Region Z–A</option>
            <option value="price_low">Price: low to high</option>
            <option value="price_high">Price: high to low</option>
            <option value="change_high">Change %: highest first</option>
            <option value="change_low">Change %: lowest first</option>
          </select>
        </div>
      </div>
      <div class="app-dashboard-table-outer">
        <table class="app-dashboard-table" aria-label="All regions and prices">
          <thead>
            <tr>
              <th class="app-dashboard-th app-dashboard-th--rank">#</th>
              <th class="app-dashboard-th app-dashboard-th--name">Region</th>
              <th class="app-dashboard-th app-dashboard-th--price">Price (USD/L)</th>
              <th
                class="app-dashboard-th app-dashboard-th--chg app-dashboard-th--period"
                scope="col"
                aria-label="Change vs period"
              >
                <div class="app-dashboard-period-head">
                  <div class="app-dashboard-period-dropdown" id="app-dashboard-period" data-period="y">
                    <button
                      type="button"
                      id="app-dashboard-period-trigger"
                      class="app-dashboard-period-btn"
                      aria-haspopup="listbox"
                      aria-expanded="false"
                      aria-label="Timeframe for change"
                    >
                      1Y
                    </button>
                    <div id="app-dashboard-period-menu" class="app-dashboard-period-menu" role="listbox" hidden>
                      <button type="button" role="option" class="app-dashboard-period-option" data-period="w">1W</button>
                      <button type="button" role="option" class="app-dashboard-period-option" data-period="m">1M</button>
                      <button type="button" role="option" class="app-dashboard-period-option" data-period="3m">3M</button>
                      <button type="button" role="option" class="app-dashboard-period-option" data-period="y">1Y</button>
                      <button type="button" role="option" class="app-dashboard-period-option" data-period="ytd">YTD</button>
                    </div>
                  </div>
                </div>
              </th>
            </tr>
          </thead>
          <tbody id="app-dashboard-tbody"></tbody>
        </table>
      </div>
      <p class="app-dashboard-foot" id="app-dashboard-status" aria-live="polite"></p>
    </div>
  </div>

  <script src="assets/config.js"></script>
  <script src="assets/utils.js"></script>
  <script src="assets/app-dashboard-core.js"></script>
  <script>
    window.addEventListener('load', function () {
      void loadAppCurrencyRates()
        .catch(function () {})
        .then(function () {
          return loadAndRenderAppDashboard();
        });
    });
  </script>
</body>
</html>
